name: Update Products Data
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch PChome products for household keywords
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.parse, json, time, os, datetime

          KEYWORDS = [
            ("收納箱",     "收納箱"),
            ("珪藻土地墊", "珪藻土地墊"),
            ("廚房瀝水架", "廚房瀝水架"),
            ("浴室置物架", "浴室置物架"),
            ("保溫瓶",     "不鏽鋼保溫瓶"),
            ("矽膠保鮮盒", "矽膠保鮮盒"),
            ("竹炭除臭包", "竹炭除臭包"),
            ("無痕掛鉤",   "掛鉤"),
            ("曬衣架",     "曬衣架"),
            ("抽真空袋",   "抽真空袋"),
          ]

          HEADERS = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36",
            "Accept": "application/json, text/javascript, */*; q=0.01",
            "Accept-Language": "zh-TW,zh;q=0.9",
            "Referer": "https://shopping.pchome.com.tw/",
          }

          EXCLUDE = ["噴霧", "美妝", "化妝", "保養", "電器", "電風扇", "吹風機"]

          items = []
          for (search_kw, label_kw) in KEYWORDS:
            try:
              url = f"https://ecshweb.pchome.com.tw/search/v3.3/?q={urllib.parse.quote(search_kw)}&page=1&sort=rnk/dc"
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=12) as r:
                data = json.loads(r.read().decode("utf-8"))

              prods = (data.get("Prods") or [])[:3]
              added = 0
              for p in prods:
                name  = p.get("Name", "")
                pid   = p.get("Id", "")
                price = (p.get("Price") or {}).get("M", 0)
                pic   = p.get("picS", "")
                if any(bad in name for bad in EXCLUDE):
                  continue
                if not name or not pid:
                  continue
                items.append({
                  "keyword": label_kw,
                  "name":    name,
                  "price":   price,
                  "sold":    0,
                  "url":     f"https://24h.pchome.com.tw/prod/{pid}",
                  "image":   f"https://a.ecimg.tw/items/{pic}" if pic else "",
                  "source":  "PChome"
                })
                added += 1
                if added >= 2:
                  break
              print(f"OK {search_kw}: {added} items")
              time.sleep(0.8)
            except Exception as e:
              print(f"SKIP {search_kw}: {e}")

          print(f"Total: {len(items)} products")
          if items:
            os.makedirs("data", exist_ok=True)
            with open("data/products.json", "w", encoding="utf-8") as f:
              json.dump({"updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"), "items": items}, f, ensure_ascii=False, indent=2)
            print("Saved products.json")
          else:
            print("Got 0 — keeping existing file")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/products.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: 更新 PChome 居家商品資料 [skip ci]" && git push)
