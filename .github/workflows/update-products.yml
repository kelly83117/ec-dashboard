name: Update Products Data
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright
        run: pip install playwright && python -m playwright install chromium --with-deps

      - name: Fetch Shopee with real browser
        run: |
          python3 - <<'PYEOF'
          from playwright.sync_api import sync_playwright
          import json, datetime, os, time

          KEYWORDS = ["收納箱", "珪藻土地墊", "廚房瀝水架", "浴室置物架",
                      "保溫瓶", "矽膠保鮮盒", "竹炭除臭包", "無痕掛鉤", "曬衣架", "抽真空袋"]

          LABEL = {"保溫瓶": "不鏽鋼保溫瓶", "無痕掛鉤": "掛鉤"}
          EXCLUDE = ["噴霧", "美妝", "化妝", "保養", "電器", "吹風機", "電風扇"]

          items = []

          with sync_playwright() as p:
            browser = p.chromium.launch(headless=True, args=["--no-sandbox"])
            context = browser.new_context(
              user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36",
              locale="zh-TW",
              viewport={"width": 1280, "height": 800},
            )
            page = context.new_page()

            print("Visiting Shopee homepage...")
            page.goto("https://shopee.tw/", timeout=30000)
            page.wait_for_timeout(3000)

            for kw in KEYWORDS:
              label = LABEL.get(kw, kw)
              captured = []

              def on_response(resp):
                if "search_item" in resp.url and resp.status == 200:
                  try:
                    captured.append(resp.json())
                  except:
                    pass

              page.on("response", on_response)

              print(f"Searching: {kw}")
              page.goto(f"https://shopee.tw/search?keyword={kw}&sortBy=sales", timeout=20000)
              page.wait_for_timeout(4000)

              page.remove_listener("response", on_response)

              added = 0
              for data in captured:
                for p_item in (data.get("items") or []):
                  b = p_item.get("item_basic") or p_item
                  name = b.get("name", "")
                  item_id = b.get("itemid") or b.get("item_id")
                  shop_id = b.get("shopid") or b.get("shop_id")
                  img = b.get("image", "")
                  price = b.get("price", 0)
                  sold = b.get("historical_sold") or b.get("sold", 0)

                  if any(bad in name for bad in EXCLUDE):
                    continue
                  if not name or not item_id or not shop_id:
                    continue

                  items.append({
                    "keyword": label,
                    "name":    name,
                    "price":   round(price / 100000) if price else 0,
                    "sold":    sold,
                    "url":     f"https://shopee.tw/product/{shop_id}/{item_id}",
                    "image":   f"https://cf.shopee.tw/file/{img}_tn" if img else "",
                    "source":  "蝦皮"
                  })
                  added += 1
                  if added >= 2:
                    break
                if added >= 2:
                  break

              print(f"  -> {added} items")
              time.sleep(1)

            browser.close()

          print(f"Total: {len(items)} products")
          if items:
            os.makedirs("data", exist_ok=True)
            with open("data/products.json", "w", encoding="utf-8") as f:
              json.dump({"updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"), "items": items}, f, ensure_ascii=False, indent=2)
            print("Saved!")
          else:
            print("Got 0 — keeping existing file")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/products.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: 更新蝦皮居家商品資料 [skip ci]" && git push)
