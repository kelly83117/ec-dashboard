name: Update Products Data
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Shopee products for household keywords
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, time, os

          KEYWORDS = ["收納箱", "珪藻土地墊", "廚房瀝水架", "浴室置物架",
                      "不鏽鋼保溫瓶", "矽膠保鮮盒", "竹炭除臭包", "無痕掛鉤", "曬衣架", "抽真空袋"]

          headers = {
            "User-Agent": "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15",
            "referer": "https://shopee.tw/",
            "accept": "application/json"
          }

          items = []
          for kw in KEYWORDS:
            try:
              url = f"https://shopee.tw/api/v4/search/search_item?by=sales&keyword={urllib.parse.quote(kw)}&limit=2&newest=0&order=desc&page_type=search&scenario=PAGE_GLOBAL_SEARCH&version=2"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())
              for p in (data.get("items") or [])[:2]:
                b = p.get("item_basic") or p
                item_id = b.get("itemid") or b.get("item_id")
                shop_id = b.get("shopid") or b.get("shop_id")
                img = b.get("image","")
                name = b.get("name","")
                price = b.get("price",0)
                sold = b.get("historical_sold") or b.get("sold",0)
                if name and item_id and shop_id:
                  items.append({
                    "keyword": kw,
                    "name": name,
                    "price": round(price/100000) if price else 0,
                    "sold": sold,
                    "url": f"https://shopee.tw/product/{shop_id}/{item_id}",
                    "image": f"https://cf.shopee.tw/file/{img}_tn" if img else "",
                    "source": "蝦皮"
                  })
              time.sleep(1)
            except Exception as e:
              print(f"Skip {kw}: {e}")

          import urllib.parse
          import datetime
          os.makedirs("data", exist_ok=True)
          with open("data/products.json","w",encoding="utf-8") as f:
            json.dump({"updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"), "items": items}, f, ensure_ascii=False, indent=2)
          print(f"Saved {len(items)} products")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/products.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: 更新蝦皮居家商品資料 [skip ci]" && git push)
