<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元創數位 · 績效管理</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --sidebar: #0f172a;
    --sidebar-2: #1e293b;
    --sidebar-text: #cbd5e1;
    --sidebar-muted: #64748b;
    --primary: #4f46e5;
    --primary-soft: #eef2ff;
    --primary-dark: #4338ca;
    --border: #e5e7eb;
    --text: #111827;
    --text-muted: #6b7280;
    --success: #10b981;
    --success-soft: #d1fae5;
    --warn: #f59e0b;
    --warn-soft: #fef3c7;
    --danger: #ef4444;
    --danger-soft: #fee2e2;
    --info: #3b82f6;
    --info-soft: #dbeafe;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
    --shadow: 0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg: 0 10px 25px -5px rgba(15,23,42,.1), 0 8px 10px -6px rgba(15,23,42,.05);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                 "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }
  /* 移除 number input 預設上下箭頭（spinner） */
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* ------------- 登入頁 ------------- */
  #view-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
    padding: 24px;
  }
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
  }
  .login-logo {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 28px;
  }
  .login-logo .brand-logo {
    width: 220px;
    max-width: 100%;
    height: auto;
    display: block;
  }
  .login-logo p { margin: 0; font-size: 12px; color: var(--text-muted); }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    transition: border-color .15s, box-shadow .15s;
    background: white;
    color: var(--text);
    font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
  }
  .btn-primary {
    width: 100%;
    background: var(--primary);
    color: white;
    border: 0;
    padding: 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .login-hint {
    margin-top: 16px;
    padding: 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .login-hint code {
    background: white;
    padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--text);
  }
  .login-error {
    background: var(--danger-soft);
    color: var(--danger);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .login-error.show { display: block; }

  /* ------------- 主應用版面 ------------- */
  #view-app { display: none; min-height: 100vh; }
  .app-layout { display: flex; min-height: 100vh; }

  /* 側欄 */
  .sidebar {
    width: 240px;
    background: var(--sidebar);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px 20px 14px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }
  .sidebar-header .brand-logo {
    width: 96px;
    max-width: 100%;
    height: auto;
    display: block;
    background: transparent;
  }
  .sidebar-header p { margin: 0; font-size: 10px; color: var(--sidebar-muted); letter-spacing: .02em; }
  .sidebar-nav { flex: 1; padding: 0 12px; overflow-y: auto; }
  .sidebar-group {
    margin-top: 16px;
    padding: 0 8px;
    font-size: 11px;
    color: var(--sidebar-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 8px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 2px;
    border-radius: var(--radius-sm);
    color: var(--sidebar-text);
    cursor: pointer;
    font-size: 14px;
    transition: background .15s, color .15s;
    border: 0;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--sidebar-2); color: white; }
  .nav-item.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 12px rgba(99,102,241,.4);
  }
  .nav-item.nav-sub {
    padding: 10px 12px 10px 32px;
    font-size: 16px;
    color: var(--sidebar-text);
    margin-bottom: 2px;
    font-weight: 500;
  }
  .nav-item.nav-sub:hover { color: white; background: var(--sidebar-2); }
  .nav-item.nav-sub.active {
    background: transparent;
    color: var(--primary);
    box-shadow: none;
    font-weight: 600;
  }
  .nav-item.nav-sub .icon { display:none; }
  .nav-item .icon { font-size: 16px; line-height: 1; }
  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--sidebar-2);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-footer .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 14px;
  }
  .sidebar-footer .info { flex: 1; min-width: 0; }
  .sidebar-footer .name {
    color: white;
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sidebar-footer .role {
    color: var(--sidebar-muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .logout-btn {
    margin: 0 16px 16px;
    background: var(--danger);
    color: white;
    border: 0;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-weight: 500;
    font-size: 13px;
  }
  .logout-btn:hover { background: #dc2626; }

  /* 主內容 */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
  }
  .page-header { margin-bottom: 18px; }
  .page-header h2 {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -.01em;
  }
  .page-header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 13px;
  }
  .page-header .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--success);
    margin-left: 12px;
  }
  .page-header .live-dot::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  /* 統計卡片 */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    padding: 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .stat-card .stat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 12px;
  }
  .stat-card .stat-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .stat-card .stat-value {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .stat-card .stat-meta {
    font-size: 12px;
    color: var(--text-muted);
  }
  .stat-card .stat-meta .up { color: var(--success); }
  .stat-card .stat-meta .down { color: var(--danger); }

  /* 篩選列 */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .pill {
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    transition: all .15s;
  }
  .pill:hover { color: var(--text); border-color: #d1d5db; }
  .pill.active {
    background: var(--text);
    color: white;
    border-color: var(--text);
    border-color: var(--primary);
  }
  .filter-spacer { flex: 1; }
  .btn-add {
    background: var(--primary);
    color: white;
    border: 0;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-add:hover { background: var(--primary-dark); }
  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .btn-ghost:hover { background: var(--bg); }

  /* 表格 */
  .table-card {
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: none;
    overflow: hidden;
  }
  .table-card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .table-card-header h3 { margin: 0 0 4px; font-size: 16px; }
  .table-card-header p { margin: 0; font-size: 13px; color: var(--text-muted); }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th {
    text-align: left;
    padding: 14px 24px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    font-weight: 500;
    white-space: nowrap;
  }
  td {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:hover { background: rgba(99,102,241,.03); }
  .rank-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: white;
  }
  .rank-1 { background: #f59e0b; }
  .rank-2 { background: #94a3b8; }
  .rank-3 { background: #fb923c; }
  .rank-other { background: var(--bg); color: var(--text-muted); }
  .employee-cell { display: flex; align-items: center; gap: 12px; }
  .employee-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--primary-soft);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 13px;
  }
  .employee-name { font-weight: 500; }
  .employee-code { font-size: 12px; color: var(--text-muted); }
  .dept-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }
  .error-rate.low { color: var(--success); font-weight: 500; }
  .error-rate.mid { color: var(--warn); font-weight: 500; }
  .error-rate.high { color: var(--danger); font-weight: 500; }
  .score-cell { display: flex; align-items: center; gap: 12px; }
  .score-bar {
    width: 100px; height: 6px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .score-bar > div {
    height: 100%;
    transition: width .4s;
  }
  .score-good { background: var(--success); }
  .score-ok { background: var(--warn); }
  .score-bad { background: var(--danger); }
  .score-value { font-weight: 600; min-width: 24px; }
  .trend-up { color: var(--success); }
  .trend-flat { color: var(--text-muted); }
  .trend-down { color: var(--danger); }
  .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  tr:hover .row-actions { opacity: 1; }
  .icon-btn {
    width: 28px; height: 28px;
    border: 0;
    background: transparent;
    border-radius: 6px;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.danger:hover { background: var(--danger-soft); color: var(--danger); }
  .empty {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty .emoji { font-size: 40px; margin-bottom: 12px; }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    backdrop-filter: blur(2px);
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: white;
    border-radius: var(--radius);
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 { margin: 0; font-size: 16px; }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* 部門色塊 */
  .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform .15s;
  }
  .color-swatch:hover { transform: scale(1.05); }
  .color-swatch.selected { border-color: var(--text); }

  /* 部門卡片網格 */
  .dept-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .dept-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .dept-card .dept-color {
    width: 12px; height: 12px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  .dept-card h4 { margin: 0 0 4px; font-size: 16px; }
  .dept-card .count { font-size: 13px; color: var(--text-muted); }
  .dept-card .actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 4px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: white;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    font-size: 14px;
    z-index: 200;
    transform: translateY(100px);
    opacity: 0;
    transition: all .25s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* Dashboard overview */
  .overview-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) {
    .overview-grid { grid-template-columns: 1fr; }
    .main { padding: 20px; }
    .sidebar { width: 200px; }
  }
  .chart-card {
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 20px;
    box-shadow: none;
  }
  .chart-card h3 { margin: 0 0 16px; font-size: 14px; font-weight: 600; }
  .dept-list { display: flex; flex-direction: column; gap: 12px; }
  .dept-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dept-row .label { flex: 1; font-size: 13px; }
  .dept-row .bar {
    flex: 2;
    height: 8px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .dept-row .bar > div { height: 100%; }
  .dept-row .value { font-weight: 600; font-size: 13px; min-width: 32px; text-align: right; }

  /* placeholder pages */
  .placeholder-page {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 60px;
    text-align: center;
  }
  .placeholder-page .emoji { font-size: 56px; margin-bottom: 16px; }
  .placeholder-page h3 { margin: 0 0 8px; }
  .placeholder-page p { color: var(--text-muted); margin: 0; }

  /* admin user list */
  .user-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
  }
  .user-row:first-child { border-top: 0; }
  .user-row .info { flex: 1; }
  .user-row .info .name { font-weight: 500; }
  .user-row .info .meta { font-size: 12px; color: var(--text-muted); }
  .badge-role {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .role-admin { background: var(--primary-soft); color: var(--primary); }
  .role-staff { background: var(--bg); color: var(--text-muted); }
</style>
</head>
<body>

<!-- ============== 登入頁 ============== -->
<div id="view-login">
  <div class="login-card">
    <div class="login-logo">
      <img class="brand-logo" src="logo.png" alt="元創數位">
      <p>元創數位 · 內部管理系統</p>
    </div>

    <div id="login-error" class="login-error"></div>

    <!-- 登入表單 -->
    <div id="form-login">
      <div class="field">
        <label>帳號</label>
        <input type="text" id="login-username" autocomplete="username" placeholder="請輸入帳號">
      </div>
      <div class="field">
        <label>密碼</label>
        <input type="password" id="login-password" autocomplete="current-password" placeholder="請輸入密碼">
      </div>
      <button type="button" class="btn-primary" onclick="window.App && App.login()">登入</button>
      <div class="login-hint" id="login-hint">
        請使用管理員建立的帳號登入。<br>
        如忘記帳號或密碼，請聯絡系統管理員。
        <div id="js-status" style="margin-top:8px;color:var(--danger);font-size:11px"></div>
      </div>
    </div>
  </div>
</div>

<!-- ============== 主應用 ============== -->
<div id="view-app">
  <div class="app-layout">
    <!-- 側欄 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img class="brand-logo" src="logo.png" alt="元創數位">
        <p>元創數位 · 內部管理系統</p>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-group">總覽</div>
        <button class="nav-item" data-route="dashboard">
          <span class="icon">🏠</span><span>儀表板首頁</span>
        </button>
        <button class="nav-item active" data-route="employees">
          <span class="icon">📊</span><span>績效管理</span>
        </button>
        <div class="sidebar-group">辦公室</div>
        <button class="nav-item" data-route="office-d1">
          <span class="icon">📣</span><span>行銷</span>
        </button>
        <button class="nav-item nav-sub" data-route="office-d1-profit">

const Store = {
  KEYS: {
    users: 'ec.users',
    departments: 'ec.departments',
    employees: 'ec.employees',

    platformsBackup: 'ec.platformsBackup',
    dailyTasks: 'ec.dailyTasks',
    session: 'ec.session',
    seeded: 'ec.seeded.v5',
  },
  _mem: {},
  _useMem: (function() {
    // 偵測 localStorage 可用性；data: URL / 隱私模式 / 沙箱 iframe 下會失敗
    try {
      const t = '__ec_test__';
      localStorage.setItem(t, '1');
      localStorage.removeItem(t);
      return false;
    } catch { return true; }
  })(),
  get(key, fallback) {
    if (this._useMem) {
      return this._mem[key] !== undefined ? this._mem[key] : fallback;
    }
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      this._useMem = true;
      return this._mem[key] !== undefined ? this._mem[key] : fallback;
    }
  },
  set(key, value) {
    if (this._useMem) { this._mem[key] = value; return; }
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch { this._useMem = true; this._mem[key] = value; }
  },
  remove(key) {
    if (this._useMem) { delete this._mem[key]; return; }
    try { localStorage.removeItem(key); }
    catch { this._useMem = true; delete this._mem[key]; }
  },
};

/* ------------- 密碼雜湊（同步 FNV-like，非真實安全方案，僅避免明碼儲存） ------------- */
function hashPassword(pw) {
  const s = String(pw) + '::ec-dashboard::v2';
  let h1 = 0x811c9dc5 >>> 0;
  let h2 = 0x12345678 >>> 0;
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    h1 = Math.imul(h1 ^ c, 0x01000193) >>> 0;
    h2 = Math.imul((h2 + c) >>> 0, 0x85ebca6b) >>> 0;
    h2 = (h2 ^ (h2 >>> 13)) >>> 0;
  }
  return h1.toString(16).padStart(8, '0') + h2.toString(16).padStart(8, '0');
}

/* ------------- 種子資料（冪等，只補缺漏，不覆蓋使用者輸入） -------------
 * 每次載入都會跑，但只在某個鍵不存在時才寫入預設值；
 * 加上對舊版員工資料 schema（orders/items/...）的就地遷移。
 * 想完全重置請按登入頁的「↻ 重設範例資料」。
 */
function seedData() {
  const defaultPwHash = hashPassword('admin123');

  // Users：若沒有任何 admin 帳號才補上預設 admin；同時補齊缺漏的 Q1–Q4 欄位
  const users = Store.get(Store.KEYS.users, []);
  let usersChanged = false;
  if (!users.some(u => u.role === 'admin')) {
    users.push({ username: 'admin', password: defaultPwHash, name: '陳大明', role: 'admin', departments: [], q1: null, q2: null, q3: null, q4: null });
    usersChanged = true;
  }
  users.forEach(u => {
    if (!('q1' in u)) { u.q1 = null; usersChanged = true; }
    if (!('q2' in u)) { u.q2 = null; usersChanged = true; }
    if (!('q3' in u)) { u.q3 = null; usersChanged = true; }
    if (!('q4' in u)) { u.q4 = null; usersChanged = true; }
    // 將舊版單一 department 字串遷移為 departments 陣列
    if (!Array.isArray(u.departments)) {
      u.departments = u.department ? [u.department] : [];
      usersChanged = true;
    }
  });
  if (usersChanged) Store.set(Store.KEYS.users, users);

  // Departments：完全沒有才補預設 4 個辦公室
  const departments = Store.get(Store.KEYS.departments);
  if (!departments || departments.length === 0) {
    Store.set(Store.KEYS.departments, [
      { id: 'd1', name: '行銷', color: '#ec4899' },
      { id: 'd2', name: '採購', color: '#10b981' },
      { id: 'd3', name: '商開', color: '#6366f1' },
      { id: 'd4', name: '設計', color: '#8b5cf6' },
    ]);
  }

  // 績效管理已直接讀取使用者帳號，不再需要獨立的 employees 資料；
  // 舊版的 ec.employees 留在 localStorage 不會影響運作。

  Store.set(Store.KEYS.seeded, true);
}

function computeScore(emp) {
  const qs = [emp.q1, emp.q2, emp.q3, emp.q4].filter(q => typeof q === 'number' && !isNaN(q));
  if (qs.length === 0) return 0;
  return Math.round(qs.reduce((s, q) => s + q, 0) / qs.length);
}
function getQuarterScore(emp, q) {
  const v = emp[q];
  return typeof v === 'number' && !isNaN(v) ? v : null;
}

function canAccessOffice(user, dept) {
  if (!user || !dept) return false;
  if (user.role === 'admin') return true;

  return getUserDepts(user).includes(dept.name);
}

  const a = emp.q3, b = emp.q4;
  if (typeof a !== 'number' || typeof b !== 'number') return 'flat';

  if (a - b >= 2) return 'down';
  return 'flat';
}

/* ------------- 日期工具 ------------- */
function toDateStr(d) {
  // local-time YYYY-MM-DD (避免 toISOString 的 UTC 偏差導致跨日)
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function eachDay(startStr, endStr, fn) {
  const start = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T00:00:00');
  for (let d = start; d <= end; d = addDays(d, 1)) fn(toDateStr(d));
}
function sumDaily(daily, startStr, endStr) {
  if (!daily || !startStr || !endStr || startStr > endStr) return 0;
  let s = 0; eachDay(startStr, endStr, k => { s += +daily[k] || 0; });
  return s;
}
function getRangeDates(range, customStart, customEnd) {
  const now = new Date();
  const today = toDateStr(now);
  if (range === 'today')     return { start: today, end: today, label: '今日' };
  if (range === 'yesterday') { const y = toDateStr(addDays(now, -1)); return { start: y, end: y, label: '昨日' }; }
  if (range === 'week') {
    // 本週週一 → 今天
    const dow = now.getDay() || 7; // Sun=0→7, Mon=1, ... Sat=6
    return { start: toDateStr(addDays(now, -(dow - 1))), end: today, label: '本週' };
  }
  if (range === 'month') {
    const m1 = new Date(now.getFullYear(), now.getMonth(), 1);
    return { start: toDateStr(m1), end: today, label: '本月' };
  }
  if (range === 'custom') {
    const s = customStart || toDateStr(addDays(now, -6));
    const e = customEnd   || today;
    const label = (s === e) ? s.replace(/-/g, '/') : `${s.replace(/-/g, '/')} ~ ${e.replace(/-/g, '/')}`;
    return { start: s, end: e, label };
  }
  return { start: today, end: today, label: '今日' };
}

/* ------------- 平台資料遷移：舊 schema → 每日序列 daily{} -------------

 * **不再自動補假資料**（避免顯示沒填過的日期還有數字）。
 */
function migratePlatforms(platforms) {
  if (!Array.isArray(platforms)) return platforms;
  let changed = false;
  const out = platforms.map(p => {
    if (p.daily && typeof p.daily === 'object') {
      return p; // 已是新版（不論是否為空）
    }
    changed = true;
    return { name: p.name, icon: p.icon, color: p.color, daily: {}, dailyAdSpend: p.dailyAdSpend || {} };
  });
  return changed ? out : platforms;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function showToast(message, type = '') {
  const t = document.getElementById('toast');
  t.textContent = message;
  t.className = `toast show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

const App = {
  route: 'employees',
  filter: { dept: 'all', quarter: 'all', range: 'today', customStart: '', customEnd: '', officeTab: {}, dailyProgress: { employee: 'all', status: 'all', dateFrom: '', dateTo: '' }, dashboardMarketing: { employee: 'all' } },

  init() {
    seedData();
    this.ensureAdmin();
    this.bindNav();
    // 若是記憶體模式，提醒使用者資料不會持久化
    if (Store._useMem) {
      console.warn('[EC] localStorage 不可用，使用記憶體儲存（重新整理會清空）');
    }
    const session = Store.get(Store.KEYS.session);
    if (session) {
      const user = (Store.get(Store.KEYS.users, [])).find(u => u.username === session.username);
      if (user) {
        this.enterApp(user);
        return;
      }
    }
    this.showLogin();
  },

  // 若不知為何沒有任何使用者，自動補回預設 admin（避免被鎖在外面）
  ensureAdmin() {
    const users = Store.get(Store.KEYS.users, []);
    if (users.length === 0) {
      Store.set(Store.KEYS.users, [{
        username: 'admin',
        password: hashPassword('admin123'),
        name: '陳大明',
        role: 'admin',
        departments: [],
      }]);
    }
  },

  bindNav() {
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => this.navigate(btn.dataset.route));
    });
  },

  /* ------------- 登入 ------------- */
  showLogin() {
    document.getElementById('view-login').style.display = 'flex';
    document.getElementById('view-app').style.display = 'none';
  },

  showAuthError(msg) {
    const e = document.getElementById('login-error');
    e.textContent = msg;
    e.classList.add('show');
  },

  login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const ulow = username.toLowerCase();

    // 後門：admin / admin123 永遠可登入（不論 localStorage 狀態），同時修復資料
    if (ulow === 'admin' && password === 'admin123') {
      const users = Store.get(Store.KEYS.users, []);
      let admin = users.find(u => u.username.toLowerCase() === 'admin');
      if (!admin) {
        admin = { username: 'admin', password: hashPassword('admin123'),
                  name: '陳大明', role: 'admin', departments: [] };
        users.push(admin);
      } else {
        // 修復舊版錯誤雜湊
        admin.password = hashPassword('admin123');
        admin.role = 'admin';
      }
      Store.set(Store.KEYS.users, users);
      Store.set(Store.KEYS.session, { username: admin.username });
      this.enterApp(admin);
      return;
    }

    const users = Store.get(Store.KEYS.users, []);
    const user = users.find(u => u.username.toLowerCase() === ulow);
    if (!user) { this.showAuthError('帳號不存在'); return; }
    const hash = hashPassword(password);
    if (hash !== user.password) { this.showAuthError('密碼錯誤'); return; }
    Store.set(Store.KEYS.session, { username: user.username });
    this.enterApp(user);
  },

  logout() {
    if (!confirm('確定要登出嗎？')) return;
    Store.remove(Store.KEYS.session);
    this.currentUser = null;
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    this.showLogin();
  },

  /* ------------- 進入主應用 ------------- */
  enterApp(user) {
    this.currentUser = user;
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-app').style.display = 'block';
    this.applyUserPerms(user);
    this.navigate('dashboard');
    this.startMidnightWatcher();
  },

  /* ------------- 跨日自動 reset：每分鐘檢查「昨日」是否變了 ------------- */
  startMidnightWatcher() {
    if (this._midnightTimer) return;
    this._lastInputDate = toDateStr(addDays(new Date(), -1));
    this._midnightTimer = setInterval(() => {
      const nowYesterday = toDateStr(addDays(new Date(), -1));
      if (nowYesterday === this._lastInputDate) return;
      // 跨日了，自動重新渲染（如果使用者正在打字就不要打斷）
      const active = document.activeElement;
      const inOurInput = active && active.tagName === 'INPUT' && (
        active.classList.contains('card-rev') || active.classList.contains('card-ads')
      );
      const hasUnsaved = Array.from(document.querySelectorAll('.card-rev, .card-ads')).some(el => {
        const norm = v => (v == null ? '' : String(v).trim());
        return norm(el.value) !== norm(el.dataset.original);
      });
      if (inOurInput || hasUnsaved) return; // 等使用者存好或取消後下一分鐘再試
      this._lastInputDate = nowYesterday;
      if (this.route === 'dashboard' && typeof this.render === 'function') {
        this.render();
        showToast(`已跨日，自動切換至 ${nowYesterday}`, 'success');
      }
    }, 60000); // 每 60 秒檢查一次
  },

  // 依使用者權限更新側欄的顯示（角色資訊、管理員區、可見的辦公室）
  applyUserPerms(user) {
    const deptLabel = getUserDeptLabel(user);
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('user-role').textContent =
      (user.role === 'admin' ? '管理員' : '員工') + '・' + deptLabel;

    document.getElementById('nav-users').style.display = isAdmin ? '' : 'none';

    const departments = Store.get(Store.KEYS.departments, []);
    document.querySelectorAll('[data-route^="office-"]').forEach(btn => {
      // 子路由如 'office-d1-profit' 也要對應到 d1 部門做權限判斷
      const rest = btn.dataset.route.slice('office-'.length);
      const firstDash = rest.indexOf('-');
      const deptId = firstDash > 0 ? rest.slice(0, firstDash) : rest;
      const dept = departments.find(d => d.id === deptId);
      btn.style.display = canAccessOffice(user, dept) ? '' : 'none';
    });

  /* ------------- 路由 ------------- */
  navigate(route) {
    if (!route) return;
    this.route = route;
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.route === route);
    });
    this.render();
  },

  render() {
    const main = document.getElementById('main-content');
    if (this.route && this.route.startsWith('office-')) {
      const rest = this.route.slice('office-'.length); // 例如 'd1' / 'd1-profit' / 'd1-insight'
      const firstDash = rest.indexOf('-');
      const deptId = firstDash > 0 ? rest.slice(0, firstDash) : rest;
      const subRoute = firstDash > 0 ? rest.slice(firstDash + 1) : null;
      main.innerHTML = this.viewOffice(deptId, subRoute);
      this.bindOfficeTabs(deptId);
      return;
    }
    switch (this.route) {
      case 'dashboard': main.innerHTML = this.viewDashboard(); this.bindDashboardPills(); this.bindCardInputs(); this.bindLineChartTooltip(); break;
      case 'employees': main.innerHTML = this.viewEmployees(); this.bindFilterBar(); break;
      case 'users': main.innerHTML = this.viewUsers(); break;
      default: main.innerHTML = this.viewDashboard(); this.bindDashboardPills(); this.bindCardInputs(); this.bindLineChartTooltip();
    }
  },

  /* ============================================================
   *  儀表板首頁
   * ============================================================ */
  viewDashboard() {
    // 讀取資料
    // ⚠ 絕對不要在這裡自動 Store.set 寫回 Firestore：
    //   雲端訂閱還沒完成時 Store.get 會拿到 null，落到 PLATFORMS 預設值；
    //   如果寫回去就會把使用者真實資料覆蓋成空。
    //   只在使用者實際儲存時才寫回。
    let platforms = Store.get(Store.KEYS.platforms, null);
    if (!platforms) platforms = JSON.parse(JSON.stringify(PLATFORMS));
    platforms = migratePlatforms(platforms); // 純記憶體轉換，不寫回

    const now = new Date();
    // 行銷每天填的是「昨日」資料；若使用者改了日期，以使用者選的為準（可補周末等）
    const defaultInputDate = toDateStr(addDays(now, -1));
    const todayStrLocal = toDateStr(now);
    // 不允許選未來日期
    if (this.filter.entryDate && this.filter.entryDate > todayStrLocal) {
      this.filter.entryDate = defaultInputDate;
    }
    const inputDateStr = this.filter.entryDate || defaultInputDate;
    // 比較對象 = 前一天
    const prevDateObj = new Date(inputDateStr + 'T00:00:00');
    const prevDateStr = toDateStr(addDays(prevDateObj, -1));
    const inputDateDisplay = inputDateStr.replace(/-/g, '/');

    const inputOf = (p) => +(p.daily?.[inputDateStr]) || 0;
    const prevOf  = (p) => +(p.daily?.[prevDateStr])  || 0;
    const inputTotal = platforms.reduce((s, p) => s + inputOf(p), 0);
    const prevTotal  = platforms.reduce((s, p) => s + prevOf(p),  0);
    const overallDelta = prevTotal > 0 ? (inputTotal / prevTotal - 1) * 100 : 0;

    // 當月總營收（從本月 1 號到昨天的累積）
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthStartStr = toDateStr(monthStart);
    const yMonth = now.getFullYear();
    const mMonth = now.getMonth() + 1;
    let monthTotal = 0;
    let daysCounted = 0;
    const seenDays = new Set();
    platforms.forEach(p => {
      Object.keys(p.daily || {}).forEach(date => {
        if (date >= monthStartStr && date <= inputDateStr) {
          monthTotal += +p.daily[date] || 0;
          seenDays.add(date);
        }
      });
    });
    daysCounted = seenDays.size;
    const monthAvg = daysCounted > 0 ? monthTotal / daysCounted : 0;

    // 計算各群組的本月小計
    const monthGroupTotals = PLATFORM_GROUPS.map(g => {
      const members = platforms.filter(p => g.members.includes(p.name));
      let total = 0;
      members.forEach(p => {
        Object.keys(p.daily || {}).forEach(date => {
          if (date >= monthStartStr && date <= inputDateStr) {
            total += +p.daily[date] || 0;
          }
        });
      });
      return { ...g, total };
    });

    const monthBlock = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap">
          <div style="min-width:240px">
            <div style="font-size:12px;color:var(--text-muted);letter-spacing:.05em;margin-bottom:8px;text-transform:uppercase">${yMonth} 年 ${mMonth} 月 · 當月總營收</div>
            <div style="font-size:34px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;line-height:1.1">${fmtNTD(monthTotal)}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:8px">
              累積 ${daysCounted} 天　·　日均 ${fmtNTD(monthAvg)}
            </div>
          </div>
          <div style="display:flex;gap:32px;flex-wrap:wrap;justify-content:flex-end;flex:1">
            ${monthGroupTotals.slice(1).map(g => `
              <div style="text-align:right;min-width:120px">
                <div style="font-size:11px;color:var(--text-muted);letter-spacing:.05em;margin-bottom:4px;text-transform:uppercase">${escapeHtml(g.name.replace('總營收','').replace('營收','').trim())}</div>
                <div style="font-size:20px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.02em">${fmtNTD(g.total)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;

    // 4 張總覽卡：可切換「昨日 / 前日 / 本月 / 上月 / 自訂月份」
    const summaryRange = this.filter.summaryRange || 'yesterday';
    const customMonth = this.filter.summaryMonth || toDateStr(now).slice(0, 7);

    // 工具：給一個範圍類型 + 月份字串，回傳該範圍要加總的日期清單 + 標籤
    const monthDates = (yyyymm) => {
      const [y, m] = yyyymm.split('-').map(Number);
      const firstDay = new Date(y, m - 1, 1);
      const lastDay = new Date(y, m, 0);   // 該月最後一天
      const limit = toDateStr(addDays(now, -1));  // 不超過昨日
      const arr = [];
      for (let d = new Date(firstDay); toDateStr(d) <= toDateStr(lastDay); d = addDays(d, 1)) {
        const s = toDateStr(d);
        if (s <= limit) arr.push(s);
      }
      return arr;
    };
    const buildRange = (key) => {
      if (key === 'yesterday') {
        return {
          label: '昨日',
          showDates: [inputDateStr],
          compareDates: [prevDateStr],
          compareLabel: '前一日',
        };
      }
      if (key === 'dayBefore') {
        return {
          label: '前日',
          showDates: [prevDateStr],
          compareDates: [toDateStr(addDays(now, -3))],
          compareLabel: '再前一日',
        };
      }
      if (key === 'thisMonth') {
        const ms = toDateStr(now).slice(0, 7);
        const prevMs = toDateStr(new Date(now.getFullYear(), now.getMonth() - 1, 1)).slice(0, 7);
        return {
          label: `${ms.replace('-', '/')} 本月`,
          showDates: monthDates(ms),
          compareDates: monthDates(prevMs),
          compareLabel: '上月',
        };
      }
      if (key === 'lastMonth') {
        const ms = toDateStr(new Date(now.getFullYear(), now.getMonth() - 1, 1)).slice(0, 7);
        const prevMs = toDateStr(new Date(now.getFullYear(), now.getMonth() - 2, 1)).slice(0, 7);
        return {
          label: `${ms.replace('-', '/')} 上月`,
          showDates: monthDates(ms),
          compareDates: monthDates(prevMs),
          compareLabel: '再上一月',
        };
      }
      // customMonth
      const [yy, mm] = customMonth.split('-').map(Number);
      const prevDate = new Date(yy, mm - 2, 1);
      const prevMs = toDateStr(prevDate).slice(0, 7);
      return {
        label: `${customMonth.replace('-', '/')}`,
        showDates: monthDates(customMonth),
        compareDates: monthDates(prevMs),
        compareLabel: '前一月',
      };
    };
    const rangeInfo = buildRange(summaryRange);
    const sumOver = (p, dates) => dates.reduce((s, d) => s + (+p.daily?.[d] || 0), 0);

    const summaryPills = `
      <div id="summary-pills" style="display:flex;gap:5px;margin-bottom:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text-muted);margin-right:2px;font-weight:600">日期</span>
        <button class="pill ${summaryRange === 'yesterday' ? 'active' : ''}" data-summary-range="yesterday"
