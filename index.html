<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元創數位 · 績效管理</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --sidebar: #0f172a;
    --sidebar-2: #1e293b;
    --sidebar-text: #cbd5e1;
    --sidebar-muted: #64748b;
    --primary: #6366f1;
    --primary-soft: #eef2ff;
    --primary-dark: #4f46e5;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --success: #10b981;
    --success-soft: #d1fae5;
    --warn: #f59e0b;
    --warn-soft: #fef3c7;
    --danger: #ef4444;
    --danger-soft: #fee2e2;
    --info: #3b82f6;
    --info-soft: #dbeafe;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
    --shadow: 0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg: 0 10px 25px -5px rgba(15,23,42,.1), 0 8px 10px -6px rgba(15,23,42,.05);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                 "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }
  /* 移除 number input 預設上下箭頭（spinner） */
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* ------------- 登入頁 ------------- */
  #view-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
    padding: 24px;
  }
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
  }
  .login-logo {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 28px;
  }
  .login-logo .brand-logo {
    width: 220px;
    max-width: 100%;
    height: auto;
    display: block;
  }
  .login-logo p { margin: 0; font-size: 12px; color: var(--text-muted); }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    transition: border-color .15s, box-shadow .15s;
    background: white;
    color: var(--text);
    font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
  }
  .btn-primary {
    width: 100%;
    background: var(--primary);
    color: white;
    border: 0;
    padding: 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .login-hint {
    margin-top: 16px;
    padding: 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .login-hint code {
    background: white;
    padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--text);
  }
  .login-error {
    background: var(--danger-soft);
    color: var(--danger);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .login-error.show { display: block; }

  /* ------------- 主應用版面 ------------- */
  #view-app { display: none; min-height: 100vh; }
  .app-layout { display: flex; min-height: 100vh; }

  /* 側欄 */
  .sidebar {
    width: 240px;
    background: var(--sidebar);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .sidebar-header .brand-logo {
    width: 160px;
    max-width: 100%;
    height: auto;
    display: block;
    background: transparent;
  }
  .sidebar-header p { margin: 0; font-size: 11px; color: var(--sidebar-muted); }
  .sidebar-nav { flex: 1; padding: 0 12px; overflow-y: auto; }
  .sidebar-group {
    margin-top: 16px;
    padding: 0 8px;
    font-size: 11px;
    color: var(--sidebar-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 8px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 2px;
    border-radius: var(--radius-sm);
    color: var(--sidebar-text);
    cursor: pointer;
    font-size: 14px;
    transition: background .15s, color .15s;
    border: 0;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--sidebar-2); color: white; }
  .nav-item.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 12px rgba(99,102,241,.4);
  }
  .nav-item .icon { font-size: 16px; line-height: 1; }
  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--sidebar-2);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-footer .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 14px;
  }
  .sidebar-footer .info { flex: 1; min-width: 0; }
  .sidebar-footer .name {
    color: white;
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sidebar-footer .role {
    color: var(--sidebar-muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .logout-btn {
    margin: 0 16px 16px;
    background: var(--danger);
    color: white;
    border: 0;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-weight: 500;
    font-size: 13px;
  }
  .logout-btn:hover { background: #dc2626; }

  /* 主內容 */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
  }
  .page-header { margin-bottom: 14px; }
  .page-header h2 {
    margin: 0 0 4px;
    font-size: 24px;
    font-weight: 700;
  }
  .page-header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .page-header .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--success);
    margin-left: 12px;
  }
  .page-header .live-dot::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  /* 統計卡片 */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    padding: 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .stat-card .stat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 12px;
  }
  .stat-card .stat-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .stat-card .stat-value {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .stat-card .stat-meta {
    font-size: 12px;
    color: var(--text-muted);
  }
  .stat-card .stat-meta .up { color: var(--success); }
  .stat-card .stat-meta .down { color: var(--danger); }

  /* 篩選列 */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .pill {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    color: var(--text);
    transition: all .15s;
  }
  .pill:hover { border-color: var(--primary); color: var(--primary); }
  .pill.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .filter-spacer { flex: 1; }
  .btn-add {
    background: var(--primary);
    color: white;
    border: 0;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-add:hover { background: var(--primary-dark); }
  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .btn-ghost:hover { background: var(--bg); }

  /* 表格 */
  .table-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .table-card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .table-card-header h3 { margin: 0 0 4px; font-size: 16px; }
  .table-card-header p { margin: 0; font-size: 13px; color: var(--text-muted); }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th {
    text-align: left;
    padding: 14px 24px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    font-weight: 500;
    white-space: nowrap;
  }
  td {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:hover { background: rgba(99,102,241,.03); }
  .rank-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: white;
  }
  .rank-1 { background: #f59e0b; }
  .rank-2 { background: #94a3b8; }
  .rank-3 { background: #fb923c; }
  .rank-other { background: var(--bg); color: var(--text-muted); }
  .employee-cell { display: flex; align-items: center; gap: 12px; }
  .employee-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--primary-soft);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 13px;
  }
  .employee-name { font-weight: 500; }
  .employee-code { font-size: 12px; color: var(--text-muted); }
  .dept-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }
  .error-rate.low { color: var(--success); font-weight: 500; }
  .error-rate.mid { color: var(--warn); font-weight: 500; }
  .error-rate.high { color: var(--danger); font-weight: 500; }
  .score-cell { display: flex; align-items: center; gap: 12px; }
  .score-bar {
    width: 100px; height: 6px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .score-bar > div {
    height: 100%;
    transition: width .4s;
  }
  .score-good { background: var(--success); }
  .score-ok { background: var(--warn); }
  .score-bad { background: var(--danger); }
  .score-value { font-weight: 600; min-width: 24px; }
  .trend-up { color: var(--success); }
  .trend-flat { color: var(--text-muted); }
  .trend-down { color: var(--danger); }
  .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  tr:hover .row-actions { opacity: 1; }
  .icon-btn {
    width: 28px; height: 28px;
    border: 0;
    background: transparent;
    border-radius: 6px;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.danger:hover { background: var(--danger-soft); color: var(--danger); }
  .empty {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty .emoji { font-size: 40px; margin-bottom: 12px; }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    backdrop-filter: blur(2px);
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: white;
    border-radius: var(--radius);
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 { margin: 0; font-size: 16px; }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* 部門色塊 */
  .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform .15s;
  }
  .color-swatch:hover { transform: scale(1.05); }
  .color-swatch.selected { border-color: var(--text); }

  /* 部門卡片網格 */
  .dept-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .dept-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .dept-card .dept-color {
    width: 12px; height: 12px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  .dept-card h4 { margin: 0 0 4px; font-size: 16px; }
  .dept-card .count { font-size: 13px; color: var(--text-muted); }
  .dept-card .actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 4px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: white;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    font-size: 14px;
    z-index: 200;
    transform: translateY(100px);
    opacity: 0;
    transition: all .25s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* Dashboard overview */
  .overview-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) {
    .overview-grid { grid-template-columns: 1fr; }
    .main { padding: 20px; }
    .sidebar { width: 200px; }
  }
  .chart-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 20px;
  }
  .chart-card h3 { margin: 0 0 16px; font-size: 16px; }
  .dept-list { display: flex; flex-direction: column; gap: 12px; }
  .dept-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dept-row .label { flex: 1; font-size: 13px; }
  .dept-row .bar {
    flex: 2;
    height: 8px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .dept-row .bar > div { height: 100%; }
  .dept-row .value { font-weight: 600; font-size: 13px; min-width: 32px; text-align: right; }

  /* placeholder pages */
  .placeholder-page {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 60px;
    text-align: center;
  }
  .placeholder-page .emoji { font-size: 56px; margin-bottom: 16px; }
  .placeholder-page h3 { margin: 0 0 8px; }
  .placeholder-page p { color: var(--text-muted); margin: 0; }

  /* admin user list */
  .user-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
  }
  .user-row:first-child { border-top: 0; }
  .user-row .info { flex: 1; }
  .user-row .info .name { font-weight: 500; }
  .user-row .info .meta { font-size: 12px; color: var(--text-muted); }
  .badge-role {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .role-admin { background: var(--primary-soft); color: var(--primary); }
  .role-staff { background: var(--bg); color: var(--text-muted); }
</style>
</head>
<body>

<!-- ============== 登入頁 ============== -->
<div id="view-login">
  <div class="login-card">
    <div class="login-logo">
      <img class="brand-logo" src="logo.png" alt="元創數位">
      <p>元創數位 · 內部管理系統</p>
    </div>

    <div id="login-error" class="login-error"></div>

    <!-- 登入表單 -->
    <div id="form-login">
      <div class="field">
        <label>帳號</label>
        <input type="text" id="login-username" autocomplete="username" placeholder="請輸入帳號">
      </div>
      <div class="field">
        <label>密碼</label>
        <input type="password" id="login-password" autocomplete="current-password" placeholder="請輸入密碼">
      </div>
      <button type="button" class="btn-primary" onclick="window.App && App.login()">登入</button>
      <div class="login-hint" id="login-hint">
        請使用管理員建立的帳號登入。<br>
        如忘記帳號或密碼，請聯絡系統管理員。
        <div id="js-status" style="margin-top:8px;color:var(--danger);font-size:11px"></div>
      </div>
    </div>
  </div>
</div>

<!-- ============== 主應用 ============== -->
<div id="view-app">
  <div class="app-layout">
    <!-- 側欄 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img class="brand-logo" src="logo.png" alt="元創數位">
        <p>元創數位 · 內部管理系統</p>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-group">總覽</div>
        <button class="nav-item" data-route="dashboard">
          <span class="icon">🏠</span><span>儀表板首頁</span>
        </button>
        <button class="nav-item active" data-route="employees">
          <span class="icon">📊</span><span>績效管理</span>
        </button>
        <div class="sidebar-group">辦公室</div>
        <button class="nav-item" data-route="office-d1">
          <span class="icon">📣</span><span>行銷</span>
        </button>
        <button class="nav-item" data-route="office-d2">
          <span class="icon">🛒</span><span>採購</span>
        </button>
        <button class="nav-item" data-route="office-d3">
          <span class="icon">💼</span><span>商開</span>
        </button>
        <button class="nav-item" data-route="office-d4">
          <span class="icon">🎨</span><span>設計</span>
        </button>
        <div class="sidebar-group" id="admin-group" style="display:none">系統管理</div>
        <button class="nav-item" data-route="users" id="nav-users" style="display:none">
          <span class="icon">👥</span><span>帳號管理</span>
        </button>
      </nav>

    users: 'ec.users',
    departments: 'ec.departments',
    employees: 'ec.employees',
    platforms: 'ec.platforms',
    dailyTasks: 'ec.dailyTasks',
    session: 'ec.session',
    seeded: 'ec.seeded.v5',
  },
  _mem: {},
  _useMem: (function() {
    // 偵測 localStorage 可用性；data: URL / 隱私模式 / 沙箱 iframe 下會失敗
    try {
      const t = '__ec_test__';
      localStorage.setItem(t, '1');
      localStorage.removeItem(t);
      return false;
    } catch { return true; }
  })(),
  get(key, fallback) {
    if (this._useMem) {
      return this._mem[key] !== undefined ? this._mem[key] : fallback;
    }
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      this._useMem = true;
      return this._mem[key] !== undefined ? this._mem[key] : fallback;
    }
  },
  set(key, value) {
    if (this._useMem) { this._mem[key] = value; return; }
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch { this._useMem = true; this._mem[key] = value; }
  },
  remove(key) {
    if (this._useMem) { delete this._mem[key]; return; }
    try { localStorage.removeItem(key); }
    catch { this._useMem = true; delete this._mem[key]; }
  },
};

/* ------------- 密碼雜湊（同步 FNV-like，非真實安全方案，僅避免明碼儲存） ------------- */
function hashPassword(pw) {
  const s = String(pw) + '::ec-dashboard::v2';
  let h1 = 0x811c9dc5 >>> 0;
  let h2 = 0x12345678 >>> 0;
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    h1 = Math.imul(h1 ^ c, 0x01000193) >>> 0;
    h2 = Math.imul((h2 + c) >>> 0, 0x85ebca6b) >>> 0;
    h2 = (h2 ^ (h2 >>> 13)) >>> 0;
  }
  return h1.toString(16).padStart(8, '0') + h2.toString(16).padStart(8, '0');
}

/* ------------- 種子資料（冪等，只補缺漏，不覆蓋使用者輸入） -------------
 * 每次載入都會跑，但只在某個鍵不存在時才寫入預設值；
 * 加上對舊版員工資料 schema（orders/items/...）的就地遷移。
 * 想完全重置請按登入頁的「↻ 重設範例資料」。
 */
function seedData() {
  const defaultPwHash = hashPassword('admin123');

  // Users：若沒有任何 admin 帳號才補上預設 admin；同時補齊缺漏的 Q1–Q4 欄位
  const users = Store.get(Store.KEYS.users, []);
  let usersChanged = false;
  if (!users.some(u => u.role === 'admin')) {
    users.push({ username: 'admin', password: defaultPwHash, name: '陳大明', role: 'admin', departments: [], q1: null, q2: null, q3: null, q4: null });
    usersChanged = true;
  }
  users.forEach(u => {
    if (!('q1' in u)) { u.q1 = null; usersChanged = true; }
    if (!('q2' in u)) { u.q2 = null; usersChanged = true; }
    if (!('q3' in u)) { u.q3 = null; usersChanged = true; }
    if (!('q4' in u)) { u.q4 = null; usersChanged = true; }
    // 將舊版單一 department 字串遷移為 departments 陣列
    if (!Array.isArray(u.departments)) {
      u.departments = u.department ? [u.department] : [];
      usersChanged = true;
    }
  });
  if (usersChanged) Store.set(Store.KEYS.users, users);

  // Departments：完全沒有才補預設 4 個辦公室
  const departments = Store.get(Store.KEYS.departments);
  if (!departments || departments.length === 0) {
    Store.set(Store.KEYS.departments, [
      { id: 'd1', name: '行銷', color: '#ec4899' },
      { id: 'd2', name: '採購', color: '#10b981' },
      { id: 'd3', name: '商開', color: '#6366f1' },
      { id: 'd4', name: '設計', color: '#8b5cf6' },
    ]);
  }

  // 績效管理已直接讀取使用者帳號，不再需要獨立的 employees 資料；
  // 舊版的 ec.employees 留在 localStorage 不會影響運作。

  Store.set(Store.KEYS.seeded, true);
}

  const qs = [emp.q1, emp.q2, emp.q3, emp.q4].filter(q => typeof q === 'number' && !isNaN(q));
  if (qs.length === 0) return 0;
  return Math.round(qs.reduce((s, q) => s + q, 0) / qs.length);
}
function getQuarterScore(emp, q) {
  const v = emp[q];
  return typeof v === 'number' && !isNaN(v) ? v : null;
}

  if (!user) return [];

function getUserDeptLabel(user) {

function canAccessOffice(user, dept) {
  if (!user || !dept) return false;
  if (user.role === 'admin') return true;
  if (user.crossOfficeAccess === true) return true;
  return getUserDepts(user).includes(dept.name);
}

function trendFromQuarters(emp) {
  const a = emp.q3, b = emp.q4;
  if (typeof a !== 'number' || typeof b !== 'number') return 'flat';
  if (b - a >= 2) return 'up';
  if (a - b >= 2) return 'down';
  return 'flat';
}

/* ------------- 日期工具 ------------- */
function toDateStr(d) {
  // local-time YYYY-MM-DD (避免 toISOString 的 UTC 偏差導致跨日)
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function eachDay(startStr, endStr, fn) {
  const start = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T00:00:00');
  for (let d = start; d <= end; d = addDays(d, 1)) fn(toDateStr(d));
}
function sumDaily(daily, startStr, endStr) {
  if (!daily || !startStr || !endStr || startStr > endStr) return 0;
  let s = 0; eachDay(startStr, endStr, k => { s += +daily[k] || 0; });
  return s;
}
function getRangeDates(range, customStart, customEnd) {
  const now = new Date();
  const today = toDateStr(now);
  if (range === 'today')     return { start: today, end: today, label: '今日' };
  if (range === 'yesterday') { const y = toDateStr(addDays(now, -1)); return { start: y, end: y, label: '昨日' }; }
  if (range === 'week') {
    // 本週週一 → 今天
    const dow = now.getDay() || 7; // Sun=0→7, Mon=1, ... Sat=6
    return { start: toDateStr(addDays(now, -(dow - 1))), end: today, label: '本週' };
  }
  if (range === 'month') {
    const m1 = new Date(now.getFullYear(), now.getMonth(), 1);
    return { start: toDateStr(m1), end: today, label: '本月' };
  }
  if (range === 'custom') {
    const s = customStart || toDateStr(addDays(now, -6));
    const e = customEnd   || today;
    const label = (s === e) ? s.replace(/-/g, '/') : `${s.replace(/-/g, '/')} ~ ${e.replace(/-/g, '/')}`;
    return { start: s, end: e, label };
  }
  return { start: today, end: today, label: '今日' };
}

/* ------------- 平台資料遷移：舊 schema → 每日序列 daily{} ------------- */
function migratePlatforms(platforms) {
  if (!Array.isArray(platforms)) return platforms;
  let changed = false;
  const out = platforms.map(p => {
    // 已是新版（含 daily 物件且至少有資料）
    if (p.daily && typeof p.daily === 'object' && Object.keys(p.daily).length > 0) {
      return p;
    }
    changed = true;
    // 從舊欄位推估每日資料
    const today = +p.today || 0;
    const monthTotal = +p.month || +p.monthTotal || (today * 30);
    let yesterday = +p.yesterday;
    if (!isFinite(yesterday) || yesterday < 0) {
      const delta = +p.deltaPct || 0;
      yesterday = (1 + delta / 100) !== 0 ? today / (1 + delta / 100) : today;
    }
    const avgDaily = monthTotal / 30;
    const seedBase = p.name.split('').reduce((s, c) => s + c.charCodeAt(0), 0);
    const daily = {};
    const now = new Date();
    for (let i = 89; i >= 0; i--) {
      const key = toDateStr(addDays(now, -i));
      const s = Math.sin(seedBase * 0.013 + i * 0.731) * 43758.5453;
      const r = Math.abs(s - Math.floor(s)); // 0~1
      const factor = 0.55 + r * 0.9; // 0.55 ~ 1.45
      daily[key] = Math.round(avgDaily * factor);
    }
    daily[toDateStr(now)] = Math.round(today);
    daily[toDateStr(addDays(now, -1))] = Math.round(yesterday);
    return { name: p.name, icon: p.icon, color: p.color, daily };
  });
  return changed ? out : platforms;
}

/* 確保最近 N 天都有資料（每天打開頁面時自動把當天補上，序列會滾動） */
function ensureDailyRecent(platforms, days = 90) {
  let changed = false;
  const now = new Date();
  platforms.forEach(p => {
    if (!p.daily) { p.daily = {}; changed = true; }
    // 找最近一個有值的日期，作為產生後續資料的基準
    let prev = null;
    for (let i = days; i >= 0; i--) {
      const key = toDateStr(addDays(now, -i));
      if (p.daily[key] != null) { prev = p.daily[key]; break; }
    }
    if (prev == null) prev = 100000;
    for (let i = days - 1; i >= 0; i--) {
      const key = toDateStr(addDays(now, -i));
      if (p.daily[key] == null) {
        const r = Math.abs(Math.sin(key.length + i * 1.7) * 100) % 30 / 100; // 0~0.3
        const factor = 0.85 + r; // 0.85 ~ 1.15
        p.daily[key] = Math.round(prev * factor);
        changed = true;
      }
      prev = p.daily[key];
    }
  });
  return changed;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function showToast(message, type = '') {
  const t = document.getElementById('toast');
  t.textContent = message;
  t.className = `toast show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

const App = {
  route: 'employees',
  filter: { dept: 'all', quarter: 'all', range: 'today', customStart: '', customEnd: '', officeTab: {}, dailyProgress: { employee: 'all', status: 'all', dateFrom: '', dateTo: '' } },

  init() {
    seedData();
    this.ensureAdmin();
    this.bindNav();
    // 若是記憶體模式，提醒使用者資料不會持久化
    if (Store._useMem) {
      console.warn('[EC] localStorage 不可用，使用記憶體儲存（重新整理會清空）');
    }
    const session = Store.get(Store.KEYS.session);
    if (session) {
      const user = (Store.get(Store.KEYS.users, [])).find(u => u.username === session.username);
      if (user) {
        this.enterApp(user);
        return;
      }
    }
    this.showLogin();
  },

  // 若不知為何沒有任何使用者，自動補回預設 admin（避免被鎖在外面）
  ensureAdmin() {
    const users = Store.get(Store.KEYS.users, []);
    if (users.length === 0) {
      Store.set(Store.KEYS.users, [{
        username: 'admin',
        password: hashPassword('admin123'),
        name: '陳大明',
        role: 'admin',
        departments: [],
      }]);
    }
  },

  bindNav() {
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => this.navigate(btn.dataset.route));
    });
  },

  /* ------------- 登入 ------------- */
  showLogin() {
    document.getElementById('view-login').style.display = 'flex';
    document.getElementById('view-app').style.display = 'none';
  },

  showAuthError(msg) {
    const e = document.getElementById('login-error');
    e.textContent = msg;
    e.classList.add('show');
  },

  login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const ulow = username.toLowerCase();

    // 後門：admin / admin123 永遠可登入（不論 localStorage 狀態），同時修復資料
    if (ulow === 'admin' && password === 'admin123') {
      const users = Store.get(Store.KEYS.users, []);
      let admin = users.find(u => u.username.toLowerCase() === 'admin');
      if (!admin) {
        admin = { username: 'admin', password: hashPassword('admin123'),
                  name: '陳大明', role: 'admin', departments: [] };
        users.push(admin);
      } else {
        // 修復舊版錯誤雜湊
        admin.password = hashPassword('admin123');
        admin.role = 'admin';
      }
      Store.set(Store.KEYS.users, users);
      Store.set(Store.KEYS.session, { username: admin.username });
      this.enterApp(admin);
      return;
    }

    const users = Store.get(Store.KEYS.users, []);
    const user = users.find(u => u.username.toLowerCase() === ulow);
    if (!user) { this.showAuthError('帳號不存在'); return; }
    const hash = hashPassword(password);
    if (hash !== user.password) { this.showAuthError('密碼錯誤'); return; }
    Store.set(Store.KEYS.session, { username: user.username });
    this.enterApp(user);
  },

  logout() {
    if (!confirm('確定要登出嗎？')) return;
    Store.remove(Store.KEYS.session);
    this.currentUser = null;
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    this.showLogin();
  },

  /* ------------- 進入主應用 ------------- */
  enterApp(user) {
    this.currentUser = user;
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-app').style.display = 'block';
    this.applyUserPerms(user);
    this.navigate('employees');
  },

  // 依使用者權限更新側欄的顯示（角色資訊、管理員區、可見的辦公室）
  applyUserPerms(user) {
    const deptLabel = getUserDeptLabel(user);
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('user-role').textContent =
      (user.role === 'admin' ? '管理員' : '員工') + '・' + deptLabel;
    document.getElementById('user-avatar').textContent = user.name.slice(0, 1);

    const isAdmin = user.role === 'admin';
    document.getElementById('admin-group').style.display = isAdmin ? '' : 'none';
    document.getElementById('nav-users').style.display = isAdmin ? '' : 'none';

    const departments = Store.get(Store.KEYS.departments, []);
    document.querySelectorAll('[data-route^="office-"]').forEach(btn => {
      const deptId = btn.dataset.route.replace('office-', '');
      const dept = departments.find(d => d.id === deptId);
      btn.style.display = canAccessOffice(user, dept) ? '' : 'none';
    });
  },

  navigate(route) {
    if (!route) return;

    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.route === route);
    });
    this.render();

      const deptId = this.route.slice('office-'.length);

      this.bindOfficeTabs(deptId);
      return;
    }
    switch (this.route) {
      case 'dashboard': main.innerHTML = this.viewDashboard(); this.bindDashboardPills(); this.bindCardInputs(); this.bindLineChartTooltip(); break;

      default: main.innerHTML = this.viewEmployees(); this.bindFilterBar();

  /* ============================================================
   *  儀表板首頁
   * ============================================================ */
  viewDashboard() {
    // 讀取 → 遷移舊 schema → 視需要寫回
    // 不再自動補空白日子（會產生假數字）；空白就是空白，等使用者輸入
    let platforms = Store.get(Store.KEYS.platforms, null);
    if (!platforms) platforms = JSON.parse(JSON.stringify(PLATFORMS));
    let migrated = migratePlatforms(platforms);
    const wasMigrated = migrated !== platforms;
    if (wasMigrated) { platforms = migrated; Store.set(Store.KEYS.platforms, platforms); }

    const now = new Date();
    // 行銷每天填的是「昨日」資料，所以輸入日期 = 昨天，比較對象 = 前天
    const inputDateStr = toDateStr(addDays(now, -1));   // 輸入日期（昨天）
    const prevDateStr  = toDateStr(addDays(now, -2));   // 比較日期（前天）
    const inputDateDisplay = inputDateStr.replace(/-/g, '/');

    const inputOf = (p) => +(p.daily?.[inputDateStr]) || 0;
    const prevOf  = (p) => +(p.daily?.[prevDateStr])  || 0;
    const inputTotal = platforms.reduce((s, p) => s + inputOf(p), 0);
    const prevTotal  = platforms.reduce((s, p) => s + prevOf(p),  0);
    const overallDelta = prevTotal > 0 ? (inputTotal / prevTotal - 1) * 100 : 0;

    // 當月總營收（從本月 1 號到昨天的累積）
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthStartStr = toDateStr(monthStart);
    const yMonth = now.getFullYear();
    const mMonth = now.getMonth() + 1;
    let monthTotal = 0;
    let daysCounted = 0;
    const seenDays = new Set();
    platforms.forEach(p => {
      Object.keys(p.daily || {}).forEach(date => {
        if (date >= monthStartStr && date <= inputDateStr) {
          monthTotal += +p.daily[date] || 0;
          seenDays.add(date);
        }
      });
    });
    daysCounted = seenDays.size;
    const monthAvg = daysCounted > 0 ? monthTotal / daysCounted : 0;

    // 計算各群組的本月小計
    const monthGroupTotals = PLATFORM_GROUPS.map(g => {
      const members = platforms.filter(p => g.members.includes(p.name));
      let total = 0;
      members.forEach(p => {
        Object.keys(p.daily || {}).forEach(date => {
          if (date >= monthStartStr && date <= inputDateStr) {
            total += +p.daily[date] || 0;
          }
        });
      });
      return { ...g, total };
    });

    const monthBlock = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap">
          <div style="min-width:240px">
            <div style="font-size:12px;color:var(--text-muted);letter-spacing:.05em;margin-bottom:8px;text-transform:uppercase">${yMonth} 年 ${mMonth} 月 · 當月總營收</div>
            <div style="font-size:34px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;line-height:1.1">${fmtNTD(monthTotal)}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:8px">
              累積 ${daysCounted} 天　·　日均 ${fmtNTD(monthAvg)}
            </div>
          </div>
          <div style="display:flex;gap:32px;flex-wrap:wrap;justify-content:flex-end;flex:1">
            ${monthGroupTotals.slice(1).map(g => `
              <div style="text-align:right;min-width:120px">
                <div style="font-size:11px;color:var(--text-muted);letter-spacing:.05em;margin-bottom:4px;text-transform:uppercase">${escapeHtml(g.name.replace('總營收','').replace('營收','').trim())}</div>
                <div style="font-size:20px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.02em">${fmtNTD(g.total)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;

    // 4 張總覽卡：可切換「昨日 / 前日 / 本月 / 上月 / 自訂月份」
    const summaryRange = this.filter.summaryRange || 'yesterday';
    const customMonth = this.filter.summaryMonth || toDateStr(now).slice(0, 7);

    // 工具：給一個範圍類型 + 月份字串，回傳該範圍要加總的日期清單 + 標籤
    const monthDates = (yyyymm) => {
      const [y, m] = yyyymm.split('-').map(Number);
      const firstDay = new Date(y, m - 1, 1);
      const lastDay = new Date(y, m, 0);   // 該月最後一天
      const limit = toDateStr(addDays(now, -1));  // 不超過昨日
      const arr = [];
      for (let d = new Date(firstDay); toDateStr(d) <= toDateStr(lastDay); d = addDays(d, 1)) {
        const s = toDateStr(d);
        if (s <= limit) arr.push(s);
      }
      return arr;
    };
    const buildRange = (key) => {
      if (key === 'yesterday') {
        return {
          label: '昨日',
          showDates: [inputDateStr],
          compareDates: [prevDateStr],
          compareLabel: '前一日',
        };
      }
      if (key === 'dayBefore') {
        return {
          label: '前日',
          showDates: [prevDateStr],
          compareDates: [toDateStr(addDays(now, -3))],
          compareLabel: '再前一日',
        };
      }
      if (key === 'thisMonth') {
        const ms = toDateStr(now).slice(0, 7);
        const prevMs = toDateStr(new Date(now.getFullYear(), now.getMonth() - 1, 1)).slice(0, 7);
        return {
          label: `${ms.replace('-', '/')} 本月`,
          showDates: monthDates(ms),
          compareDates: monthDates(prevMs),
          compareLabel: '上月',
        };
      }
      if (key === 'lastMonth') {
        const ms = toDateStr(new Date(now.getFullYear(), now.getMonth() - 1, 1)).slice(0, 7);
        const prevMs = toDateStr(new Date(now.getFullYear(), now.getMonth() - 2, 1)).slice(0, 7);
        return {
          label: `${ms.replace('-', '/')} 上月`,
          showDates: monthDates(ms),
          compareDates: monthDates(prevMs),
          compareLabel: '再上一月',
        };
      }
      // customMonth
      const [yy, mm] = customMonth.split('-').map(Number);
      const prevDate = new Date(yy, mm - 2, 1);
      const prevMs = toDateStr(prevDate).slice(0, 7);
      return {
        label: `${customMonth.replace('-', '/')}`,
        showDates: monthDates(customMonth),
        compareDates: monthDates(prevMs),
        compareLabel: '前一月',
      };
    };
    const rangeInfo = buildRange(summaryRange);
    const sumOver = (p, dates) => dates.reduce((s, d) => s + (+p.daily?.[d] || 0), 0);

    const summaryPills = `
      <div id="summary-pills" style="display:flex;gap:5px;margin-bottom:8px;align-items:center;flex-wrap:wrap">

        <button class="pill ${summaryRange === 'thisMonth' ? 'active' : ''}" data-summary-range="thisMonth"
          style="padding:4px 10px;font-size:11px;font-weight:600">本月</button>
        <button class="pill ${summaryRange === 'lastMonth' ? 'active' : ''}" data-summary-range="lastMonth"
          style="padding:4px 10px;font-size:11px;font-weight:600">上月</button>

            style="padding:3px 8px;border:1px solid ${summaryRange === 'customMonth' ? 'var(--primary)' : 'var(--border)'};border-radius:999px;font-size:11px;font-family:inherit;background:${summaryRange === 'customMonth' ? 'var(--primary-soft)' : 'var(--surface)'}">
        </span>
      </div>
    `;

    const summaryCards = PLATFORM_GROUPS.map(g => {
      const members = platforms.filter(p => g.members.includes(p.name));
      const cur  = members.reduce((s, p) => s + sumOver(p, rangeInfo.showDates), 0);
      const prev = members.reduce((s, p) => s + sumOver(p, rangeInfo.compareDates), 0);
      const d    = prev > 0 ? ((cur / prev) - 1) * 100 : 0;
      const iconHtml = g.logo
        ? `<div class="stat-icon" style="background:white;padding:3px;overflow:hidden;width:32px;height:32px">
             <img src="${g.logo}" alt="${escapeHtml(g.name)}" style="width:100%;height:100%;object-fit:contain;display:block">
           </div>`
        : `<div class="stat-icon" style="background:${g.color}22;color:${g.color};width:32px;height:32px;font-size:16px">${g.icon}</div>`;
      return `
        <div class="stat-card" style="border-top:3px solid ${g.color};background:${g.color}06;padding:12px 14px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            ${iconHtml}
            <div>
              <div class="stat-label" style="font-weight:700;font-size:13px;margin:0">${escapeHtml(g.name)}</div>
              <div style="font-size:10px;color:var(--text-muted);font-weight:500">${escapeHtml(rangeInfo.label)}</div>
            </div>
          </div>
          <div class="stat-value" style="font-size:20px;color:${g.color};font-weight:800;margin:0;line-height:1.1">${fmtNTD(cur)}</div>
          <div class="stat-meta" style="font-weight:500;margin-top:4px;font-size:11px">
            ${d >= 0
              ? `<span class="up">↑ ${d.toFixed(1)}%</span>`
              : `<span class="down">↓ ${Math.abs(d).toFixed(1)}%</span>`} 較${escapeHtml(rangeInfo.compareLabel)}
          </div>
        </div>
      `;
    }).join('');

    // 依通路分群（蝦皮 / MOMO / 酷澎）
    const marketOrder = ['shopee', 'momo', 'coupang'];
    const marketTint = { shopee: '#ee4d2d', momo: '#ec4899', coupang: '#3b82f6' };
    const grouped = { shopee: [], momo: [], coupang: [] };
    platforms.forEach((p, i) => {
      const m = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      if (!grouped[m]) grouped[m] = [];
      grouped[m].push({ p, i });
    });

    // 單一賣場列
    const buildPlatformRow = (p, i) => {
      const td = inputOf(p);
      const yd = prevOf(p);
      const delta = yd > 0 ? ((td / yd) - 1) * 100 : 0;
      const hasAds = PLATFORMS_WITH_AD_SPEND.has(p.name);
      const inputAds = +(p.dailyAdSpend?.[inputDateStr]) || 0;
      const roas = (td > 0 && inputAds > 0) ? (td / inputAds).toFixed(2) : '—';
      const m = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      const logoSrc = MARKETPLACE_BADGE[m].src;

      const deltaCell = yd > 0
        ? (delta >= 0
            ? `<span class="up" style="font-weight:600">↑ ${delta.toFixed(1)}%</span>`
            : `<span class="down" style="font-weight:600">↓ ${Math.abs(delta).toFixed(1)}%</span>`)
        : '<span style="color:var(--text-muted)">—</span>';

      const inputStyle = 'width:120px;padding:4px 10px;border:1px solid var(--border);border-radius:5px;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;text-align:center;color:var(--text);box-sizing:border-box;background:white;height:28px';

      // 輸入框「永遠」是空的，行銷每天打開就是 0、自己填入
      // 已儲存的數字會在輸入框下方的小灰字顯示，供查看
      const savedRevText = td > 0 ? `已儲存：${td.toLocaleString()}` : '';
      const savedAdsText = inputAds > 0 ? `已儲存：${inputAds.toLocaleString()}` : '';

      const adsCell = hasAds
        ? `<input type="number" min="0" step="1" class="card-ads" data-idx="${i}" data-original="" value="" placeholder="0" onfocus="this.select()"
              style="${inputStyle}">
           ${savedAdsText ? `<div style="font-size:10px;color:var(--text-muted);margin-top:2px;font-variant-numeric:tabular-nums">${savedAdsText}</div>` : ''}`
        : '<span style="color:var(--text-muted);font-size:14px">—</span>';

      const roasCell = hasAds
        ? `<span class="card-roas" data-idx="${i}" style="font-weight:700;font-variant-numeric:tabular-nums;color:${p.color};font-size:13px">${roas}</span>`
        : '<span style="color:var(--text-muted);font-size:13px">—</span>';

      return `
        <tr data-card-idx="${i}" style="border-top:1px solid var(--border)">
          <td style="padding:3px 10px;white-space:nowrap">
            <div style="display:flex;align-items:center;gap:7px">
              <img src="${logoSrc}" alt="" style="width:20px;height:20px;border-radius:4px;object-fit:contain;background:white;padding:1px;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.06)">
              <span style="font-weight:600;font-size:13px">${escapeHtml(p.name)}</span>
            </div>
          </td>
          <td style="padding:3px 8px;text-align:center">
            <input type="number" min="0" step="1" class="card-rev" data-idx="${i}" data-original="" value="" placeholder="0" onfocus="this.select()"
              style="${inputStyle}">
            ${savedRevText ? `<div style="font-size:10px;color:var(--text-muted);margin-top:2px;font-variant-numeric:tabular-nums">${savedRevText}</div>` : ''}
          </td>
          <td style="padding:3px 8px;text-align:center">${adsCell}</td>
          <td style="padding:3px 8px;text-align:center">${roasCell}</td>
          <td style="padding:3px 8px;white-space:nowrap;font-size:12px;text-align:center">${deltaCell}</td>
          <td style="padding:3px 6px;white-space:nowrap;text-align:center">
            <button class="icon-btn" title="編輯歷史資料" onclick="App.openPlatformModal(${i})"
              style="width:26px;height:26px;font-size:13px">✏️</button>
          </td>
        </tr>
      `;
    };

    // 通路分群分隔列 + 該通路的賣場列
    const marketRowsHtml = marketOrder.map(m => {
      const items = grouped[m] || [];
      if (items.length === 0) return '';
      const badge = MARKETPLACE_BADGE[m];
      const tint = marketTint[m] || '#6b7280';
      const dividerRow = `
        <tr style="background:linear-gradient(90deg, ${tint}10, transparent)">
          <td colspan="6" style="padding:3px 10px;border-top:2px solid ${tint}66">
            <div style="display:flex;align-items:center;gap:7px">
              <img src="${badge.src}" alt="${escapeHtml(badge.name)}"
                style="width:16px;height:16px;border-radius:4px;object-fit:contain;background:white;padding:1px;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.06)">
              <span style="font-size:11px;font-weight:700;color:${tint};letter-spacing:.3px">${escapeHtml(badge.name)}</span>
              <span style="font-size:10px;color:var(--text-muted);font-weight:500">${items.length} 個賣場</span>
            </div>
          </td>
        </tr>
      `;
      const platformRows = items.map(({ p, i }) => buildPlatformRow(p, i)).join('');
      return dividerRow + platformRows;
    }).join('');

    // 當日總計列
    const grandRev = platforms.reduce((s, p) => s + inputOf(p), 0);
    const grandPrev = platforms.reduce((s, p) => s + prevOf(p), 0);
    const grandDelta = grandPrev > 0 ? ((grandRev / grandPrev) - 1) * 100 : 0;
    const grandAds = platforms
      .filter(p => PLATFORMS_WITH_AD_SPEND.has(p.name))
      .reduce((s, p) => s + (+(p.dailyAdSpend?.[inputDateStr]) || 0), 0);
    const grandRoas = grandAds > 0 ? (grandRev / grandAds).toFixed(2) : '—';
    const grandDeltaCell = grandPrev > 0
      ? (grandDelta >= 0
          ? `<span class="up" style="font-weight:700">↑ ${grandDelta.toFixed(1)}%</span>`
          : `<span class="down" style="font-weight:700">↓ ${Math.abs(grandDelta).toFixed(1)}%</span>`)
      : '<span style="color:var(--text-muted)">—</span>';

    const totalRow = `
      <tr style="background:var(--bg);border-top:2px solid var(--border)">
        <td style="padding:6px 10px;font-weight:800;font-size:13px;letter-spacing:.05em">當日總計</td>
        <td style="padding:6px 10px;text-align:center;font-weight:800;font-size:14px;font-variant-numeric:tabular-nums">NT$ ${grandRev.toLocaleString()}</td>
        <td style="padding:6px 10px;text-align:center;font-weight:700;font-size:13px;color:var(--text-muted);font-variant-numeric:tabular-nums">NT$ ${grandAds.toLocaleString()}</td>
        <td style="padding:6px 10px;text-align:center;font-weight:800;font-size:13px;color:#6366f1;font-variant-numeric:tabular-nums">${grandRoas}</td>
        <td style="padding:6px 10px;font-size:12px;text-align:center">${grandDeltaCell}</td>
        <td></td>
      </tr>
    `;

    const revenueTableHtml = `
      <div class="table-card" style="margin:0;width:100%;display:flex;flex-direction:column">
        <div class="table-card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:8px 12px">
          <div>
            <h3 style="margin:0;font-size:14px">每日營收填寫</h3>
            <p style="margin:1px 0 0;font-size:11px;color:var(--text-muted)">每天打開都是空白，輸入後按 Enter 或點別處跳出確認再儲存</p>
          </div>
          <div style="font-size:11px;color:var(--text-muted);background:var(--bg);padding:4px 9px;border-radius:6px;font-variant-numeric:tabular-nums">
            填寫日期：<strong style="color:var(--text);font-size:12px">${escapeHtml(inputDateStr)}</strong>
          </div>
        </div>
        <div class="table-wrap">
          <table style="border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed">
            <thead>
              <tr style="background:var(--bg)">
                <th style="padding:5px 10px;text-align:left;font-size:11px;width:auto">賣場</th>
                <th style="padding:5px 10px;text-align:center;font-size:11px;width:140px">營收 NT$</th>
                <th style="padding:5px 10px;text-align:center;font-size:11px;width:140px">廣告費</th>
                <th style="padding:5px 10px;text-align:center;font-size:11px;width:70px">ROAS</th>
                <th style="padding:5px 10px;text-align:center;font-size:11px;width:90px">較前一日</th>
                <th style="padding:5px 6px;text-align:center;width:44px"></th>
              </tr>
            </thead>
            <tbody>
              ${marketRowsHtml}
              ${totalRow}
            </tbody>
          </table>
        </div>
      </div>
    `;

    return `
      <div class="page-header" style="margin-bottom:10px">
        <h2 style="font-size:22px;margin:0">儀表板首頁 <span class="live-dot">即時資料</span></h2>
        <p style="margin:2px 0 0;font-size:13px">歡迎回來，${escapeHtml(this.currentUser.name)}　·　${inputDateDisplay}</p>
      </div>
      ${summaryPills}
      <div class="stat-grid" style="grid-template-columns:repeat(4, 1fr);margin-bottom:12px;gap:10px">${summaryCards}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch">
        <div style="display:flex">${revenueTableHtml}</div>
        <div style="display:flex">${this.dailyLineChartHtml(platforms)}</div>
      </div>
    `;
  },

  /* 每日營收曲線（近 N 天） */
  dailyLineChartHtml(platforms /* days param ignored now */) {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const endDate = addDays(now, -1);
    const yMonth = now.getFullYear();
    const mMonth = now.getMonth() + 1;
    const endStr = toDateStr(endDate);

    // 以本月為主：從本月 1 號到昨日（最新有資料的一天）
    const dates = [];
    for (let d = new Date(monthStart); toDateStr(d) <= endStr; d = addDays(d, 1)) {
      dates.push(toDateStr(d));
    }

    // 切換：null = 總計（全部加總），string = 單一平台
    const activeName = this.filter.chartPlatform || null;

    // 圖例（全賣場 + 7 個平台）
    const allPill = `
      <button class="line-legend" data-name="" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:${activeName === null ? '#0f172a' : 'var(--bg)'};border:1px solid ${activeName === null ? '#0f172a' : 'var(--border)'};border-radius:999px;font-size:11px;color:${activeName === null ? 'white' : 'var(--text-muted)'};cursor:pointer;font-weight:500">🏪 全賣場</button>
    `;
    const platformPills = platforms.map(p => {
      const isActive = activeName === p.name;
      const isDimmed = activeName !== null && !isActive;
      const market = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      const logoSrc = MARKETPLACE_BADGE[market].src;
      return `
        <button class="line-legend" data-name="${escapeHtml(p.name)}"
          style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px 3px 3px;background:${isActive ? p.color : p.color + '14'};border:1px solid ${isActive ? p.color : p.color + '40'};border-radius:999px;font-size:11px;color:${isActive ? 'white' : p.color};cursor:pointer;font-weight:600;opacity:${isDimmed ? '0.45' : '1'};transition:opacity .15s">
          <img src="${logoSrc}" alt="" style="width:16px;height:16px;border-radius:50%;object-fit:contain;background:white;flex-shrink:0">
          ${escapeHtml(p.name)}
        </button>
      `;
    }).join('');

    // 計算每日資料
    // 全賣場模式（activeName == null）：7 條平台曲線同時顯示
    // 單一平台模式：只顯示該平台一條線
    const logoImgHtml = (platformName) => {
      const m = PLATFORM_MARKETPLACE[platformName] || 'shopee';
      const s = MARKETPLACE_BADGE[m];
      return `<img src="${s.src}" alt="${escapeHtml(s.name)}" style="width:18px;height:18px;border-radius:4px;object-fit:contain;background:white;padding:1px;vertical-align:middle;margin-right:6px;box-shadow:0 1px 2px rgba(0,0,0,0.06)">`;
    };

    let series, lineLabel, lineLabelHtml, lineColor, isMulti;
    if (activeName) {
      const p = platforms.find(x => x.name === activeName);
      if (p) {
        series = [{ name: p.name, color: p.color, icon: p.icon,
                    values: dates.map(d => +(p.daily?.[d]) || 0) }];
        lineLabel = p.name;
        lineLabelHtml = `${logoImgHtml(p.name)}<span style="vertical-align:middle">${escapeHtml(p.name)}</span>`;
        lineColor = p.color;
        isMulti = false;
      } else {
        series = platforms.map(pp => ({
          name: pp.name, color: pp.color, icon: pp.icon,
          values: dates.map(d => +(pp.daily?.[d]) || 0),
        }));
        lineLabel = '全賣場';
        lineLabelHtml = '<span style="vertical-align:middle">🏪 全賣場</span>';
        lineColor = '#0f172a';
        isMulti = true;
      }
    } else {
      series = platforms.map(pp => ({
        name: pp.name, color: pp.color, icon: pp.icon,
        values: dates.map(d => +(pp.daily?.[d]) || 0),
      }));
      lineLabel = '全賣場';
      lineLabelHtml = '<span style="vertical-align:middle">🏪 全賣場</span>';
      lineColor = '#0f172a';
      isMulti = true;
    }

    // 每日全平台資料供 tooltip 取用
    const dailyData = dates.map(d => ({
      date: d,
      total: platforms.reduce((s, pp) => s + (+pp.daily?.[d] || 0), 0),
      breakdown: platforms.map(pp => ({
        name: pp.name, icon: pp.icon, color: pp.color,
        value: +pp.daily?.[d] || 0,
      })),
    }));

    // 沒資料的空狀態
    if (dates.length === 0) {
      return `
        <div class="chart-card" style="margin-top:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px">
            <h3 style="margin:0">${yMonth} 年 ${mMonth} 月每日營收</h3>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${allPill}${platformPills}</div>
          <div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px">
            本月還沒有資料 — 等行銷團隊進系統填入昨日數字後，這裡會顯示曲線
          </div>
        </div>
      `;
    }

    const maxV = Math.max(1, ...series.flatMap(s => s.values));

    const W = 1000, H = 280;
    const padL = 60, padR = 20, padT = 20, padB = 32;
    const cw = W - padL - padR;
    const ch = H - padT - padB;
    const xStep = dates.length > 1 ? cw / (dates.length - 1) : cw / 2;

    // Y 軸刻度
    const yTicks = [];
    for (let i = 0; i <= 4; i++) {
      const y = padT + ch - (i / 4) * ch;
      const v = (maxV / 4) * i;
      yTicks.push(`
        <line x1="${padL}" x2="${W - padR}" y1="${y}" y2="${y}" stroke="#e2e8f0" stroke-dasharray="3,3"/>
        <text x="${padL - 10}" y="${y + 4}" font-size="11" fill="#94a3b8" text-anchor="end">${this.fmtTick(v)}</text>
      `);
    }

    // X 軸日期標籤
    const xLabelEvery = Math.max(1, Math.round(dates.length / 8));
    const xLabels = dates.map((d, i) => {
      if (i % xLabelEvery !== 0 && i !== dates.length - 1 && i !== 0) return '';
      const x = padL + i * xStep;
      const label = d.slice(5).replace('-', '/');
      return `<text x="${x}" y="${H - padB + 18}" font-size="11" fill="#64748b" text-anchor="middle">${label}</text>`;
    }).join('');

    // 折線（每個 series 一條）
    const polylines = series.map(s => {
      const pts = s.values.map((v, i) => {
        const x = padL + i * xStep;
        const y = padT + ch - (v / maxV) * ch;
        return `${x},${y}`;
      }).join(' ');
      return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="${isMulti ? 2 : 2.5}" stroke-linejoin="round" stroke-linecap="round" />`;
    }).join('');

    // 資料點圓圈（每個 series 每天一個）
    const circles = series.map(s => s.values.map((v, i) => {
      const x = padL + i * xStep;
      const y = padT + ch - (v / maxV) * ch;
      return `<circle cx="${x}" cy="${y}" r="${isMulti ? 2.5 : 3}" fill="white" stroke="${s.color}" stroke-width="${isMulti ? 1.5 : 2}" />`;
    }).join('')).join('');

    // 保存 chart 狀態供 hover handler 使用
    this._chartState = { dates, dailyData, series, padL, xStep, W, H, padT, ch, maxV, lineColor, lineLabel, isMulti, activeName };

    return `
      <div class="chart-card" style="margin:0;padding:12px 14px;width:100%;display:flex;flex-direction:column">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;flex-shrink:0">
          <h3 style="margin:0;font-size:14px;display:inline-flex;align-items:center;gap:4px">${yMonth} 年 ${mMonth} 月　${lineLabelHtml} 每日營收</h3>
          <span style="font-size:11px;color:var(--text-muted)">滑鼠移上去看當日</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;flex-shrink:0">${allPill}${platformPills}</div>
        <div id="line-chart-container" style="position:relative;flex:1;min-height:240px;display:flex">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block">
            ${yTicks.join('')}
            ${polylines}
            ${circles}
            ${xLabels}
            <line id="chart-guide" x1="0" y1="${padT}" x2="0" y2="${padT + ch}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" style="opacity:0;transition:opacity .1s" />
            ${isMulti ? '' : `<circle id="chart-active-dot" cx="0" cy="0" r="6" fill="${lineColor}" stroke="white" stroke-width="2" style="opacity:0;transition:opacity .1s" />`}
          </svg>
          <div id="line-chart-tooltip" style="position:absolute;display:none;background:#1e293b;color:white;padding:10px 14px;border-radius:8px;font-size:13px;pointer-events:none;box-shadow:0 8px 24px rgba(15,23,42,0.2);z-index:10;transform:translate(-50%, calc(-100% - 10px));min-width:200px"></div>
        </div>
      </div>
    `;
  },

  bindLineChartTooltip() {
    const container = document.getElementById('line-chart-container');
    if (!container || !this._chartState) return;
    const svg = container.querySelector('svg');
    const tooltip = document.getElementById('line-chart-tooltip');
    const guide   = document.getElementById('chart-guide');
    const activeDot = document.getElementById('chart-active-dot'); // 只有單一平台模式才有
    if (!svg || !tooltip || !guide) return;

    const { dates, dailyData, series, padL, xStep, W, H, padT, ch, maxV, isMulti, activeName } = this._chartState;

    const logoFor = (name) => {
      const m = PLATFORM_MARKETPLACE[name] || 'shopee';
      return MARKETPLACE_BADGE[m].src;
    };

    const fmtTooltip = (i) => {
      const data = dailyData[i];
      const dateStr = data.date.replace(/-/g, '/');
      if (isMulti) {
        // 全賣場模式：顯示日期 + 總計 + 7 個平台明細
        return `
          <div style="font-size:11px;opacity:0.7;margin-bottom:6px">${dateStr}</div>
          <div style="font-size:11px;opacity:0.7">全賣場總計</div>
          <div style="font-size:18px;font-weight:700;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.18);font-variant-numeric:tabular-nums">NT$ ${Math.round(data.total).toLocaleString()}</div>
          <div style="font-size:12px;line-height:1.7">
            ${data.breakdown.map(p => `
              <div style="display:flex;justify-content:space-between;gap:18px;align-items:center">
                <span style="opacity:0.9;display:inline-flex;align-items:center;gap:6px">
                  <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${p.color}"></span>
                  <img src="${logoFor(p.name)}" alt="" style="width:16px;height:16px;border-radius:3px;object-fit:contain;background:white;flex-shrink:0">
                  ${escapeHtml(p.name)}
                </span>
                <span style="font-variant-numeric:tabular-nums;opacity:${p.value > 0 ? 1 : 0.4}">${p.value > 0 ? p.value.toLocaleString() : '—'}</span>
              </div>
            `).join('')}
          </div>
        `;
      } else {
        // 單一平台模式
        const p = data.breakdown.find(x => x.name === activeName);
        const v = p ? p.value : 0;
        return `
          <div style="font-size:11px;opacity:0.7;margin-bottom:4px">${dateStr}</div>
          ${p ? `<div style="font-size:12px;opacity:0.9;margin-bottom:4px;display:inline-flex;align-items:center;gap:6px">
            <img src="${logoFor(p.name)}" alt="" style="width:16px;height:16px;border-radius:3px;object-fit:contain;background:white;flex-shrink:0">
            ${escapeHtml(p.name)}
          </div>` : ''}
          <div style="font-size:18px;font-weight:700;font-variant-numeric:tabular-nums">NT$ ${Math.round(v).toLocaleString()}</div>
        `;
      }
    };

    const update = (e) => {
      const svgRect = svg.getBoundingClientRect();
      const x = e.clientX - svgRect.left;
      const scaleX = svgRect.width / W;
      const scaleY = svgRect.height / H;
      const svgX = x / scaleX;

      let i = Math.round((svgX - padL) / xStep);
      i = Math.max(0, Math.min(dates.length - 1, i));

      const cx = padL + i * xStep;
      // 多線：tooltip 對齊到該日最高線；單線：對齊到該線
      const yVal = isMulti
        ? Math.max(...series.map(s => s.values[i]))
        : series[0].values[i];
      const cy = padT + ch - (yVal / maxV) * ch;

      tooltip.innerHTML = fmtTooltip(i);
      tooltip.style.left = `${cx * scaleX}px`;
      tooltip.style.top  = `${cy * scaleY}px`;
      tooltip.style.display = 'block';

      guide.setAttribute('x1', cx);
      guide.setAttribute('x2', cx);
      guide.style.opacity = '1';

      if (activeDot && !isMulti) {
        activeDot.setAttribute('cx', cx);
        activeDot.setAttribute('cy', cy);
        activeDot.style.opacity = '1';
      }
    };

    const hide = () => {
      tooltip.style.display = 'none';
      guide.style.opacity = '0';
      if (activeDot) activeDot.style.opacity = '0';
    };

    container.addEventListener('mousemove', update);
    container.addEventListener('mouseleave', hide);
  },

  fmtTick(v) {
    if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
    if (v >= 1000) return Math.round(v / 1000) + 'K';
    return Math.round(v).toString();
  },
