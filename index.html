  /* ============================================================
   *  通用 Modal
   * ============================================================ */
  openModal({ title, bodyHtml, onSave, onMount, onCancel, saveLabel, cancelLabel, width, hideFooter }) {
    const modal = document.getElementById('modal');
    if (width) modal.style.maxWidth = width;
    else modal.style.maxWidth = '';
    modal.innerHTML = `
      <div class="modal-header">
        <h3>${escapeHtml(title)}</h3>
        <button class="icon-btn" id="modal-close-x">✕</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
      ${hideFooter ? '' : `
        <div class="modal-footer">
          <button class="btn-ghost" id="modal-cancel">${escapeHtml(cancelLabel || '取消')}</button>
          <button class="btn-primary" style="width:auto;padding:10px 20px" id="modal-save">${escapeHtml(saveLabel || '儲存')}</button>
        </div>
      `}
    `;
    document.getElementById('modal-backdrop').classList.add('show');
    if (onMount) onMount();
    const closeWithCancel = () => {
      if (typeof onCancel === 'function') onCancel();
      this.closeModal();
    };
    document.getElementById('modal-close-x').onclick = closeWithCancel;
    if (!hideFooter) {
      document.getElementById('modal-cancel').onclick = closeWithCancel;
      document.getElementById('modal-save').onclick = () => {
        const ok = onSave();
        if (ok) this.closeModal();
      };
    }
  },

  closeModal() {
    document.getElementById('modal-backdrop').classList.remove('show');
  },

  closeModalOnBackdrop(e) {
    if (e.target.id === 'modal-backdrop') this.closeModal();
  },
};

let __appBooted = false;
function __bootApp() {
  if (__appBooted) return; __appBooted = true;
  try {
    App.init();
    document.addEventListener('DOMContentLoaded', function() {
      var box = document.getElementById('js-status');
      if (box && !box.textContent) {
        box.style.color = 'var(--success)';
        box.textContent = '✓ 系統就緒';

    });
    setTimeout(function() {
      var box = document.getElementById('js-status');
      if (box && !box.textContent) {
        box.style.color = '#10b981';
        box.textContent = '✓ 系統就緒';
      }
    }, 50);
  } catch (err) {
    alert('App 初始化失敗：' + err.message + '\n\n' + err.stack);
    var box = document.getElementById('js-status');
    if (box) box.textContent = '⚠ 初始化失敗：' + err.message;
  }
}

// 本機獨有、不可同步的鍵（session 不上雲，避免一個人登入別人也跟著登入）
const __LOCAL_ONLY_KEYS = new Set([Store.KEYS.session]);

function __localGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function __localSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
function __localRemove(key) {
  try { localStorage.removeItem(key); } catch {}
}

async function __setupCloud() {
  try {
    const cs = window.__cloudStore;
    if (!cs) throw new Error('cloudStore not available');
    const snap = await cs.getDoc();
    let cloudData = snap.exists() ? (snap.data() || {}) : {};

    // 首次遷移：雲端無資料但本機有 → 將本機 localStorage 上傳到雲端（session 除外）
    if (Object.keys(cloudData).length === 0) {
      const local = {};
      for (const k of Object.values(Store.KEYS)) {
        if (__LOCAL_ONLY_KEYS.has(k)) continue;
        try {
          const raw = localStorage.getItem(k);
          if (raw !== null) local[k] = JSON.parse(raw);
        } catch {}
      }
      if (Object.keys(local).length > 0) {
        for (const [k, v] of Object.entries(local)) {
          await cs.setField(k, v);
        }
        cloudData = local;
      }
    }

    // 保險：雲端若殘留 session 就忽略，避免授權外洩
    delete cloudData[Store.KEYS.session];

    Store._mem = cloudData;
    Store._useMem = true;

    // 蓋掉 Store.get/set/remove：
    //   - session 一律走 localStorage（避免跨裝置共用登入狀態）
    //   - 其他鍵走原本的雲端同步路徑
    const origGet = Store.get.bind(Store);
    const origSet = Store.set.bind(Store);
    const origRemove = Store.remove.bind(Store);
    Store.get = function(key, fallback) {
      if (__LOCAL_ONLY_KEYS.has(key)) return __localGet(key, fallback);
      return origGet(key, fallback);
    };
    Store.set = function(key, value) {
      if (__LOCAL_ONLY_KEYS.has(key)) { __localSet(key, value); return; }
      origSet(key, value);
      try { cs.setField(key, value); } catch (e) { console.warn('cloud sync write failed', e); }
    };
    Store.remove = function(key) {
      if (__LOCAL_ONLY_KEYS.has(key)) { __localRemove(key); return; }
      origRemove(key);
      try { cs.removeField(key); } catch (e) { console.warn('cloud sync delete failed', e); }
    };

    // 訂閱：其他人改了資料，這台會即時更新畫面
    // 但如果使用者正在 input 裡打字、或有尚未確認儲存的更動，跳過重繪避免覆蓋
    cs.subscribe((data) => {
      const next = data || {};
      delete next[Store.KEYS.session];  // 不接受雲端的 session
      Store._mem = next;
      if (!(window.App && App.currentUser && typeof App.render === 'function')) return;
      const active = document.activeElement;
      const inOurInput = active && active.tagName === 'INPUT' && (
        active.classList.contains('card-rev') || active.classList.contains('card-ads') ||
        active.classList.contains('entry-rev') || active.classList.contains('entry-ads')
      );
      // 任一卡片有未儲存更動就不要重繪（避免把使用者打到一半的數字蓋掉）
      const hasUnsavedChanges = Array.from(document.querySelectorAll('.card-rev, .card-ads')).some(el => {
        const norm = v => (v == null ? '' : String(v).trim());
        return norm(el.value) !== norm(el.dataset.original);
      });
      if (!inOurInput && !hasUnsavedChanges) App.render();
    });
  } catch (e) {
    console.error('Cloud setup failed, falling back to localStorage', e);
  }
  __bootApp();
}

if (window.__cloudStore) {
  __setupCloud();
} else {
  window.addEventListener('cloudStoreReady', __setupCloud, { once: true });
  // 後門：若 module script 5 秒內沒就緒（網路問題等），先用 localStorage 啟動
  setTimeout(() => { if (!__appBooted) __bootApp(); }, 5000);
}

  import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteField, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

  const firebaseConfig = {

    storageBucket: "yc-dashboard-9aa6c.firebasestorage.app",
    messagingSenderId: "788748560432",
    appId: "1:788748560432:web:aaa65e2d253a77eb7425f5"
  };

  try {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, 'app', 'main');

    window.__cloudStore = {
      getDoc: () => getDoc(docRef),
      setField: (key, value) => setDoc(docRef, { [key]: value }, { merge: true }),
      removeField: (key) => updateDoc(docRef, { [key]: deleteField() }),
      subscribe: (cb) => onSnapshot(docRef, snap => cb(snap.exists() ? snap.data() : {})),
    };
    window.dispatchEvent(new Event('cloudStoreReady'));
  } catch (e) {
    console.error('Firebase init failed:', e);

</script>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f2f7;color:#1a1a2e;font-family:'Noto Sans TC',sans-serif;font-size:15px;min-height:100vh;}

.settings-bar{background:#fff;border:1px solid #e4e6ef;border-radius:10px;padding:11px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
.setting-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#374151;}
.setting-label{font-weight:600;white-space:nowrap;}
.setting-input{background:#f8f9fc;border:1px solid #e4e6ef;border-radius:6px;padding:5px 9px;font-size:13px;font-family:'DM Mono',monospace;color:#374151;outline:none;width:70px;text-align:center;}
.setting-input:focus{border-color:#5b5fcf;}
.setting-hint{font-size:12px;color:#9ca3af;}

.panel{background:#fff;border-radius:12px;border:1px solid #e4e6ef;overflow:hidden;}
.global-upload{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid #e4e6ef;background:#fafbff;flex-wrap:wrap;}

.shop-tabs{display:flex;border-bottom:2px solid #f0f2f7;}
.stab{padding:11px 18px;border:none;background:transparent;font-size:14px;font-weight:500;font-family:'Noto Sans TC',sans-serif;color:#9ca3af;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.stab:hover{color:#5b5fcf;}
.stab.active{color:#5b5fcf;border-bottom-color:#5b5fcf;font-weight:700;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stab-ok{width:6px;height:6px;border-radius:50%;background:#d1d5db;margin-left:2px;transition:background .3s;}
.stab-ok.on{background:#10b981;}

.shop-content{display:none;padding:16px 20px;}
.shop-content.active{display:block;}

/* Period */
.period-bar{background:#f8f9fc;border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.period-bar-label{font-size:13px;font-weight:700;color:#374151;white-space:nowrap;}
.month-select{background:#fff;border:1px solid #e4e6ef;border-radius:7px;padding:6px 10px;font-size:13px;font-family:'Noto Sans TC',sans-serif;color:#374151;outline:none;cursor:pointer;}
.half-btns{display:flex;gap:4px;}
.half-btn{padding:6px 14px;border:1.5px solid #e4e6ef;border-radius:7px;font-size:13px;font-weight:500;font-family:'Noto Sans TC',sans-serif;background:#fff;color:#6b7280;cursor:pointer;transition:all .15s;white-space:nowrap;}
.half-btn:hover{border-color:#5b5fcf;color:#5b5fcf;}
.half-btn.active{background:#5b5fcf;border-color:#5b5fcf;color:#fff;}
.days-badge{font-size:12px;color:#5b5fcf;background:#ede9fe;padding:3px 10px;border-radius:5px;font-weight:600;white-space:nowrap;}

/* Upload */
.upload-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.upload-row-label{font-size:13px;font-weight:700;color:#374151;min-width:50px;}
.ucard{display:flex;align-items:center;gap:8px;border:1.5px dashed #d1d5db;border-radius:9px;padding:9px 14px;cursor:pointer;position:relative;overflow:hidden;background:#fff;transition:all .2s;font-size:13px;color:#6b7280;font-weight:500;min-width:160px;}
.ucard:hover{border-color:#5b5fcf;background:#f5f5ff;}
.ucard.ok{border-style:solid;border-color:#10b981;color:#065f46;background:#f0fdf4;}
.ucard.err{border-color:#ef4444;color:#991b1b;background:#fef2f2;}
.ucard input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.ucard-icon{font-size:17px;flex-shrink:0;}
.ucard-info{display:flex;flex-direction:column;gap:1px;}
.ucard-title{font-size:13px;font-weight:600;}
.ucard-sub{font-size:11px;color:#9ca3af;}
.gen-btn{background:#5b5fcf;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;}
.gen-btn:hover{background:#4a4eb8;}
.gen-btn:disabled{background:#d1d5db;color:#9ca3af;cursor:not-allowed;}
.export-btn{display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #d1d5db;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;font-family:'Noto Sans TC',sans-serif;color:#374151;cursor:pointer;transition:all .15s;white-space:nowrap;}
.export-btn:hover{border-color:#10b981;color:#10b981;background:#f0fdf4;}
.export-btn:disabled{opacity:.35;cursor:not-allowed;}
.spin-row{display:none;align-items:center;gap:7px;color:#5b5fcf;font-size:13px;}
.spin-row.show{display:flex;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{width:14px;height:14px;border:2px solid rgba(91,95,207,.2);border-top-color:#5b5fcf;border-radius:50%;animation:spin .8s linear infinite;}

/* KPI */
.kpi-strip{display:flex;border-top:1px solid #f0f2f7;border-bottom:1px solid #f0f2f7;background:#f8f9fc;margin:0 -20px;flex-wrap:wrap;}
.kpi{padding:11px 16px;border-right:1px solid #e4e6ef;min-width:100px;}
.kpi:last-child{border-right:none;}
.kpi-l{font-size:11px;color:#9ca3af;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px;}
.kpi-v{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;}
.kpi-v.blue{color:#5b5fcf;}.kpi-v.green{color:#10b981;}.kpi-v.amber{color:#f59e0b;}.kpi-v.red{color:#ef4444;}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:8px;margin:10px 0 6px;flex-wrap:wrap;}
.search-input{background:#f8f9fc;border:1px solid #e4e6ef;color:#374151;border-radius:7px;padding:7px 11px;font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;width:180px;}
.search-input:focus{border-color:#5b5fcf;}
.row-cnt{font-size:13px;color:#9ca3af;flex:1;}
.period-tag{font-size:12px;color:#6b7280;background:#f3f4f6;padding:3px 10px;border-radius:6px;font-family:'DM Mono',monospace;}

/* Table */
.tscroll{overflow-x:auto;max-height:560px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:#f8f9fc;position:sticky;top:0;z-index:3;}
th{padding:9px 18px;text-align:right;font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #e4e6ef;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:#5b5fcf;}
th.tl{text-align:left;}
td{padding:11px 18px;border-bottom:1px solid #f0f2f7;text-align:right;color:#374151;white-space:nowrap;font-size:13px;}
td.tl{text-align:left;}
tbody tr:hover td{background:#fafbff;}
.td-code{font-family:'DM Mono',monospace;font-size:12px;color:#6b7280;min-width:80px;padding-right:12px;}
.td-id{font-family:'DM Mono',monospace;font-size:12px;color:#9ca3af;min-width:140px;padding-right:16px;}
.td-name{font-weight:500;color:#1a1a2e;white-space:nowrap;min-width:220px;max-width:320px;overflow:hidden;text-overflow:ellipsis;font-size:13px;}
.td-num{font-family:'DM Mono',monospace;font-size:13px;min-width:90px;}
.td-pos{color:#10b981;font-weight:600;}.td-neg{color:#ef4444;font-weight:600;}.td-amber{color:#f59e0b;}
.tr-total td{background:#f0f4ff !important;font-weight:700;border-top:2px solid #c7d2fe;}
.tr-no-rev td{color:#9ca3af;}

/* Analysis tags */
.tag{display:inline-block;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:700;white-space:nowrap;}
.tag-danger{background:#fee2e2;color:#991b1b;}
.tag-high{background:#d1fae5;color:#065f46;}
.tag-low{background:#fef3c7;color:#92400e;}
.tag-lose{background:#fee2e2;color:#7f1d1d;}
.tag-bad{background:#fef3c7;color:#78350f;}
.tag-add300{background:#dbeafe;color:#1e40af;}
.tag-add200{background:#dbeafe;color:#1e40af;}
.tag-add100{background:#ede9fe;color:#5b21b6;}
.tag-add50{background:#f0fdf4;color:#166534;}
.tag-sub300{background:#fee2e2;color:#7f1d1d;}
.tag-sub200{background:#fee2e2;color:#991b1b;}
.tag-sub100{background:#fff7ed;color:#9a3412;}

/* Filter popup */
.th-wrap{position:relative;display:inline-flex;align-items:center;gap:3px;width:100%;justify-content:flex-end;}
.th-wrap.tl{justify-content:flex-start;}
.filter-btn{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:11px;padding:0 2px;line-height:1;transition:color .12s;}
.filter-btn:hover,.filter-btn.on{color:#5b5fcf;}
.filter-popup{display:none;position:absolute;top:calc(100% + 4px);right:0;z-index:100;background:#fff;border:1px solid #e4e6ef;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);padding:12px;min-width:170px;}
.filter-popup.tl{right:auto;left:0;}
.filter-popup.open{display:block;}
.filter-popup-title{font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.filter-popup input{width:100%;background:#f8f9fc;border:1px solid #e4e6ef;border-radius:6px;padding:6px 8px;font-size:13px;outline:none;margin-bottom:5px;font-family:'Noto Sans TC',monospace;}
.filter-popup input:focus{border-color:#5b5fcf;}
.fp-sort-row{display:flex;gap:4px;margin-top:4px;}
.fp-sort-btn{flex:1;padding:6px;border:1px solid #e4e6ef;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:#374151;transition:all .12s;}
.fp-sort-btn:hover{border-color:#5b5fcf;color:#5b5fcf;}
.fp-sort-btn.on{background:#5b5fcf;border-color:#5b5fcf;color:#fff;}
.fp-clear{width:100%;margin-top:6px;padding:6px;border:1px solid #e4e6ef;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:#9ca3af;}
.fp-clear:hover{color:#ef4444;border-color:#ef4444;}

.pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:12px;font-weight:600;}
.ph{background:#d1fae5;color:#065f46;}.pm{background:#fef3c7;color:#92400e;}.pl{background:#fee2e2;color:#991b1b;}.pn{background:#f3f4f6;color:#9ca3af;}

.empty{padding:44px 24px;text-align:center;color:#9ca3af;display:flex;flex-direction:column;align-items:center;gap:10px;}
.empty-icon{font-size:36px;}
.empty-hint{font-size:13px;line-height:1.8;}
.sum-tab{padding:10px 18px;font-size:13px;cursor:pointer;color:#9ca3af;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s;}
.sum-tab:hover{color:#1a1a2e;background:#fff;}
.sum-tab-on{color:#5b5fcf;border-bottom-color:#5b5fcf;font-weight:600;background:#fff;}
.sum-th{padding:9px 18px;font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid #e4e6ef;white-space:nowrap;}
.sum-period-cell{font-size:12px;color:#6b7280;font-family:'DM Mono',monospace;vertical-align:middle;}
.sum-period-full{font-size:13px;font-weight:600;color:#1a1a2e;}

/* Inline edit */
.edit-btn{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:13px;padding:0 3px;line-height:1;transition:color .12s;vertical-align:middle;}
.edit-btn:hover{color:#5b5fcf;}
.cell-val{display:inline;}
.cell-edited{color:#5b5fcf;font-weight:600;}
.inline-input{width:80px;padding:3px 6px;border:1.5px solid #5b5fcf;border-radius:5px;font-size:12px;font-family:'DM Mono',monospace;outline:none;background:#fff;text-align:right;}
.inline-input.text-inp{width:120px;text-align:left;font-family:'Noto Sans TC',sans-serif;}
.note-cell{min-width:120px;max-width:180px;white-space:normal;font-size:12px;color:#6b7280;padding-right:12px;}
.note-input{width:140px;padding:4px 7px;border:1.5px solid #5b5fcf;border-radius:5px;font-size:12px;font-family:'Noto Sans TC',sans-serif;outline:none;background:#fff;}
.growth-pos{color:#10b981;font-weight:600;}
.growth-neg{color:#ef4444;font-weight:600;}
.growth-na{color:#9ca3af;}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
window.__profitTabHtml = `<div class="profit-wrap"><div class="settings-bar">
  <div class="setting-item">
    <span class="setting-label">平台手續費</span>
    <input type="number" class="setting-input" id="platformRate" value="20.5" min="0" max="100" step="0.1">
    <span class="setting-hint">%（修改後重新產生即套用）</span>
  </div>
</div>

<div class="panel">
  <div class="global-upload">
    <label class="ucard" id="uc-map-global" style="min-width:200px;">
      <input type="file" accept=".xlsx,.xls" onchange="onMapFile(event)">
      <div class="ucard-icon" id="ui-map-global">🗂</div>
      <div class="ucard-info">
        <div class="ucard-title" id="ut-map-global">蝦皮商品清單</div>
        <div class="ucard-sub" id="us-map-global">上傳一次，三個賣場共用</div>
      </div>
    </label>
    <div class="spin-row" id="spin-map"><div class="spin"></div>讀取中…</div>
    <span id="map-status" style="font-size:13px;color:#9ca3af;"></span>
  </div>

  <div class="shop-tabs">
    <button class="stab active" onclick="setShop('總表',this)"><span class="sdot" style="background:#6b7280"></span>總表</button>
    <button class="stab" onclick="setShop('好麻吉',this)"><span class="sdot" style="background:#5b5fcf"></span>好麻吉<span class="stab-ok" id="dot-好麻吉"></span></button>
    <button class="stab" onclick="setShop('玩樂',this)"><span class="sdot" style="background:#10b981"></span>玩樂<span class="stab-ok" id="dot-玩樂"></span></button>
    <button class="stab" onclick="setShop('森之旅',this)"><span class="sdot" style="background:#f59e0b"></span>森之旅<span class="stab-ok" id="dot-森之旅"></span></button>
    <button class="stab" onclick="setShop('酷澎',this)"><span class="sdot" style="background:#ef4444"></span>酷澎<span class="stab-ok" id="dot-酷澎"></span></button>
  </div>

  <div id="content-總表" class="shop-content active">
    <div class="empty"><div class="empty-icon">📊</div><div class="empty-hint">請先到各賣場分頁產生報表</div></div>
  </div>
  <div id="content-好麻吉" class="shop-content"></div>
  <div id="content-玩樂" class="shop-content"></div>
  <div id="content-森之旅" class="shop-content"></div>
  <div id="content-酷澎" class="shop-content"></div>
</div></div>`;

const SHOPS=[{id:'好麻吉',color:'#5b5fcf'},{id:'玩樂',color:'#10b981'},{id:'森之旅',color:'#f59e0b'},{id:'酷澎',color:'#ef4444'}];
const MONTHS=['2025/01','2025/02','2025/03','2025/04','2025/05','2025/06','2025/07','2025/08','2025/09','2025/10','2025/11','2025/12','2026/01','2026/02','2026/03','2026/04','2026/05','2026/06','2026/07','2026/08','2026/09','2026/10','2026/11','2026/12'];
const HALVES=[{id:'first',label:'上半（1-15）'},{id:'second',label:'下半（16-末）'},{id:'full',label:'整月（1-末）'}];

const state={};
SHOPS.forEach(s=>{state[s.id]={rawMobic:null,rawAds:null,rawMap:{},curMonth:'2026/05',curHalf:'first',days:15,_built:null,_period:'',filters:{},sorts:{}};});
let globalMap={};
let curShop='總表';
let openPopup=null;

// ── LocalStorage ──
function lsKey(shop,month,half){return`ec|${shop}|${month}|${half}`;}
function lsSave(shop,month,half,built,period,days){
  try{localStorage.setItem(lsKey(shop,month,half),JSON.stringify({built,period,days,rate:getPlatformRate(),ts:Date.now()}));}
  catch(e){alert('儲存失敗');}
}
function lsLoad(shop,month,half){
  try{const d=localStorage.getItem(lsKey(shop,month,half));return d?JSON.parse(d):null;}catch{return null;}
}
function lsHasAny(shop){
  for(let i=0;i<localStorage.length;i++){if(localStorage.key(i).startsWith(`ec|${shop}|`))return true;}
  return false;
}

// ── Init ──
SHOPS.forEach(s=>{document.getElementById('content-'+s.id).innerHTML=shopHTML(s.id);});
SHOPS.forEach(s=>{onMonthChange(s.id);if(lsHasAny(s.id))document.getElementById('dot-'+s.id).classList.add('on');});

function shopHTML(shop){return`
  <div class="period-bar">
    <div class="period-bar-label">📅 區間</div>
    <select class="month-select" id="month-sel-${shop}" onchange="onMonthChange('${shop}')">
      ${MONTHS.map(m=>`<option value="${m}" ${m==='2026/05'?'selected':''}>${m}</option>`).join('')}
    </select>
    <div class="half-btns" id="half-btns-${shop}">
      ${HALVES.map(h=>`<button class="half-btn ${h.id==='first'?'active':''}" onclick="onHalfChange('${shop}','${h.id}',this)">${h.label}</button>`).join('')}
    </div>
    <span class="days-badge" id="days-badge-${shop}">15 天</span>
  </div>
  <div class="upload-row">
    <div class="upload-row-label">上傳</div>
    <label class="ucard" id="uc-mobic-${shop}">
      <input type="file" accept=".xlsx,.xls" onchange="onFile(event,'${shop}','mobic')">
      <div class="ucard-icon" id="ui-mobic-${shop}">📦</div>
      <div class="ucard-info"><div class="ucard-title" id="ut-mobic-${shop}">莫筆克銷售分析</div><div class="ucard-sub">.xlsx</div></div>
    </label>
    <label class="ucard" id="uc-ads-${shop}">
      <input type="file" accept=".csv" onchange="onFile(event,'${shop}','ads')">
      <div class="ucard-icon" id="ui-ads-${shop}">📣</div>
      <div class="ucard-info"><div class="ucard-title" id="ut-ads-${shop}">蝦皮廣告報表</div><div class="ucard-sub">.csv</div></div>
    </label>
    <div class="spin-row" id="spin-${shop}"><div class="spin"></div>讀取中…</div>
    <button class="gen-btn" id="gen-${shop}" onclick="generate('${shop}')" disabled>▶ 產生並儲存</button>
  </div>
  <div class="kpi-strip" id="kpi-${shop}">
    <div class="kpi"><div class="kpi-l">營收</div><div class="kpi-v blue" id="kv-rev-${shop}">—</div></div>
    <div class="kpi"><div class="kpi-l">毛利</div><div class="kpi-v" id="kv-gross-${shop}">—</div></div>
    <div class="kpi"><div class="kpi-l">廣告費</div><div class="kpi-v amber" id="kv-ads-${shop}">—</div></div>
    <div class="kpi"><div class="kpi-l">純利</div><div class="kpi-v green" id="kv-net-${shop}">—</div></div>
    <div class="kpi"><div class="kpi-l">純利率</div><div class="kpi-v amber" id="kv-margin-${shop}">—</div></div>
    <div class="kpi"><div class="kpi-l">廣告佔比</div><div class="kpi-v" id="kv-adpct-${shop}">—</div></div>
  </div>
  <div class="toolbar" id="tb-${shop}">
    <span class="period-tag" id="period-tag-${shop}"></span>
    <input type="text" class="search-input" id="search-${shop}" placeholder="🔍 搜尋商品…" oninput="applyFilters('${shop}')">
    <span class="row-cnt" id="cnt-${shop}"></span>
    <button class="export-btn" id="exp-${shop}" onclick="doExport('${shop}')" disabled>⬇ 匯出 Excel</button>
  </div>
  <div id="tbl-${shop}">
    <div class="empty"><div class="empty-icon">📋</div><div class="empty-hint">選擇區間後上傳報表，按「▶ 產生並儲存」</div></div>
  </div>`;
}

// ── Period ──
function getPeriodLabel(month,half){
  const[y,m]=month.split('/');const last=new Date(+y,+m,0).getDate();
  if(half==='first')return`${month}/01 – ${month}/15`;
  if(half==='second')return`${month}/16 – ${month}/${last}`;
  return`${month}/01 – ${month}/${last}`;
}
function getDays(month,half){
  const[y,m]=month.split('/');const last=new Date(+y,+m,0).getDate();
  if(half==='first')return 15;if(half==='second')return last-15;return last;
}
function onMonthChange(shop){
  state[shop].curMonth=document.getElementById('month-sel-'+shop).value;
  updateDaysBadge(shop);tryLoadSaved(shop);
}
function onHalfChange(shop,half,btn){
  state[shop].curHalf=half;
  document.querySelectorAll(`#half-btns-${shop} .half-btn`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');updateDaysBadge(shop);tryLoadSaved(shop);
}
function updateDaysBadge(shop){
  const d=getDays(state[shop].curMonth,state[shop].curHalf);
  state[shop].days=d;document.getElementById('days-badge-'+shop).textContent=d+' 天';
}
function resetUploadCards(shop){
  // 重置莫筆克卡片
  state[shop].rawMobic=null;
  document.getElementById('uc-mobic-'+shop).className='ucard';
  document.getElementById('ui-mobic-'+shop).textContent='📦';

        state[shop].rawAds=parseAdsCsv(text);markCard(shop,'ads','✅',file.name,'ok');
      }catch(err){markCard(shop,'ads','❌','讀取失敗','err');}

function parseAdsCsv(text){
  const lines=text.split('\n');
  let hi=lines.findIndex(l=>l.includes('廣告名稱')&&l.includes('花費'));if(hi<0)hi=7;
  const headers=splitCSV(lines[hi]).map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(hi+1).filter(l=>l.trim()).map(line=>{
    const vals=splitCSV(line).map(v=>v.replace(/^"|"$/g,'').trim());
    const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||'';});return obj;
  }).filter(r=>r['廣告名稱']);
}
function splitCSV(line){const res=[];let cur='';let q=false;for(let c of line){if(c==='"'){q=!q;}else if(c===','&&!q){res.push(cur);cur='';}else{cur+=c;}}res.push(cur);return res;}
function markCard(shop,type,icon,title,cls){

}

// ── 取得對應的「上期」區間 key ──
function getPrevPeriodKey(shop, month, half) {
  const [y, m] = month.split('/').map(Number);
  if (half === 'second') {
    // 下半月 → 上半月（同月）
    return lsKey(shop, month, 'first');
  } else if (half === 'first') {
    // 上半月 → 上個月下半月
    const prevMonth = m === 1
      ? `${y-1}/12`
      : `${y}/${String(m-1).padStart(2,'0')}`;
    return lsKey(shop, prevMonth, 'second');
  } else {
    // 整月 → 上個月整月
    const prevMonth = m === 1
      ? `${y-1}/12`
      : `${y}/${String(m-1).padStart(2,'0')}`;
    return lsKey(shop, prevMonth, 'full');
  }
}

// 取得上期報表的 code→rev map
function getPrevRevMap(shop, month, half) {
  const key = getPrevPeriodKey(shop, month, half);
  try {
    const rep = JSON.parse(localStorage.getItem(key) || 'null');
    if (!rep || !rep.built) return {};
    const map = {};
    rep.built.forEach(r => { if (r.code && r.rev) map[r.code] = r.rev; });
    return map;
  } catch { return {}; }
}

function getPlatformRate(){return(parseFloat(document.getElementById('platformRate').value)||20.5)/100;}

function buildShop(shop,days){
  const s=state[shop];const PLATFORM=getPlatformRate();
  const salesCol=s.rawMobic.length?Object.keys(s.rawMobic[0]).find(k=>k.startsWith('銷售數量')):null;
  const agg={};
  s.rawMobic.forEach(r=>{
    const code=(r['商品編號']||'').trim();if(!code)return;
    const name=(r['商品名稱']||'').trim();
    if(!agg[code])agg[code]={code,name,qty:0,rev:0,cost:0,gross:0,stock:0,shopeeIds:[],fromMobic:true};
    agg[code].qty+=num(r[salesCol]||0);agg[code].rev+=num(r['售價']||0);
    agg[code].cost+=num(r['成本']||0);agg[code].gross+=num(r['獲利']||0);
    agg[code].stock+=num(r['可用庫存']||0);
  });

  // 廣告資料：花費、直接投入產出比、投入產出比、點擊數
  const adsById={};const directROIById={};const roiById={};const clicksById={};
  s.rawAds.forEach(r=>{
    const sid=(r['商品 ID']||'').trim();
    const spend=num(r['花費']||0);
    const droi=num(r['直接投入產出比']||0);
    const roi=num(r['投入產出比']||0);
    const clicks=num(r['點擊數']||0);
    if(sid&&sid!=='-'){
      if(spend>0)adsById[sid]=(adsById[sid]||0)+spend;
      if(droi>0)directROIById[sid]=droi;
      if(roi>0)roiById[sid]=roi;
      if(clicks>0)clicksById[sid]=(clicksById[sid]||0)+clicks;
    }
  });

  const pm=s.rawMap||{};const adsByCode={};const directROIByCode={};const roiByCode={};const clicksByCode={};const sidsForCode={};const nameForCode={};
  Object.entries(pm).forEach(([code,entry])=>{
    // 相容新格式 {sids,name} 和舊格式 array
    const sids=Array.isArray(entry)?entry:(entry.sids||[]);
    const pName=Array.isArray(entry)?'':(entry.name||'');
    sidsForCode[code]=sids;
    if(pName)nameForCode[code]=pName;
    sids.forEach(sid=>{
      if(adsById[sid])adsByCode[code]=(adsByCode[code]||0)+adsById[sid];
      if(directROIById[sid])directROIByCode[code]=directROIById[sid];
      if(roiById[sid])roiByCode[code]=roiById[sid];
      if(clicksById[sid])clicksByCode[code]=(clicksByCode[code]||0)+clicksById[sid];
    });
  });
  Object.keys(agg).forEach(code=>{
    if(sidsForCode[code])agg[code].shopeeIds=sidsForCode[code];
  });

  // 有廣告費但無銷售：用商品清單的名稱
  Object.keys(adsByCode).forEach(code=>{
    if(!agg[code]){
      const sids=sidsForCode[code]||[];
      // 找商品名稱：優先用清單的名稱
      const pName=nameForCode[code]||'';
      const displayName=pName||`（商品ID: ${sids[0]||'未知'}）`;
      agg[code]={code,name:displayName,qty:0,rev:0,cost:0,gross:0,stock:0,shopeeIds:sids,fromMobic:false};
    }
  });

  // 只有好麻吉才抓上期營收
  const prevRevMap = shop==='好麻吉' ? getPrevRevMap(shop, s.curMonth, s.curHalf) : {};

  const built=Object.values(agg).map(p=>{
    const adsFee=adsByCode[p.code]||0;
    const directROI=directROIByCode[p.code]||0;
    const roi=roiByCode[p.code]||0;
    const clicks=clicksByCode[p.code]||0;
    const platFee=p.rev*PLATFORM;
    const pureProfit=p.gross-adsFee-platFee;
    const pureRate=p.rev>0?pureProfit/p.rev:0;
    const adsPct=p.rev>0?adsFee/p.rev:0;
    const denom=pureRate+adsPct-0.20;
    const targetROI=denom>0?1/denom:null;
    const roiDiff=(targetROI!==null&&directROI>0)?directROI-targetROI:null;
    const dayBudget=days>0?adsFee/days:0;
    const analysis=calcAnalysis(adsFee,pureRate,targetROI,roiDiff,clicks,pureProfit);
    // 上半月營收 & 成長比（只有好麻吉）
    const prevRev = prevRevMap[p.code] ?? null;
    const growthRate = (prevRev!==null && prevRev>0) ? (p.rev - prevRev) / prevRev : null;
    const growthAnalysis = shop==='好麻吉' ? calcGrowthAnalysis(growthRate, p.rev, prevRev, pureRate) : null;
    return{code:p.code,name:p.name,shopeeIds:p.shopeeIds,qty:p.qty,rev:p.rev,gross:p.gross,
      adsFee,platFee,pureProfit,pureRate,adsPct,targetROI,directROI,roi,roiDiff,
      dayBudget,clicks,stock:p.stock,fromMobic:p.fromMobic,analysis,
      prevRev, growthRate, growthAnalysis};
  });
  built.sort((a,b)=>{if(!a.fromMobic&&b.fromMobic)return 1;if(a.fromMobic&&!b.fromMobic)return -1;return b.pureProfit-a.pureProfit;});
  return built;
}

// ── 分析公式 ──
// $D=廣告費, $H=淨利率, $K=目標ROI, $N=實際-目標, $O=點擊數
function calcAnalysis(adsFee, pureRate, targetROI, roiDiff, clicks, pureProfit){
  const D=adsFee, H=pureRate, K=targetROI, N=roiDiff, O=clicks;
  if(D===0 && H>=0 && H<0.1) return{label:'危險商品',cls:'tag-danger'};
  if(D===0 && H>0.3) return{label:'高利潤商品',cls:'tag-high'};
  if(D===0 && (K===null||K===undefined)) return{label:'低淨利',cls:'tag-low'};
  if(D>0 && H<0) return{label:'賠錢中',cls:'tag-lose'};
  if(D>0 && pureProfit<0) return{label:'低淨利',cls:'tag-low'};
  if(D>0 && H>=0 && H<0.1) return{label:'低效廣告',cls:'tag-bad'};
  if(N===null||N===undefined||!isFinite(N)||O<100) return{label:'',cls:''};
  if(N>=3) return{label:'加300',cls:'tag-add300'};
  if(N>=2) return{label:'加200',cls:'tag-add200'};
  if(N>=1) return{label:'加100',cls:'tag-add100'};
  if(N>=0) return{label:'加50',cls:'tag-add50'};
  if(N<=-3) return{label:'減300',cls:'tag-sub300'};
  if(N<=-2) return{label:'減200',cls:'tag-sub200'};
  if(N<=-1) return{label:'減100',cls:'tag-sub100'};
  return{label:'',cls:''};
}

// ── 成長比分析公式 ──
function calcGrowthAnalysis(growthRate, rev, prevRev, pureRate) {
  // growthRate = (本期-上期)/上期，null 表示無上期資料
  if (growthRate !== null && growthRate < -0.30) return { label:'🔴重跌品', cls:'tag-danger' };
  if (growthRate !== null && growthRate > 0.30)  return { label:'🟢爆發品', cls:'tag-high' };
  if (rev >= 10000)                              return { label:'👑高營收', cls:'tag-add300' };
  if (rev >= 7000 && rev < 10000)               return { label:'🟨中營收', cls:'tag-add200' };
  if (rev >= 5000 && rev < 7000)                return { label:'🟡發展品', cls:'tag-add100' };
  if (pureRate < 0.20)                          return { label:'🔻低利品', cls:'tag-low' };
  if (prevRev !== null && prevRev > 0 && (rev === 0 || rev === null)) return { label:'⚫斷銷品', cls:'tag-lose' };
  return { label:'', cls:'' };
}

// ── Filters & Sort ──
function applyFilters(shop){
  const s=state[shop];if(!s._built||!s._built.length)return;
  const q=(document.getElementById('search-'+shop).value||'').toLowerCase();
  let list=[...s._built];
  if(q)list=list.filter(r=>r.name.toLowerCase().includes(q)||r.code.toLowerCase().includes(q));
  Object.entries(s.filters||{}).forEach(([col,f])=>{
    if(!f||f.val===''||f.val===undefined)return;
    list=list.filter(r=>{
      const v=r[col];
      if(f.type==='text')return(v+'').toLowerCase().includes(f.val.toLowerCase());
      if(f.type==='min')return num(v)>=parseFloat(f.val);
      if(f.type==='max')return num(v)<=parseFloat(f.val);
      return true;
    });
  });
  const{col,dir}=s.sorts||{};
  if(col){
    list.sort((a,b)=>{
      if(!a.fromMobic&&b.fromMobic)return 1;if(a.fromMobic&&!b.fromMobic)return -1;
      let va=a[col],vb=b[col];
      if(va===null||va===undefined)va=dir==='asc'?Infinity:-Infinity;
      if(vb===null||vb===undefined)vb=dir==='asc'?Infinity:-Infinity;
      if(typeof va==='string')return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
      return dir==='asc'?va-vb:vb-va;
    });
  }
  renderTable(shop,list);
}
function setSort(shop,col,dir){state[shop].sorts={col,dir};applyFilters(shop);}
function setColFilter(shop,col,type,val){
  if(!state[shop].filters)state[shop].filters={};
  if(val===''||val===null)delete state[shop].filters[col];
  else state[shop].filters[col]={type,val};
  applyFilters(shop);
}
function clearColFilter(shop,col){delete(state[shop].filters||{})[col];state[shop].sorts={};applyFilters(shop);}

// 開始編輯數字
function startEdit(shop,code,col,tdId){
  const td=document.getElementById(tdId);if(!td)return;
  const edits=getEdits(shop);
  const r=state[shop]._built.find(x=>x.code===code);if(!r)return;
  const cur=(edits[code]?.[col]!==undefined)?edits[code][col]:r[col];
  const inp=document.createElement('input');
  inp.type='number';inp.className='inline-input';inp.value=isFinite(cur)?+cur.toFixed(4):'';
  inp.onblur=()=>commitEdit(shop,code,col,inp.value,tdId);
  inp.onkeydown=(e)=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){applyFilters(shop);}};
  td.innerHTML='';td.appendChild(inp);inp.focus();inp.select();
}

function commitEdit(shop,code,col,val,tdId){
  const edits=getEdits(shop);
  if(!edits[code])edits[code]={};
  const numVal=parseFloat(val);
  if(!isNaN(numVal)){edits[code][col]=numVal;}else{delete edits[code][col];}
  saveEdits(shop,edits);
  // 重算這行的衍生欄位
  recalcRow(shop,code,edits[code]||{});
  applyFilters(shop);
}

function recalcRow(shop,code,ov){
  const built=state[shop]._built;const idx=built.findIndex(r=>r.code===code);if(idx<0)return;
  const r=built[idx];const PLATFORM=getPlatformRate();
  // 只有廣告費可以編輯，重算相關衍生欄位
  const adsFee=ov.adsFee!==undefined?ov.adsFee:r.adsFee;
  const rev=r.rev;const gross=r.gross;
  const platFee=rev*PLATFORM;
  const pureProfit=gross-adsFee-platFee;
  const pureRate=rev>0?pureProfit/rev:0;
  const adsPct=rev>0?adsFee/rev:0;
  const denom=pureRate+adsPct-0.20;
  const targetROI=denom>0?1/denom:null;
  const directROI=r.directROI;
  const days=state[shop]._days||1;
  const dayBudget=adsFee/days;
  const roiDiff=(targetROI!==null&&directROI>0)?directROI-targetROI:null;
  const analysis=calcAnalysis(adsFee,pureRate,targetROI,roiDiff,r.clicks,pureProfit);
  const growthRate=r.growthRate;
  const growthAnalysis=shop==='好麻吉'?calcGrowthAnalysis(growthRate,rev,r.prevRev,pureRate):null;
  Object.assign(built[idx],{adsFee,platFee,pureProfit,pureRate,adsPct,targetROI,roiDiff,dayBudget,analysis,growthAnalysis});
  const s=state[shop];lsSave(shop,s.curMonth,s.curHalf,built,s._period,s._days);
}

// 備註編輯
function startNote(shop,code,tdId){
  const td=document.getElementById(tdId);if(!td)return;
  const notes=getNotes(shop);
  const inp=document.createElement('input');
  inp.type='text';inp.className='note-input';inp.placeholder='輸入備註…';inp.value=notes[code]||'';
  inp.onblur=()=>commitNote(shop,code,inp.value,tdId);
  inp.onkeydown=(e)=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape')applyFilters(shop);};
  td.innerHTML='';td.appendChild(inp);inp.focus();
}
function commitNote(shop,code,val,tdId){
  const notes=getNotes(shop);
  if(val.trim())notes[code]=val.trim();else delete notes[code];
  saveNotes(shop,notes);applyFilters(shop);
}

// ── Render Table ──
function renderTable(shop,list){
  const s=state[shop];const built=s._built;
  const edits=getEdits(shop);
  const notes=getNotes(shop);
  let tRev=0,tGross=0,tAds=0,tPure=0;
  built.forEach(r=>{tRev+=r.rev;tGross+=r.gross;tAds+=r.adsFee;tPure+=r.pureProfit;});
  setKpis(shop,tRev,tGross,tAds,tPure);
  document.getElementById('period-tag-'+shop).textContent=s._period||'';
  document.getElementById('cnt-'+shop).textContent=list.length+' 筆';

  const ss=s.sorts||{};
  const si=(col)=>ss.col===col?(ss.dir==='asc'?' ▲':' ▼'):'';
  const hasF=(col)=>!!(s.filters?.[col])||ss.col===col;
  const thN=(col,label)=>`<th><div class="th-wrap"><span onclick="setSort('${shop}','${col}',ss.col==='${col}'&&ss.dir==='asc'?'desc':'asc')" style="cursor:pointer">${label}${si(col)}</span><button class="filter-btn ${hasF(col)?'on':''}" onclick="event.stopPropagation();openFilter('${shop}','${col}',true,this)">▾</button></div></th>`;
  const thT=(col,label)=>`<th class="tl"><div class="th-wrap tl"><span onclick="setSort('${shop}','${col}',ss.col==='${col}'&&ss.dir==='asc'?'desc':'asc')" style="cursor:pointer">${label}${si(col)}</span><button class="filter-btn ${hasF(col)?'on':''}" onclick="event.stopPropagation();openFilter('${shop}','${col}',false,this)">▾</button></div></th>`;

  let html=`<div class="tscroll"><table><thead><tr>
    ${thT('shopeeId','商品ID')}
    ${thT('code','編號')}
    ${thT('name','商品名稱')}
    ${thN('adsFee','廣告費')}
    ${thN('rev','營收')}
    ${thN('gross','毛利')}
    ${thN('pureProfit','淨利')}
    ${thN('pureRate','淨利率%')}
    ${thN('adsPct','廣告佔比')}
    ${thN('stock','可用庫存')}
    ${thN('targetROI','目標ROI')}
    ${thN('directROI','直接投入產出')}
    ${thN('roi','投入產出')}
    ${thN('roiDiff','實際-目標')}
    ${thN('clicks','點擊數')}
    ${thN('dayBudget','日預算')}
    ${thT('analysisLabel','分析')}
    <th class="tl">調整備註</th>
    ${shop==='好麻吉'?`
    ${thN('prevRev','上半月營收')}
    ${thN('growthRate','成長比')}
    <th class="tl">成長分析</th>
    <th class="tl">成長調整</th>`:''}
  </tr></thead><tbody>`;

  let rowIdx=0;
  list.forEach(r=>{
    const pc=r.pureProfit>=0?'td-pos':'td-neg';
    const ov=edits[r.code]||{};
    const isEdited=(col)=>ov[col]!==undefined;
    const idStr=!r.shopeeIds?.length?'<span style="color:#d1d5db">—</span>':r.shopeeIds.length===1?r.shopeeIds[0]:'<span style="color:#f59e0b">多個</span>';
    const roiDiffStr=r.roiDiff===null?'—':`<span style="color:${r.roiDiff>=0?'#10b981':'#ef4444'};font-weight:600">${r.roiDiff.toFixed(2)}</span>`;
    const anaObj=r.analysis||{label:'',cls:''};
    const anaHtml=anaObj.label?`<span class="tag ${anaObj.cls}">${anaObj.label}</span>`:'—';
    const note=notes[r.code]||'';
    const noteId=`note-${shop}-${r.code}`;

    // 可編輯數字欄 helper
    const editTd=(col,display,cls='')=>{
      const tid=`td-${shop}-${r.code}-${col}`;
      const edited=isEdited(col);
      return `<td class="td-num ${cls} ${edited?'cell-edited':''}" id="${tid}">
        <span class="cell-val">${display}</span>
        <button class="edit-btn" onclick="startEdit('${shop}','${r.code}','${col}','${tid}')" title="編輯">✏️</button>
      </td>`;
    };

    if(!r.fromMobic){
      const adsId=`td-${shop}-${r.code}-adsFee`;
      html+=`<tr class="tr-no-rev">
        <td class="tl td-id">${idStr}</td>
        <td class="tl td-code">${r.code}</td>
        <td class="tl td-name" style="color:#9ca3af">${r.name}</td>
        <td class="td-num td-amber ${isEdited('adsFee')?'cell-edited':''}" id="${adsId}">
          <span class="cell-val">$${fmtN(r.adsFee)}</span>
          <button class="edit-btn" onclick="startEdit('${shop}','${r.code}','adsFee','${adsId}')" title="編輯">✏️</button>
        </td>
        <td colspan="12" style="color:#d1d5db;text-align:center;font-size:12px">— 無銷售資料 —</td>
        <td class="tl note-cell" id="${noteId}">
          ${note?`<span>${note}</span>`:''}
          <button class="edit-btn" onclick="startNote('${shop}','${r.code}','${noteId}')" title="加備註">📝</button>
        </td>
        ${shop==='好麻吉'?`<td colspan="4"></td>`:''}
      </tr>`;
    }else{
      html+=`<tr>
        <td class="tl td-id">${idStr}</td>
        <td class="tl td-code">${r.code}</td>
        <td class="tl td-name">${r.name}</td>
        ${editTd('adsFee','$'+fmtN(r.adsFee),'td-amber')}
        <td class="td-num">$${fmtN(r.rev)}</td>
        <td class="td-num">$${fmtN(r.gross)}</td>
        <td class="td-num ${pc}">$${fmtN(r.pureProfit)}</td>
        <td>${pill(r.pureRate*100)}</td>
        <td class="td-num">${(r.adsPct*100).toFixed(2)}%</td>
        <td class="td-num">${r.stock.toLocaleString()}</td>
        <td class="td-num">${r.targetROI!==null?r.targetROI.toFixed(2):'—'}</td>
        <td class="td-num">${r.directROI>0?r.directROI.toFixed(2):'—'}</td>
        <td class="td-num">${r.roi>0?r.roi.toFixed(2):'—'}</td>
        <td class="td-num">${roiDiffStr}</td>
        <td class="td-num">${r.clicks>0?r.clicks.toLocaleString():'—'}</td>
        <td class="td-num">${r.dayBudget>0?'$'+fmtN(r.dayBudget):'—'}</td>
        <td class="tl">${anaHtml}</td>
        <td class="tl note-cell" id="${noteId}">
          ${note?`<span style="color:#374151">${note}</span>`:''}
          <button class="edit-btn" onclick="startNote('${shop}','${r.code}','${noteId}')" title="加備註">📝</button>
        </td>
        ${shop==='好麻吉'?(()=>{
          const gnoteId=`gnote-${shop}-${r.code}`;
          const gnote=getNotes(shop+'_growth')[r.code]||'';
          return `
          <td class="td-num ${r.prevRev!==null?'':'growth-na'}">${r.prevRev!==null?'$'+fmtN(r.prevRev):'—'}</td>
          <td class="td-num ${r.growthRate===null?'growth-na':r.growthRate>=0?'growth-pos':'growth-neg'}">
            ${r.growthRate!==null?(r.growthRate>=0?'+':'')+(r.growthRate*100).toFixed(2)+'%':'—'}
          </td>
          <td class="tl">${r.growthAnalysis&&r.growthAnalysis.label?`<span class="tag ${r.growthAnalysis.cls}">${r.growthAnalysis.label}</span>`:'—'}</td>
          <td class="tl note-cell" id="${gnoteId}">
            ${gnote?`<span style="color:#374151">${gnote}</span>`:''}
            <button class="edit-btn" onclick="startNote('${shop}_growth','${r.code}','${gnoteId}')" title="加備註">📝</button>
          </td>`;
        })():''}
      </tr>`;
    }
    rowIdx++;
  });

  let fRev=0,fGross=0,fAds=0,fPure=0,fQty=0;
  list.forEach(r=>{fRev+=r.rev;fGross+=r.gross;fAds+=r.adsFee;fPure+=r.pureProfit;fQty+=r.qty;});
  let fPrevRev=0; list.forEach(r=>{if(r.prevRev)fPrevRev+=r.prevRev;});
  const fGrowth=(fPrevRev>0)?(fRev-fPrevRev)/fPrevRev:null;
  html+=`<tr class="tr-total">
    <td class="tl" colspan="3">小計（${list.length}筆）</td>
    <td class="td-num td-amber">$${fmtN(fAds)}</td>
    <td class="td-num">$${fmtN(fRev)}</td>
    <td class="td-num">$${fmtN(fGross)}</td>
    <td class="td-num ${fPure>=0?'td-pos':'td-neg'}">$${fmtN(fPure)}</td>
    <td>${fRev>0?pill(fPure/fRev*100):'—'}</td>
    <td colspan="9"></td>
    <td></td>
    ${shop==='好麻吉'?`
    <td class="td-num">$${fmtN(fPrevRev)}</td>
    <td class="td-num ${fGrowth===null?'growth-na':fGrowth>=0?'growth-pos':'growth-neg'}">${fGrowth!==null?(fGrowth>=0?'+':'')+(fGrowth*100).toFixed(2)+'%':'—'}</td>
    <td></td><td></td>`:''}
  </tr></tbody></table></div>`;
  document.getElementById('tbl-'+shop).innerHTML=html;
}

// ── Summary ──
function renderSummary(){
  const el=document.getElementById('content-總表');
  const PLATFORM=getPlatformRate();const rows=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);if(!k.startsWith('ec|'))continue;
    try{
      const rep=JSON.parse(localStorage.getItem(k));
      const parts=k.split('|');
      const shop=parts[1];
      let tRev=0,tGross=0,tAds=0,tPure=0;
      rep.built.forEach(r=>{tRev+=r.rev;tGross+=r.gross;tAds+=r.adsFee;tPure+=r.pureProfit;});
      rows.push({shop,period:rep.period,tRev,tGross,tAds,tPure});
    }catch{}
  }
  if(!rows.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-hint">尚無儲存資料</div></div>`;return;}

  // 按區間排序（新的在前）
  rows.sort((a,b)=>b.period.localeCompare(a.period));

  // 按區間分組
  const byPeriod={};
  const periodOrder=[];
  rows.forEach(r=>{
    if(!byPeriod[r.period]){byPeriod[r.period]=[];periodOrder.push(r.period);}
    byPeriod[r.period].push(r);
  });

  let html=`<div style="padding:18px 20px;">
  <div class="tscroll"><table>
    <thead><tr>
      <th class="tl" style="min-width:200px">日期區間</th>
      <th class="tl" style="min-width:100px">賣場</th>
      <th style="min-width:110px">營收</th>
      <th style="min-width:110px">廣告費</th>
      <th style="min-width:110px">毛利</th>
      <th style="min-width:110px">純利</th>
      <th style="min-width:80px">純利率</th>
    </tr></thead><tbody>`;

  periodOrder.forEach(period=>{
    const rs=byPeriod[period];
    // 只有一個賣場：不顯示合計列
    // 多個賣場：顯示各賣場，最後一行是合計
    const showTotal = rs.length > 1;
    let gR=0,gG=0,gA=0,gP=0;

    rs.forEach((r,i)=>{
      const c=SHOPS.find(s=>s.id===r.shop)?.color||'#6b7280';
      gR+=r.tRev;gG+=r.tGross;gA+=r.tAds;gP+=r.tPure;
      const isFirst = i===0;
      html+=`<tr style="${i===0?'border-top:2px solid #e4e6ef':''}">
        <td class="tl" style="font-size:12px;color:#6b7280;font-family:'DM Mono',monospace;${isFirst?'':'opacity:0'}">${r.period}</td>
        <td class="tl"><span style="display:inline-flex;align-items:center;gap:7px;font-weight:500;color:#1a1a2e">
          <span style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;display:inline-block"></span>${r.shop}
        </span></td>
        <td class="td-num">$${fmtN(r.tRev)}</td>
        <td class="td-num td-amber">$${fmtN(r.tAds)}</td>
        <td class="td-num">$${fmtN(r.tGross)}</td>
        <td class="td-num ${r.tPure>=0?'td-pos':'td-neg'}" style="font-weight:600">$${fmtN(r.tPure)}</td>
        <td>${r.tRev>0?pill(r.tPure/r.tRev*100):'—'}</td>
      </tr>`;
    });

    // 多賣場才顯示合計
    if(showTotal){
      html+=`<tr style="background:#f8f9fc;">
        <td class="tl" style="font-size:11px;color:#9ca3af;padding-left:20px">合計</td>
        <td></td>
        <td class="td-num" style="font-weight:700">$${fmtN(gR)}</td>
        <td class="td-num td-amber" style="font-weight:700">$${fmtN(gA)}</td>
        <td class="td-num" style="font-weight:700">$${fmtN(gG)}</td>
        <td class="td-num ${gP>=0?'td-pos':'td-neg'}" style="font-weight:700">$${fmtN(gP)}</td>
        <td>${gR>0?pill(gP/gR*100):'—'}</td>
      </tr>`;
    }
  });

  html+=`</tbody></table></div>
  <div style="margin-top:12px;font-size:11px;color:#9ca3af;">＊純利 = 毛利 − 廣告費 − 營收 × ${(PLATFORM*100).toFixed(1)}%</div>
  </div>`;
  el.innerHTML=html;
}

function switchSummaryMonth(month){
  const el=document.getElementById('content-總表');
  el._curMonth=month;
  renderSummary();
}

// ── Tab switch ──
function setShop(shop,btn){
  curShop=shop;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.shop-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('content-'+shop).classList.add('active');
  if(shop==='總表')renderSummary();
}

// ── Export ──
function doExport(shop){
  const built=state[shop]._built;if(!built?.length)return;
  const wb=XLSX.utils.book_new();
  const isHaomaji = shop === '好麻吉';
  const h=['商品ID','編號','商品名稱','廣告費','營收','毛利','淨利','淨利率%','廣告佔比%','可用庫存','目標ROI','直接投入產出','投入產出','實際-目標','點擊數','日預算','分析','調整備註',
    ...(isHaomaji?['上半月營收','成長比','成長分析','成長調整']:[])];
  const exportNotes=getNotes(shop);
  const d=built.map(r=>[
    !r.shopeeIds?.length?'未對應':r.shopeeIds.length===1?r.shopeeIds[0]:'多個',
    r.code,r.name,+r.adsFee.toFixed(0),+r.rev.toFixed(0),+r.gross.toFixed(0),+r.pureProfit.toFixed(0),
    +(r.pureRate*100).toFixed(2),+(r.adsPct*100).toFixed(2),r.stock,
    r.targetROI!==null?+r.targetROI.toFixed(2):'-',r.directROI>0?+r.directROI.toFixed(2):'-',
    r.roi>0?+r.roi.toFixed(2):'-',r.roiDiff!==null?+r.roiDiff.toFixed(2):'-',
    r.clicks>0?r.clicks:'-',r.dayBudget>0?+r.dayBudget.toFixed(0):'-',
    r.analysis?.label||'', exportNotes[r.code]||'',
    ...(isHaomaji?[
      r.prevRev!==null?+r.prevRev.toFixed(0):'-',
      r.growthRate!==null?+((r.growthRate*100).toFixed(2)):'-',
      r.growthAnalysis?.label||''
    ]:[])
  ]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([h,...d]),shop);
  XLSX.writeFile(wb,`淨利表_${shop}_${state[shop]._period||''}.xlsx`);
}

// ── Helpers ──
function setKpis(shop,rev,gross,ads,pure){
  document.getElementById('kv-rev-'+shop).textContent='$'+fmtN(rev);
  document.getElementById('kv-gross-'+shop).textContent='$'+fmtN(gross);
  document.getElementById('kv-ads-'+shop).textContent='$'+fmtN(ads);
  document.getElementById('kv-net-'+shop).textContent='$'+fmtN(pure);
  document.getElementById('kv-net-'+shop).className='kpi-v '+(pure>=0?'green':'red');
  document.getElementById('kv-margin-'+shop).textContent=rev?(pure/rev*100).toFixed(1)+'%':'—';
  document.getElementById('kv-adpct-'+shop).textContent=rev?(ads/rev*100).toFixed(2)+'%':'—';
}
function num(v){return parseFloat((v+'').replace(/[,$%]/g,'').trim())||0;}
function fmtN(v){return Math.abs(Math.round(v)).toLocaleString();}
function pill(r){if(r===null||r===undefined)return'<span class="pill pn">—</span>';const c=r>=55?'ph':r>=35?'pm':'pl';return`<span class="pill ${c}">${r.toFixed(1)}%</span>`;}

document.addEventListener('click', function(e) {
  if (e.target.closest('[data-office-tab="profit"]')) {
    setTimeout(function() {
      if (typeof SHOPS !== 'undefined') {
        try {
          SHOPS.forEach(function(s) {
            var el = document.getElementById('content-' + s.id);
            if (el && !el.innerHTML.trim() && typeof shopHTML === 'function') el.innerHTML = shopHTML(s.id);
          });
          SHOPS.forEach(function(s) { if (typeof initShopUI === 'function') initShopUI(s.id); });
        } catch(e) { console.log(e); }
      }
    }, 150);
  }
});
</script>
