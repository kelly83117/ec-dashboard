                ${task.dueDate ? `<span style="font-size:11px;color:#ef4444;font-weight:600" title="預計完成日">📌 ${escapeHtml(task.dueDate.slice(5).replace('-','/'))}</span>` : ''}
                <span style="margin-left:auto;font-size:11px;color:var(--text-muted);font-weight:500">${escapeHtml(displayParticipants)}</span>
              </div>
            </div>
          `;
        }).join('');

    // 上一個 / 下一個 按鈕：依模式而定
    const useMonthNav = isMonthMode || isGanttMode;
    const prevOffset = useMonthNav ? monthOffset - 1 : weekOffset - 1;
    const nextOffset = useMonthNav ? monthOffset + 1 : weekOffset + 1;
    const offsetAttr = useMonthNav ? 'data-month-offset' : 'data-week-offset';

    return `
      <div style="display:grid;grid-template-columns:${isGanttMode ? 'minmax(0,1fr)' : 'minmax(0,1fr) minmax(280px, 360px)'};gap:16px;align-items:start">
        <div style="background:#fcfcfd;border:1px solid #e5e7eb;border-radius:10px;overflow:visible;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding:13px 16px;border-bottom:1px solid #e5e7eb;background:white">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
              <h3 style="margin:0;font-size:15px;font-weight:600;letter-spacing:-.01em">工作${isGanttMode ? '甘特圖' : (isMonthMode ? '月曆' : '週曆')}</h3>
              <div style="display:flex;align-items:center;gap:2px;background:#f3f4f6;border-radius:7px;padding:2px">
                <button class="pill" ${offsetAttr}="${prevOffset}" title="上一個" style="padding:3px 9px;font-size:12px;border:0;background:transparent">←</button>
                <button class="pill active" ${offsetAttr}="0" style="padding:3px 12px;font-size:12px;min-width:54px;border:0">${displayLabel}</button>
                <button class="pill" ${offsetAttr}="${nextOffset}" title="下一個" style="padding:3px 9px;font-size:12px;border:0;background:transparent">→</button>
              </div>
              <div style="display:flex;align-items:center;gap:2px;background:#f3f4f6;border-radius:7px;padding:2px">
                <button class="pill ${f.viewMode === 'week' ? 'active' : ''}" data-view-mode="week" style="padding:3px 11px;font-size:12px;border:0;${f.viewMode === 'week' ? '' : 'background:transparent'}">週</button>
                <button class="pill ${isMonthMode ? 'active' : ''}" data-view-mode="month" style="padding:3px 11px;font-size:12px;border:0;${isMonthMode ? '' : 'background:transparent'}">月</button>
                <button class="pill ${isGanttMode ? 'active' : ''}" data-view-mode="gantt" style="padding:3px 11px;font-size:12px;border:0;${isGanttMode ? '' : 'background:transparent'}">甘特</button>
              </div>
              <span style="font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums">${escapeHtml(headerLabel)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
              <select id="dash-mkt-emp" style="padding:5px 11px;border:1px solid #e5e7eb;border-radius:7px;background:white;color:var(--text);font-size:12px;font-family:inherit;cursor:pointer">
                ${employeeOptions}
              </select>
              <button class="btn-add" data-cal-add="${escapeHtml(deptId)}" style="padding:6px 12px;font-size:12px">+ 新增進度</button>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-bottom:1px solid #e5e7eb;background:#f9fafb;flex-wrap:wrap">
            ${DAILY_TASK_STATUS_LIST.map(s => {
              const meta = DAILY_TASK_STATUS[s];
              const c = statusCounts[s] || 0;
              return `<span title="${escapeHtml(s)} ${c} 件" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;background:${c > 0 ? meta.bg : '#f3f4f6'};color:${c > 0 ? meta.color : '#9ca3af'};font-size:12px;font-weight:600;font-variant-numeric:tabular-nums">${meta.emoji} ${escapeHtml(s)} ${c}</span>`;
            }).join('')}
          </div>
          <div>${calendarBody}</div>
        </div>
        ${isGanttMode ? '' : `
        <div style="position:sticky;top:14px;background:#fcfcfd;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden">
          <div style="padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;border-bottom:1px solid #e5e7eb;background:white">
            <div>
              <h3 style="margin:0;font-size:15px;font-weight:600;letter-spacing:-.01em">待辦事項</h3>
              <p style="margin:3px 0 0;font-size:12px;color:var(--text-muted);font-weight:500;font-variant-numeric:tabular-nums">${scopeLabel} · 共 ${allTodoRows.length} 項</p>
            </div>
            <button class="btn-add" data-todo-quick-add="${escapeHtml(deptId)}" style="padding:5px 12px;font-size:12px;flex-shrink:0">+ 新增</button>
          </div>
          ${todoFilterPills}
          <div style="max-height:720px;overflow-y:auto;background:#fcfcfd">${pendingHtml}</div>
        </div>
        `}
      </div>
    `;
  },

  /* 每日營收曲線（近 N 天） */
  dailyLineChartHtml(platforms /* days param ignored now */) {
    const now = new Date();
    const curY = now.getFullYear();
    const curM = now.getMonth() + 1;
    // 年/月分開記：預設本月；不允許未來
    let yMonth = this.filter.chartYear || curY;
    let mMonth = this.filter.chartMonth || curM;
    if (yMonth > curY || (yMonth === curY && mMonth > curM)) {
      yMonth = curY; mMonth = curM;
    }
    const monthStart = new Date(yMonth, mMonth - 1, 1);
    const lastOfMonth = new Date(yMonth, mMonth, 0);
    const isCurrent = (yMonth === curY && mMonth === curM);
    // 本月只顯示到昨日；過去月份顯示整月
    const endDate = isCurrent ? addDays(now, -1) : lastOfMonth;
    const endStr = toDateStr(endDate);
    const monthLabel = isCurrent ? '本月' : `${mMonth}月`;
    // 給下拉選單用：年份從 2024 到當年；月份永遠 1-12（含禁用判斷由 JS 過濾或 disabled）
    const yearOpts = [];
    for (let y = curY; y >= 2024; y--) yearOpts.push(y);
    const monthOpts = Array.from({length:12}, (_,i)=>i+1);

    const dates = [];
    for (let d = new Date(monthStart); toDateStr(d) <= endStr; d = addDays(d, 1)) {
      dates.push(toDateStr(d));
    }

    // 切換：null = 總計（全部加總），string = 單一平台
    const activeName = this.filter.chartPlatform || null;

    // 圖例（全賣場 + 7 個平台）
    const allPill = `
      <button class="line-legend" data-name="" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:${activeName === null ? '#0f172a' : 'var(--bg)'};border:1px solid ${activeName === null ? '#0f172a' : 'var(--border)'};border-radius:999px;font-size:11px;color:${activeName === null ? 'white' : 'var(--text-muted)'};cursor:pointer;font-weight:500">🏪 全賣場</button>
    `;
    const platformPills = platforms.map(p => {
      const isActive = activeName === p.name;
      const isDimmed = activeName !== null && !isActive;
      const market = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      const logoSrc = MARKETPLACE_BADGE[market].src;
      return `
        <button class="line-legend" data-name="${escapeHtml(p.name)}"
          style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px 3px 3px;background:${isActive ? p.color : p.color + '14'};border:1px solid ${isActive ? p.color : p.color + '40'};border-radius:999px;font-size:11px;color:${isActive ? 'white' : p.color};cursor:pointer;font-weight:600;opacity:${isDimmed ? '0.45' : '1'};transition:opacity .15s">
          <img src="${logoSrc}" alt="" style="width:16px;height:16px;border-radius:50%;object-fit:contain;background:white;flex-shrink:0">
          ${escapeHtml(p.name)}
        </button>
      `;
    }).join('');

    // 計算每日資料
    // 全賣場模式（activeName == null）：7 條平台曲線同時顯示
    // 單一平台模式：只顯示該平台一條線
    const logoImgHtml = (platformName) => {
      const m = PLATFORM_MARKETPLACE[platformName] || 'shopee';
      const s = MARKETPLACE_BADGE[m];
      return `<img src="${s.src}" alt="${escapeHtml(s.name)}" style="width:18px;height:18px;border-radius:4px;object-fit:contain;background:white;padding:1px;vertical-align:middle;margin-right:6px;box-shadow:0 1px 2px rgba(0,0,0,0.06)">`;
    };

    let series, lineLabel, lineLabelHtml, lineColor, isMulti;
    if (activeName) {
      const p = platforms.find(x => x.name === activeName);
      if (p) {
        series = [{ name: p.name, color: p.color, icon: p.icon,
                    values: dates.map(d => +(p.daily?.[d]) || 0) }];
        lineLabel = p.name;
        lineLabelHtml = `${logoImgHtml(p.name)}<span style="vertical-align:middle">${escapeHtml(p.name)}</span>`;
        lineColor = p.color;
        isMulti = false;
      } else {
        series = platforms.map(pp => ({
          name: pp.name, color: pp.color, icon: pp.icon,
          values: dates.map(d => +(pp.daily?.[d]) || 0),
        }));
        lineLabel = '全賣場';
        lineLabelHtml = '<span style="vertical-align:middle">🏪 全賣場</span>';
        lineColor = '#0f172a';
        isMulti = true;
      }
    } else {
      series = platforms.map(pp => ({
        name: pp.name, color: pp.color, icon: pp.icon,
        values: dates.map(d => +(pp.daily?.[d]) || 0),
      }));
      lineLabel = '全賣場';
      lineLabelHtml = '<span style="vertical-align:middle">🏪 全賣場</span>';
      lineColor = '#0f172a';
      isMulti = true;
    }

    // 每日全平台資料供 tooltip 取用
    const dailyData = dates.map(d => ({
      date: d,
      total: platforms.reduce((s, pp) => s + (+pp.daily?.[d] || 0), 0),
      breakdown: platforms.map(pp => ({
        name: pp.name, icon: pp.icon, color: pp.color,
        value: +pp.daily?.[d] || 0,
      })),
    }));

    // 沒資料的空狀態
    if (dates.length === 0) {
      return `
        <div class="chart-card" style="margin-top:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px">
            <h3 style="margin:0;font-size:14px;display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap">
              <select id="chart-year-sel" style="border:1px solid var(--border);background:white;border-radius:6px;height:26px;padding:0 6px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text)">
                ${yearOpts.map(y => `<option value="${y}" ${y===yMonth?'selected':''}>${y} 年</option>`).join('')}
              </select>
              <select id="chart-month-sel" style="border:1px solid var(--border);background:white;border-radius:6px;height:26px;padding:0 6px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text)">
                ${monthOpts.map(m => {
                  const isFuture = (yMonth===curY && m>curM);
                  return `<option value="${m}" ${m===mMonth?'selected':''} ${isFuture?'disabled':''}>${m} 月</option>`;
                }).join('')}
              </select>
              ${!isCurrent ? '<button id="chart-month-reset" title="回到本月" style="border:1px solid var(--border);background:white;border-radius:6px;padding:0 10px;height:26px;cursor:pointer;font-size:11px;color:var(--text-muted)">回本月</button>' : ''}
              <span style="margin-left:4px">每日營收</span>
            </h3>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${allPill}${platformPills}</div>
          <div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px">
            ${monthLabel}還沒有資料 ${isCurrent ? '— 等行銷團隊進系統填入昨日數字後，這裡會顯示曲線' : ''}
          </div>
        </div>
      `;
    }

    const maxV = Math.max(1, ...series.flatMap(s => s.values));

    const W = 1000, H = 280;
    const padL = 60, padR = 20, padT = 20, padB = 32;
    const cw = W - padL - padR;
    const ch = H - padT - padB;
    const xStep = dates.length > 1 ? cw / (dates.length - 1) : cw / 2;

    // Y 軸刻度
    const yTicks = [];
    for (let i = 0; i <= 4; i++) {
      const y = padT + ch - (i / 4) * ch;
      const v = (maxV / 4) * i;
      yTicks.push(`
        <line x1="${padL}" x2="${W - padR}" y1="${y}" y2="${y}" stroke="#e2e8f0" stroke-dasharray="3,3"/>
        <text x="${padL - 10}" y="${y + 4}" font-size="11" fill="#94a3b8" text-anchor="end">${this.fmtTick(v)}</text>
      `);
    }

    // X 軸日期標籤
    const xLabelEvery = Math.max(1, Math.round(dates.length / 8));
    const xLabels = dates.map((d, i) => {
      if (i % xLabelEvery !== 0 && i !== dates.length - 1 && i !== 0) return '';
      const x = padL + i * xStep;
      const label = d.slice(5).replace('-', '/');
      return `<text x="${x}" y="${H - padB + 18}" font-size="11" fill="#64748b" text-anchor="middle">${label}</text>`;
    }).join('');

    // 折線（每個 series 一條）
    const polylines = series.map(s => {
      const pts = s.values.map((v, i) => {
        const x = padL + i * xStep;
        const y = padT + ch - (v / maxV) * ch;
        return `${x},${y}`;
      }).join(' ');
      return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="${isMulti ? 2 : 2.5}" stroke-linejoin="round" stroke-linecap="round" />`;
    }).join('');

    // 資料點圓圈（每個 series 每天一個）
    const circles = series.map(s => s.values.map((v, i) => {
      const x = padL + i * xStep;
      const y = padT + ch - (v / maxV) * ch;
      return `<circle cx="${x}" cy="${y}" r="${isMulti ? 2.5 : 3}" fill="white" stroke="${s.color}" stroke-width="${isMulti ? 1.5 : 2}" />`;
    }).join('')).join('');

    // 保存 chart 狀態供 hover handler 使用
    this._chartState = { dates, dailyData, series, padL, xStep, W, H, padT, ch, maxV, lineColor, lineLabel, isMulti, activeName };

    // 計算目前選中的 series 累計：全賣場 = 7 個賣場全部加總；單一賣場 = 該賣場本月加總
    const seriesTotal = series.reduce((s, ss) => s + ss.values.reduce((a, b) => a + b, 0), 0);
    const daysWithData = dates.filter(d =>
      series.some(s => s.values[dates.indexOf(d)] > 0)
    ).length;
    const totalLabel = isMulti ? `${monthLabel}全賣場累計` : `${monthLabel}「${lineLabel}」累計`;

    return `
      <div class="chart-card" style="margin:0;padding:12px 14px;width:100%;display:flex;flex-direction:column">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;flex-shrink:0">
          <h3 style="margin:0;font-size:14px;display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap">
            <select id="chart-year-sel" style="border:1px solid var(--border);background:white;border-radius:6px;height:26px;padding:0 6px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text)">
              ${yearOpts.map(y => `<option value="${y}" ${y===yMonth?'selected':''}>${y} 年</option>`).join('')}
            </select>
            <select id="chart-month-sel" style="border:1px solid var(--border);background:white;border-radius:6px;height:26px;padding:0 6px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text)">
              ${monthOpts.map(m => {
                const isFuture = (yMonth===curY && m>curM);
                return `<option value="${m}" ${m===mMonth?'selected':''} ${isFuture?'disabled':''}>${m} 月</option>`;
              }).join('')}
            </select>
            ${!isCurrent ? '<button id="chart-month-reset" title="回到本月" style="border:1px solid var(--border);background:white;border-radius:6px;padding:0 10px;height:26px;cursor:pointer;font-size:11px;color:var(--text-muted)">回本月</button>' : ''}
            <span style="margin-left:4px">${lineLabelHtml} 每日營收</span>
          </h3>
          <span style="font-size:11px;color:var(--text-muted)">滑鼠移上去看當日</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px;flex-shrink:0">
          <span style="font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:.05em">${escapeHtml(totalLabel)}</span>
          <span style="font-size:20px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.01em">NT$ ${seriesTotal.toLocaleString()}</span>
          <span style="font-size:11px;color:var(--text-muted)">· ${daysWithData} 天有資料</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;flex-shrink:0">${allPill}${platformPills}</div>
        <div id="line-chart-container" style="position:relative;flex:1;min-height:240px;display:flex">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block">
            ${yTicks.join('')}
            ${polylines}
            ${circles}
            ${xLabels}
            <line id="chart-guide" x1="0" y1="${padT}" x2="0" y2="${padT + ch}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" style="opacity:0;transition:opacity .1s" />
            ${isMulti ? '' : `<circle id="chart-active-dot" cx="0" cy="0" r="6" fill="${lineColor}" stroke="white" stroke-width="2" style="opacity:0;transition:opacity .1s" />`}
          </svg>
          <div id="line-chart-tooltip" style="position:absolute;display:none;background:#1e293b;color:white;padding:10px 14px;border-radius:8px;font-size:13px;pointer-events:none;box-shadow:0 8px 24px rgba(15,23,42,0.2);z-index:10;transform:translate(-50%, calc(-100% - 10px));min-width:200px"></div>
        </div>
      </div>
    `;
  },

  bindLineChartTooltip() {
    const container = document.getElementById('line-chart-container');
    if (!container || !this._chartState) return;
    const svg = container.querySelector('svg');
    const tooltip = document.getElementById('line-chart-tooltip');
    const guide   = document.getElementById('chart-guide');
    const activeDot = document.getElementById('chart-active-dot'); // 只有單一平台模式才有
    if (!svg || !tooltip || !guide) return;

    const { dates, dailyData, series, padL, xStep, W, H, padT, ch, maxV, isMulti, activeName } = this._chartState;

    const logoFor = (name) => {
      const m = PLATFORM_MARKETPLACE[name] || 'shopee';
      return MARKETPLACE_BADGE[m].src;
    };

    const fmtTooltip = (i) => {
      const data = dailyData[i];
      const dateStr = data.date.replace(/-/g, '/');
      if (isMulti) {
        // 全賣場模式：顯示日期 + 總計 + 7 個平台明細
        return `
          <div style="font-size:11px;opacity:0.7;margin-bottom:6px">${dateStr}</div>
          <div style="font-size:11px;opacity:0.7">全賣場總計</div>
          <div style="font-size:18px;font-weight:700;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.18);font-variant-numeric:tabular-nums">NT$ ${Math.round(data.total).toLocaleString()}</div>
          <div style="font-size:12px;line-height:1.7">
            ${data.breakdown.map(p => `
              <div style="display:flex;justify-content:space-between;gap:18px;align-items:center">
                <span style="opacity:0.9;display:inline-flex;align-items:center;gap:6px">
                  <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${p.color}"></span>
                  <img src="${logoFor(p.name)}" alt="" style="width:16px;height:16px;border-radius:3px;object-fit:contain;background:white;flex-shrink:0">
                  ${escapeHtml(p.name)}
                </span>
                <span style="font-variant-numeric:tabular-nums;opacity:${p.value > 0 ? 1 : 0.4}">${p.value > 0 ? p.value.toLocaleString() : '—'}</span>
              </div>
            `).join('')}
          </div>
        `;
      } else {
        // 單一平台模式
        const p = data.breakdown.find(x => x.name === activeName);
        const v = p ? p.value : 0;
        return `
          <div style="font-size:11px;opacity:0.7;margin-bottom:4px">${dateStr}</div>
          ${p ? `<div style="font-size:12px;opacity:0.9;margin-bottom:4px;display:inline-flex;align-items:center;gap:6px">
            <img src="${logoFor(p.name)}" alt="" style="width:16px;height:16px;border-radius:3px;object-fit:contain;background:white;flex-shrink:0">
            ${escapeHtml(p.name)}
          </div>` : ''}
          <div style="font-size:18px;font-weight:700;font-variant-numeric:tabular-nums">NT$ ${Math.round(v).toLocaleString()}</div>
        `;
      }
    };

    const update = (e) => {
      const svgRect = svg.getBoundingClientRect();
      const x = e.clientX - svgRect.left;
      const scaleX = svgRect.width / W;
      const scaleY = svgRect.height / H;
      const svgX = x / scaleX;

      let i = Math.round((svgX - padL) / xStep);
      i = Math.max(0, Math.min(dates.length - 1, i));

      const cx = padL + i * xStep;
      // 多線：tooltip 對齊到該日最高線；單線：對齊到該線
      const yVal = isMulti
        ? Math.max(...series.map(s => s.values[i]))
        : series[0].values[i];
      const cy = padT + ch - (yVal / maxV) * ch;

      tooltip.innerHTML = fmtTooltip(i);
      tooltip.style.left = `${cx * scaleX}px`;
      tooltip.style.top  = `${cy * scaleY}px`;
      tooltip.style.display = 'block';

      guide.setAttribute('x1', cx);
      guide.setAttribute('x2', cx);
      guide.style.opacity = '1';

      if (activeDot && !isMulti) {
        activeDot.setAttribute('cx', cx);
        activeDot.setAttribute('cy', cy);
        activeDot.style.opacity = '1';
      }
    };

    const hide = () => {
      tooltip.style.display = 'none';
      guide.style.opacity = '0';
      if (activeDot) activeDot.style.opacity = '0';
    };

    container.addEventListener('mousemove', update);
    container.addEventListener('mouseleave', hide);
  },

  fmtTick(v) {
    if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
    if (v >= 1000) return Math.round(v / 1000) + 'K';
    return Math.round(v).toString();
  },

  /* 營收輸入區塊（HTML 片段，不含 page-header） */
  revenueEntrySectionHtml(platforms) {
    const now = new Date();
    const todayStr = toDateStr(now);
    const entryDate = this.filter.entryDate || todayStr;

    const platformRows = platforms.map((p, i) => {
      const rev = (p.daily && p.daily[entryDate] != null) ? p.daily[entryDate] : '';
      const ads = (p.dailyAdSpend && p.dailyAdSpend[entryDate] != null) ? p.dailyAdSpend[entryDate] : '';
      const hasAds = PLATFORMS_WITH_AD_SPEND.has(p.name);
      return `
        <div style="display:flex;align-items:center;gap:14px;padding:10px 0;${i < platforms.length - 1 ? 'border-bottom:1px solid var(--border);' : ''}">
          <span class="dept-tag" style="background:${p.color}22;color:${p.color};font-size:13px;padding:5px 12px;min-width:130px">
            ${p.icon} ${escapeHtml(p.name)}
          </span>
          <div style="display:flex;align-items:center;gap:6px;flex:1">
            <span style="font-size:12px;color:var(--text-muted);min-width:32px">營收</span>
            <input type="number" min="0" step="1" class="entry-rev" data-idx="${i}" value="${rev}" placeholder="0"
              style="flex:1;max-width:180px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-variant-numeric:tabular-nums;text-align:right">
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex:1">
            <span style="font-size:12px;color:var(--text-muted);min-width:36px">廣告費</span>
            ${hasAds ? `
              <input type="number" min="0" step="1" class="entry-ads" data-idx="${i}" value="${ads}" placeholder="0"
                style="flex:1;max-width:160px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-variant-numeric:tabular-nums;text-align:right">
            ` : `<span style="color:var(--text-muted);font-size:13px">—</span>`}
          </div>
        </div>
      `;
    }).join('');

    const isToday = entryDate === todayStr;

    return `
      <div style="margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding-bottom:14px;margin-bottom:8px;border-bottom:1px solid var(--border)">
          <h3 style="margin:0;font-size:16px">💰 營收輸入</h3>
          <label style="font-weight:500;margin-left:8px">日期</label>
          <input type="date" id="entry-date" value="${entryDate}" max="${todayStr}"
            style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px">
          ${isToday
            ? `<span class="up" style="font-size:13px;font-weight:500">● 今日</span>`
            : `<button class="btn-ghost" id="entry-today" style="padding:5px 12px;font-size:12px">回到今日</button>`}
          <span id="entry-status" style="margin-left:auto;font-size:13px;color:var(--text-muted)"></span>
          <button class="btn-primary" id="entry-save" style="width:auto;padding:8px 22px">💾 儲存</button>
        </div>
        ${platformRows}
      </div>
    `;
  },

  bindDashboardPills() {
    // 曲線圖圖例：點哪個平台就單獨顯示，點「全部」回到所有平台
    document.querySelectorAll('.line-legend').forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.name;
        const next = name || null;
        // 點到同一個 → 也回到全部
        this.filter.chartPlatform = (this.filter.chartPlatform === next) ? null : next;
        this.render();
      });
    });
    // 折線圖年/月下拉：分開選
    const yearSel = document.getElementById('chart-year-sel');
    if (yearSel) yearSel.addEventListener('change', () => {
      this.filter.chartYear = +yearSel.value;
      this.render();
    });
    const monthSel = document.getElementById('chart-month-sel');
    if (monthSel) monthSel.addEventListener('change', () => {
      this.filter.chartMonth = +monthSel.value;
      this.render();
    });
    const resetBtn = document.getElementById('chart-month-reset');
    if (resetBtn) resetBtn.addEventListener('click', () => {
      this.filter.chartYear = null;
      this.filter.chartMonth = null;
      this.render();
    });
    // 總覽卡日期切換：昨日 / 前日 / 本月 / 上月
    document.querySelectorAll('#summary-pills [data-summary-range]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.filter.summaryRange = btn.dataset.summaryRange;
        this.render();
      });
    });
    // 自訂月份 picker
    const monthPicker = document.getElementById('summary-custom-month');
    if (monthPicker) {
      monthPicker.addEventListener('change', () => {
        this.filter.summaryMonth = monthPicker.value;
        this.filter.summaryRange = 'customMonth';
        this.render();
      });

  /* ============================================================
   *  本月明細 — 試算表式檢視
   * ============================================================ */
  openMonthlyDetailModal() {
    let platforms = Store.get(Store.KEYS.platforms, null);
    if (!platforms) platforms = JSON.parse(JSON.stringify(PLATFORMS));
    platforms = migratePlatforms(platforms);

    const now = new Date();
    const yMonth = now.getFullYear();
    const mMonth = now.getMonth();
    const lastDay = new Date(yMonth, mMonth + 1, 0).getDate();
    const todayDay = now.getDate();
    // 只顯示「本月 1 號 到 今天」的日期（未來空白日不顯示，避免列數太多要捲動）
    const dates = Array.from({ length: todayDay }, (_, i) =>
      `${yMonth}-${String(mMonth + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`
    );

    // 依通路分群（蝦皮 4 / MOMO 2 / 酷澎 1）
    const marketOrder = ['shopee', 'momo', 'coupang'];
    const marketTint = { shopee: '#ee4d2d', momo: '#ec4899', coupang: '#3b82f6' };
    const grouped = { shopee: [], momo: [], coupang: [] };
    platforms.forEach(p => {
      const m = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      if (!grouped[m]) grouped[m] = [];
      grouped[m].push(p);
    });

    // 取所有平台的順序 + 各自是否有廣告費
    const flatPlatforms = [];
    marketOrder.forEach(m => grouped[m].forEach(p => flatPlatforms.push({ p, market: m })));

    // 計算每平台每日 / 每平台總計 / 每日總計 / 整月總計
    const get = (p, d) => +(p.daily?.[d]) || 0;
    const getAds = (p, d) => +(p.dailyAdSpend?.[d]) || 0;

    const platformTotals = flatPlatforms.map(({ p }) => {
      const rev = dates.reduce((s, d) => s + get(p, d), 0);
      const ads = PLATFORMS_WITH_AD_SPEND.has(p.name)
        ? dates.reduce((s, d) => s + getAds(p, d), 0)
        : 0;
      const roas = ads > 0 ? (rev / ads).toFixed(2) : '—';
      return { rev, ads, roas };
    });

    // 表頭：通路（合併欄）+ 每平台子欄 + 總計
    // Row 1: marketplace headers
    // Row 2: 營收 / 廣告費 / ROAS sub-headers

    const fmt = (n) => n > 0 ? n.toLocaleString() : '—';
    // 各賣場第一欄會加上 border-left 區隔（leftBorder='1px solid #e5e7eb' or ''）
    const fmtCell = (n, dim, leftBorder) => `<td style="padding:5px 8px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;color:${dim ? '#cbd5e1' : 'var(--text)'};line-height:1.4;${leftBorder ? `border-left:${leftBorder}` : ''}">${fmt(n)}</td>`;
    const fmtRoas = (rev, ads) => {
      if (ads === 0) return `<td style="padding:5px 8px;text-align:right;color:#cbd5e1;font-size:13px;line-height:1.4">—</td>`;
      const r = (rev / ads).toFixed(2);
      return `<td style="padding:5px 8px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:#4f46e5;line-height:1.4">${r}</td>`;
    };

    // 建欄位設定：每平台佔幾欄
    const colSpec = flatPlatforms.map(({ p }) => {
      const hasAds = PLATFORMS_WITH_AD_SPEND.has(p.name);
      return { p, hasAds, cols: hasAds ? 3 : 1 };
    });

    // 通路合併表頭
    const marketHeadHtml = marketOrder.map(m => {
      const items = grouped[m] || [];
      if (items.length === 0) return '';
      const tint = marketTint[m];
      const totalCols = items.reduce((s, p) => s + (PLATFORMS_WITH_AD_SPEND.has(p.name) ? 3 : 1), 0);
      const badge = MARKETPLACE_BADGE[m];
      return `<th colspan="${totalCols}" style="padding:7px 8px;background:${tint}14;color:${tint};text-align:center;font-size:13px;font-weight:700;border-left:2px solid ${tint};border-bottom:1px solid var(--border)"><img src="${badge.src}" style="width:15px;height:15px;vertical-align:middle;border-radius:3px;margin-right:4px;object-fit:contain">${escapeHtml(badge.name)}</th>`;
    }).join('');

    // 平台名稱列
    const platformHeadHtml = colSpec.map(({ p, cols }) => {
      return `<th colspan="${cols}" style="padding:6px 6px;text-align:center;font-size:13px;color:var(--text);font-weight:600;border-bottom:1px solid var(--border);border-left:1px solid var(--border);white-space:nowrap">${escapeHtml(p.name)}</th>`;
    }).join('');

    // 子欄位列（短標籤節省空間） — 各賣場第一欄加 border-left 區隔
    const subHeadHtml = colSpec.map(({ hasAds }) => {
      const lb = 'border-left:1px solid #94a3b8;';
      if (hasAds) {
        return `<th style="padding:5px 6px;text-align:right;font-size:11px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);${lb}">營收</th>
                <th style="padding:5px 6px;text-align:right;font-size:11px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border)">廣告</th>
                <th style="padding:5px 6px;text-align:right;font-size:11px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border)">ROAS</th>`;
      }
      return `<th style="padding:5px 6px;text-align:right;font-size:11px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);${lb}">營收</th>`;
    }).join('');

    // 每一天的資料列
    const todayStrLocal = toDateStr(new Date());
    let monthTotalRev = 0;
    let monthTotalAds = 0;
    const dayRowsHtml = dates.map(d => {
      const isToday = d === todayStrLocal;
      const dayLabel = d.slice(5).replace('-', '/');
      let dayRev = 0;
      let dayAds = 0;
      // 各通路當日小計（蝦皮 / MOMO / 酷澎）
      const marketSubtotals = { shopee: 0, momo: 0, coupang: 0 };
      const cells = colSpec.map(({ p, hasAds }) => {
        const rev = get(p, d);
        dayRev += rev;
        const m = PLATFORM_MARKETPLACE[p.name] || 'shopee';
        marketSubtotals[m] += rev;
        // 每個賣場的第一欄加 border-left 區隔
        const lb = '1px solid #94a3b8';
        if (hasAds) {
          const ads = getAds(p, d);
          dayAds += ads;
          return fmtCell(rev, rev === 0, lb) + fmtCell(ads, ads === 0) + fmtRoas(rev, ads);
        }
        return fmtCell(rev, rev === 0, lb);
      }).join('');
      monthTotalRev += dayRev;
      monthTotalAds += dayAds;

      const subtotalCell = (val, tint, bold) => `
        <td style="padding:5px 8px;text-align:right;font-size:13px;font-weight:${bold ? '700' : '600'};font-variant-numeric:tabular-nums;color:${val > 0 ? (tint || 'var(--text)') : '#cbd5e1'};background:var(--bg);border-left:1px solid var(--border)">${fmt(val)}</td>
      `;

      return `
        <tr style="background:${isToday ? '#eef2ff44' : 'transparent'};line-height:1.4">
          <td style="padding:5px 10px;font-size:13px;font-weight:600;color:${isToday ? 'var(--primary)' : 'var(--text-muted)'};font-variant-numeric:tabular-nums;white-space:nowrap;border-right:1px solid var(--border);background:${isToday ? '#f5f3ff' : 'var(--surface)'}">${escapeHtml(dayLabel)}${isToday ? ' ●' : ''}</td>
          ${cells}
          ${subtotalCell(marketSubtotals.shopee, '#ee4d2d')}
          ${subtotalCell(marketSubtotals.momo, '#ec4899')}
          ${subtotalCell(marketSubtotals.coupang, '#3b82f6')}
          <td style="padding:5px 10px;text-align:right;font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;color:${dayRev > 0 ? 'var(--text)' : '#cbd5e1'};background:#fef3c7;border-left:2px solid var(--warn)">${fmt(dayRev)}</td>
        </tr>
      `;
    }).join('');

    // 總計列：個別賣場 + 通路小計
    const totalCells = colSpec.map(({ hasAds }, idx) => {
      const t = platformTotals[idx];
      const lb = 'border-left:1px solid #94a3b8;';
      if (hasAds) {
        return `<td style="padding:7px 8px;text-align:right;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;${lb}">${fmt(t.rev)}</td>
                <td style="padding:7px 8px;text-align:right;font-size:13px;font-weight:600;color:var(--text-muted);font-variant-numeric:tabular-nums">${fmt(t.ads)}</td>
                <td style="padding:7px 8px;text-align:right;font-size:14px;font-weight:700;color:#4f46e5;font-variant-numeric:tabular-nums">${t.roas}</td>`;
      }
      return `<td style="padding:7px 8px;text-align:right;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;${lb}">${fmt(t.rev)}</td>`;
    }).join('');

    // 通路月總計
    const monthSubtotals = { shopee: 0, momo: 0, coupang: 0 };
    flatPlatforms.forEach(({ p, market }, idx) => {
      monthSubtotals[market] += platformTotals[idx].rev;
    });

    const tableHtml = `
      <div style="border:1px solid var(--border);border-radius:6px;overflow:hidden">
        <table style="border-collapse:separate;border-spacing:0;width:100%;table-layout:auto;font-size:13px">
          <thead style="background:var(--surface)">
            <tr>
              <th rowspan="3" style="padding:6px 8px;text-align:left;font-size:12px;color:var(--text-muted);font-weight:600;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);width:56px">日期</th>
              ${marketHeadHtml}
              <th colspan="4" rowspan="2" style="padding:6px 8px;text-align:center;font-size:13px;color:var(--text-muted);font-weight:700;border-left:2px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg)">通路小計 / 當日總計</th>
            </tr>
            <tr>${platformHeadHtml}</tr>
            <tr>${subHeadHtml}
              <th style="padding:5px 8px;text-align:right;font-size:11px;color:#ee4d2d;font-weight:700;border-bottom:1px solid var(--border);background:#ee4d2d10;border-left:2px solid var(--border);white-space:nowrap;min-width:88px">蝦皮總營收</th>
              <th style="padding:5px 8px;text-align:right;font-size:11px;color:#ec4899;font-weight:700;border-bottom:1px solid var(--border);background:#ec489910;white-space:nowrap;min-width:84px">MOMO總營收</th>
              <th style="padding:5px 8px;text-align:right;font-size:11px;color:#3b82f6;font-weight:700;border-bottom:1px solid var(--border);background:#3b82f610;white-space:nowrap;min-width:80px">酷澎總營收</th>
              <th style="padding:5px 8px;text-align:right;font-size:11px;color:var(--warn);font-weight:700;border-bottom:1px solid var(--border);background:#fef3c7;border-left:2px solid var(--warn);white-space:nowrap;min-width:96px">當日總營收</th>
            </tr>
          </thead>
          <tbody>
            ${dayRowsHtml}
          </tbody>
          <tfoot>
            <tr style="background:var(--bg);border-top:2px solid var(--border)">
              <td style="padding:8px 10px;font-size:14px;font-weight:800;color:var(--text);border-right:1px solid var(--border);background:var(--bg)">總計</td>
              ${totalCells}
              <td style="padding:8px 10px;text-align:right;font-size:14px;font-weight:800;color:#ee4d2d;background:#ee4d2d18;border-left:2px solid var(--border);font-variant-numeric:tabular-nums">${fmt(monthSubtotals.shopee)}</td>
              <td style="padding:8px 10px;text-align:right;font-size:14px;font-weight:800;color:#ec4899;background:#ec489918;font-variant-numeric:tabular-nums">${fmt(monthSubtotals.momo)}</td>
              <td style="padding:8px 10px;text-align:right;font-size:14px;font-weight:800;color:#3b82f6;background:#3b82f618;font-variant-numeric:tabular-nums">${fmt(monthSubtotals.coupang)}</td>
              <td style="padding:8px 10px;text-align:right;font-size:16px;font-weight:800;color:var(--warn);background:#fef3c7;border-left:2px solid var(--warn);font-variant-numeric:tabular-nums">${fmt(monthTotalRev)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
      <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-muted)">
        <button id="restore-backup-btn" style="padding:6px 11px;border:1px solid var(--border);border-radius:5px;background:white;color:var(--text-muted);font-size:12px;cursor:pointer;font-weight:500" title="從上一次儲存前的備份還原資料">
          ↩ 還原上一版
        </button>
        <span>${dates.length === 0 ? '本月還沒有任何日期可顯示' : `共 ${dates.length} 天 · ● 今天 · — 無資料`}</span>
      </div>
    `;

    this.openModal({
      title: `📅 ${yMonth} 年 ${mMonth + 1} 月 明細`,
      bodyHtml: tableHtml,
      width: '85vw',
      hideFooter: true,
      onMount: () => {
        const btn = document.getElementById('restore-backup-btn');
        if (btn) btn.addEventListener('click', () => this.restorePlatformsBackup());
      },
    });
  },

  /* ------------- 還原 platforms 備份 ------------- */
  restorePlatformsBackup() {
    const backup = Store.get(Store.KEYS.platformsBackup, null);
    if (!backup || !backup.data) {
      showToast('沒有可還原的備份', 'error');
      return;
    }
    const ts = new Date(backup.timestamp || 0);
    const tsLabel = isFinite(ts.getTime())
      ? `${ts.getFullYear()}/${String(ts.getMonth()+1).padStart(2,'0')}/${String(ts.getDate()).padStart(2,'0')} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`
      : '時間未知';

    // 統計備份內容
    const backupSummary = (backup.data || []).map(p => {
      const days = Object.keys(p.daily || {}).length;
      return `${p.name}：${days} 天有資料`;
    }).join('<br>');

    this.closeModal();
    this.openModal({
      title: '⚠️ 還原上一版營收資料',
      bodyHtml: `
        <div style="font-size:13px;color:var(--text);line-height:1.7">
          <p style="margin:0 0 10px">準備從備份還原以下資料：</p>
          <div style="padding:10px 14px;background:var(--bg);border-radius:6px;font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums;line-height:1.8;margin-bottom:12px">
            <div style="font-weight:600;color:var(--text);margin-bottom:6px">備份時間：${escapeHtml(tsLabel)}${backup.savedBy ? ` · 由 ${escapeHtml(backup.savedBy)} 觸發` : ''}</div>
            ${backupSummary}
          </div>
          <div style="padding:10px 12px;background:#fee2e2;border-left:3px solid #ef4444;border-radius:6px;font-size:12px">
            <strong>注意</strong>：還原會把目前所有營收 / 廣告費資料覆蓋成備份的版本。<br>
            如果你今天有填新的資料但還沒備份過，會 <strong>遺失</strong>。確定要還原嗎？
          </div>
        </div>
      `,
      saveLabel: '確認還原',
      cancelLabel: '取消',
      onSave: () => {
        // 還原前再備份一次當前資料（避免使用者按錯後無法 redo）
        const current = Store.get(Store.KEYS.platforms, null);
        if (current) {
          Store.set(Store.KEYS.platformsBackup, {
            data: current,
            timestamp: Date.now(),
            savedBy: this.currentUser?.username || '',
            note: '還原前自動備份',
          });
        }
        Store.set(Store.KEYS.platforms, backup.data);
        showToast('✓ 已還原到備份版本', 'success');
        this.render();
        return true;
      },
    });
  },

  /* ============================================================
   *  卡片內 inputs（今日營收 + 廣告費）— 失焦時跳出確認 / 取消 dialog
   * ============================================================ */
  bindCardInputs() {
    // 本月明細按鈕
    const btnMonthDetail = document.getElementById('open-month-detail');
    if (btnMonthDetail) {
      btnMonthDetail.addEventListener('click', () => this.openMonthlyDetailModal());
    }
    // 填寫日期 picker + 前後一天按鈕
    const picker = document.getElementById('entry-date-picker');
    const todayLocal = toDateStr(new Date());
    const defaultEntry = toDateStr(addDays(new Date(), -1));
    if (picker) {
      picker.addEventListener('change', () => {
        let v = picker.value;
        if (!v) return;
        if (v > todayLocal) v = todayLocal;
        this.filter.entryDate = v;
        this.render();
      });
    }
    const prevBtn = document.getElementById('entry-date-prev');
    if (prevBtn) {
      prevBtn.addEventListener('click', () => {
        const cur = this.filter.entryDate || defaultEntry;
        const d = new Date(cur + 'T00:00:00');
        this.filter.entryDate = toDateStr(addDays(d, -1));
        this.render();
      });
    }
    const nextBtn = document.getElementById('entry-date-next');
    if (nextBtn) {
      nextBtn.addEventListener('click', () => {
        const cur = this.filter.entryDate || defaultEntry;
        const d = new Date(cur + 'T00:00:00');
        const next = toDateStr(addDays(d, 1));
        if (next > todayLocal) return;
        this.filter.entryDate = next;
        this.render();
      });
    }
    const resetBtn = document.getElementById('entry-date-reset');
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        this.filter.entryDate = defaultEntry;
        this.render();
      });
    }

    // 寫入日期：以使用者於「填寫日期」picker 選的為準（預設昨天）
    const inputDateStr = this.filter.entryDate || toDateStr(addDays(new Date(), -1));

    // 字串「123,456」→ 數字 123456；空字串 / 非數字 → null
    const parseAmount = (raw) => {
      if (raw == null) return null;
      const digits = String(raw).replace(/[^\d]/g, '');
      if (digits === '') return null;
      const n = +digits;
      return isFinite(n) ? n : null;
    };
    // 數字 → 千分位字串
    const fmtAmount = (n) => (n != null && n > 0 ? n.toLocaleString() : '');

    // 比對兩個值用「數字本身」比，避免逗號干擾
    const sameVal = (a, b) => {
      const pa = parseAmount(a), pb = parseAmount(b);
      return (pa == null ? 0 : pa) === (pb == null ? 0 : pb);
    };

    // 該列輸入是否有改動
    const isDirty = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const revChanged = revEl && !sameVal(revEl.value, revEl.dataset.original);
      const adsChanged = adsEl && !sameVal(adsEl.value, adsEl.dataset.original);
      return revChanged || adsChanged;
    };

    // 顯示「未儲存」的視覺提示（橘色邊框 + 顯示快速儲存按鈕）
    const markUnsaved = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const orange = '#f59e0b';
      let anyDirty = false;
      if (revEl) {
        const changed = !sameVal(revEl.value, revEl.dataset.original);
        revEl.style.borderColor = changed ? orange : 'var(--border)';
        revEl.style.boxShadow = changed ? '0 0 0 2px #f59e0b22' : 'none';
        if (changed) anyDirty = true;
      }
      if (adsEl) {
        const changed = !sameVal(adsEl.value, adsEl.dataset.original);
        adsEl.style.borderColor = changed ? orange : 'var(--border)';
        adsEl.style.boxShadow = changed ? '0 0 0 2px #f59e0b22' : 'none';
        if (changed) anyDirty = true;
      }
      // 該列的「✓ 快速儲存」按鈕：dirty 時顯示，乾淨時隱藏
      const saveBtn = document.querySelector(`.row-save-btn[data-idx="${idx}"]`);
      if (saveBtn) saveBtn.style.display = anyDirty ? 'inline-block' : 'none';
    };

    // 邊打邊更新 ROAS（不存檔）
    const updateRoas = (idx) => {
      const roasEl = document.querySelector(`.card-roas[data-idx="${idx}"]`);
      if (!roasEl) return;
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const rev = parseAmount(revEl?.value) || 0;
      const ads = parseAmount(adsEl?.value) || 0;
      roasEl.textContent = (rev > 0 && ads > 0) ? (rev / ads).toFixed(2) : '—';
    };

    // 還原輸入框到原始值
    const revert = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      if (revEl) revEl.value = revEl.dataset.original || '';
      if (adsEl) adsEl.value = adsEl.dataset.original || '';
      updateRoas(idx);
      markUnsaved(idx);
    };

    // 寫入 store
    const commit = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const platforms = Store.get(Store.KEYS.platforms, null);

      // 🔒 寫入前先備份：把目前雲端版本存到 ec.platformsBackup
      //   如果未來資料出意外，可在 📅 本月明細 視窗按「還原上一版」救回
      if (platforms && Array.isArray(platforms)) {
        Store.set(Store.KEYS.platformsBackup, {
          data: platforms,
          timestamp: Date.now(),
          savedBy: this.currentUser?.username || '',
        });
      }

      const list = migratePlatforms(platforms ? platforms.map(p => ({ ...p })) : JSON.parse(JSON.stringify(PLATFORMS)));
      if (!list[idx]) return;

      const writeField = (key, val) => {
        list[idx][key] = list[idx][key] || {};
        if (val == null || isNaN(val)) delete list[idx][key][inputDateStr];
        else list[idx][key][inputDateStr] = Math.round(val);
      };

      if (revEl) {
        const n = parseAmount(revEl.value);
        writeField('daily', n);
        const formatted = fmtAmount(n);
        revEl.value = formatted;
        revEl.dataset.original = formatted;
      }
      if (adsEl) {
        const n = parseAmount(adsEl.value);
        writeField('dailyAdSpend', n);
        const formatted = fmtAmount(n);
        adsEl.value = formatted;
        adsEl.dataset.original = formatted;
      }
      Store.set(Store.KEYS.platforms, list);
      markUnsaved(idx);
      showToast('已儲存', 'success');
    };

    // 顯示確認 / 取消 dialog
    let dialogOpen = false;
    const promptConfirm = (idx) => {
      if (dialogOpen) return; // 同一次只跳一次
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const platforms = Store.get(Store.KEYS.platforms, null) || [];
      const platformName = platforms[idx]?.name || '此賣場';
      const dispVal = (n) => (n == null || n <= 0 ? '—' : n.toLocaleString());

      const revOldN = parseAmount(revEl?.dataset.original);
      const revNewN = parseAmount(revEl?.value);
      const adsOldN = parseAmount(adsEl?.dataset.original);
      const adsNewN = parseAmount(adsEl?.value);
      const revChanged = revEl && (revOldN || 0) !== (revNewN || 0);
      const adsChanged = adsEl && (adsOldN || 0) !== (adsNewN || 0);
      if (!revChanged && !adsChanged) return;

      const diffRow = (label, oldN, newN, changed) => {
        if (!changed) return '';
        return `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px">
            <span style="min-width:60px;font-size:12px;color:var(--text-muted);font-weight:600">${escapeHtml(label)}</span>
            <span style="font-variant-numeric:tabular-nums;color:var(--text-muted);text-decoration:line-through;font-size:14px">${dispVal(oldN)}</span>
            <span style="color:var(--text-muted);font-size:12px">→</span>
            <span style="font-variant-numeric:tabular-nums;color:#f59e0b;font-weight:700;font-size:16px">${dispVal(newN)}</span>
          </div>
        `;
      };

      dialogOpen = true;
      this.openModal({
        title: `確認修改 — ${platformName}`,
        bodyHtml: `
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:10px">
            日期：<strong style="color:var(--text)">${escapeHtml(inputDateStr)}</strong>
          </div>
          ${diffRow('營收', revOldN, revNewN, revChanged)}
          ${diffRow('廣告費', adsOldN, adsNewN, adsChanged)}
          <div style="margin-top:14px;padding:10px 12px;background:#f59e0b14;border-left:3px solid #f59e0b;border-radius:6px;font-size:12px;color:var(--text)">
            按「確認」會寫入雲端儲存；按「取消」會還原為原本的金額。
          </div>
        `,
        saveLabel: '確認',
        cancelLabel: '取消',
        onSave: () => {
          dialogOpen = false;
          commit(idx);
          return true;
        },
        onCancel: () => {
          // 沒按確認就還原 — 不要一直顯示未確認的數字
          dialogOpen = false;
          revert(idx);
        },
      });
    };

    // 列上的 ✓ 快速儲存按鈕：直接 commit，跳過確認視窗
    document.querySelectorAll('.row-save-btn').forEach(btn => {
      btn.addEventListener('mousedown', (e) => e.preventDefault()); // 不要讓 input 先 blur 跳出確認
      btn.addEventListener('click', () => {
        const idx = +btn.dataset.idx;
        commit(idx);
      });
    });

    // 輸入時：即時加千分位 + 更新 ROAS、標記未儲存
    document.querySelectorAll('.card-rev, .card-ads').forEach(el => {
      const idx = +el.dataset.idx;
      el.addEventListener('input', () => {
        // 即時格式化：保留游標相對位置
        const before = el.value;
        const caret = el.selectionStart || 0;
        const digitsBeforeCaret = before.slice(0, caret).replace(/[^\d]/g, '').length;
        const digits = before.replace(/[^\d]/g, '');
        const formatted = digits === '' ? '' : (+digits).toLocaleString();
        if (formatted !== before) {
          el.value = formatted;
          // 重新放游標：放在「相同位數之後」
          let count = 0, newCaret = formatted.length;
          for (let i = 0; i < formatted.length; i++) {
            if (/\d/.test(formatted[i])) count++;
            if (count === digitsBeforeCaret) { newCaret = i + 1; break; }
          }
          try { el.setSelectionRange(newCaret, newCaret); } catch (_) {}
        }
        updateRoas(idx);
        markUnsaved(idx);
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          el.blur();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          // Esc 直接還原這格（不存）
          el.value = el.dataset.original || '';
          updateRoas(idx);
          markUnsaved(idx);
        }
      });
      el.addEventListener('blur', () => {
        // 失焦時若有改動 → 跳確認 dialog
        // 但若新焦點仍在同一列（例如從營收跳到廣告費），先不跳，等整列都離開
        setTimeout(() => {
          const active = document.activeElement;
          const sameRow = active && active.tagName === 'INPUT'
            && (active.classList.contains('card-rev') || active.classList.contains('card-ads'))
            && +active.dataset.idx === idx;
          if (sameRow) return;
          if (isDirty(idx)) promptConfirm(idx);
        }, 50);
      });
    });
  },

  /* （已棄用）營收輸入區段 bindRevenueEntry — 保留方法避免外部呼叫崩潰 */
  bindRevenueEntry() {
    const recompute = () => {
      let totalRev = 0, totalAds = 0;
      document.querySelectorAll('.entry-rev').forEach(el => {
        const v = +el.value;
        if (isFinite(v)) totalRev += v;
      });
      document.querySelectorAll('.entry-ads').forEach(el => {
        const v = +el.value;
        if (isFinite(v)) totalAds += v;
      });
      document.querySelectorAll('.entry-roas').forEach(el => {
        const idx = +el.dataset.idx;
        const revEl = document.querySelector(`.entry-rev[data-idx="${idx}"]`);
        const adsEl = document.querySelector(`.entry-ads[data-idx="${idx}"]`);
        const rev = revEl ? +revEl.value : 0;
        const ads = adsEl ? +adsEl.value : 0;
        el.textContent = (rev > 0 && ads > 0) ? (rev / ads).toFixed(2) : '—';
      });
      const tr = document.getElementById('entry-total-rev');
      const ta = document.getElementById('entry-total-ads');
      const trs = document.getElementById('entry-total-roas');
      if (tr) tr.textContent = fmtNTD(totalRev);
      if (ta) ta.textContent = totalAds > 0 ? fmtNTD(totalAds) : '—';
      if (trs) trs.textContent = (totalRev > 0 && totalAds > 0) ? (totalRev / totalAds).toFixed(2) : '—';
    };

    document.querySelectorAll('.entry-rev, .entry-ads').forEach(el => {
      el.addEventListener('input', recompute);
    });

    const dateEl = document.getElementById('entry-date');
    if (dateEl) dateEl.addEventListener('change', () => {
      this.filter.entryDate = dateEl.value;
      this.render();
    });

    const todayBtn = document.getElementById('entry-today');
    if (todayBtn) todayBtn.addEventListener('click', () => {
      this.filter.entryDate = toDateStr(new Date());
      this.render();
    });

    const saveBtn = document.getElementById('entry-save');
    if (saveBtn) saveBtn.addEventListener('click', () => {
      const entryDate = (document.getElementById('entry-date') || {}).value || toDateStr(new Date());
      const platforms = Store.get(Store.KEYS.platforms, null) || JSON.parse(JSON.stringify(PLATFORMS));
      const migrated = migratePlatforms(platforms);
      const list = migrated;

      document.querySelectorAll('.entry-rev').forEach(el => {
        const idx = +el.dataset.idx;
        const v = el.value === '' ? null : +el.value;
        if (!list[idx]) return;
        list[idx].daily = list[idx].daily || {};
        if (v == null || isNaN(v)) delete list[idx].daily[entryDate];
        else list[idx].daily[entryDate] = Math.round(v);
      });
      document.querySelectorAll('.entry-ads').forEach(el => {
        const idx = +el.dataset.idx;
        const v = el.value === '' ? null : +el.value;
        if (!list[idx]) return;
        list[idx].dailyAdSpend = list[idx].dailyAdSpend || {};
        if (v == null || isNaN(v)) delete list[idx].dailyAdSpend[entryDate];
        else list[idx].dailyAdSpend[entryDate] = Math.round(v);
      });

      Store.set(Store.KEYS.platforms, list);
      showToast(`${entryDate.replace(/-/g, '/')} 已儲存`, 'success');
      const statusEl = document.getElementById('entry-status');
      if (statusEl) statusEl.textContent = '✓ 已同步到雲端';
    });
  },

  openPlatformModal(idx) {
    let platforms = Store.get(Store.KEYS.platforms, null);
    if (!platforms) platforms = JSON.parse(JSON.stringify(PLATFORMS));
    platforms = migratePlatforms(platforms);
    platforms = platforms.map(p => ({
      ...p,
      daily: { ...(p.daily || {}) },
      dailyAdSpend: { ...(p.dailyAdSpend || {}) },
    }));

    const p = platforms[idx];
    if (!p) { showToast('找不到此平台', 'error'); return; }

    const now = new Date();
    const todayStr = toDateStr(now);
    const yesterdayStr = toDateStr(addDays(now, -1));
    const hasAds = PLATFORMS_WITH_AD_SPEND.has(p.name);

    // 重新渲染 modal body 用：日期變動時更新欄位值
    const renderBody = (dateStr) => {
      const rev = (p.daily[dateStr] != null) ? p.daily[dateStr] : '';
      const ads = (p.dailyAdSpend[dateStr] != null) ? p.dailyAdSpend[dateStr] : '';
      const roas = (typeof rev === 'number' && rev > 0 && typeof ads === 'number' && ads > 0)
        ? (rev / ads).toFixed(2) : '—';
      return `
        <div class="field">
          <label>平台</label>
          <input value="${p.icon} ${escapeHtml(p.name)}" disabled
            style="background:var(--bg);color:var(--text-muted)">
        </div>
        <div class="field">
          <label>日期</label>
          <input type="date" id="m-date" value="${dateStr}" max="${todayStr}">
          <div style="margin-top:6px;font-size:12px;color:var(--text-muted)">
            預設為昨天，可改其他日期；改完日期欄位下方數字會跟著變
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>當日營收（NT$）</label>
            <input type="number" id="m-rev" min="0" step="1" value="${rev}" placeholder="0" onfocus="this.select()">
          </div>
          <div class="field">
            <label>廣告費（NT$）</label>
            ${hasAds
              ? `<input type="number" id="m-ads" min="0" step="1" value="${ads}" placeholder="0" onfocus="this.select()">`
              : `<input value="此平台沒有廣告費" disabled style="background:var(--bg);color:var(--text-muted)">`}
          </div>
        </div>
        ${hasAds ? `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:${p.color}14;border-radius:var(--radius-sm);margin-top:8px">
            <span style="font-size:12px;color:var(--text-muted);letter-spacing:.05em">ROAS</span>
            <span id="m-roas" style="font-weight:700;font-variant-numeric:tabular-nums;color:${p.color};font-size:18px">${roas}</span>
          </div>
        ` : ''}
        <div style="font-size:12px;color:var(--text-muted);margin-top:6px">
          留空表示「沒這筆」，會把該日數值刪掉；ROAS = 營收 ÷ 廣告費（自動算）
        </div>
      `;
    };

    this.openModal({
      title: `編輯：${p.icon} ${p.name}`,
      bodyHtml: renderBody(yesterdayStr),
      onMount: () => {
        const updateRoas = () => {
          const roasEl = document.getElementById('m-roas');
          if (!roasEl) return;
          const revEl = document.getElementById('m-rev');
          const adsEl = document.getElementById('m-ads');
          const rev = revEl ? +revEl.value : 0;
          const ads = adsEl ? +adsEl.value : 0;
          roasEl.textContent = (rev > 0 && ads > 0) ? (rev / ads).toFixed(2) : '—';
        };
        // 切換日期時，即時更新下方營收與廣告費欄位顯示
        const dateEl = document.getElementById('m-date');
        if (dateEl) dateEl.addEventListener('change', () => {
          const newDate = dateEl.value;
          if (!newDate) return;
          const revEl = document.getElementById('m-rev');
          const adsEl = document.getElementById('m-ads');
          const newRev = (p.daily[newDate] != null) ? p.daily[newDate] : '';
          const newAds = (p.dailyAdSpend[newDate] != null) ? p.dailyAdSpend[newDate] : '';
          if (revEl) revEl.value = newRev;
          if (adsEl) adsEl.value = newAds;
          updateRoas();
        });
        // 邊打邊更新 ROAS
        const revEl = document.getElementById('m-rev');
        const adsEl = document.getElementById('m-ads');
        if (revEl) revEl.addEventListener('input', updateRoas);
        if (adsEl) adsEl.addEventListener('input', updateRoas);
      },
      onSave: () => {
        const dateStr = (document.getElementById('m-date') || {}).value;
        if (!dateStr) { showToast('請選擇日期', 'error'); return false; }

        const revRaw = (document.getElementById('m-rev') || {}).value;
        const rev = revRaw === '' ? null : +revRaw;
        if (rev != null && (!isFinite(rev) || rev < 0)) { showToast('營收需為非負數字', 'error'); return false; }
        if (rev == null) delete p.daily[dateStr];
        else p.daily[dateStr] = Math.round(rev);

        if (hasAds) {
          const adsRaw = (document.getElementById('m-ads') || {}).value;
          const ads = adsRaw === '' ? null : +adsRaw;
          if (ads != null && (!isFinite(ads) || ads < 0)) { showToast('廣告費需為非負數字', 'error'); return false; }
          if (ads == null) delete p.dailyAdSpend[dateStr];
          else p.dailyAdSpend[dateStr] = Math.round(ads);
        }

        Store.set(Store.KEYS.platforms, platforms);
        showToast(`「${p.name}」${dateStr.replace(/-/g,'/')} 已更新`, 'success');
        this.render();
        return true;
      },
    });
  },

  /* ============================================================
   *  績效管理
   * ============================================================ */
  viewEmployees() {
    const departments = Store.get(Store.KEYS.departments, []);
    const allUsers = Store.get(Store.KEYS.users, []);
    // 員工績效明細：排除管理員、以及未指派辦公室（全公司）的帳號
    const users = allUsers.filter(u => u.role !== 'admin' && getUserDepts(u).length > 0);
    const deptById = Object.fromEntries(departments.map(d => [d.id, d]));
    const filterDept = this.filter.dept === 'all' ? null : deptById[this.filter.dept];
    const filtered = !filterDept
      ? users
      : users.filter(u => getUserDepts(u).includes(filterDept.name));

    const quarter = this.filter.quarter || 'all';
    const sortKey = quarter === 'all' ? null : quarter;

    const ranked = filtered.map(u => ({
      ...u,
      score: computeScore(u),
      trend: trendFromQuarters(u),
    })).sort((a, b) => {
      const av = sortKey ? (getQuarterScore(a, sortKey) ?? -1) : a.score;
      const bv = sortKey ? (getQuarterScore(b, sortKey) ?? -1) : b.score;
      return bv - av;
    });

    const avgScore = ranked.length
      ? Math.round(ranked.reduce((s, e) => {
          const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
          return s + v;
        }, 0) / ranked.length * 10) / 10
      : 0;
    const excellent = ranked.filter(e => {
      const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
      return v >= 90;
    }).length;
    const needsImprov = ranked.filter(e => {
      const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
      return v > 0 && v < 60;
    }).length;
    const topPerformer = ranked[0];

    const deptByName = Object.fromEntries(departments.map(d => [d.name, d]));

    const cellScore = (val) => {
      if (val == null) return '<span style="color:var(--text-muted)">—</span>';
      const cls = val >= 90 ? 'trend-up' : val < 60 ? 'trend-down' : '';
      return `<span class="${cls}" style="font-weight:600">${val}</span>`;
    };
    const highlight = (q) => quarter === q ? 'style="background:var(--primary-soft)"' : '';

    const rows = ranked.length === 0 ? `
      <tr><td colspan="10"><div class="empty"><div class="emoji">📭</div>
        <div>尚無員工資料</div>
        <div style="font-size:13px;margin-top:4px">請先到「帳號管理」建立員工帳號</div>
      </div></td></tr>
    ` : ranked.map((u, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
      const userDepts = getUserDepts(u);
      const scoreClass = u.score >= 90 ? 'score-good' : u.score >= 80 ? 'score-ok' : 'score-bad';
      const trendIcon = u.trend === 'up' ? '<span class="trend-up">↑ 上升</span>'
        : u.trend === 'down' ? '<span class="trend-down">↓ 下降</span>'
        : '<span class="trend-flat">→ 持平</span>';
      const deptCell = userDepts.length === 0
        ? `<span style="color:var(--text-muted)">全公司</span>`
        : userDepts.map(dn => {
            const d = deptByName[dn];
            return d
              ? `<span class="dept-tag" style="background:${d.color}22;color:${d.color};margin-right:4px">${escapeHtml(d.name)}</span>`
              : `<span class="dept-tag" style="background:#e5e7eb;color:#6b7280;margin-right:4px">${escapeHtml(dn)}</span>`;
          }).join('');
      return `
        <tr>
          <td><span class="rank-badge ${rankClass}">${rank}</span></td>
          <td>
            <div class="employee-cell">
              <div class="employee-avatar">${escapeHtml(u.name.slice(0,1))}</div>
              <div>
                <div class="employee-name">${escapeHtml(u.name)}</div>
                <div class="employee-code">@${escapeHtml(u.username)}</div>
              </div>
            </div>
          </td>
          <td>${deptCell}</td>
          <td ${highlight('q1')}>${cellScore(getQuarterScore(u, 'q1'))}</td>
          <td ${highlight('q2')}>${cellScore(getQuarterScore(u, 'q2'))}</td>
          <td ${highlight('q3')}>${cellScore(getQuarterScore(u, 'q3'))}</td>
          <td ${highlight('q4')}>${cellScore(getQuarterScore(u, 'q4'))}</td>
          <td>
            <div class="score-cell">
              <div class="score-bar"><div class="${scoreClass}" style="width:${u.score}%"></div></div>
              <span class="score-value">${u.score}</span>
            </div>
          </td>
          <td>${trendIcon}</td>
          <td>
            <div class="row-actions">
              <button class="icon-btn" title="編輯分數" onclick="App.openScoreModal('${escapeHtml(u.username)}')">✏️</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    const deptPills = `
      <button class="pill ${this.filter.dept === 'all' ? 'active' : ''}" data-dept="all">全部辦公室</button>
      ${departments.map(d => `
        <button class="pill ${this.filter.dept === d.id ? 'active' : ''}" data-dept="${d.id}">${escapeHtml(d.name)}</button>
      `).join('')}
    `;

    const quarterLabels = { all: '全年', q1: 'Q1', q2: 'Q2', q3: 'Q3', q4: 'Q4' };
    const quarterPills = ['all','q1','q2','q3','q4'].map(q => `
      <button class="pill ${quarter === q ? 'active' : ''}" data-quarter="${q}">${quarterLabels[q]}</button>
    `).join('');

    const currentLabel = quarterLabels[quarter];
    const tableSubtitle = quarter === 'all'
      ? `依全年平均分數排序 · 共 ${ranked.length} 人`
      : `依 ${currentLabel} 分數排序 · 共 ${ranked.length} 人`;

    return `
      <div class="page-header">
        <h2>績效管理 <span class="live-dot">即時更新</span></h2>
        <p>各辦公室員工 ${currentLabel} 績效分數（滿分 100 分）</p>
      </div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--info-soft);color:var(--info)">📊</div>
          <div class="stat-label">${currentLabel}平均分數</div>
          <div class="stat-value">${avgScore}</div>
          <div class="stat-meta">滿分 100 分</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--success-soft);color:var(--success)">🏆</div>
          <div class="stat-label">優秀員工（≥ 90）</div>
          <div class="stat-value">${excellent}</div>
          <div class="stat-meta">共 ${ranked.length} 人中</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--danger-soft);color:var(--danger)">⚠️</div>
          <div class="stat-label">待加強（&lt; 60）</div>
          <div class="stat-value">${needsImprov}</div>
          <div class="stat-meta">需關注並輔導</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--primary-soft);color:var(--primary)">⭐</div>
          <div class="stat-label">${currentLabel}最高分</div>
          <div class="stat-value" style="font-size:22px">${topPerformer ? escapeHtml(topPerformer.name) : '—'}</div>
          <div class="stat-meta">${topPerformer ? (sortKey ? (getQuarterScore(topPerformer, sortKey) ?? '—') : topPerformer.score) + ' 分' : ''}</div>
        </div>
      </div>
      <div class="filter-bar">
        ${deptPills}
        <span style="width:1px;height:24px;background:var(--border);margin:0 4px"></span>
        ${quarterPills}
        <span class="filter-spacer"></span>
        ${this.currentUser.role === 'admin' ? `<button class="btn-ghost" onclick="App.navigate('users')">前往帳號管理 ↗</button>` : ''}
      </div>
      <div class="table-card">
        <div class="table-card-header">
          <h3>員工績效明細</h3>
          <p>${tableSubtitle}</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>排名</th><th>員工</th><th>辦公室</th>
                <th ${highlight('q1')}>Q1</th>
                <th ${highlight('q2')}>Q2</th>
                <th ${highlight('q3')}>Q3</th>
                <th ${highlight('q4')}>Q4</th>
                <th>全年平均</th><th>趨勢</th><th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  },

  bindFilterBar() {
    document.querySelectorAll('.pill[data-dept]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.dept = p.dataset.dept;
        this.render();
      });
    });
    document.querySelectorAll('.pill[data-quarter]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.quarter = p.dataset.quarter;
        this.render();
      });
    });
  },

  bindOfficeTabs(deptId) {
    document.querySelectorAll('.pill[data-office-tab]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.officeTab[deptId] = p.dataset.officeTab;
        this.render();
      });
    });
    // d1（行銷）：只有在主頁（有週曆）才綁；子頁不綁（避免 querySelector 找不到元素）
    if (deptId === 'd1' && document.querySelector('[data-week-offset], [data-month-offset]')) {
      this.bindWeeklyCalendar(deptId);
    }
    // d1 insight 子頁：洞察表上傳按鈕
    if (deptId === 'd1' && this.route === 'office-d1-insight') {
      this.bindInsightTab();
    }
    // d1 profit 子頁：初始化淨利表的賣場分頁內容
    if (deptId === 'd1' && this.route === 'office-d1-profit' && typeof SHOPS !== 'undefined') {
      setTimeout(() => {
        try {
          SHOPS.forEach(s => {
            const el = document.getElementById('content-' + s.id);
            if (el && !el.innerHTML.trim() && typeof shopHTML === 'function') {
              el.innerHTML = shopHTML(s.id);
            }
          });
          if(typeof initProfitPeriodControls==='function') initProfitPeriodControls();
          SHOPS.forEach(s => {
            if (typeof initShopUI === 'function') initShopUI(s.id);
          });
        } catch (e) { console.error('profit init failed', e); }
      }, 200);
    }
    // 動態 tab 的事件綁定
    const activeTab = this.filter.officeTab[deptId];
    const cfg = OFFICE_CONFIG[deptId];
    const tabKey = activeTab || cfg?.tabs?.[0]?.key;
    const tab = cfg?.tabs?.find(t => t.key === tabKey);
    if (tab?.dynamic === 'daily-progress') {
      this.bindDailyProgress(deptId);
    } else if (tab?.dynamic === 'weekly-calendar') {
      this.bindWeeklyCalendar(deptId);
    }
  },

  /* ------------- 工作週曆事件綁定 ------------- */
  bindWeeklyCalendar(deptId) {
    const ensureFilter = () => {
      if (!this.filter.dashboardMarketing) {
        this.filter.dashboardMarketing = { employee: 'all', weekOffset: 0, monthOffset: 0, viewMode: 'week' };
      }
    };
    // 人員下拉
    const emp = document.getElementById('dash-mkt-emp');
    if (emp) emp.addEventListener('change', () => {
      ensureFilter();
      this.filter.dashboardMarketing.employee = emp.value;
      this.render();
    });
    // 切換週
    document.querySelectorAll('[data-week-offset]').forEach(btn => {
      btn.addEventListener('click', () => {
        ensureFilter();
        this.filter.dashboardMarketing.weekOffset = +btn.dataset.weekOffset;
        this.render();
      });
    });
    // 待辦狀態篩選 pills
    document.querySelectorAll('[data-todo-status]').forEach(btn => {
      btn.addEventListener('click', () => {
        ensureFilter();
        this.filter.dashboardMarketing.todoStatus = btn.dataset.todoStatus;
        this.render();
      });
    });
    // 切換月
    document.querySelectorAll('[data-month-offset]').forEach(btn => {
      btn.addEventListener('click', () => {
        ensureFilter();
        this.filter.dashboardMarketing.monthOffset = +btn.dataset.monthOffset;
        this.render();
      });
    });
    // 切換週 / 月 模式
    document.querySelectorAll('[data-view-mode]').forEach(btn => {
      btn.addEventListener('click', () => {
        ensureFilter();
        const m = btn.dataset.viewMode;
        this.filter.dashboardMarketing.viewMode = m;
        // 切到月模式時重設 monthOffset 為 0（本月）
        if (m === 'month') this.filter.dashboardMarketing.monthOffset = 0;
        else this.filter.dashboardMarketing.weekOffset = 0;
        this.render();
      });
    });
    // 點任務卡 / 待辦事項 → 用新模式 modal 編輯（與新增同樣樣式）
    // 從「待辦事項」側欄點進來的才顯示刪除按鈕；工作週曆卡片不顯示
    document.querySelectorAll('[data-cal-task]').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-cal-del]')) return;
        const fromTodoList = card.dataset.todoSource === 'list';
        this.openQuickTodoModal(deptId, card.dataset.calTask, { showDelete: fromTodoList });
      });
    });
    // 刪除按鈕
    document.querySelectorAll('[data-cal-del]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        this.deleteDailyTask(btn.dataset.calDel);
      });
    });
    // 新增進度
    document.querySelectorAll('[data-cal-add]').forEach(btn => {
      btn.addEventListener('click', () => this.openDailyTaskModal(deptId));
    });
    // 點任一格子（週 / 月 / 甘特日期表頭）→ 用該日期開啟新增 modal
    document.querySelectorAll('[data-cell-date]').forEach(cell => {
      cell.addEventListener('click', (e) => {
        // 點在任務卡 / 狀態下拉 / 刪除鈕上：交給原本 handler 處理
        if (e.target.closest('[data-cal-task]') || e.target.closest('.dp-status-select')
            || e.target.closest('[data-cal-del]')) return;
        this.openDailyTaskModal(deptId, null, { date: cell.dataset.cellDate });
      });
    });
    // 快速新增單一待辦
    document.querySelectorAll('[data-todo-quick-add]').forEach(btn => {
      btn.addEventListener('click', () => this.openQuickTodoModal(btn.dataset.todoQuickAdd));
    });
    // 待辦事項 — 狀態下拉改動
    document.querySelectorAll('.dp-status-select').forEach(sel => {
      sel.addEventListener('change', () => {
        const taskId = sel.dataset.taskId;
        const newStatus = sel.value;
        const list = Store.get(Store.KEYS.dailyTasks, []);
        const i = list.findIndex(x => x.id === taskId);
        if (i < 0) return;
        const title = list[i].title || '待辦';
        list[i].status = newStatus;
        Store.set(Store.KEYS.dailyTasks, list);

        // 改為「已完成」→ 詢問是否刪除
        if (newStatus === '已完成') {
          const ok = confirm(`「${title}」已完成 ✅\n\n是否要從清單中刪除這筆？\n（不刪也可以，會留在「已完成」分頁）`);
          if (ok) {
            const list2 = Store.get(Store.KEYS.dailyTasks, []);
            const j = list2.findIndex(x => x.id === taskId);
            if (j >= 0) {
              list2.splice(j, 1);
              Store.set(Store.KEYS.dailyTasks, list2);
              showToast(`已刪除「${title}」`, 'success');
              this.render();
              return;
            }
          }
        }

        showToast(`已將「${title}」改為 ${newStatus}`, 'success');
        this.render();
      });
    });
    // 每日工作進度 tab 內的 todo 勾選還是維持原本行為
    document.querySelectorAll('.dp-todo-tick').forEach(cb => {
      cb.addEventListener('change', () => {
        const taskId = cb.dataset.taskId;
        const todoIdx = +cb.dataset.todoIdx;
        const list = Store.get(Store.KEYS.dailyTasks, []);
        const i = list.findIndex(x => x.id === taskId);
        if (i < 0) return;
        if (!Array.isArray(list[i].todos)) list[i].todos = [];
        if (list[i].todos[todoIdx]) {
          list[i].todos[todoIdx].done = cb.checked;
          Store.set(Store.KEYS.dailyTasks, list);
          this.render();
        }
      });
    });
  },

  /* ============================================================
   *  每日工作進度
   * ============================================================ */
  renderDailyProgressTab(deptId, color, dept) {
    const allTasks = Store.get(Store.KEYS.dailyTasks, []);
    const tasks = allTasks.filter(t => t.deptId === deptId);
    const members = (Store.get(Store.KEYS.users, [])).filter(u => getUserDepts(u).includes(dept.name));
    const f = this.filter.dailyProgress;

    // 套用篩選
    let filtered = tasks.slice();
    if (f.employee && f.employee !== 'all') {
      filtered = filtered.filter(t => t.employee === f.employee);
    }
    if (f.status && f.status !== 'all') {
      filtered = filtered.filter(t => t.status === f.status);
    }
    if (f.dateFrom) filtered = filtered.filter(t => t.date >= f.dateFrom);
    if (f.dateTo)   filtered = filtered.filter(t => t.date <= f.dateTo);

    // 排序：日期新→舊，相同日期 createdAt 新→舊
    filtered.sort((a, b) => {
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (b.createdAt || 0) - (a.createdAt || 0);
    });

    // 統計
    const counts = { '進行中': 0, '已完成': 0, '遇阻': 0, '待開始': 0 };
    tasks.forEach(t => { if (counts[t.status] != null) counts[t.status]++; });

    const statusPills = ['all', ...DAILY_TASK_STATUS_LIST].map(s => {
      const active = (f.status || 'all') === s;
      const label = s === 'all' ? `全部 (${tasks.length})` : `${DAILY_TASK_STATUS[s].emoji} ${s} (${counts[s]})`;
      return `<button class="pill ${active ? 'active' : ''}" data-dp-status="${escapeHtml(s)}">${label}</button>`;
    }).join('');

    const employeeOptions = `
      <option value="all" ${(f.employee || 'all') === 'all' ? 'selected' : ''}>全部員工</option>
      ${members.map(u => `<option value="${escapeHtml(u.username)}" ${f.employee === u.username ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}
    `;

    // 依日期分組（filtered 已按日期新→舊排序）
    const grouped = [];
    let currentGroup = null;
    filtered.forEach(t => {
      if (!currentGroup || currentGroup.date !== t.date) {
        currentGroup = { date: t.date, items: [] };
        grouped.push(currentGroup);
      }
      currentGroup.items.push(t);
    });

    const weekdayMap = ['週日','週一','週二','週三','週四','週五','週六'];
    const formatDateHeading = (dateStr) => {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      const today = new Date();
      const tStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      const yStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
      let extra = '';
      if (dateStr === tStr) extra = ' · 今天';
      else if (dateStr === yStr) extra = ' · 昨天';
      return `${dateStr} ${weekdayMap[dt.getDay()]}${extra}`;
    };

    const timelineHtml = filtered.length === 0
      ? `<div class="empty" style="padding:48px 24px"><div class="emoji">📋</div>${tasks.length === 0 ? '尚無工作進度紀錄' : '沒有符合篩選條件的紀錄'}<div style="font-size:13px;margin-top:4px;color:var(--text-muted)">${tasks.length === 0 ? '點右上「+ 新增進度」開始記錄' : '試試調整員工或狀態篩選'}</div></div>`
      : `<div style="padding:8px 8px 16px">${
          grouped.map(g => `
            <div style="margin-top:12px">
              <div style="display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--text-muted)">
                <span style="display:inline-block;width:4px;height:14px;border-radius:2px;background:${color}"></span>
                <span style="font-variant-numeric:tabular-nums">${escapeHtml(formatDateHeading(g.date))}</span>
                <span style="flex:1;height:1px;background:var(--border)"></span>
                <span style="font-size:12px;font-weight:500;color:var(--text-muted)">${g.items.length} 筆</span>
              </div>
              <div style="position:relative;margin:6px 0 6px 24px;padding-left:18px;border-left:2px solid var(--border)">
                ${g.items.map(t => {
                  const st = DAILY_TASK_STATUS[t.status] || { color: '#6b7280', bg: '#e5e7eb', emoji: '•' };
                  const canEdit = this.currentUser.role === 'admin' || this.currentUser.username === t.employee;
                  const catMeta = t.category ? getCategoryMeta(t.category) : null;
                  const catColor = catMeta?.color || '#6b7280';
                  const todos = Array.isArray(t.todos) ? t.todos : [];
                  const doneCount = todos.filter(td => td.done).length;
                  return `
