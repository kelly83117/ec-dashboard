<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元創數位 · 績效管理</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --sidebar: #0f172a;
    --sidebar-2: #1e293b;
    --sidebar-text: #cbd5e1;
    --sidebar-muted: #64748b;
    --primary: #6366f1;
    --primary-soft: #eef2ff;
    --primary-dark: #4f46e5;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --success: #10b981;
    --success-soft: #d1fae5;
    --warn: #f59e0b;
    --warn-soft: #fef3c7;
    --danger: #ef4444;
    --danger-soft: #fee2e2;
    --info: #3b82f6;
    --info-soft: #dbeafe;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
    --shadow: 0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg: 0 10px 25px -5px rgba(15,23,42,.1), 0 8px 10px -6px rgba(15,23,42,.05);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                 "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }

  /* ------------- 登入頁 ------------- */
  #view-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
    padding: 24px;
  }
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
  }
  .login-logo {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 28px;
  }
  .login-logo .brand-logo {
    width: 220px;
    max-width: 100%;
    height: auto;
    display: block;
  }
  .login-logo p { margin: 0; font-size: 12px; color: var(--text-muted); }
  .login-tabs {
    display: flex; gap: 4px;
    background: var(--bg); padding: 4px;
    border-radius: var(--radius-sm);
    margin-bottom: 24px;
  }
  .login-tabs button {
    flex: 1; padding: 8px 12px;
    border: 0; background: transparent;
    border-radius: 6px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .login-tabs button.active {
    background: white;
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    transition: border-color .15s, box-shadow .15s;
    background: white;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
  }
  .btn-primary {
    width: 100%;
    background: var(--primary);
    color: white;
    border: 0;
    padding: 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .login-hint {
    margin-top: 16px;
    padding: 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .login-hint code {
    background: white;
    padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--text);
  }
  .login-error {
    background: var(--danger-soft);
    color: var(--danger);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .login-error.show { display: block; }

  /* ------------- 主應用版面 ------------- */
  #view-app { display: none; min-height: 100vh; }
  .app-layout { display: flex; min-height: 100vh; }

  /* 側欄 */
  .sidebar {
    width: 240px;
    background: var(--sidebar);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .sidebar-header .brand-logo {
    width: 160px;
    max-width: 100%;
    height: auto;
    display: block;
    background: white;
    padding: 6px 10px;
    border-radius: 8px;
  }
  .sidebar-header p { margin: 0; font-size: 11px; color: var(--sidebar-muted); }
  .sidebar-nav { flex: 1; padding: 0 12px; overflow-y: auto; }
  .sidebar-group {
    margin-top: 16px;
    padding: 0 8px;
    font-size: 11px;
    color: var(--sidebar-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 8px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 2px;
    border-radius: var(--radius-sm);
    color: var(--sidebar-text);
    cursor: pointer;
    font-size: 14px;
    transition: background .15s, color .15s;
    border: 0;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--sidebar-2); color: white; }
  .nav-item.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 12px rgba(99,102,241,.4);
  }
  .nav-item .icon { font-size: 16px; line-height: 1; }
  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--sidebar-2);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-footer .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 14px;
  }
  .sidebar-footer .info { flex: 1; min-width: 0; }
  .sidebar-footer .name {
    color: white;
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sidebar-footer .role {
    color: var(--sidebar-muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .logout-btn {
    margin: 0 16px 16px;
    background: var(--danger);
    color: white;
    border: 0;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-weight: 500;
    font-size: 13px;
  }
  .logout-btn:hover { background: #dc2626; }

  /* 主內容 */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
  }
  .page-header { margin-bottom: 24px; }
  .page-header h2 {
    margin: 0 0 4px;
    font-size: 24px;
    font-weight: 700;
  }
  .page-header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .page-header .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--success);
    margin-left: 12px;
  }
  .page-header .live-dot::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  /* 統計卡片 */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    padding: 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .stat-card .stat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 12px;
  }
  .stat-card .stat-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .stat-card .stat-value {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .stat-card .stat-meta {
    font-size: 12px;
    color: var(--text-muted);
  }
  .stat-card .stat-meta .up { color: var(--success); }
  .stat-card .stat-meta .down { color: var(--danger); }

  /* 篩選列 */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .pill {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    color: var(--text);
    transition: all .15s;
  }
  .pill:hover { border-color: var(--primary); color: var(--primary); }
  .pill.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .filter-spacer { flex: 1; }
  .btn-add {
    background: var(--primary);
    color: white;
    border: 0;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-add:hover { background: var(--primary-dark); }
  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .btn-ghost:hover { background: var(--bg); }

  /* 表格 */
  .table-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .table-card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .table-card-header h3 { margin: 0 0 4px; font-size: 16px; }
  .table-card-header p { margin: 0; font-size: 13px; color: var(--text-muted); }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th {
    text-align: left;
    padding: 14px 24px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    font-weight: 500;
    white-space: nowrap;
  }
  td {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:hover { background: rgba(99,102,241,.03); }
  .rank-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: white;
  }
  .rank-1 { background: #f59e0b; }
  .rank-2 { background: #94a3b8; }
  .rank-3 { background: #fb923c; }
  .rank-other { background: var(--bg); color: var(--text-muted); }
  .employee-cell { display: flex; align-items: center; gap: 12px; }
  .employee-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--primary-soft);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 13px;
  }
  .employee-name { font-weight: 500; }
  .employee-code { font-size: 12px; color: var(--text-muted); }
  .dept-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }
  .error-rate.low { color: var(--success); font-weight: 500; }
  .error-rate.mid { color: var(--warn); font-weight: 500; }
  .error-rate.high { color: var(--danger); font-weight: 500; }
  .score-cell { display: flex; align-items: center; gap: 12px; }
  .score-bar {
    width: 100px; height: 6px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .score-bar > div {
    height: 100%;
    transition: width .4s;
  }
  .score-good { background: var(--success); }
  .score-ok { background: var(--warn); }
  .score-bad { background: var(--danger); }
  .score-value { font-weight: 600; min-width: 24px; }
  .trend-up { color: var(--success); }
  .trend-flat { color: var(--text-muted); }
  .trend-down { color: var(--danger); }
  .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  tr:hover .row-actions { opacity: 1; }
  .icon-btn {
    width: 28px; height: 28px;
    border: 0;
    background: transparent;
    border-radius: 6px;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.danger:hover { background: var(--danger-soft); color: var(--danger); }
  .empty {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty .emoji { font-size: 40px; margin-bottom: 12px; }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    backdrop-filter: blur(2px);
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: white;
    border-radius: var(--radius);
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 { margin: 0; font-size: 16px; }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* 部門色塊 */
  .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform .15s;
  }
  .color-swatch:hover { transform: scale(1.05); }
  .color-swatch.selected { border-color: var(--text); }

  /* 部門卡片網格 */
  .dept-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .dept-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .dept-card .dept-color {
    width: 12px; height: 12px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  .dept-card h4 { margin: 0 0 4px; font-size: 16px; }
  .dept-card .count { font-size: 13px; color: var(--text-muted); }
  .dept-card .actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 4px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: white;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    font-size: 14px;
    z-index: 200;
    transform: translateY(100px);
    opacity: 0;
    transition: all .25s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* Dashboard overview */
  .overview-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) {
    .overview-grid { grid-template-columns: 1fr; }
    .main { padding: 20px; }
    .sidebar { width: 200px; }
  }
  .chart-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 20px;
  }
  .chart-card h3 { margin: 0 0 16px; font-size: 16px; }
  .dept-list { display: flex; flex-direction: column; gap: 12px; }
  .dept-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dept-row .label { flex: 1; font-size: 13px; }
  .dept-row .bar {
    flex: 2;
    height: 8px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .dept-row .bar > div { height: 100%; }
  .dept-row .value { font-weight: 600; font-size: 13px; min-width: 32px; text-align: right; }

  /* placeholder pages */
  .placeholder-page {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 60px;
    text-align: center;
  }
  .placeholder-page .emoji { font-size: 56px; margin-bottom: 16px; }
  .placeholder-page h3 { margin: 0 0 8px; }
  .placeholder-page p { color: var(--text-muted); margin: 0; }

  /* admin user list */
  .user-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
  }
  .user-row:first-child { border-top: 0; }
  .user-row .info { flex: 1; }
  .user-row .info .name { font-weight: 500; }
  .user-row .info .meta { font-size: 12px; color: var(--text-muted); }
  .badge-role {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .role-admin { background: var(--primary-soft); color: var(--primary); }
  .role-staff { background: var(--bg); color: var(--text-muted); }
</style>
</head>
<body>

<!-- ============== 登入頁 ============== -->
<div id="view-login">
  <div class="login-card">
    <div class="login-logo">
      <img class="brand-logo" src="logo.png" alt="元創數位">
      <p>元創數位 · 內部管理系統</p>
    </div>

    <div class="login-tabs">
      <button id="tab-login" class="active" onclick="App.switchAuthTab('login')">登入</button>
      <button id="tab-register" onclick="App.switchAuthTab('register')">註冊</button>
    </div>

    <div id="login-error" class="login-error"></div>

    <!-- 登入表單 -->
    <div id="form-login">
      <button type="button" class="btn-primary" style="margin-bottom:16px;background:linear-gradient(135deg,#6366f1,#8b5cf6)"
              onclick="window.App && App.quickAdminLogin()">
        🚀 一鍵以管理員身分登入
      </button>
      <div style="text-align:center;color:var(--text-muted);font-size:12px;margin-bottom:16px">— 或手動輸入 —</div>
      <div class="field">
        <label>帳號</label>
        <input type="text" id="login-username" autocomplete="username" value="admin">
      </div>
      <div class="field">
        <label>密碼</label>
        <input type="password" id="login-password" autocomplete="current-password" value="admin123">
      </div>
      <button type="button" class="btn-primary" onclick="window.App && App.login()">登入</button>
      <div class="login-hint" id="login-hint">
        預設管理員帳號：<code>admin</code> / 密碼：<code>admin123</code><br>
        登入後可至「帳號管理」修改密碼或新增其他帳號。<br>
        <a href="#" onclick="event.preventDefault(); App.resetAllData();" style="color:var(--primary);text-decoration:none">↻ 重設範例資料</a>
        <div id="js-status" style="margin-top:8px;color:var(--danger);font-size:11px"></div>
      </div>
    </div>

    <!-- 註冊表單 -->
    <div id="form-register" style="display:none;">
      <div class="field">
        <label>姓名</label>
        <input type="text" id="reg-name">
      </div>
      <div class="field">
        <label>帳號</label>
        <input type="text" id="reg-username" autocomplete="username">
      </div>
      <div class="field">
        <label>密碼（至少 6 碼）</label>
        <input type="password" id="reg-password" autocomplete="new-password">
      </div>
      <div class="field">
        <label>辦公室</label>
        <select id="reg-department"></select>
      </div>
      <button type="button" class="btn-primary" onclick="window.App && App.register()">建立帳號</button>
    </div>
  </div>
</div>

<!-- ============== 主應用 ============== -->

const Store = {

    users: 'ec.users',
    departments: 'ec.departments',
    employees: 'ec.employees',
    session: 'ec.session',
    seeded: 'ec.seeded.v4',
  },
  _mem: {},
  _useMem: (function() {
    // 偵測 localStorage 可用性；data: URL / 隱私模式 / 沙箱 iframe 下會失敗
    try {
      const t = '__ec_test__';
      localStorage.setItem(t, '1');
      localStorage.removeItem(t);
      return false;
    } catch { return true; }
  })(),
  get(key, fallback) {
    if (this._useMem) {
      return this._mem[key] !== undefined ? this._mem[key] : fallback;
    }
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      this._useMem = true;
      return this._mem[key] !== undefined ? this._mem[key] : fallback;
    }
  },
  set(key, value) {
    if (this._useMem) { this._mem[key] = value; return; }
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch { this._useMem = true; this._mem[key] = value; }
  },
  remove(key) {
    if (this._useMem) { delete this._mem[key]; return; }
    try { localStorage.removeItem(key); }
    catch { this._useMem = true; delete this._mem[key]; }
  },
};

/* ------------- 密碼雜湊（同步 FNV-like，非真實安全方案，僅避免明碼儲存） ------------- */
function hashPassword(pw) {
  const s = String(pw) + '::ec-dashboard::v2';
  let h1 = 0x811c9dc5 >>> 0;
  let h2 = 0x12345678 >>> 0;
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    h1 = Math.imul(h1 ^ c, 0x01000193) >>> 0;
    h2 = Math.imul((h2 + c) >>> 0, 0x85ebca6b) >>> 0;
    h2 = (h2 ^ (h2 >>> 13)) >>> 0;
  }
  return h1.toString(16).padStart(8, '0') + h2.toString(16).padStart(8, '0');
}

/* ------------- 計算效率分數（0–100） ------------- */
function computeScore(emp) {
  // 平均耗時越低、錯誤率越低、件數越高 → 分數越高
  const timeScore = Math.max(0, 100 - (emp.avgTime - 3) * 12);  // 3 分鐘為基準
  const errorScore = Math.max(0, 100 - emp.errorRate * 25);
  const volumeScore = Math.min(100, (emp.items / 750) * 100);
  const raw = timeScore * 0.35 + errorScore * 0.35 + volumeScore * 0.3;
  return Math.round(Math.max(0, Math.min(100, raw)));
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function showToast(message, type = '') {
  const t = document.getElementById('toast');
  t.textContent = message;
  t.className = `toast show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

    }
    const session = Store.get(Store.KEYS.session);
    if (session) {

    // 後門：admin / admin123 永遠可登入（不論 localStorage 狀態），同時修復資料
    if (username === 'admin' && password === 'admin123') {
      const users = Store.get(Store.KEYS.users, []);
      let admin = users.find(u => u.username === 'admin');
      if (!admin) {
        admin = { username: 'admin', password: hashPassword('admin123'),
                  name: '陳大明', role: 'admin', department: '商開' };
        users.push(admin);
      } else {
        // 修復舊版錯誤雜湊
        admin.password = hashPassword('admin123');
        admin.role = 'admin';
      }
      Store.set(Store.KEYS.users, users);
      Store.set(Store.KEYS.session, { username: 'admin' });
      this.enterApp(admin);
      return;

    const users = Store.get(Store.KEYS.users, []);

    const hash = hashPassword(password);

            <div>帳號總數　<strong style="color:var(--text);float:right">${(Store.get(Store.KEYS.users, [])).length} 個</strong></div>
            <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
              資料儲存於瀏覽器 localStorage<br>清除瀏覽器資料將會遺失所有設定
            </div>
          </div>
        </div>
      </div>
    `;
  },

  statGridHtml(totalOrders, totalItems, avgScore, avgError, empCount) {
    const avgPerPerson = empCount ? Math.round(totalItems / empCount) : 0;
    return `
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--info-soft);color:var(--info)">📋</div>
          <div class="stat-label">本週訂單處理</div>
          <div class="stat-value">${totalOrders.toLocaleString()}</div>
          <div class="stat-meta"><span class="up">↑ 8.2%</span> 較上週</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--primary-soft);color:var(--primary)">📦</div>
          <div class="stat-label">總揀貨件數</div>
          <div class="stat-value">${totalItems.toLocaleString()}</div>
          <div class="stat-meta">平均 ${avgPerPerson} 件/人</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--success-soft);color:var(--success)">⚡</div>
          <div class="stat-label">平均效率分數</div>
          <div class="stat-value">${avgScore}</div>
          <div class="stat-meta"><span class="up">↑ 2.4</span> 較上週</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--warn-soft);color:var(--warn)">⚠️</div>
          <div class="stat-label">平均錯誤率</div>
          <div class="stat-value">${avgError}%</div>
          <div class="stat-meta"><span class="down">↓ 0.3%</span> 較上週</div>
        </div>
      </div>
    `;
  },

  /* ============================================================
   *  績效管理
   * ============================================================ */
  viewEmployees() {
    const departments = Store.get(Store.KEYS.departments, []);
    const employees = Store.get(Store.KEYS.employees, []);
    const filtered = this.filter.dept === 'all'
      ? employees
      : employees.filter(e => e.department === this.filter.dept);

    const totalOrders = filtered.reduce((s, e) => s + e.orders, 0);
    const totalItems = filtered.reduce((s, e) => s + e.items, 0);
    const avgScore = filtered.length ? Math.round(filtered.reduce((s,e)=>s+computeScore(e),0) / filtered.length * 10) / 10 : 0;
    const avgError = filtered.length ? (filtered.reduce((s,e)=>s+e.errorRate,0) / filtered.length).toFixed(2) : '0';

    // 排序：分數高 → 低
    const ranked = filtered.map(e => ({ ...e, score: computeScore(e) }))
      .sort((a, b) => b.score - a.score);

    const deptMap = Object.fromEntries(departments.map(d => [d.id, d]));

    const rows = ranked.length === 0 ? `
      <tr><td colspan="9"><div class="empty"><div class="emoji">📭</div>
        <div>尚無員工資料</div>
        <div style="font-size:13px;margin-top:4px">點右上「新增員工」開始建立</div>
      </div></td></tr>
    ` : ranked.map((e, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
      const dept = deptMap[e.department];
      const errClass = e.errorRate < 1 ? 'low' : e.errorRate < 2 ? 'mid' : 'high';
      const scoreClass = e.score >= 90 ? 'score-good' : e.score >= 80 ? 'score-ok' : 'score-bad';
      const trendIcon = e.trend === 'up' ? '<span class="trend-up">↑ 上升</span>'
        : e.trend === 'down' ? '<span class="trend-down">↓ 下降</span>'
        : '<span class="trend-flat">→ 持平</span>';
      return `
        <tr>
          <td><span class="rank-badge ${rankClass}">${rank}</span></td>
          <td>
            <div class="employee-cell">
              <div class="employee-avatar">${escapeHtml(e.name.slice(0,1))}</div>
              <div>
                <div class="employee-name">${escapeHtml(e.name)}</div>
                <div class="employee-code">${escapeHtml(e.code)}</div>
              </div>
            </div>
          </td>
          <td>${dept ? `<span class="dept-tag" style="background:${dept.color}22;color:${dept.color}">${escapeHtml(dept.name)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
          <td><strong>${e.orders}</strong></td>
          <td>${e.items}</td>
          <td>${e.avgTime} 分</td>
          <td><span class="error-rate ${errClass}">${e.errorRate}%</span></td>
          <td>
            <div class="score-cell">
              <div class="score-bar"><div class="${scoreClass}" style="width:${e.score}%"></div></div>
              <span class="score-value">${e.score}</span>
            </div>
          </td>
          <td>${trendIcon}</td>
          <td>
            <div class="row-actions">
              <button class="icon-btn" title="編輯" onclick="App.openEmployeeModal('${e.id}')">✏️</button>
              <button class="icon-btn danger" title="刪除" onclick="App.deleteEmployee('${e.id}')">🗑️</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    const deptPills = `
      <button class="pill ${this.filter.dept === 'all' ? 'active' : ''}" data-dept="all">全部辦公室</button>
      ${departments.map(d => `
        <button class="pill ${this.filter.dept === d.id ? 'active' : ''}" data-dept="${d.id}">${escapeHtml(d.name)}</button>
      `).join('')}
    `;

    return `
      <div class="page-header">
        <h2>績效管理 <span class="live-dot">即時更新</span></h2>
        <p>本週倉儲與出貨團隊績效統計</p>
      </div>
      ${this.statGridHtml(totalOrders, totalItems, avgScore, avgError, filtered.length)}
      <div class="filter-bar">
        ${deptPills}
        <span style="width:1px;height:24px;background:var(--border);margin:0 4px"></span>
        <button class="pill ${this.filter.period==='week'?'active':''}" data-period="week">本週</button>
        <button class="pill ${this.filter.period==='month'?'active':''}" data-period="month">本月</button>
        <span class="filter-spacer"></span>
        <button class="btn-add" onclick="App.openEmployeeModal()">+ 新增員工</button>
      </div>
      <div class="table-card">
        <div class="table-card-header">
          <h3>員工績效明細</h3>
          <p>依效率分數排序 · 共 ${ranked.length} 人</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>排名</th><th>員工</th><th>辦公室</th><th>處理訂單</th>
                <th>揀貨件數</th><th>平均耗時</th><th>錯誤率</th>
                <th>效率分數</th><th>趨勢</th><th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  },

  bindFilterBar() {
    document.querySelectorAll('.pill[data-dept]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.dept = p.dataset.dept;
        this.render();
      });
    });
    document.querySelectorAll('.pill[data-period]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.period = p.dataset.period;
        this.render();
      });
    });
  },

  /* ------------- 員工 Modal ------------- */
  openEmployeeModal(id) {
    const employees = Store.get(Store.KEYS.employees, []);
    const departments = Store.get(Store.KEYS.departments, []);
    if (departments.length === 0) {
      showToast('系統未設定任何辦公室', 'error');
      return;
    }
    const emp = id ? employees.find(e => e.id === id) : null;
    const isEdit = !!emp;
    const e = emp || { code:'', name:'', department: departments[0].id, orders:0, items:0, avgTime:5, errorRate:1, trend:'flat' };

    this.openModal({
      title: isEdit ? '編輯員工' : '新增員工',
      bodyHtml: `
        <div class="field-row">
          <div class="field"><label>員工編號</label><input id="f-code" value="${escapeHtml(e.code)}" required></div>
          <div class="field"><label>姓名</label><input id="f-name" value="${escapeHtml(e.name)}" required></div>
        </div>
        <div class="field">
          <label>辦公室</label>
          <select id="f-dept">
            ${departments.map(d => `<option value="${d.id}" ${d.id===e.department?'selected':''}>${escapeHtml(d.name)}</option>`).join('')}
          </select>
        </div>
        <div class="field-row">
          <div class="field"><label>處理訂單</label><input type="number" id="f-orders" min="0" value="${e.orders}"></div>
          <div class="field"><label>揀貨件數</label><input type="number" id="f-items" min="0" value="${e.items}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>平均耗時（分）</label><input type="number" id="f-time" step="0.1" min="0" value="${e.avgTime}"></div>
          <div class="field"><label>錯誤率（%）</label><input type="number" id="f-error" step="0.1" min="0" value="${e.errorRate}"></div>
        </div>
        <div class="field">
          <label>趨勢</label>
          <select id="f-trend">
            <option value="up" ${e.trend==='up'?'selected':''}>↑ 上升</option>
            <option value="flat" ${e.trend==='flat'?'selected':''}>→ 持平</option>
            <option value="down" ${e.trend==='down'?'selected':''}>↓ 下降</option>
          </select>
        </div>
      `,
      onSave: () => {
        const data = {
          id: emp?.id || uid(),
          code: document.getElementById('f-code').value.trim(),
          name: document.getElementById('f-name').value.trim(),
          department: document.getElementById('f-dept').value,
          orders: +document.getElementById('f-orders').value || 0,
          items: +document.getElementById('f-items').value || 0,
          avgTime: +document.getElementById('f-time').value || 0,
          errorRate: +document.getElementById('f-error').value || 0,
          trend: document.getElementById('f-trend').value,
        };
        if (!data.code || !data.name) { showToast('請填寫員工編號與姓名', 'error'); return false; }
        const list = Store.get(Store.KEYS.employees, []);
        if (isEdit) {
          const i = list.findIndex(x => x.id === emp.id);
          list[i] = data;
        } else {
          list.push(data);
        }
        Store.set(Store.KEYS.employees, list);
        showToast(isEdit ? '已更新' : '已新增', 'success');
        this.render();
        return true;
      },
    });
  },

  deleteEmployee(id) {
    const list = Store.get(Store.KEYS.employees, []);
    const emp = list.find(e => e.id === id);
    if (!emp) return;
    if (!confirm(`確定要刪除「${emp.name}」嗎？`)) return;
    Store.set(Store.KEYS.employees, list.filter(e => e.id !== id));
    showToast('已刪除', 'success');
    this.render();
  },

  /* ============================================================
   *  各辦公室頁面（行銷 / 採購 / 商開 / 設計）
   * ============================================================ */
  viewOffice(deptId) {
    const dept = (Store.get(Store.KEYS.departments, [])).find(d => d.id === deptId);
    const cfg = OFFICE_CONFIG[deptId];
    if (!dept || !cfg) {
      return `<div class="placeholder-page"><div class="emoji">❓</div><h3>找不到此辦公室</h3></div>`;
    }
    const employees = (Store.get(Store.KEYS.employees, [])).filter(e => e.department === deptId);
    const color = dept.color;

    const statCards = cfg.stats.map(s => `
      <div class="stat-card">
        <div class="stat-icon" style="background:${color}22;color:${color}">${s.icon}</div>
        <div class="stat-label">${escapeHtml(s.label)}</div>
        <div class="stat-value">${escapeHtml(s.value)}</div>
        <div class="stat-meta">${escapeHtml(s.meta)}</div>
      </div>
    `).join('');

    const sectionTables = cfg.sections.map(sec => `
      <div class="table-card" style="margin-bottom:16px">
        <div class="table-card-header"><h3>${escapeHtml(sec.title)}</h3></div>
        <div class="table-wrap">
          <table>
            <thead><tr>${cfg.sectionHeads.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
            <tbody>
              ${sec.rows.map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `).join('');

    const memberRows = employees.length === 0
      ? `<tr><td colspan="6"><div class="empty"><div class="emoji">📭</div>此辦公室目前沒有成員</div></td></tr>`
      : employees.map(e => {
          const score = computeScore(e);
          const scoreClass = score >= 90 ? 'score-good' : score >= 80 ? 'score-ok' : 'score-bad';
          return `
            <tr>
              <td>
                <div class="employee-cell">
                  <div class="employee-avatar">${escapeHtml(e.name.slice(0,1))}</div>
                  <div>
                    <div class="employee-name">${escapeHtml(e.name)}</div>
                    <div class="employee-code">${escapeHtml(e.code)}</div>
                  </div>
                </div>
              </td>
              <td><strong>${e.orders}</strong></td>
              <td>${e.items}</td>
              <td>${e.avgTime} 分</td>
              <td>${e.errorRate}%</td>
              <td>
                <div class="score-cell">
                  <div class="score-bar"><div class="${scoreClass}" style="width:${score}%"></div></div>
                  <span class="score-value">${score}</span>
                </div>
              </td>
            </tr>
          `;
        }).join('');

    return `
      <div class="page-header">
        <h2>
          <span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${color};vertical-align:middle;margin-right:8px"></span>
          ${cfg.icon} ${escapeHtml(dept.name)}辦公室
        </h2>
        <p>${escapeHtml(cfg.subtitle)}</p>
      </div>
      <div class="stat-grid">${statCards}</div>
      ${sectionTables}
      <div class="table-card">
        <div class="table-card-header">
          <h3>${escapeHtml(dept.name)}成員</h3>
          <p>共 ${employees.length} 人</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>員工</th><th>處理訂單</th><th>件數</th><th>平均耗時</th><th>錯誤率</th><th>效率分數</th></tr>
            </thead>
            <tbody>${memberRows}</tbody>
          </table>
        </div>
      </div>
    `;
  },

  /* ============================================================
   *  帳號管理（管理員）
   * ============================================================ */
  viewUsers() {
    if (this.currentUser.role !== 'admin') {
      return `<div class="placeholder-page"><div class="emoji">🔒</div><h3>權限不足</h3><p>僅管理員可存取此頁面</p></div>`;
    }
    const users = Store.get(Store.KEYS.users, []);
    const rows = users.map(u => `
      <div class="user-row">
        <div class="employee-avatar">${escapeHtml(u.name.slice(0,1))}</div>
        <div class="info">
          <div class="name">${escapeHtml(u.name)} <span class="badge-role ${u.role==='admin'?'role-admin':'role-staff'}">${u.role==='admin'?'管理員':'員工'}</span></div>
          <div class="meta">@${escapeHtml(u.username)} · ${escapeHtml(u.department)}</div>
        </div>
        <button class="icon-btn" title="編輯" onclick="App.openUserModal('${escapeHtml(u.username)}')">✏️</button>
        ${u.username === this.currentUser.username
          ? ''
          : `<button class="icon-btn danger" title="刪除" onclick="App.deleteUser('${escapeHtml(u.username)}')">🗑️</button>`}
      </div>
    `).join('');

    return `
      <div class="page-header">
        <h2>帳號管理</h2>
        <p>建立、編輯系統使用者帳號</p>
      </div>
      <div class="filter-bar">
        <span class="filter-spacer"></span>
        <button class="btn-add" onclick="App.openUserModal()">+ 新增帳號</button>
      </div>
      <div class="table-card">${rows || '<div class="empty"><div class="emoji">👥</div>尚無帳號</div>'}</div>
    `;
  },

  openUserModal(username) {
    const users = Store.get(Store.KEYS.users, []);
    const user = username ? users.find(u => u.username === username) : null;
    const isEdit = !!user;
    const departments = Store.get(Store.KEYS.departments, []);
    const u = user || { username:'', name:'', role:'staff', department: departments[0]?.name || '' };

    this.openModal({
      title: isEdit ? '編輯帳號' : '新增帳號',
      bodyHtml: `
        <div class="field"><label>姓名</label><input id="f-uname" value="${escapeHtml(u.name)}" required></div>
        <div class="field">
          <label>帳號</label>
          <input id="f-uusername" value="${escapeHtml(u.username)}" ${isEdit?'readonly':''} required>
        </div>
        <div class="field">
          <label>${isEdit ? '新密碼（留空保留原密碼）' : '密碼（至少 6 碼）'}</label>
          <input type="password" id="f-upassword" ${isEdit?'':'required minlength="6"'}>
        </div>
        <div class="field-row">
          <div class="field">
            <label>權限</label>
            <select id="f-urole">
              <option value="staff" ${u.role==='staff'?'selected':''}>員工</option>
              <option value="admin" ${u.role==='admin'?'selected':''}>管理員</option>
            </select>
          </div>
          <div class="field">
            <label>辦公室</label>
            <select id="f-udept">
              ${departments.map(d => `<option value="${escapeHtml(d.name)}" ${d.name===u.department?'selected':''}>${escapeHtml(d.name)}</option>`).join('')}
            </select>
          </div>
        </div>
      `,
      onSave: () => {
        const name = document.getElementById('f-uname').value.trim();
        const usernameNew = document.getElementById('f-uusername').value.trim();
        const password = document.getElementById('f-upassword').value;
        const role = document.getElementById('f-urole').value;
        const department = document.getElementById('f-udept').value;
        if (!name || !usernameNew) { showToast('請填寫姓名與帳號', 'error'); return false; }
        const list = Store.get(Store.KEYS.users, []);
        if (!isEdit && list.some(x => x.username === usernameNew)) { showToast('帳號已存在', 'error'); return false; }
        if (isEdit) {
          const i = list.findIndex(x => x.username === user.username);
          list[i].name = name;
          list[i].role = role;
          list[i].department = department;
          if (password) {
            if (password.length < 6) { showToast('密碼至少 6 碼', 'error'); return false; }
            list[i].password = hashPassword(password);
          }
        } else {
          if (password.length < 6) { showToast('密碼至少 6 碼', 'error'); return false; }
          list.push({ username: usernameNew, name, role, department, password: hashPassword(password) });
        }
        Store.set(Store.KEYS.users, list);

        // 若編輯的是當前登入者，更新側欄
        if (isEdit && user.username === this.currentUser.username) {
          this.currentUser.name = name;
          this.currentUser.role = role;
          this.currentUser.department = department;
          document.getElementById('user-name').textContent = name;
          document.getElementById('user-role').textContent =
            (role === 'admin' ? '管理員' : '員工') + '・' + department;
          document.getElementById('user-avatar').textContent = name.slice(0, 1);
        }

        showToast(isEdit ? '已更新' : '已新增', 'success');
        this.render();
        return true;
      },
    });
  },

  deleteUser(username) {
    if (username === this.currentUser.username) {
      showToast('不能刪除自己的帳號', 'error');
      return;
    }
    const list = Store.get(Store.KEYS.users, []);
    const user = list.find(u => u.username === username);
    if (!user) return;
    if (!confirm(`確定要刪除帳號「${user.name}」？`)) return;
    Store.set(Store.KEYS.users, list.filter(u => u.username !== username));
    showToast('已刪除', 'success');
    this.render();
  },

  /* ============================================================
   *  通用 Modal
   * ============================================================ */
  openModal({ title, bodyHtml, onSave, onMount }) {
    const modal = document.getElementById('modal');
    modal.innerHTML = `
      <div class="modal-header">
        <h3>${escapeHtml(title)}</h3>
        <button class="icon-btn" onclick="App.closeModal()">✕</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="App.closeModal()">取消</button>
        <button class="btn-primary" style="width:auto;padding:10px 20px" id="modal-save">儲存</button>
      </div>
    `;
    document.getElementById('modal-backdrop').classList.add('show');
    if (onMount) onMount();
    document.getElementById('modal-save').onclick = () => {
      const ok = onSave();
      if (ok) this.closeModal();
    };
  },

  closeModal() {
    document.getElementById('modal-backdrop').classList.remove('show');
  },

  closeModalOnBackdrop(e) {
    if (e.target.id === 'modal-backdrop') this.closeModal();
  },
};

window.App = App;
try {
  App.init();
  // 顯示成功訊息（綠色），讓使用者知道 JS 跑完了
  document.addEventListener('DOMContentLoaded', function() {
    var box = document.getElementById('js-status');
    if (box && !box.textContent) {
      box.style.color = 'var(--success)';
      box.textContent = '✓ 系統就緒，可直接按「登入」或「一鍵登入」';
    }
  });
  // DOMContentLoaded 可能已經過了，直接也設一次
  setTimeout(function() {
    var box = document.getElementById('js-status');
    if (box && !box.textContent) {
      box.style.color = '#10b981';
      box.textContent = '✓ 系統就緒，可直接按「登入」或「一鍵登入」';
    }
  }, 50);
} catch (err) {
  alert('App 初始化失敗：' + err.message + '\n\n' + err.stack);
  var box = document.getElementById('js-status');
  if (box) box.textContent = '⚠ 初始化失敗：' + err.message;
}
</script>
</body>
</html>
