<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 禁止瀏覽器快取主檔，確保每次都拿最新版（解決使用者看到舊版的問題） -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- 版本號（每次部署都會變），給 JS 端的版本檢查使用 -->
<meta name="app-version" content="2026-06-11-29">
<title>元創 · 管理系統</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='12' fill='white'/%3E%3Ctext x='50' y='72' font-family='Helvetica,Arial,sans-serif' font-size='62' font-weight='900' text-anchor='middle' fill='%2329A89C' letter-spacing='-2'%3EYC%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --sidebar: #0f172a;
    --sidebar-2: #1e293b;
    --sidebar-text: #e2e8f0;
    --sidebar-muted: #94a3b8;
    --primary: #4f46e5;
    --primary-soft: #eef2ff;
    --primary-dark: #4338ca;
    --border: #e5e7eb;
    --text: #111827;
    --text-muted: #6b7280;
    --success: #10b981;
    --success-soft: #d1fae5;
    --warn: #f59e0b;
    --warn-soft: #fef3c7;
    --danger: #ef4444;
    --danger-soft: #fee2e2;
    --info: #3b82f6;
    --info-soft: #dbeafe;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
    --shadow: 0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg: 0 10px 25px -5px rgba(15,23,42,.1), 0 8px 10px -6px rgba(15,23,42,.05);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family:
      "Microsoft JhengHei", "微軟正黑體",
      "PingFang TC", "蘋方-繁",
      "Heiti TC", "黑體-繁",
      "Noto Sans TC", "思源黑體",
      -apple-system, BlinkMacSystemFont, "Segoe UI",
      sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  /* 全站統一使用黑體 family，覆蓋 Inna 的 profit 區塊內 body 樣式 */
  body, button, input, select, textarea, table, h1, h2, h3, h4, h5, h6, p, div, span, td, th {
    font-family:
      "Microsoft JhengHei", "微軟正黑體",
      "PingFang TC", "蘋方-繁",
      "Heiti TC", "黑體-繁",
      "Noto Sans TC", "思源黑體",
      -apple-system, BlinkMacSystemFont, "Segoe UI",
      sans-serif;
  }
  /* 數字仍用 tabular nums 對齊；黑體仍保有 */
  [style*="tabular-nums"], .nums, td, th {
    font-variant-numeric: tabular-nums;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }
  /* 移除 number input 預設上下箭頭（spinner） */
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* ------------- 登入頁 ------------- */
  #view-login {
    min-height: 100vh;
    display: none;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
    padding: 24px;
  }
  /* 全屏載入遮罩（同步啟動，啟動完才隱藏，避免 view-login 或部分 UI 閃現） */
  #view-boot {
    position: fixed;
    inset: 0;
    background: #fcfcfd;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
    transition: opacity .18s ease;
  }
  #view-boot.hide { opacity: 0; pointer-events: none; }
  #view-boot .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e5e7eb;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .45s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
  }
  .login-logo {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 28px;
  }
  .login-logo .brand-logo {
    width: 220px;
    max-width: 100%;
    height: auto;
    display: block;
  }
  .login-logo p { margin: 0; font-size: 12px; color: var(--text-muted); }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    transition: border-color .15s, box-shadow .15s;
    background: white;
    color: var(--text);
    font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
  }
  .btn-primary {
    width: 100%;
    background: var(--primary);
    color: white;
    border: 0;
    padding: 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .login-hint {
    margin-top: 16px;
    padding: 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .login-hint code {
    background: white;
    padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--text);
  }
  .login-error {
    background: var(--danger-soft);
    color: var(--danger);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .login-error.show { display: block; }

  /* ------------- 主應用版面 ------------- */
  #view-app { display: none; min-height: 100vh; }
  .app-layout { display: flex; min-height: 100vh; }

  /* 側欄 */
  .sidebar {
    width: 240px;
    background: var(--sidebar);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width .25s ease;
    overflow: hidden;
  }
  body.sidebar-collapsed .sidebar { width: 0; }
  body.sidebar-collapsed .sidebar > * { opacity: 0; pointer-events: none; }
  /* 收合後右側畫面整體等比放大（zoom 兼容性更好，不會破壞 flex/fixed） */
  .main { transition: zoom .25s ease; }
  body.sidebar-collapsed .main { zoom: 1.12; }
  /* 收合按鈕：浮在側欄外側邊緣，永遠可見 */
  .sidebar-toggle {
    position: fixed;
    top: 18px;
    left: 226px; /* 240 - 14 = 226，按鈕剛好騎在邊緣 */
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: white;
    color: var(--text-muted);
    border: 1px solid var(--border);
    box-shadow: 0 2px 6px rgba(0,0,0,.08);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: left .25s ease, background-color .15s ease, color .15s ease, box-shadow .15s ease;
    font-weight: 600;
  }
  .sidebar-toggle:hover {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
    box-shadow: 0 3px 10px rgba(99,102,241,.35);
  }
  .sidebar-toggle:active { transform: translateY(1px); }
  body.sidebar-collapsed .sidebar-toggle { left: 8px; }
  .sidebar-header {
    padding: 16px 20px 14px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }
  .sidebar-header .brand-logo {
    width: 96px;
    max-width: 100%;
    height: auto;
    display: block;
    background: transparent;
  }
  .sidebar-header p { margin: 0; font-size: 10px; color: var(--sidebar-muted); letter-spacing: .02em; }
  .sidebar-nav { flex: 1; padding: 0 12px; overflow-y: auto; }
  .sidebar-group {
    margin-top: 16px;
    padding: 0 8px;
    font-size: 11px;
    color: var(--sidebar-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 8px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 12px 14px;
    margin-bottom: 2px;
    border-radius: var(--radius-sm);
    color: var(--sidebar-text);
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    transition: background .15s, color .15s;
    border: 0;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .nav-item .icon { font-size: 18px; }
  .nav-item:hover { background: var(--sidebar-2); color: white; }
  .nav-item.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 12px rgba(99,102,241,.4);
  }
  .nav-item.nav-parent .nav-chevron {
    font-size: 12px;
    color: var(--sidebar-muted);
    transition: transform .2s;
    margin-left: 4px;
  }
  .nav-item.nav-parent.expanded .nav-chevron { transform: rotate(180deg); }
  .nav-sub-group {
    overflow: hidden;
    max-height: 0;
    transition: max-height .25s ease;
  }
  .nav-sub-group.expanded {
    max-height: 300px;
  }
  .nav-item.nav-sub {
    padding: 10px 14px 10px 46px;
    font-size: 15px;
    color: var(--sidebar-text);
    margin-bottom: 1px;
    font-weight: 500;
    position: relative;
  }
  .nav-item.nav-sub::before {
    content: '';
    position: absolute;
    left: 30px;
    top: 50%;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--sidebar-muted);
    transform: translateY(-50%);
    opacity: .5;
  }
  .nav-item.nav-sub:hover { color: white; background: var(--sidebar-2); }
  .nav-item.nav-sub:hover::before { background: white; opacity: 1; }
  .nav-item.nav-sub.active {
    background: var(--sidebar-2);
    color: white;
    box-shadow: none;
    font-weight: 600;
  }
  .nav-item.nav-sub.active::before {
    background: var(--primary);
    opacity: 1;
    width: 6px;
    height: 6px;
  }
  .nav-item.nav-sub .icon { display:none; }
  .nav-item .icon { font-size: 16px; line-height: 1; }
  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--sidebar-2);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-footer .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 14px;
  }
  .sidebar-footer .info { flex: 1; min-width: 0; }
  .sidebar-footer .name {
    color: white;
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sidebar-footer .role {
    color: var(--sidebar-muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .logout-btn {
    margin: 0 16px 16px;
    background: var(--danger);
    color: white;
    border: 0;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-weight: 500;
    font-size: 13px;
  }
  .logout-btn:hover { background: #dc2626; }

  /* 主內容 */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
  }
  .page-header { margin-bottom: 18px; }
  .page-header h2 {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -.01em;
  }
  .page-header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 13px;
  }
  .page-header .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--success);
    margin-left: 12px;
  }
  .page-header .live-dot::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  /* 統計卡片 */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    padding: 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .stat-card .stat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 12px;
  }
  .stat-card .stat-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .stat-card .stat-value {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .stat-card .stat-meta {
    font-size: 12px;
    color: var(--text-muted);
  }
  .stat-card .stat-meta .up { color: var(--success); }
  .stat-card .stat-meta .down { color: var(--danger); }

  /* 篩選列 */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .pill {
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    transition: all .15s;
  }
  .pill:hover { color: var(--text); border-color: #d1d5db; }
  .pill.active {
    background: var(--text);
    color: white;
    border-color: var(--text);
    border-color: var(--primary);
  }
  .filter-spacer { flex: 1; }
  .btn-add {
    background: var(--primary);
    color: white;
    border: 0;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-add:hover { background: var(--primary-dark); }
  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .btn-ghost:hover { background: var(--bg); }

  /* 表格 */
  .table-card {
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: none;
    overflow: hidden;
  }
  .table-card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .table-card-header h3 { margin: 0 0 4px; font-size: 16px; }
  .table-card-header p { margin: 0; font-size: 13px; color: var(--text-muted); }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th {
    text-align: left;
    padding: 14px 24px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    font-weight: 500;
    white-space: nowrap;
  }
  td {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:hover { background: rgba(99,102,241,.03); }
  .rank-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: white;
  }
  .rank-1 { background: #f59e0b; }
  .rank-2 { background: #94a3b8; }
  .rank-3 { background: #fb923c; }
  .rank-other { background: var(--bg); color: var(--text-muted); }
  .employee-cell { display: flex; align-items: center; gap: 12px; }
  .employee-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--primary-soft);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 13px;
  }
  .employee-name { font-weight: 500; }
  .employee-code { font-size: 12px; color: var(--text-muted); }
  .dept-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }
  .error-rate.low { color: var(--success); font-weight: 500; }
  .error-rate.mid { color: var(--warn); font-weight: 500; }
  .error-rate.high { color: var(--danger); font-weight: 500; }
  .score-cell { display: flex; align-items: center; gap: 12px; }
  .score-bar {
    width: 100px; height: 6px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .score-bar > div {
    height: 100%;
    transition: width .4s;
  }
  .score-good { background: var(--success); }
  .score-ok { background: var(--warn); }
  .score-bad { background: var(--danger); }
  .score-value { font-weight: 600; min-width: 24px; }
  .trend-up { color: var(--success); }
  .trend-flat { color: var(--text-muted); }
  .trend-down { color: var(--danger); }
  .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  tr:hover .row-actions { opacity: 1; }
  .icon-btn {
    width: 28px; height: 28px;
    border: 0;
    background: transparent;
    border-radius: 6px;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.danger:hover { background: var(--danger-soft); color: var(--danger); }
  .empty {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty .emoji { font-size: 40px; margin-bottom: 12px; }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    backdrop-filter: blur(2px);
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: white;
    border-radius: var(--radius);
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 { margin: 0; font-size: 16px; }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* 部門色塊 */
  .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform .15s;
  }
  .color-swatch:hover { transform: scale(1.05); }
  .color-swatch.selected { border-color: var(--text); }

  /* 部門卡片網格 */
  .dept-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .dept-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .dept-card .dept-color {
    width: 12px; height: 12px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  .dept-card h4 { margin: 0 0 4px; font-size: 16px; }
  .dept-card .count { font-size: 13px; color: var(--text-muted); }
  .dept-card .actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;

<!-- ============== 自動清快取（讓所有電腦點網址就能拿到最新版） ============== -->
<script>
(function autoRefreshOnVersionChange(){
  try {
    const META_VERSION = document.querySelector('meta[name="app-version"]')?.content || '';
    if (!META_VERSION) return;

    // 1) 清掉所有可能阻擋更新的 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      }).catch(()=>{});
    }

    // 2) 比對版本：跟 localStorage 存的舊版號比對
    let lastVer = '';
    try { lastVer = localStorage.getItem('__app_version') || ''; } catch {}
    if (lastVer === META_VERSION) {
      console.log('[version] 目前已是最新版', META_VERSION);
      return;
    }

    console.warn('[version] 偵測到新版！舊:', lastVer || '(無)', '→ 新:', META_VERSION);

    // 3) 清掉 Cache API 裡所有舊資源
    if ('caches' in window) {
      caches.keys().then(names => {
        return Promise.all(names.map(n => {
          console.warn('[version] 清掉舊 cache:', n);
          return caches.delete(n);
        }));
      }).then(() => {
        try { localStorage.setItem('__app_version', META_VERSION); } catch {}
        // 第一次部署時 lastVer 是空的，避免無限重載
        if (lastVer && lastVer !== META_VERSION) {
          console.warn('[version] 即將自動重載...');
          location.reload();
        }
      }).catch(err => {
        console.warn('[version] 清 cache 失敗：', err);
        try { localStorage.setItem('__app_version', META_VERSION); } catch {}
      });
    } else {
      try { localStorage.setItem('__app_version', META_VERSION); } catch {}
    }
  } catch (e) { console.warn('[version] 檢測例外', e); }
})();
</script>

<script>
/* =========================================================================

// 全域錯誤捕捉：把任何 JS 錯誤顯示在登入頁，避免無聲失敗
window.addEventListener('error', function(e) {

const Store = {
  KEYS: {
    users: 'ec.users',
    departments: 'ec.departments',
    employees: 'ec.employees',
    platforms: 'ec.platforms',
    platformsBackup: 'ec.platformsBackup',
    dailyTasks: 'ec.dailyTasks',
    session: 'ec.session',
    seeded: 'ec.seeded.v5',
  },
  _mem: {},
  _useMem: (function() {
    // 偵測 localStorage 可用性；data: URL / 隱私模式 / 沙箱 iframe 下會失敗
    try {
      const t = '__ec_test__';
      localStorage.setItem(t, '1');
      localStorage.removeItem(t);
      return false;
    } catch { return true; }
  })(),
  get(key, fallback) {
    if (this._useMem) {
      return this._mem[key] !== undefined ? this._mem[key] : fallback;
    }
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      this._useMem = true;
      return this._mem[key] !== undefined ? this._mem[key] : fallback;
    }
  },
  set(key, value) {
    if (this._useMem) { this._mem[key] = value; return; }
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch { this._useMem = true; this._mem[key] = value; }
  },
  remove(key) {
    if (this._useMem) { delete this._mem[key]; return; }
    try { localStorage.removeItem(key); }
    catch { this._useMem = true; delete this._mem[key]; }
  },
};

/* ------------- 密碼雜湊（同步 FNV-like，非真實安全方案，僅避免明碼儲存） ------------- */
function hashPassword(pw) {
  const s = String(pw) + '::ec-dashboard::v2';
  let h1 = 0x811c9dc5 >>> 0;
  let h2 = 0x12345678 >>> 0;
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    h1 = Math.imul(h1 ^ c, 0x01000193) >>> 0;
    h2 = Math.imul((h2 + c) >>> 0, 0x85ebca6b) >>> 0;
    h2 = (h2 ^ (h2 >>> 13)) >>> 0;
  }
  return h1.toString(16).padStart(8, '0') + h2.toString(16).padStart(8, '0');
}

/* ------------- 種子資料（冪等，只補缺漏，不覆蓋使用者輸入） -------------
 * 每次載入都會跑，但只在某個鍵不存在時才寫入預設值；
 * 加上對舊版員工資料 schema（orders/items/...）的就地遷移。
 * 想完全重置請按登入頁的「↻ 重設範例資料」。
 */
function seedData() {
  const defaultPwHash = hashPassword('admin123');

  // Users：若沒有任何 admin 帳號才補上預設 admin；同時補齊缺漏的 Q1–Q4 欄位
  const users = Store.get(Store.KEYS.users, []);
  let usersChanged = false;
  if (!users.some(u => u.role === 'admin')) {
    users.push({ username: 'admin', password: defaultPwHash, name: '陳大明', role: 'admin', departments: [], q1: null, q2: null, q3: null, q4: null });
    usersChanged = true;
  }
  users.forEach(u => {
    if (!('q1' in u)) { u.q1 = null; usersChanged = true; }
    if (!('q2' in u)) { u.q2 = null; usersChanged = true; }
    if (!('q3' in u)) { u.q3 = null; usersChanged = true; }
    if (!('q4' in u)) { u.q4 = null; usersChanged = true; }
    // 將舊版單一 department 字串遷移為 departments 陣列
    if (!Array.isArray(u.departments)) {
      u.departments = u.department ? [u.department] : [];
      usersChanged = true;
    }
  });
  if (usersChanged) Store.set(Store.KEYS.users, users);

  // Departments：完全沒有才補預設 4 個辦公室
  const departments = Store.get(Store.KEYS.departments);
  if (!departments || departments.length === 0) {
    Store.set(Store.KEYS.departments, [
      { id: 'd1', name: '行銷', color: '#ec4899' },
      { id: 'd2', name: '採購', color: '#10b981' },
      { id: 'd3', name: '商開', color: '#6366f1' },
      { id: 'd4', name: '設計', color: '#8b5cf6' },
    ]);
  }

  // 績效管理已直接讀取使用者帳號，不再需要獨立的 employees 資料；
  // 舊版的 ec.employees 留在 localStorage 不會影響運作。

  Store.set(Store.KEYS.seeded, true);
}

/* ------------- 計算年度績效分數（Q1–Q4 平均，0–100） ------------- */
function computeScore(emp) {
  const qs = [emp.q1, emp.q2, emp.q3, emp.q4].filter(q => typeof q === 'number' && !isNaN(q));
  if (qs.length === 0) return 0;
  return Math.round(qs.reduce((s, q) => s + q, 0) / qs.length);
}
function getQuarterScore(emp, q) {
  const v = emp[q];
  return typeof v === 'number' && !isNaN(v) ? v : null;
}
// 取得使用者所屬辦公室清單（相容舊欄位 department）
function getUserDepts(user) {
  if (!user) return [];
  if (Array.isArray(user.departments)) return user.departments.filter(Boolean);
  if (user.department) return [user.department];
  return [];
}
function getUserDeptLabel(user) {
  const list = getUserDepts(user);
  return list.length ? list.join('・') : '全公司';
}
function canAccessOffice(user, dept) {
  if (!user || !dept) return false;
  if (user.role === 'admin') return true;
  if (user.crossOfficeAccess === true) return true;
  return getUserDepts(user).includes(dept.name);
}

function trendFromQuarters(emp) {
  const a = emp.q3, b = emp.q4;
  if (typeof a !== 'number' || typeof b !== 'number') return 'flat';
  if (b - a >= 2) return 'up';
  if (a - b >= 2) return 'down';
  return 'flat';
}

/* ------------- 日期工具 ------------- */
function toDateStr(d) {
  // local-time YYYY-MM-DD (避免 toISOString 的 UTC 偏差導致跨日)
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function eachDay(startStr, endStr, fn) {
  const start = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T00:00:00');
  for (let d = start; d <= end; d = addDays(d, 1)) fn(toDateStr(d));
}
function sumDaily(daily, startStr, endStr) {
  if (!daily || !startStr || !endStr || startStr > endStr) return 0;
  let s = 0; eachDay(startStr, endStr, k => { s += +daily[k] || 0; });
  return s;
}
function getRangeDates(range, customStart, customEnd) {
  const now = new Date();
  const today = toDateStr(now);
  if (range === 'today')     return { start: today, end: today, label: '今日' };
  if (range === 'yesterday') { const y = toDateStr(addDays(now, -1)); return { start: y, end: y, label: '昨日' }; }
  if (range === 'week') {
    // 本週週一 → 今天
    const dow = now.getDay() || 7; // Sun=0→7, Mon=1, ... Sat=6
    return { start: toDateStr(addDays(now, -(dow - 1))), end: today, label: '本週' };
  }
  if (range === 'month') {
    const m1 = new Date(now.getFullYear(), now.getMonth(), 1);
    return { start: toDateStr(m1), end: today, label: '本月' };
  }
  if (range === 'custom') {
    const s = customStart || toDateStr(addDays(now, -6));
    const e = customEnd   || today;
    const label = (s === e) ? s.replace(/-/g, '/') : `${s.replace(/-/g, '/')} ~ ${e.replace(/-/g, '/')}`;
    return { start: s, end: e, label };
  }
  return { start: today, end: today, label: '今日' };
}

/* ------------- 平台資料遷移：舊 schema → 每日序列 daily{} -------------
 * 只做 schema 轉換：保留已有的 daily 資料；缺欄位時補空物件 {}。
 * **不再自動補假資料**（避免顯示沒填過的日期還有數字）。
 */
function migratePlatforms(platforms) {
  if (!Array.isArray(platforms)) return platforms;
  let changed = false;
  const out = platforms.map(p => {
    if (p.daily && typeof p.daily === 'object') {
      return p; // 已是新版（不論是否為空）
    }
    changed = true;
    return { name: p.name, icon: p.icon, color: p.color, daily: {}, dailyAdSpend: p.dailyAdSpend || {} };
  });
  return changed ? out : platforms;
}

}

}

  // 若不知為何沒有任何使用者，自動補回預設 admin（避免被鎖在外面）
  ensureAdmin() {
    const users = Store.get(Store.KEYS.users, []);
    if (users.length === 0) {
      Store.set(Store.KEYS.users, [{
        username: 'admin',
        password: hashPassword('admin123'),
        name: '陳大明',
        role: 'admin',
        departments: [],
      }]);

  },

  bindNav() {
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        // 父層 toggle 按鈕：只展開/收合子項，不導航
        if (btn.dataset.toggleGroup) {
          const groupKey = btn.dataset.toggleGroup;
          const group = document.querySelector(`.nav-sub-group[data-group="${groupKey}"]`);
          const expanded = btn.classList.toggle('expanded');
          if (group) group.classList.toggle('expanded', expanded);
          return;
        }
        if (btn.dataset.route) this.navigate(btn.dataset.route);
      });
    });
  },

  /* ------------- 側欄收合 ------------- */
  bindSidebarToggle() {
    const btn = document.getElementById('sidebar-toggle-btn');
    if (!btn) return;
    // 還原上次的狀態
    try {
      if (localStorage.getItem('ec.sidebarCollapsed') === '1') {
        document.body.classList.add('sidebar-collapsed');
      }
    } catch {}
    const updateIcon = () => {
      btn.textContent = document.body.classList.contains('sidebar-collapsed') ? '›' : '‹';
    };
    updateIcon();
    btn.addEventListener('click', () => {
      const collapsed = document.body.classList.toggle('sidebar-collapsed');
      try { localStorage.setItem('ec.sidebarCollapsed', collapsed ? '1' : '0'); } catch {}
      updateIcon();
    });
  },

  /* ------------- 登入 ------------- */
  showLogin() {
    document.getElementById('view-login').style.display = 'flex';
    document.getElementById('view-app').style.display = 'none';
    this._hideBoot();
  },

  /* 隱藏全屏載入遮罩（淡出後移除）*/
  _hideBoot() {
    const el = document.getElementById('view-boot');
    if (!el) return;
    el.classList.add('hide');
    setTimeout(() => { try { el.parentNode && el.parentNode.removeChild(el); } catch {} }, 220);
  },

  showAuthError(msg) {
    const e = document.getElementById('login-error');
    e.textContent = msg;
    e.classList.add('show');
  },

  login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const ulow = username.toLowerCase();

    // 後門：admin / admin123 永遠可登入（不論 localStorage 狀態），同時修復資料
    if (ulow === 'admin' && password === 'admin123') {
      const users = Store.get(Store.KEYS.users, []);
      let admin = users.find(u => u.username.toLowerCase() === 'admin');
      if (!admin) {
        admin = { username: 'admin', password: hashPassword('admin123'),
                  name: '陳大明', role: 'admin', departments: [] };
        users.push(admin);
      } else {
        // 修復舊版錯誤雜湊
        admin.password = hashPassword('admin123');
        admin.role = 'admin';
      }
      Store.set(Store.KEYS.users, users);
      Store.set(Store.KEYS.session, { username: admin.username });
      this.enterApp(admin);
      return;
    }

    const users = Store.get(Store.KEYS.users, []);
    const user = users.find(u => u.username.toLowerCase() === ulow);
    if (!user) { this.showAuthError('帳號不存在'); return; }
    const hash = hashPassword(password);
    if (hash !== user.password) { this.showAuthError('密碼錯誤'); return; }
    Store.set(Store.KEYS.session, { username: user.username });
    this.enterApp(user);
  },

  logout() {
    if (!confirm('確定要登出嗎？')) return;
    Store.remove(Store.KEYS.session);
    this.currentUser = null;
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    this.showLogin();
  },

  /* ------------- 進入主應用 ------------- */
  enterApp(user) {
    this.currentUser = user;
    // 1) 先把使用者資訊套到側欄（avatar / 名字 / 權限），讓 view-app 一顯示就是正確的樣子
    this.applyUserPerms(user);
    // 2) 還原上次瀏覽的路由 - 雙重儲存 (sessionStorage 先, 再 localStorage)
    let savedRoute = 'dashboard';
    try {
      const r = sessionStorage.getItem('ec.lastRoute') || localStorage.getItem('ec.lastRoute');
      if (r) savedRoute = r;
    } catch {}
    if (savedRoute && savedRoute !== 'dashboard') {
      const ok = this._isRouteAllowed(savedRoute, user);
      if (!ok) savedRoute = 'dashboard';
    }
    // 3) 先把目標頁面渲染好（不顯示），再一次切換 view-login → view-app
    this.route = savedRoute;
    try { localStorage.setItem('ec.lastRoute', savedRoute); } catch {}
    try { sessionStorage.setItem('ec.lastRoute', savedRoute); } catch {}
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.route === savedRoute);
    });
    if (savedRoute.startsWith('office-d1')) {
      const parent = document.querySelector('[data-toggle-group="d1"]');
      const group = document.querySelector('.nav-sub-group[data-group="d1"]');
      if (parent) parent.classList.add('expanded');
      if (group) group.classList.add('expanded');
    }
    this.render();
    // 4) 最後才切顯示，畫面已經是目標頁的樣子，不會閃 "?" 或首頁
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-app').style.display = 'block';
    this._hideBoot();
    this.startMidnightWatcher();
  },

  _isRouteAllowed(route, user) {
    if (route === 'dashboard') return true;
    if (route === 'employees') return true;
    if (route === 'users') return user.role === 'admin';
    if (route.startsWith('office-')) {
      const rest = route.slice('office-'.length);
      const firstDash = rest.indexOf('-');
      const deptId = firstDash > 0 ? rest.slice(0, firstDash) : rest;
      const departments = Store.get(Store.KEYS.departments, []);
      const dept = departments.find(d => d.id === deptId);
      return canAccessOffice(user, dept);
    }
    return true;
  },

  /* ------------- 跨日自動 reset：每分鐘檢查「昨日」是否變了 ------------- */
  startMidnightWatcher() {
    if (this._midnightTimer) return;
    this._lastInputDate = toDateStr(addDays(new Date(), -1));
    this._midnightTimer = setInterval(() => {
      const nowYesterday = toDateStr(addDays(new Date(), -1));
      if (nowYesterday === this._lastInputDate) return;
      // 跨日了，自動重新渲染（如果使用者正在打字就不要打斷）
      const active = document.activeElement;
      const inOurInput = active && active.tagName === 'INPUT' && (
        active.classList.contains('card-rev') || active.classList.contains('card-ads')
      );
      const hasUnsaved = Array.from(document.querySelectorAll('.card-rev, .card-ads')).some(el => {
        const norm = v => (v == null ? '' : String(v).trim());
        return norm(el.value) !== norm(el.dataset.original);
      });
      if (inOurInput || hasUnsaved) return; // 等使用者存好或取消後下一分鐘再試
      this._lastInputDate = nowYesterday;
      if (this.route === 'dashboard' && typeof this.render === 'function') {
        this.render();
        showToast(`已跨日，自動切換至 ${nowYesterday}`, 'success');
      }
    }, 60000); // 每 60 秒檢查一次
  },

  // 依使用者權限更新側欄的顯示（角色資訊、管理員區、可見的辦公室）
  applyUserPerms(user) {
    const deptLabel = getUserDeptLabel(user);
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('user-role').textContent =
      (user.role === 'admin' ? '管理員' : '員工') + '・' + deptLabel;
    document.getElementById('user-avatar').textContent = user.name.slice(0, 1);

    const isAdmin = user.role === 'admin';
    document.getElementById('admin-group').style.display = isAdmin ? '' : 'none';
    document.getElementById('nav-users').style.display = isAdmin ? '' : 'none';

    const departments = Store.get(Store.KEYS.departments, []);
    document.querySelectorAll('[data-route^="office-"]').forEach(btn => {
      // 子路由如 'office-d1-profit' 也要對應到 d1 部門做權限判斷
      const rest = btn.dataset.route.slice('office-'.length);
      const firstDash = rest.indexOf('-');
      const deptId = firstDash > 0 ? rest.slice(0, firstDash) : rest;
      const dept = departments.find(d => d.id === deptId);
      btn.style.display = canAccessOffice(user, dept) ? '' : 'none';
    });
    // 父層 toggle 按鈕 + 子項群組：依照群組 key 對應到部門
    document.querySelectorAll('[data-toggle-group]').forEach(btn => {
      const deptId = btn.dataset.toggleGroup;
      const dept = departments.find(d => d.id === deptId);
      const canSee = canAccessOffice(user, dept);
      btn.style.display = canSee ? '' : 'none';
      const group = document.querySelector(`.nav-sub-group[data-group="${deptId}"]`);
      if (group) group.style.display = canSee ? '' : 'none';
    });
  },

  /* ------------- 路由 ------------- */
  navigate(route) {
    if (!route) return;
    this.route = route;
    // 持久化目前路由 - 同時存 sessionStorage 跟 localStorage 雙重保險
    try { sessionStorage.setItem('ec.lastRoute', route); } catch {}
    try { localStorage.setItem('ec.lastRoute', route); } catch {}
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.route === route);
    });
    // 若進入到 office-d1 系列任一頁，自動展開行銷子項
    if (route.startsWith('office-d1')) {
      const parent = document.querySelector('[data-toggle-group="d1"]');
      const group = document.querySelector('.nav-sub-group[data-group="d1"]');
      if (parent) parent.classList.add('expanded');
      if (group) group.classList.add('expanded');
    }
    this.render();
  },

  render() {
    const main = document.getElementById('main-content');
    if (this.route && this.route.startsWith('office-')) {
      const rest = this.route.slice('office-'.length); // 例如 'd1' / 'd1-profit' / 'd1-insight'
      const firstDash = rest.indexOf('-');
      const deptId = firstDash > 0 ? rest.slice(0, firstDash) : rest;
      const subRoute = firstDash > 0 ? rest.slice(firstDash + 1) : null;
      main.innerHTML = this.viewOffice(deptId, subRoute);
      this.bindOfficeTabs(deptId);
      return;
    }
    switch (this.route) {
      case 'dashboard': main.innerHTML = this.viewDashboard(); this.bindDashboardPills(); this.bindCardInputs(); this.bindLineChartTooltip(); break;
      case 'employees': main.innerHTML = this.viewEmployees(); this.bindFilterBar(); break;
      case 'users': main.innerHTML = this.viewUsers(); break;
      default: main.innerHTML = this.viewDashboard(); this.bindDashboardPills(); this.bindCardInputs(); this.bindLineChartTooltip();
    }
  },

  /* ============================================================
   *  儀表板首頁
   * ============================================================ */
  viewDashboard() {
    // 讀取資料
    // ⚠ 絕對不要在這裡自動 Store.set 寫回 Firestore：
    //   雲端訂閱還沒完成時 Store.get 會拿到 null，落到 PLATFORMS 預設值；
    //   如果寫回去就會把使用者真實資料覆蓋成空。
    //   只在使用者實際儲存時才寫回。
    let platforms = Store.get(Store.KEYS.platforms, null);
    if (!platforms) platforms = JSON.parse(JSON.stringify(PLATFORMS));
    platforms = migratePlatforms(platforms); // 純記憶體轉換，不寫回

    const now = new Date();
    // 行銷每天填的是「昨日」資料；若使用者改了日期，以使用者選的為準（可補周末等）
    const defaultInputDate = toDateStr(addDays(now, -1));
    const todayStrLocal = toDateStr(now);
    // 不允許選未來日期
    if (this.filter.entryDate && this.filter.entryDate > todayStrLocal) {
      this.filter.entryDate = defaultInputDate;
    }
    const inputDateStr = this.filter.entryDate || defaultInputDate;
    // 比較對象 = 前一天
    const prevDateObj = new Date(inputDateStr + 'T00:00:00');
    const prevDateStr = toDateStr(addDays(prevDateObj, -1));
    const inputDateDisplay = inputDateStr.replace(/-/g, '/');

    const inputOf = (p) => +(p.daily?.[inputDateStr]) || 0;
    const prevOf  = (p) => +(p.daily?.[prevDateStr])  || 0;
    const inputTotal = platforms.reduce((s, p) => s + inputOf(p), 0);
    const prevTotal  = platforms.reduce((s, p) => s + prevOf(p),  0);
    const overallDelta = prevTotal > 0 ? (inputTotal / prevTotal - 1) * 100 : 0;

    // 當月總營收（從本月 1 號到昨天的累積）
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthStartStr = toDateStr(monthStart);
    const yMonth = now.getFullYear();
    const mMonth = now.getMonth() + 1;
    let monthTotal = 0;
    let daysCounted = 0;
    const seenDays = new Set();
    platforms.forEach(p => {
      Object.keys(p.daily || {}).forEach(date => {
        if (date >= monthStartStr && date <= inputDateStr) {
          monthTotal += +p.daily[date] || 0;
          seenDays.add(date);
        }
      });
    });
    daysCounted = seenDays.size;
    const monthAvg = daysCounted > 0 ? monthTotal / daysCounted : 0;

    // 計算各群組的本月小計
    const monthGroupTotals = PLATFORM_GROUPS.map(g => {
      const members = platforms.filter(p => g.members.includes(p.name));
      let total = 0;
      members.forEach(p => {
        Object.keys(p.daily || {}).forEach(date => {
          if (date >= monthStartStr && date <= inputDateStr) {
            total += +p.daily[date] || 0;
          }
        });
      });
      return { ...g, total };
    });

    const monthBlock = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap">
          <div style="min-width:240px">
            <div style="font-size:12px;color:var(--text-muted);letter-spacing:.05em;margin-bottom:8px;text-transform:uppercase">${yMonth} 年 ${mMonth} 月 · 當月總營收</div>
            <div style="font-size:34px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;line-height:1.1">${fmtNTD(monthTotal)}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:8px">
              累積 ${daysCounted} 天　·　日均 ${fmtNTD(monthAvg)}
            </div>
          </div>
          <div style="display:flex;gap:32px;flex-wrap:wrap;justify-content:flex-end;flex:1">
            ${monthGroupTotals.slice(1).map(g => `
              <div style="text-align:right;min-width:120px">
                <div style="font-size:11px;color:var(--text-muted);letter-spacing:.05em;margin-bottom:4px;text-transform:uppercase">${escapeHtml(g.name.replace('總營收','').replace('營收','').trim())}</div>
                <div style="font-size:20px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.02em">${fmtNTD(g.total)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;

    // 4 張總覽卡：可切換「昨日 / 前日 / 本月 / 上月 / 自訂月份」
    const summaryRange = this.filter.summaryRange || 'yesterday';
    const customMonth = this.filter.summaryMonth || toDateStr(now).slice(0, 7);

    // 工具：給一個範圍類型 + 月份字串，回傳該範圍要加總的日期清單 + 標籤
    const monthDates = (yyyymm) => {
      const [y, m] = yyyymm.split('-').map(Number);
      const firstDay = new Date(y, m - 1, 1);
      const lastDay = new Date(y, m, 0);   // 該月最後一天
      const limit = toDateStr(addDays(now, -1));  // 不超過昨日
      const arr = [];
      for (let d = new Date(firstDay); toDateStr(d) <= toDateStr(lastDay); d = addDays(d, 1)) {
        const s = toDateStr(d);
        if (s <= limit) arr.push(s);
      }
      return arr;
    };
    const buildRange = (key) => {
      if (key === 'yesterday') {
        return {
          label: '昨日',
          showDates: [inputDateStr],
          compareDates: [prevDateStr],
          compareLabel: '前一日',
        };
      }
      if (key === 'dayBefore') {
        return {
          label: '前日',
          showDates: [prevDateStr],
          compareDates: [toDateStr(addDays(now, -3))],
          compareLabel: '再前一日',
        };
      }
      if (key === 'thisMonth') {
        const ms = toDateStr(now).slice(0, 7);
        const prevMs = toDateStr(new Date(now.getFullYear(), now.getMonth() - 1, 1)).slice(0, 7);
        return {
          label: `${ms.replace('-', '/')} 本月`,
          showDates: monthDates(ms),
          compareDates: monthDates(prevMs),
          compareLabel: '上月',
        };
      }
      if (key === 'lastMonth') {
        const ms = toDateStr(new Date(now.getFullYear(), now.getMonth() - 1, 1)).slice(0, 7);
        const prevMs = toDateStr(new Date(now.getFullYear(), now.getMonth() - 2, 1)).slice(0, 7);
        return {
          label: `${ms.replace('-', '/')} 上月`,
          showDates: monthDates(ms),
          compareDates: monthDates(prevMs),
          compareLabel: '再上一月',
        };
      }
      // customMonth
      const [yy, mm] = customMonth.split('-').map(Number);
      const prevDate = new Date(yy, mm - 2, 1);
      const prevMs = toDateStr(prevDate).slice(0, 7);
      return {
        label: `${customMonth.replace('-', '/')}`,
        showDates: monthDates(customMonth),
        compareDates: monthDates(prevMs),
        compareLabel: '前一月',
      };
    };
    const rangeInfo = buildRange(summaryRange);
    const sumOver = (p, dates) => dates.reduce((s, d) => s + (+p.daily?.[d] || 0), 0);

    const summaryPills = `
      <div id="summary-pills" style="display:flex;gap:5px;margin-bottom:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text-muted);margin-right:2px;font-weight:600">日期</span>
        <button class="pill ${summaryRange === 'yesterday' ? 'active' : ''}" data-summary-range="yesterday"
          style="padding:4px 10px;font-size:11px;font-weight:600">昨日 (${inputDateStr.replace(/-/g, '/')})</button>
        <span style="width:1px;height:14px;background:var(--border);margin:0 2px"></span>
        <button class="pill ${summaryRange === 'thisMonth' ? 'active' : ''}" data-summary-range="thisMonth"
          style="padding:4px 10px;font-size:11px;font-weight:600">本月</button>
        <button class="pill ${summaryRange === 'lastMonth' ? 'active' : ''}" data-summary-range="lastMonth"
          style="padding:4px 10px;font-size:11px;font-weight:600">上月</button>
        <span style="display:inline-flex;align-items:center;gap:4px">
          <span style="font-size:11px;color:var(--text-muted);font-weight:600">選月份：</span>
          <input type="month" id="summary-custom-month" value="${customMonth}" max="${toDateStr(now).slice(0,7)}"
            style="padding:3px 8px;border:1px solid ${summaryRange === 'customMonth' ? 'var(--primary)' : 'var(--border)'};border-radius:999px;font-size:11px;font-family:inherit;background:${summaryRange === 'customMonth' ? 'var(--primary-soft)' : 'var(--surface)'}">
        </span>
      </div>
    `;

    const summaryCards = PLATFORM_GROUPS.map(g => {
      const members = platforms.filter(p => g.members.includes(p.name));
      const cur  = members.reduce((s, p) => s + sumOver(p, rangeInfo.showDates), 0);
      const prev = members.reduce((s, p) => s + sumOver(p, rangeInfo.compareDates), 0);
      const d    = prev > 0 ? ((cur / prev) - 1) * 100 : 0;
      const iconHtml = g.logo
        ? `<img src="${g.logo}" alt="${escapeHtml(g.name)}" style="width:22px;height:22px;object-fit:contain;border-radius:4px;display:block">`
        : `<span style="font-size:16px;line-height:1">${g.icon}</span>`;
      return `
        <div class="stat-card" style="padding:14px 16px;background:white;border:1px solid var(--border);border-radius:10px;box-shadow:none">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;color:var(--text-muted)">
            ${iconHtml}
            <span style="font-size:12px;font-weight:600;letter-spacing:.02em">${escapeHtml(g.name)}</span>
            <span style="margin-left:auto;font-size:10px;color:var(--text-muted);font-weight:500">${escapeHtml(rangeInfo.label)}</span>
          </div>
          <div style="font-size:22px;color:var(--text);font-weight:700;margin:0;line-height:1.15;font-variant-numeric:tabular-nums;letter-spacing:-.01em">${fmtNTD(cur)}</div>
          <div style="margin-top:6px;font-size:11px;color:var(--text-muted);font-weight:500">
            ${d >= 0
              ? `<span class="up">↑ ${d.toFixed(1)}%</span>`
              : `<span class="down">↓ ${Math.abs(d).toFixed(1)}%</span>`} 較${escapeHtml(rangeInfo.compareLabel)}
          </div>
        </div>
      `;
    }).join('');

    // 依通路分群（蝦皮 / MOMO / 酷澎）
    const marketOrder = ['shopee', 'momo', 'coupang'];
    const marketTint = { shopee: '#ee4d2d', momo: '#ec4899', coupang: '#3b82f6' };
    const grouped = { shopee: [], momo: [], coupang: [] };
    platforms.forEach((p, i) => {
      const m = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      if (!grouped[m]) grouped[m] = [];
      grouped[m].push({ p, i });
    });

    // 單一賣場列
    const buildPlatformRow = (p, i) => {
      const td = inputOf(p);
      const yd = prevOf(p);
      const delta = yd > 0 ? ((td / yd) - 1) * 100 : 0;
      const hasAds = PLATFORMS_WITH_AD_SPEND.has(p.name);
      const inputAds = +(p.dailyAdSpend?.[inputDateStr]) || 0;
      const roas = (td > 0 && inputAds > 0) ? (td / inputAds).toFixed(2) : '—';
      const m = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      const logoSrc = MARKETPLACE_BADGE[m].src;

      const deltaCell = yd > 0
        ? (delta >= 0
            ? `<span class="up" style="font-weight:600">↑ ${delta.toFixed(1)}%</span>`
            : `<span class="down" style="font-weight:600">↓ ${Math.abs(delta).toFixed(1)}%</span>`)
        : '<span style="color:var(--text-muted)">—</span>';

      const inputStyle = 'width:100%;max-width:110px;padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;text-align:center;color:var(--text);box-sizing:border-box;background:white;height:28px';

      // 輸入框預設帶入「當日已儲存」的值（加上千分位逗號），過 12 點跨日才會自動清成 0
      const fmt = v => (v > 0 ? (+v).toLocaleString() : '');
      const revValue = fmt(td);
      const adsValue = fmt(inputAds);

      const adsCell = hasAds
        ? `<input type="text" inputmode="numeric" class="card-ads" data-idx="${i}" data-original="${adsValue}" value="${adsValue}" placeholder="0" onfocus="this.select()"
              style="${inputStyle}">`
        : '<span style="color:var(--text-muted);font-size:14px">—</span>';

      const roasCell = hasAds
        ? `<span class="card-roas" data-idx="${i}" style="font-weight:700;font-variant-numeric:tabular-nums;color:${p.color};font-size:13px">${roas}</span>`
        : '<span style="color:var(--text-muted);font-size:13px">—</span>';

      return `
        <tr data-card-idx="${i}" style="border-top:1px solid var(--border)">
          <td style="padding:3px 6px;white-space:nowrap;overflow:hidden">
            <div style="display:flex;align-items:center;gap:6px;min-width:0">
              <img src="${logoSrc}" alt="" style="width:18px;height:18px;border-radius:4px;object-fit:contain;background:white;padding:1px;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.06)">
              <span style="font-weight:600;font-size:13px;white-space:nowrap" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</span>
            </div>
          </td>
          <td style="padding:3px 8px;text-align:center">
            <input type="text" inputmode="numeric" class="card-rev" data-idx="${i}" data-original="${revValue}" value="${revValue}" placeholder="0" onfocus="this.select()"
              style="${inputStyle}">
          </td>
          <td style="padding:3px 8px;text-align:center">${adsCell}</td>
          <td style="padding:3px 8px;text-align:center">${roasCell}</td>
          <td style="padding:3px 8px;white-space:nowrap;font-size:12px;text-align:center">${deltaCell}</td>
          <td style="padding:3px 6px;white-space:nowrap;text-align:center">
            <button class="row-save-btn" data-idx="${i}" title="立即儲存此列" style="display:none;width:26px;height:26px;font-size:14px;font-weight:700;border:0;border-radius:5px;background:#10b981;color:white;cursor:pointer;box-shadow:0 2px 4px rgba(16,185,129,.3)">✓</button>
          </td>
        </tr>
      `;
    };

    // 通路分群分隔列 + 該通路的賣場列
    const marketRowsHtml = marketOrder.map(m => {
      const items = grouped[m] || [];
      if (items.length === 0) return '';
      const badge = MARKETPLACE_BADGE[m];
      const tint = marketTint[m] || '#6b7280';
      const dividerRow = `
        <tr style="background:var(--bg)">
          <td colspan="6" style="padding:6px 14px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:7px">
              <img src="${badge.src}" alt="${escapeHtml(badge.name)}"
                style="width:14px;height:14px;border-radius:3px;object-fit:contain;flex-shrink:0">
              <span style="font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase">${escapeHtml(badge.name)}</span>
              <span style="font-size:10px;color:var(--text-muted);font-weight:500">· ${items.length} 個賣場</span>
            </div>
          </td>
        </tr>
      `;
      const platformRows = items.map(({ p, i }) => buildPlatformRow(p, i)).join('');
      return dividerRow + platformRows;
    }).join('');

    // 當日總計列
    const grandRev = platforms.reduce((s, p) => s + inputOf(p), 0);
    const grandPrev = platforms.reduce((s, p) => s + prevOf(p), 0);
    const grandDelta = grandPrev > 0 ? ((grandRev / grandPrev) - 1) * 100 : 0;
    const grandAds = platforms
      .filter(p => PLATFORMS_WITH_AD_SPEND.has(p.name))
      .reduce((s, p) => s + (+(p.dailyAdSpend?.[inputDateStr]) || 0), 0);
    const grandRoas = grandAds > 0 ? (grandRev / grandAds).toFixed(2) : '—';
    const grandDeltaCell = grandPrev > 0
      ? (grandDelta >= 0
          ? `<span class="up" style="font-weight:700">↑ ${grandDelta.toFixed(1)}%</span>`
          : `<span class="down" style="font-weight:700">↓ ${Math.abs(grandDelta).toFixed(1)}%</span>`)
      : '<span style="color:var(--text-muted)">—</span>';

    const totalRow = `
      <tr style="background:var(--bg);border-top:2px solid var(--border)">
        <td style="padding:6px 6px;font-weight:800;font-size:13px;letter-spacing:.05em">當日總計</td>
        <td style="padding:6px 4px;text-align:center;font-weight:800;font-size:13px;font-variant-numeric:tabular-nums">NT$ ${grandRev.toLocaleString()}</td>
        <td style="padding:6px 4px;text-align:center;font-weight:700;font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums">NT$ ${grandAds.toLocaleString()}</td>
        <td style="padding:6px 4px;text-align:center;font-weight:800;font-size:13px;color:#6366f1;font-variant-numeric:tabular-nums">${grandRoas}</td>
        <td style="padding:6px 4px;font-size:12px;text-align:center">${grandDeltaCell}</td>
        <td></td>
      </tr>
    `;

    const revenueTableHtml = `
      <div class="table-card" style="margin:0;width:100%;display:flex;flex-direction:column">
        <div class="table-card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:8px 12px">
          <div>
            <h3 style="margin:0;font-size:14px">每日營收填寫</h3>
            <p style="margin:1px 0 0;font-size:11px;color:var(--text-muted)">輸入後按 Enter 或點別處跳出確認再儲存 · 過 12 點自動歸 0</p>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:4px;background:var(--bg);padding:3px 6px;border-radius:6px">
              <span style="font-size:11px;color:var(--text-muted);font-weight:500;padding-left:4px">填寫日期</span>
              <button id="entry-date-prev" title="前一天" style="padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:white;color:var(--text-muted);font-size:11px;cursor:pointer;line-height:1">←</button>
              <input type="date" id="entry-date-picker" value="${escapeHtml(inputDateStr)}" max="${escapeHtml(todayStrLocal)}"
                style="padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-weight:600;font-family:inherit;color:var(--text);background:white;width:130px">
              <button id="entry-date-next" title="後一天" style="padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:white;color:var(--text-muted);font-size:11px;cursor:pointer;line-height:1" ${inputDateStr >= todayStrLocal ? 'disabled' : ''}>→</button>
              ${inputDateStr !== defaultInputDate ? `<button id="entry-date-reset" title="回到昨天" style="padding:2px 7px;border:0;border-radius:4px;background:var(--primary-soft);color:var(--primary);font-size:10px;font-weight:600;cursor:pointer;margin-left:2px">昨天</button>` : ''}
            </div>
            <button id="open-month-detail" title="查看本月每日明細"
              style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:white;color:var(--text);font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px">
              📅 本月明細
            </button>
          </div>
        </div>
        <div class="table-wrap">
          <table style="border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed">
            <thead>
              <tr style="background:var(--bg)">
                <th style="padding:5px 6px;text-align:left;font-size:11px;min-width:110px">賣場</th>
                <th style="padding:5px 4px;text-align:center;font-size:11px;width:115px">營收 NT$</th>
                <th style="padding:5px 4px;text-align:center;font-size:11px;width:115px">廣告費</th>
                <th style="padding:5px 4px;text-align:center;font-size:11px;width:58px">ROAS</th>
                <th style="padding:5px 4px;text-align:center;font-size:11px;width:78px">較前一日</th>
                <th style="padding:5px 4px;text-align:center;width:32px"></th>
              </tr>
            </thead>
            <tbody>
              ${marketRowsHtml}
              ${totalRow}
            </tbody>
          </table>
        </div>
      </div>
    `;

    return `
      <div class="page-header" style="margin-bottom:10px">
        <h2 style="font-size:22px;margin:0">儀表板首頁 <span class="live-dot">即時資料</span></h2>
        <p style="margin:2px 0 0;font-size:13px">歡迎回來，${escapeHtml(this.currentUser.name)}　·　${inputDateDisplay}</p>
      </div>
      ${summaryPills}
      <div class="stat-grid" style="grid-template-columns:repeat(4, 1fr);margin-bottom:12px;gap:10px">${summaryCards}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch">
        <div style="display:flex">${revenueTableHtml}</div>
        <div style="display:flex">${this.dailyLineChartHtml(platforms)}</div>
      </div>
    `;
  },

  /* ============================================================
   *  行銷辦公室 - 工作週曆（Google Calendar 風格的週檢視）
   * ============================================================ */
  /* ============================================================
   *  營運表現洞察表 — 整合 3 份 Excel：母表 / 銷售排行 / 商品表現
   *  並依商品編號合併、自動分類、警示母表缺漏、跨週對照
   * ============================================================ */
  renderInsightTabHtml() {
    /* 預設分類門檻（使用者可調） */
    if (!window.INSIGHT_DEFAULT_THRESHOLDS) {
      window.INSIGHT_DEFAULT_THRESHOLDS = {
        explosion: 50,    // 爆發品：成長比 > 50%
        growth: 10,       // 成長品：成長比 10% ~ 50%
        drop: -10,        // 衰退品：成長比 -10% ~ -50%
        heavyDrop: -50,   // 重跌品：成長比 < -50%
        ctrMin: 3,        // 轉換條件門檻：點擊率 > 3%
        weakConvMin: 1,   // 弱轉換：1% ~ 3%
        weakConvMax: 3,
        lowConvMin: 3,    // 轉換偏低：3% ~ 6%
        lowConvMax: 6,
      };
    }
    const INSIGHT_DEFAULT_THRESHOLDS = window.INSIGHT_DEFAULT_THRESHOLDS;

    // ============== 賣場切換 ==============
    const INSIGHT_SHOPS = ['玩樂', '好麻吉', '森之旅'];
    const currentShop = (this.filter.insightShop && INSIGHT_SHOPS.indexOf(this.filter.insightShop) >= 0)
      ? this.filter.insightShop : '玩樂';

    // ============== 欄位顯示控制 ==============
    // 不可隱藏：band、#、商品編號/名稱/ID
    const INSIGHT_COLS = [
      { key: 'prevPrev', label: '上上上週營收' },
      { key: 'revenue', label: '上週 / 上上週營收' },
      { key: 'growth', label: '成長率' },
      { key: 'impressions', label: '曝光次數' },
      { key: 'ctr', label: '點擊率' },
      { key: 'convRate', label: '轉換率' },
      { key: 'group', label: '大類' },
      { key: 'flow', label: '上上週 → 上週' },
      { key: 'stock', label: '可用庫存' },
      { key: 'note', label: '調整' },
    ];
    const hiddenColsArr = Array.isArray(this.filter.insightHiddenCols) ? this.filter.insightHiddenCols : [];
    const hiddenCols = new Set(hiddenColsArr);
    const visCol = (k) => !hiddenCols.has(k);
    const visibleColCount = 2 + INSIGHT_COLS.filter(c => visCol(c.key)).length;

    // 一次性遷移：把舊的 ec.insightWeekly 等（玩樂的資料）搬到新 key
    this.migrateInsightDataIfNeeded();

    const sKey = (type) => `ec.insight_${currentShop}_${type}`;

    const master = Store.get(sKey('master'), null);
    const weeks = Store.get(sKey('weeks'), []) || [];   // 多週歷史，新→舊
    const perf  = Store.get(sKey('perf'), null);
    const notes = Store.get(sKey('notes'), {}) || {};
    const T = Object.assign({}, INSIGHT_DEFAULT_THRESHOLDS, Store.get('ec.insightThresholds', {}) || {});

    // 固定 slot：本週 = weeks[0]，上週 = weeks[1]
    const sales = weeks[0] || null;
    const salesPrev = weeks[1] || null;
    const compareIdx = 1; // 給 prevPrev 計算用

    const masterByCode = master?.byCode || {};
    const salesProducts = sales?.products || [];
    const prevByCode = {};
    (salesPrev?.products || []).forEach(p => { prevByCode[p.code] = p; });
    // 為了算「上週類別」，需要上週的上週（即比對週的前一週）
    const salesPrevPrev = (compareIdx + 1 < weeks.length) ? weeks[compareIdx + 1] : null;
    const prevPrevByCode = {};
    (salesPrevPrev?.products || []).forEach(p => { prevPrevByCode[p.code] = p; });
    const perfByShopeeId = perf?.byShopeeId || {};

    // 把蝦皮 exclusive 的結束日（例：6/8 00:00 表示截止到 6/7）顯示成 inclusive
    const displayPeriod = (period) => {
      if (!period) return '—';
      const m = period.match(/^(\d{4})\/(\d{2})\/(\d{2})\s*[–\-—]\s*(\d{4})\/(\d{2})\/(\d{2})$/);
      if (!m) return period;
      const [, sy, sm, sd, ey, em, ed] = m;
      const endDate = new Date(+ey, +em - 1, +ed);
      endDate.setDate(endDate.getDate() - 1);
      const ny = endDate.getFullYear();
      const nm = String(endDate.getMonth() + 1).padStart(2, '0');
      const nd = String(endDate.getDate()).padStart(2, '0');
      return `${sy}/${sm}/${sd} – ${ny}/${nm}/${nd}`;
    };

    // 合併：以 sales 為主，補上 master / perf / prev / notes
    const merged = salesProducts.map(s => {
      const m = masterByCode[s.code] || null;
      const shopeeId = m?.id || '';
      const p = shopeeId ? perfByShopeeId[shopeeId] : null;
      const prev = prevByCode[s.code] || null;
      const prevPrev = prevPrevByCode[s.code] || null;
      const growthRate = prev && prev.revenue > 0
        ? (s.revenue - prev.revenue) / prev.revenue
        : (s.revenue > 0 && !prev ? null : 0);
      const prevGrowthRate = prev && prevPrev && prevPrev.revenue > 0
        ? (prev.revenue - prevPrev.revenue) / prevPrev.revenue
        : null;
      return {
        code: s.code,
        name: s.name,
        mocbicName: m?.mocbicName || '',
        shopeeId,
        revenue: s.revenue || 0,
        prevRevenue: prev?.revenue || 0,
        prevPrevRevenue: prevPrev?.revenue || 0,
        growthRate,
        prevGrowthRate,
        qty: s.qty || 0,
        profit: s.profit || 0,
        stock: s.stock || 0,
        demand: s.demand || 0,
        impressions: p?.impressions || 0,
        clicks: p?.clicks || 0,
        ctr: p?.ctr || 0,
        convRate: p?.convRate || 0,
        inMaster: !!m,
        note: notes[s.code] || null,
      };
    });

    const needMasterUpdate = merged.filter(p => !p.inMaster);

    // 排序：可點欄位標題切換
    const sortKey = this.filter.insightSortKey || 'revenue';
    const sortDir = this.filter.insightSortDir || 'desc';
    const sortGetters = {
      code: p => p.code || '',
      prevPrev: p => p.prevPrevRevenue || 0,
      revenue: p => p.revenue || 0,
      growth: p => (p.growthRate == null ? -Infinity : p.growthRate),
      impressions: p => p.impressions || 0,
      ctr: p => p.ctr || 0,
      convRate: p => p.convRate || 0,
      stock: p => (p.stock - p.demand),
    };
    const getter = sortGetters[sortKey] || sortGetters.revenue;
    const sorted = merged.slice().sort((a, b) => {
      const va = getter(a), vb = getter(b);
      let cmp;
      if (typeof va === 'string' || typeof vb === 'string') cmp = String(va).localeCompare(String(vb));
      else cmp = (va - vb);
      return sortDir === 'asc' ? cmp : -cmp;
    });

    // 大類分組（成長類/下滑類/轉換類）色票
    const GROUP_STYLE = {
      '成長類': { color: '#15803d', bg: '#dcfce7', band: '#22c55e' },
      '下滑類': { color: '#b91c1c', bg: '#fee2e2', band: '#ef4444' },
      '轉換類': { color: '#1d4ed8', bg: '#dbeafe', band: '#3b82f6' },
    };
    // 由細分類標籤推大類（用於上色和分組）
    const groupOf = (label) => {
      if (!label) return null;
      if (label.indexOf('爆發品') >= 0 || label.indexOf('成長品') >= 0) return '成長類';
      if (label.indexOf('衰退品') >= 0 || label.indexOf('重跌品') >= 0) return '下滑類';
      if (label.indexOf('轉換') >= 0) return '轉換類';
      return null;
    };

    // 完整分類（用使用者設定的門檻）
    // metricsOverride 可指定 growthRate，未指定就用 p 本身（用於計算上週類別）
    const classifyMetrics = (growthRate, convRate, clicks, impressions, ctr) => {
      // 成長類（基於 growth rate）— 優先級高
      if (growthRate !== null && growthRate !== undefined) {
        const g = growthRate * 100;
        if (g > T.explosion)     return { label: '🟡 爆發品',  color: '#a16207', bg: '#fef9c3' };
        if (g >= T.growth)       return { label: '🟨 成長品',  color: '#ca8a04', bg: '#fef9c3' };
        if (g < T.heavyDrop)     return { label: '🔴 重跌品',  color: '#dc2626', bg: '#fee2e2' };
        if (g <= T.drop)         return { label: '🟥 衰退品',  color: '#ea580c', bg: '#fed7aa' };
      }
      // 轉換類（需要點擊率 > T.ctrMin，例：> 3%）
      const ctrPct = (ctr || 0) * 100;
      const convPct = (convRate || 0) * 100;
      if (ctrPct > T.ctrMin) {
        if (convRate === 0)                                              return { label: '🟩 零轉換',   color: '#22c55e', bg: '#dcfce7' };
        if (convPct >= T.weakConvMin && convPct < T.weakConvMax)         return { label: '🟢 弱轉換',   color: '#10b981', bg: '#d1fae5' };
        if (convPct >= T.lowConvMin && convPct <= T.lowConvMax)          return { label: '🟢 轉換偏低', color: '#10b981', bg: '#d1fae5' };
      }
      return null;
    };
    const classifyProduct = (p) => classifyMetrics(p.growthRate, p.convRate, p.clicks, p.impressions, p.ctr);
    // 上週類別只用 growth（沒有歷史的轉換數據）
    const classifyPrev = (p) => p.prevGrowthRate !== null
      ? classifyMetrics(p.prevGrowthRate, 0, 0, 0, 0)
      : null;

    // 總計
    const totalRev = sorted.reduce((s, p) => s + p.revenue, 0);
    const totalProfit = sorted.reduce((s, p) => s + p.profit, 0);
    const totalQty = sorted.reduce((s, p) => s + p.qty, 0);

    const fmt = n => (n > 0 || n < 0) ? Math.round(n).toLocaleString() : '—';
    const fmtPct = n => isFinite(n) && n > 0 ? (n * 100).toFixed(2) + '%' : '—';
    const fmtTime = (ts) => ts ? new Date(ts).toLocaleString('zh-TW', { dateStyle: 'short', timeStyle: 'short' }) : '';

    // 上傳狀態卡片（4 個：母表 / 本週銷售 / 上週銷售 / 商品表現）
    const uploadCards = [
      {
        key: 'master', label: '商品清單（母表）', icon: '📋',
        loaded: !!master, info: master ? `${Object.keys(masterByCode).length} 個編號 · ${fmtTime(master.uploadedAt)}` : '尚未上傳',
        accept: '.xlsx,.xls', inputId: 'insight-master-upload',
        hint: '一次上傳，自動分配到 3 個賣場分頁'
      },
      {
        key: 'sales', label: '上週銷售排行', icon: '💰',
        loaded: !!sales, info: sales ? `${salesProducts.length} 個編號 · ${displayPeriod(sales.period) || ''} · ${fmtTime(sales.uploadedAt)}` : '尚未上傳',
        accept: '.xlsx,.xls', inputId: 'insight-sales-upload',
        hint: '上週商品銷售（系統會依檔案週期自動歸位）'
      },
      {
        key: 'salesPrev', label: '上上週銷售排行', icon: '📅',
        loaded: !!salesPrev, info: salesPrev ? `${(salesPrev.products || []).length} 個編號 · ${displayPeriod(salesPrev.period) || ''} · ${fmtTime(salesPrev.uploadedAt)}` : '尚未上傳',
        accept: '.xlsx,.xls', inputId: 'insight-salesprev-upload',
        hint: '上上週商品銷售（成長率/類別流向用）'
      },
      {
        key: 'salesPrevPrev', label: '上上上週銷售排行', icon: '🗓️',
        loaded: !!salesPrevPrev, info: salesPrevPrev ? `${(salesPrevPrev.products || []).length} 個編號 · ${displayPeriod(salesPrevPrev.period) || ''} · ${fmtTime(salesPrevPrev.uploadedAt)}` : '尚未上傳',
        accept: '.xlsx,.xls', inputId: 'insight-salesprevprev-upload',
        hint: '上上上週商品銷售（三週對照用）'
      },
      {
        key: 'perf', label: '商品表現（蝦皮）', icon: '📊',
        loaded: !!perf, info: perf ? `${Object.keys(perfByShopeeId).length} 個商品 · ${fmtTime(perf.uploadedAt)}` : '尚未上傳',
        accept: '.xlsx,.xls', inputId: 'insight-perf-upload',
        hint: '商品ID / 曝光 / 點擊 / 轉換率（可出貨）'
      },
    ];

    // 上傳區包成浮窗，預設隱藏；點「📤 上傳檔案」按鈕才開啟
    const uploadGridHtml = `
      <div id="insight-upload-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:9000;align-items:center;justify-content:center;padding:24px">
        <div style="background:white;border-radius:12px;width:100%;max-width:880px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #e5e7eb;background:#fafbfc">
            <div>
              <h3 style="margin:0;font-size:15px;font-weight:700">📤 上傳檔案</h3>
              <p style="margin:2px 0 0;font-size:12px;color:#dc2626;font-weight:700">載入最新上週銷售排行，直接拖移到上週銷售排行位置，系統會自動將檔案換位處理</p>
            </div>
            <button id="insight-upload-close" type="button" style="width:30px;height:30px;border:1px solid var(--border);background:white;border-radius:6px;font-size:14px;cursor:pointer;color:var(--text-muted)">✕</button>
          </div>
          <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:12px;padding:18px;background:#fafbfc">
            ${uploadCards.map(u => `
              <label style="background:white;border:1px solid ${u.loaded ? '#10b98144' : '#e5e7eb'};border-radius:8px;padding:14px 16px;cursor:pointer;display:block;transition:border-color .12s;position:relative" onmouseover="this.style.borderColor='${u.loaded ? '#10b981' : '#9ca3af'}'" onmouseout="this.style.borderColor='${u.loaded ? '#10b98144' : '#e5e7eb'}'">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                  <span style="font-size:18px">${u.icon}</span>
                  <span style="font-size:14px;font-weight:600;color:var(--text)">${escapeHtml(u.label)}</span>
                  ${u.loaded
                    ? `<span style="margin-left:auto;display:inline-flex;align-items:center;gap:6px">
                         <span style="font-size:11px;color:#10b981;font-weight:700">✓ 已載入</span>
                         <button type="button" data-clear-piece="${u.key}" title="清除這份" style="width:20px;height:20px;border:0;border-radius:4px;background:transparent;color:#9ca3af;font-size:13px;line-height:1;cursor:pointer;padding:0" onmouseover="this.style.background='#fee2e2';this.style.color='#dc2626'" onmouseout="this.style.background='transparent';this.style.color='#9ca3af'">✕</button>
                       </span>`
                    : '<span style="margin-left:auto;font-size:11px;color:var(--text-muted)">點此上傳</span>'
                  }
                </div>
                <div style="font-size:12px;color:var(--text-muted);line-height:1.4">${escapeHtml(u.info)}</div>
                <div style="font-size:11px;color:#cbd5e1;margin-top:3px">${escapeHtml(u.hint)}</div>
                <input type="file" id="${u.inputId}" accept="${u.accept}" style="display:none">
              </label>
            `).join('')}
          </div>
        </div>
      </div>
    `;

    // 警示：母表缺漏（精簡 chip 版，內嵌在期間列右側）
    const warningHtml = needMasterUpdate.length > 0 ? `
      <details style="position:relative;display:inline-block;margin-left:6px">
        <summary class="pill" style="padding:4px 10px;background:#fef3c7;border:1px solid #fcd34d;border-radius:7px;font-size:12px;font-weight:600;color:#92400e;list-style:none;cursor:pointer;user-select:none">⚠️ ${needMasterUpdate.length} 個商品不在母表</summary>
        <div style="position:absolute;top:32px;left:0;z-index:50;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:10px 14px;min-width:280px;max-width:480px;font-size:12px;color:var(--text);line-height:1.5">
          請更新母表 Excel 後重新上傳，否則這些商品<strong>無法對應到商品 ID / 蝦皮表現</strong>。
          <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">
            ${needMasterUpdate.map(p => `<button class="insight-jump-code" data-jump-code="${escapeHtml(p.code)}" style="padding:2px 8px;border:1px solid #fcd34d;background:#fef9c3;border-radius:5px;font-size:11px;font-weight:700;color:#92400e;cursor:pointer;font-family:monospace" onmouseover="this.style.background='#fde68a'" onmouseout="this.style.background='#fef9c3'">${escapeHtml(p.code)}</button>`).join('')}
          </div>
        </div>
      </details>
    ` : '';

    const fmtGrowth = (g) => {
      if (g === null || g === undefined) return '<span style="color:var(--text-muted)">—</span>';
      const pct = g * 100;
      if (pct === 0) return '<span style="color:var(--text-muted)">0%</span>';
      const color = pct > 0 ? '#10b981' : '#ef4444';
      const arrow = pct > 0 ? '↑' : '↓';
      return `<span style="color:${color};font-weight:700">${arrow} ${Math.abs(pct).toFixed(0)}%</span>`;
    };

    // 細分類篩選：先計算每個分類的商品數
    const classifyOf = (p) => {
      const c = classifyProduct(p);
      return c ? c.label.replace(/^[^一-龥]+/, '').trim() : '';
    };
    const classCounts = {};
    sorted.forEach(p => {
      const c = classifyOf(p);
      if (c) classCounts[c] = (classCounts[c] || 0) + 1;
    });
    // 複選：insightClass 是已勾選的類別陣列；空陣列 / null = 全部
    // 相容舊資料：如果是字串就轉成陣列
    let selectedClasses = this.filter.insightClass;
    if (typeof selectedClasses === 'string') selectedClasses = selectedClasses === 'all' || !selectedClasses ? [] : [selectedClasses];
    if (!Array.isArray(selectedClasses)) selectedClasses = [];
    const selectedSet = new Set(selectedClasses);
    const ctrLowFilter = !!this.filter.insightCtrLow;
    let filteredSorted = selectedSet.size === 0
      ? sorted
      : sorted.filter(p => selectedSet.has(classifyOf(p)));
    if (ctrLowFilter) {
      filteredSorted = filteredSorted.filter(p => p.ctr > 0 && p.ctr < 0.03);
    }
    const ctrLowCount = sorted.filter(p => p.ctr > 0 && p.ctr < 0.03).length;

    const CLASS_PILLS = [
      { group: '下滑類', color: '#b91c1c', items: [
        { key: '重跌品', emoji: '🔴' },
        { key: '衰退品', emoji: '🟥' },
      ]},
      { group: '成長類', color: '#15803d', items: [
        { key: '爆發品', emoji: '🟡' },
        { key: '成長品', emoji: '🟨' },
      ]},
      { group: '轉換類', color: '#1d4ed8', items: [
        { key: '弱轉換', emoji: '🟢' },
        { key: '轉換偏低', emoji: '🟢' },
        { key: '零轉換', emoji: '🟩' },
      ]},
    ];

    const allActive = selectedSet.size === 0;
    const ctrPillHtml = `<button class="pill ${ctrLowFilter ? 'active' : ''}" data-insight-ctr-low="${ctrLowFilter ? '0' : '1'}" title="只看點擊率 < 3% 的商品" style="padding:4px 12px;font-size:13px;border:0;${ctrLowFilter ? 'background:#f59e0b;color:white;font-weight:700' : 'background:transparent;color:'+(ctrLowCount > 0 ? '#b45309' : '#cbd5e1')+';font-weight:600'}">📉 點擊率&lt;3% ${ctrLowCount}</button>`;
    const colMenuHtml = `
      <span style="display:inline-flex;align-items:center;gap:6px;margin-left:auto">
        <details id="insight-col-menu" style="position:relative" ${this._insightColMenuOpen ? 'open' : ''}>
          <summary class="pill" style="padding:6px 12px;font-size:12px;list-style:none;cursor:pointer;user-select:none">👁 欄位 (${INSIGHT_COLS.length - hiddenCols.size}/${INSIGHT_COLS.length})</summary>
          <div style="position:absolute;top:36px;right:0;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:8px;min-width:180px;z-index:100">
            ${INSIGHT_COLS.map(c => `
              <label style="display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-size:12px;border-radius:5px;user-select:none" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background=''">
                <input type="checkbox" data-col-toggle="${c.key}" ${visCol(c.key) ? 'checked' : ''} style="margin:0;cursor:pointer">
                <span>${escapeHtml(c.label)}</span>
              </label>
            `).join('')}
            <div style="border-top:1px solid #f3f4f6;margin:6px 0 4px"></div>
            <button id="insight-col-show-all" type="button" style="width:100%;padding:6px;border:0;background:transparent;font-size:11px;color:var(--primary);cursor:pointer;border-radius:5px;font-weight:600">顯示全部</button>
          </div>
        </details>
        <button id="insight-settings" class="pill" style="padding:6px 12px;font-size:12px">⚙ 分類門檻設定</button>
      </span>
    `;
    const classFilterPillsHtml = sorted.length > 0 ? `
      <button class="pill ${allActive ? 'active' : ''}" data-insight-class="all" style="padding:4px 12px;font-size:12px;border:0;${allActive ? 'background:var(--primary);color:white;font-weight:700' : 'background:transparent;color:var(--text-muted);font-weight:600'}">全部 ${sorted.length}</button>
      ${CLASS_PILLS.map(g => {
        const groupTotal = g.items.reduce((s, it) => s + (classCounts[it.key] || 0), 0);
        const selectedInGroup = g.items.filter(it => selectedSet.has(it.key));
        const groupActive = selectedInGroup.length > 0;
        return `
          <details class="insight-group-menu" style="position:relative">
            <summary class="pill" style="padding:4px 10px;font-size:12px;list-style:none;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:5px;border:1px solid ${groupActive ? g.color : g.color+'44'};background:${groupActive ? g.color+'15' : 'white'};color:${g.color};font-weight:700;border-radius:99px">
              ${escapeHtml(g.group)} ${groupTotal}
              ${selectedInGroup.length > 0 ? `<span style="background:${g.color};color:white;border-radius:99px;padding:1px 6px;font-size:10px;font-weight:700">${selectedInGroup.length}</span>` : ''}
              <span style="font-size:10px;color:${g.color};opacity:.6">▾</span>
            </summary>
            <div style="position:absolute;top:32px;left:0;z-index:60;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:6px;display:flex;flex-direction:column;gap:4px;min-width:160px">
              ${g.items.map(it => {
                const cnt = classCounts[it.key] || 0;
                const isActive = selectedSet.has(it.key);
                return `<button class="pill" data-insight-class="${escapeHtml(it.key)}" style="padding:5px 12px;font-size:13px;border:0;text-align:left;${isActive ? 'background:'+g.color+';color:white;font-weight:700' : 'background:transparent;color:'+(cnt > 0 ? g.color : '#cbd5e1')+';font-weight:600'};border-radius:6px">${it.emoji} ${escapeHtml(it.key)} ${cnt}</button>`;
              }).join('')}
            </div>
          </details>
        `;
      }).join('')}
      ${ctrPillHtml}
      ${colMenuHtml}
    ` : '';

    const rowsHtml = filteredSorted.length === 0
      ? `<tr><td colspan="${visibleColCount}" style="padding:32px;text-align:center;color:var(--text-muted);font-size:13px">${sorted.length === 0 ? '尚未上傳銷售排行 Excel' : `沒有符合「${escapeHtml(Array.from(selectedSet).join('、') || '全部')}」的商品`}</td></tr>`
      : filteredSorted.map((p, i) => {
          const netStock = p.stock - p.demand;
          const cls = classifyProduct(p);
          const prevCls = classifyPrev(p);
          const grp = groupOf(cls?.label);
          const prevGrp = groupOf(prevCls?.label);
          const grpStyle = grp ? GROUP_STYLE[grp] : null;
          const hasNote = p.note && (p.note.text || (p.note.adjustments && p.note.adjustments.length > 0));

          // 滑鼠 hover 顯示的內容：同日合併、用「、」串、最新在上；最後加長期備註
          // 同時抓出「最新一筆」直接顯示在表格內
          let hoverPreview = '';
          let latestAdjText = '';
