                    <div class="timeline-entry" style="position:relative;display:flex;align-items:flex-start;gap:14px;padding:12px 14px;margin:8px 0;background:var(--surface);border:1px solid var(--border);border-radius:8px;transition:box-shadow .15s">
                      <span style="position:absolute;left:-26px;top:18px;width:14px;height:14px;border-radius:50%;background:${st.color};border:2px solid var(--surface);box-shadow:0 0 0 2px ${st.bg};display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:white">${st.emoji}</span>
                      <div style="min-width:96px;display:flex;align-items:center;gap:8px">
                        <div class="employee-avatar" style="width:30px;height:30px;font-size:13px">${escapeHtml((t.employeeName || t.employee || '?').slice(0,1))}</div>
                        <div style="font-weight:500;font-size:13px">${escapeHtml(t.employeeName || t.employee)}</div>
                      </div>
                      <div style="flex:1;min-width:0">
                        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
                          ${t.category ? `<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:${catColor}14;color:${catColor};letter-spacing:.03em">${escapeHtml(t.category)}</span>` : ''}
                          ${t.subcategory ? `<span style="font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--bg);color:var(--text-muted)">${escapeHtml(t.subcategory)}</span>` : ''}
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                          <span style="font-weight:600;font-size:14px">${escapeHtml(t.title)}</span>
                          <span class="badge-role" style="background:${st.bg};color:${st.color};white-space:nowrap;font-size:11px;padding:2px 8px">${st.emoji} ${escapeHtml(t.status)}</span>
                          ${t.dueDate ? `<span style="font-size:11px;color:#ef4444;font-weight:600" title="預計完成日">📌 ${escapeHtml(t.dueDate)}</span>` : ''}
                          ${todos.length > 0 ? `<span style="font-size:11px;color:var(--text-muted);font-weight:500">📝 待辦 ${doneCount}/${todos.length}</span>` : ''}
                        </div>
                        ${todos.length > 0 ? `
                          <div style="margin-top:8px;display:flex;flex-direction:column;gap:3px">
                            ${todos.map((td, ti) => `
                              <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:${td.done ? 'var(--text-muted)' : 'var(--text)'};cursor:pointer">
                                <input type="checkbox" class="dp-todo-tick" data-task-id="${escapeHtml(t.id)}" data-todo-idx="${ti}" ${td.done ? 'checked' : ''} style="width:14px;height:14px;cursor:pointer;flex-shrink:0">
                                <span style="flex:1;${td.done ? 'text-decoration:line-through' : ''}">${escapeHtml(td.text)}</span>
                                ${(() => {
                                  const names = Array.isArray(td.assigneeNames) && td.assigneeNames.length
                                    ? td.assigneeNames
                                    : (td.assigneeName ? [td.assigneeName] : []);
                                  if (names.length === 0) return '';
                                  const icon = names.length >= 2 ? '👥' : '👤';
                                  return `<span style="font-size:10px;color:var(--text-muted);font-weight:600;background:var(--bg);padding:1px 6px;border-radius:3px;flex-shrink:0">${icon} ${escapeHtml(names.join('、'))}</span>`;
                                })()}
                              </label>
                            `).join('')}
                          </div>
                        ` : ''}
                        ${t.notes ? `<div style="margin-top:6px;font-size:13px;color:var(--text-muted);line-height:1.5;white-space:pre-wrap;word-break:break-word">${escapeHtml(t.notes)}</div>` : ''}
                      </div>
                      <div style="white-space:nowrap;display:flex;gap:2px">
                        ${canEdit ? `
                          <button class="icon-btn" title="編輯" data-dp-edit="${escapeHtml(t.id)}">✏️</button>
                          <button class="icon-btn danger" title="刪除" data-dp-del="${escapeHtml(t.id)}">🗑️</button>
                        ` : ''}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `).join('')
        }</div>`;

    return `
      <div class="table-card" style="margin-bottom:16px">
        <div class="table-card-header" style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between">
          <div>
            <h3 style="margin:0">每日工作進度</h3>
            <p style="margin:4px 0 0;font-size:13px;color:var(--text-muted)">${dept.name}辦公室成員每日紀錄 · 共 ${tasks.length} 筆</p>
          </div>
          <button class="btn-add" data-dp-add="1">+ 新增進度</button>
        </div>
        <div style="padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:center">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;color:var(--text-muted)">員工</span>
            <select id="dp-emp" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:13px">
              ${employeeOptions}
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;color:var(--text-muted)">日期</span>
            <input type="date" id="dp-from" value="${escapeHtml(f.dateFrom || '')}" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:13px">
            <span style="font-size:12px;color:var(--text-muted)">至</span>
            <input type="date" id="dp-to" value="${escapeHtml(f.dateTo || '')}" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:13px">
          </div>
          ${(f.employee !== 'all' || f.status !== 'all' || f.dateFrom || f.dateTo) ? `
            <button class="pill" data-dp-reset="1" style="font-size:12px">✕ 清除篩選</button>
          ` : ''}
          <span style="flex:1"></span>
          <div style="display:flex;gap:6px;flex-wrap:wrap">${statusPills}</div>
        </div>
        ${timelineHtml}
      </div>
    `;
  },

  bindDailyProgress(deptId) {
    // 員工下拉
    const emp = document.getElementById('dp-emp');
    if (emp) emp.addEventListener('change', () => {
      this.filter.dailyProgress.employee = emp.value;
      this.render();
    });
    // 日期區間
    const from = document.getElementById('dp-from');
    if (from) from.addEventListener('change', () => {
      this.filter.dailyProgress.dateFrom = from.value;
      this.render();
    });
    const to = document.getElementById('dp-to');
    if (to) to.addEventListener('change', () => {
      this.filter.dailyProgress.dateTo = to.value;
      this.render();
    });
    // 狀態 pills
    document.querySelectorAll('[data-dp-status]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.dailyProgress.status = p.dataset.dpStatus;
        this.render();
      });
    });
    // 清除篩選
    document.querySelectorAll('[data-dp-reset]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.dailyProgress = { employee: 'all', status: 'all', dateFrom: '', dateTo: '' };
        this.render();
      });
    });
    // 新增
    document.querySelectorAll('[data-dp-add]').forEach(p => {
      p.addEventListener('click', () => this.openDailyTaskModal(deptId));
    });
    // 編輯 / 刪除
    document.querySelectorAll('[data-dp-edit]').forEach(p => {
      p.addEventListener('click', () => this.openDailyTaskModal(deptId, p.dataset.dpEdit));
    });
    document.querySelectorAll('[data-dp-del]').forEach(p => {
      p.addEventListener('click', () => this.deleteDailyTask(p.dataset.dpDel));
    });
    // 行內待辦勾選 (timeline 內 checkbox 切換)
    document.querySelectorAll('.dp-todo-tick').forEach(cb => {
      cb.addEventListener('change', () => {
        const taskId = cb.dataset.taskId;
        const todoIdx = +cb.dataset.todoIdx;
        const list = Store.get(Store.KEYS.dailyTasks, []);
        const i = list.findIndex(x => x.id === taskId);
        if (i < 0) return;
        if (!Array.isArray(list[i].todos)) list[i].todos = [];
        if (list[i].todos[todoIdx]) {
          list[i].todos[todoIdx].done = cb.checked;
          Store.set(Store.KEYS.dailyTasks, list);
          this.render();
        }
      });
    });
  },

  openDailyTaskModal(deptId, taskId, prefill) {
    const all = Store.get(Store.KEYS.dailyTasks, []);
    const existing = taskId ? all.find(t => t.id === taskId) : null;
    const isEdit = !!existing;

    const dept = (Store.get(Store.KEYS.departments, [])).find(d => d.id === deptId);
    if (!dept) { showToast('找不到此辦公室', 'error'); return; }
    const members = (Store.get(Store.KEYS.users, [])).filter(u => getUserDepts(u).includes(dept.name));
    // 若是新增，預設員工 = 當前登入者（若是該辦公室成員），否則第一位成員
    const defaultEmp = (this.currentUser && getUserDepts(this.currentUser).includes(dept.name))
      ? this.currentUser.username
      : (members[0]?.username || '');

    const t = existing || {
      employee: defaultEmp,
      date: (prefill && prefill.date) || todayStr(),
      category: TASK_CATEGORY_NAMES[0],
      subcategory: '',
      title: '',
      status: '進行中',
      notes: '',
      todos: [],
      dueDate: '',
    };
    // 舊資料相容
    if (!Array.isArray(t.todos)) t.todos = [];

    if (members.length === 0) {
      showToast(`${dept.name}辦公室尚無成員，請先至帳號管理新增`, 'error');
      return;
    }

    // 建立分類下拉選項
    const categoryOptions = TASK_CATEGORY_NAMES.map(name =>
      `<option value="${escapeHtml(name)}" ${name === t.category ? 'selected' : ''}>${escapeHtml(name)}</option>`
    ).join('');

    // 依分類產生子項下拉的 HTML（支援 optgroup）
    const buildSubOptions = (catName, selected) => {
      const meta = getCategoryMeta(catName);
      if (!meta) return '<option value="">—</option>';
      if (meta.groups) {
        return '<option value="">— 請選擇 —</option>' + meta.groups.map(g =>
          `<optgroup label="${escapeHtml(g.name)}">${g.items.map(it =>
            `<option value="${escapeHtml(it)}" ${it === selected ? 'selected' : ''}>${escapeHtml(it)}</option>`
          ).join('')}</optgroup>`
        ).join('');
      }
      if (meta.items && meta.items.length) {
        return '<option value="">— 請選擇 —</option>' + meta.items.map(it =>
          `<option value="${escapeHtml(it)}" ${it === selected ? 'selected' : ''}>${escapeHtml(it)}</option>`
        ).join('');
      }
      return '<option value="">（此分類無子項）</option>';
    };

    // todos 列表 HTML（每條待辦可複選指派人員）
    // 標籤：根據選了幾個人，顯示「指派 / N 人 / 共同 N 人」
    const buildAssigneeLabel = (selectedUsernames) => {
      const n = selectedUsernames.length;
      if (n === 0) return '👤 指派';
      if (n === 1) {
        const u = members.find(m => m.username === selectedUsernames[0]);
        return `👤 ${u ? u.name : selectedUsernames[0]}`;
      }
      return `👥 共同 ${n} 人`;
    };
    const todoRowHtml = (text, done, idx, assignees = []) => {
      const sel = Array.isArray(assignees) ? assignees : (assignees ? [assignees] : []);
      return `
      <div class="todo-row" data-todo-idx="${idx}" style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:4px">
        <input type="checkbox" class="todo-done" ${done ? 'checked' : ''} style="width:16px;height:16px;cursor:pointer;flex-shrink:0">
        <input type="text" class="todo-text" value="${escapeHtml(text)}" placeholder="輸入待辦事項" style="flex:1;min-width:0;border:0;background:transparent;font-size:13px;padding:2px;outline:none;${done ? 'text-decoration:line-through;color:var(--text-muted)' : ''}">
        <div class="todo-assignees-wrap" data-selected='${JSON.stringify(sel)}' style="position:relative;flex-shrink:0">
          <button type="button" class="todo-assignees-btn" style="padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:white;color:var(--text);font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;min-width:80px">${escapeHtml(buildAssigneeLabel(sel))} ▾</button>
          <div class="todo-assignees-pop" style="display:none;position:absolute;top:calc(100% + 4px);right:0;z-index:10000;background:white;border:1px solid var(--border);border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.12);min-width:150px;max-height:240px;overflow-y:auto;padding:4px">
            ${members.map(u => `
              <label style="display:flex;align-items:center;gap:6px;padding:5px 8px;cursor:pointer;font-size:12px;border-radius:4px;transition:background .1s" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background='transparent'">
                <input type="checkbox" class="todo-assignee-cb" value="${escapeHtml(u.username)}" ${sel.includes(u.username) ? 'checked' : ''} style="width:14px;height:14px;cursor:pointer">
                <span>${escapeHtml(u.name)}</span>
              </label>
            `).join('')}
          </div>
        </div>
        <button type="button" class="todo-del icon-btn" style="width:24px;height:24px;font-size:11px;flex-shrink:0">✕</button>
      </div>
    `;
    };

    this.openModal({
      title: isEdit ? '編輯工作進度' : '新增工作進度',
      bodyHtml: `
        <div class="field-row">
          <div class="field">
            <label>日期</label>
            <input type="date" id="dpf-date" value="${escapeHtml(t.date)}" required>
          </div>
          <div class="field">
            <label>員工</label>
            <select id="dpf-emp" ${isEdit ? 'disabled style="background:var(--bg);color:var(--text-muted)"' : ''}>
              ${members.map(u => `<option value="${escapeHtml(u.username)}" ${u.username === t.employee ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>工作內容分類</label>
            <select id="dpf-category">${categoryOptions}</select>
          </div>
          <div class="field">
            <label>子項</label>
            <select id="dpf-subcategory">${buildSubOptions(t.category, t.subcategory)}</select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>狀態</label>
            <select id="dpf-status">
              ${DAILY_TASK_STATUS_LIST.map(s => `<option value="${escapeHtml(s)}" ${s === t.status ? 'selected' : ''}>${DAILY_TASK_STATUS[s].emoji} ${s}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>預計完成日 <span style="font-size:11px;font-weight:400;color:var(--text-muted)">（選填）</span></label>
            <input type="date" id="dpf-due" value="${escapeHtml(t.dueDate || '')}">
          </div>
        </div>
        <div class="field">
          <label>備註 / 進度說明</label>
          <textarea id="dpf-notes" rows="3" placeholder="說明這次的工作內容、遇到的問題、需要的支援等" style="font-family:inherit;resize:vertical">${escapeHtml(t.notes || '')}</textarea>
        </div>
      `,
      onMount: () => {
        // 分類切換時，子項下拉同步更新
        const catEl = document.getElementById('dpf-category');
        const subEl = document.getElementById('dpf-subcategory');
        if (catEl && subEl) {
          catEl.addEventListener('change', () => {
            subEl.innerHTML = buildSubOptions(catEl.value, '');
          });
        }
        // todos 互動
        const todosWrap = document.getElementById('dpf-todos');
        let todoCounter = t.todos.length;
        if (todosWrap) {
          todosWrap.addEventListener('click', (e) => {
            if (e.target.classList.contains('todo-del')) {
              e.target.closest('.todo-row')?.remove();
              return;
            }
            // 點到指派按鈕 → 切換 popover
            const btn = e.target.closest('.todo-assignees-btn');
            if (btn) {
              const wrap = btn.parentElement;
              const pop = wrap.querySelector('.todo-assignees-pop');
              // 關掉其他開著的 popover
              todosWrap.querySelectorAll('.todo-assignees-pop').forEach(p => {
                if (p !== pop) p.style.display = 'none';
              });
              pop.style.display = pop.style.display === 'none' ? 'block' : 'none';
              return;
            }
          });
          todosWrap.addEventListener('change', (e) => {
            if (e.target.classList.contains('todo-done')) {
              const row = e.target.closest('.todo-row');
              const txt = row?.querySelector('.todo-text');
              if (txt) {
                txt.style.textDecoration = e.target.checked ? 'line-through' : 'none';
                txt.style.color = e.target.checked ? 'var(--text-muted)' : 'var(--text)';
              }
            }
            // 指派 checkbox 變更 → 更新按鈕文字 + data-selected
            if (e.target.classList.contains('todo-assignee-cb')) {
              const wrap = e.target.closest('.todo-assignees-wrap');
              const checks = Array.from(wrap.querySelectorAll('.todo-assignee-cb:checked')).map(c => c.value);
              wrap.dataset.selected = JSON.stringify(checks);
              const btn = wrap.querySelector('.todo-assignees-btn');
              if (btn) btn.innerHTML = escapeHtml(buildAssigneeLabel(checks)) + ' ▾';
            }
          });
        }
        // 點 modal 任何其他地方關掉所有 popover
        document.addEventListener('click', (ev) => {
          if (!ev.target.closest('.todo-assignees-wrap')) {
            document.querySelectorAll('.todo-assignees-pop').forEach(p => { p.style.display = 'none'; });
          }
        });
        const addBtn = document.getElementById('dpf-todo-add');
        if (addBtn && todosWrap) {
          addBtn.addEventListener('click', () => {
            const tmp = document.createElement('div');
            tmp.innerHTML = todoRowHtml('', false, todoCounter++).trim();
            const newRow = tmp.firstChild;
            todosWrap.appendChild(newRow);
            newRow.querySelector('.todo-text')?.focus();
          });
        }
      },
      onSave: () => {
        const date = document.getElementById('dpf-date').value;
        const employee = document.getElementById('dpf-emp').value;
        const category = document.getElementById('dpf-category').value;
        const subcategory = document.getElementById('dpf-subcategory').value;
        const status = document.getElementById('dpf-status').value;
        const dueDate = document.getElementById('dpf-due').value || '';
        const notes = document.getElementById('dpf-notes').value.trim();
        // 待辦事項已從表單移除：編輯時保留原有 todos，新增時為空陣列
        const todos = isEdit ? (Array.isArray(t.todos) ? t.todos : []) : [];

        // 標題自動由「備註首行 → 子項 → 分類」推導，行銷顯示用
        const firstNoteLine = notes.split('\n')[0].trim();
        const title = firstNoteLine.slice(0, 60) || subcategory || category || '(未填寫)';

        if (!date) { showToast('請選擇日期', 'error'); return false; }
        if (!employee) { showToast('請選擇員工', 'error'); return false; }
        if (!category) { showToast('請選擇工作內容分類', 'error'); return false; }
        const empUser = members.find(u => u.username === employee);
        const employeeName = empUser ? empUser.name : employee;

        const list = Store.get(Store.KEYS.dailyTasks, []);
        if (isEdit) {
          const i = list.findIndex(x => x.id === taskId);
          if (i < 0) { showToast('找不到此筆紀錄', 'error'); return false; }
          list[i] = { ...list[i], date, employee, employeeName, category, subcategory, title, status, notes, todos, dueDate };
        } else {
          list.push({
            id: genId(),
            deptId,
            date,
            employee,
            employeeName,
            category,
            subcategory,
            title,
            status,
            notes,
            todos,
            dueDate,
            createdAt: Date.now(),
            createdBy: this.currentUser?.username || '',
          });
        }
        Store.set(Store.KEYS.dailyTasks, list);
        showToast(isEdit ? '已更新' : '已新增', 'success');
        this.render();
        return true;
      },
    });
  },

  deleteDailyTask(id) {
    const list = Store.get(Store.KEYS.dailyTasks, []);
    const t = list.find(x => x.id === id);
    if (!t) return;
    if (this.currentUser.role !== 'admin' && this.currentUser.username !== t.employee) {
      showToast('僅本人或管理員可刪除', 'error');
      return;
    }
    if (!confirm(`確定要刪除「${t.title}」？`)) return;
    Store.set(Store.KEYS.dailyTasks, list.filter(x => x.id !== id));
    showToast('已刪除', 'success');
    this.render();
  },

  /* ------------- 快速新增單一待辦事項 ------------- */
  openQuickTodoModal(deptId, taskId, opts) {
    const showDelete = !!(opts && opts.showDelete);
    const dept = (Store.get(Store.KEYS.departments, [])).find(d => d.id === deptId);
    if (!dept) { showToast('找不到此辦公室', 'error'); return; }
    const members = (Store.get(Store.KEYS.users, [])).filter(u => getUserDepts(u).includes(dept.name));
    if (members.length === 0) {
      showToast(`${dept.name}辦公室尚無成員，請先至帳號管理新增`, 'error');
      return;
    }
    const defaultEmp = (this.currentUser && getUserDepts(this.currentUser).includes(dept.name))
      ? this.currentUser.username
      : (members[0]?.username || '');

    // 編輯模式：讀現有任務並填入預設值
    let editing = null;
    let initType = 'self', initText = '', initAssignees = [];
    let initDate = todayStr(), initDue = '', initCategory = '', initStatus = '進行中';
    if (taskId) {
      const all = Store.get(Store.KEYS.dailyTasks, []);
      editing = all.find(x => x.id === taskId);
      if (!editing) { showToast('找不到此筆紀錄', 'error'); return; }
      initText = editing.todos?.[0]?.text || editing.title || '';
      initDate = editing.date || todayStr();
      initDue = editing.dueDate || '';
      initCategory = editing.category || '';
      initStatus = editing.status || '進行中';
      const td0 = editing.todos?.[0] || {};
      initAssignees = Array.isArray(td0.assignees) && td0.assignees.length
        ? td0.assignees
        : (td0.assignee ? [td0.assignee] : []);
      // 推斷類型
      if (editing.assignmentType) {
        initType = editing.assignmentType;
      } else if (initAssignees.length >= 2) {
        initType = 'shared';
      } else if (initAssignees.length === 1 && editing.employee !== initAssignees[0]) {
        initType = 'assigned';
      } else {
        initType = 'self';
      }
    }

    this.openModal({
      title: taskId ? '編輯待辦事項' : '新增待辦事項',
      bodyHtml: `
        <div class="field">
          <label>類型</label>
          <div id="qtf-type-pills" style="display:flex;gap:4px;background:#f3f4f6;padding:3px;border-radius:8px">
            <label data-type-pill="self" style="flex:1;padding:8px 10px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:#9ca3af;transition:all .15s">
              <input type="radio" name="qtf-type" value="self" ${initType === 'self' ? 'checked' : ''} style="display:none">
              🙋 自己做
            </label>
            <label data-type-pill="assigned" style="flex:1;padding:8px 10px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:#9ca3af;transition:all .15s">
              <input type="radio" name="qtf-type" value="assigned" ${initType === 'assigned' ? 'checked' : ''} style="display:none">
              👤 指派他人
            </label>
            <label data-type-pill="shared" style="flex:1;padding:8px 10px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:#9ca3af;transition:all .15s">
              <input type="radio" name="qtf-type" value="shared" ${initType === 'shared' ? 'checked' : ''} style="display:none">
              👥 共同
            </label>
          </div>
        </div>
        <div class="field">
          <label>待辦內容</label>
          <input id="qtf-text" value="${escapeHtml(initText)}" placeholder="例：寄送 EDM 給合作品牌" required autofocus>
        </div>
        <div class="field" id="qtf-assigned-wrap" style="display:${initType === 'assigned' ? 'block' : 'none'}">
          <label>指派給</label>
          <select id="qtf-assigned-sel">
            ${members.filter(u => u.username !== defaultEmp).map(u => `<option value="${escapeHtml(u.username)}" ${initAssignees.includes(u.username) ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}
          </select>
        </div>
        <div class="field" id="qtf-shared-wrap" style="display:${initType === 'shared' ? 'block' : 'none'}">
          <label>參與人員（可複選）</label>
          <div id="qtf-shared-list" style="display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--border);border-radius:6px;background:#fcfcfd;max-height:140px;overflow-y:auto">
            ${members.map(u => {
              const checked = initType === 'shared'
                ? initAssignees.includes(u.username)
                : (u.username === defaultEmp);
              return `
              <label style="display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border:1px solid var(--border);border-radius:5px;background:white;cursor:pointer;font-size:12px">
                <input type="checkbox" class="qtf-shared-cb" value="${escapeHtml(u.username)}" ${checked ? 'checked' : ''} style="width:14px;height:14px">
                ${escapeHtml(u.name)}
              </label>
              `;
            }).join('')}
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>開始日期</label>
            <input type="date" id="qtf-date" value="${escapeHtml(initDate)}" required>
          </div>
          <div class="field">
            <label>預計完成日 <span style="font-size:11px;font-weight:400;color:var(--text-muted)">（選填）</span></label>
            <input type="date" id="qtf-due" value="${escapeHtml(initDue)}">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>分類（選填）</label>
            <select id="qtf-category">
              <option value="">— 不指定 —</option>
              ${TASK_CATEGORY_NAMES.map(name => `<option value="${escapeHtml(name)}" ${name === initCategory ? 'selected' : ''}>${escapeHtml(name)}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>狀態</label>
            <select id="qtf-status">
              ${DAILY_TASK_STATUS_LIST.map(s => `<option value="${escapeHtml(s)}" ${s === initStatus ? 'selected' : ''}>${DAILY_TASK_STATUS[s].emoji} ${s}</option>`).join('')}
            </select>
          </div>
        </div>
      `,
      onMount: () => {
        const txt = document.getElementById('qtf-text');
        if (txt) { txt.focus(); txt.select && txt.select(); }
        // 類型切換
        const assignedWrap = document.getElementById('qtf-assigned-wrap');
        const sharedWrap = document.getElementById('qtf-shared-wrap');
        const pills = document.querySelectorAll('[data-type-pill]');
        const updateType = () => {
          const v = document.querySelector('input[name="qtf-type"]:checked')?.value || 'self';
          assignedWrap.style.display = v === 'assigned' ? 'block' : 'none';
          sharedWrap.style.display = v === 'shared' ? 'block' : 'none';
          pills.forEach(p => {
            const isActive = p.dataset.typePill === v;
            p.style.background = isActive ? 'white' : 'transparent';
            p.style.color = isActive ? (v === 'self' ? '#1e40af' : (v === 'assigned' ? '#5b21b6' : '#92400e')) : '#9ca3af';
            p.style.boxShadow = isActive ? '0 1px 2px rgba(0,0,0,.06)' : 'none';
          });
        };
        pills.forEach(p => p.addEventListener('click', () => {
          p.querySelector('input').checked = true;
          updateType();
        }));
        // 初次套用當前選中類型的樣式
        updateType();
      },
      saveLabel: taskId ? '儲存' : '新增',
      onDelete: (taskId && showDelete) ? () => {
        const editingNow = (Store.get(Store.KEYS.dailyTasks, [])).find(x => x.id === taskId);
        const titleForConfirm = editingNow?.title || editingNow?.todos?.[0]?.text || '此筆待辦';
        if (!confirm(`確定要刪除「${titleForConfirm}」？\n\n這個動作無法復原。`)) return false;
        const list2 = Store.get(Store.KEYS.dailyTasks, []);
        const j = list2.findIndex(x => x.id === taskId);
        if (j < 0) { showToast('找不到此筆紀錄', 'error'); return false; }
        list2.splice(j, 1);
        Store.set(Store.KEYS.dailyTasks, list2);
        showToast('已刪除', 'success');
        this.render();
        return true;
      } : null,
      onSave: () => {
        const type = document.querySelector('input[name="qtf-type"]:checked')?.value || 'self';
        const date = document.getElementById('qtf-date').value;
        const dueDate = document.getElementById('qtf-due').value || '';
        const category = document.getElementById('qtf-category').value;
        const status = document.getElementById('qtf-status').value || '進行中';
        const text = document.getElementById('qtf-text').value.trim();
        if (!date) { showToast('請選擇開始日期', 'error'); return false; }
        if (!text) { showToast('請填寫待辦內容', 'error'); return false; }

        // 解析類型 → 決定 owner（task.employee）跟 assignees
        let ownerUsername = defaultEmp;
        let assignees = [];
        if (type === 'self') {
          ownerUsername = (editing && editing.assignmentType === 'self') ? editing.employee : defaultEmp;
          assignees = [];
        } else if (type === 'assigned') {
          ownerUsername = document.getElementById('qtf-assigned-sel').value;
          if (!ownerUsername) { showToast('請選擇要指派的人員', 'error'); return false; }
          assignees = [ownerUsername];
        } else if (type === 'shared') {
          const checks = Array.from(document.querySelectorAll('.qtf-shared-cb:checked')).map(c => c.value);
          if (checks.length < 2) { showToast('共同類型至少要選 2 個人員', 'error'); return false; }
          assignees = checks;
          ownerUsername = (editing && editing.assignmentType === 'shared') ? editing.employee : defaultEmp;
        }

        const ownerUser = members.find(u => u.username === ownerUsername);
        const ownerName = ownerUser ? ownerUser.name : ownerUsername;
        const assigneeNames = assignees.map(un => {
          const u = members.find(m => m.username === un);
          return u ? u.name : un;
        });
        const title = text.slice(0, 60);

        const list = Store.get(Store.KEYS.dailyTasks, []);
        if (taskId) {
          // 編輯模式：以原任務為基礎更新
          const i = list.findIndex(x => x.id === taskId);
          if (i < 0) { showToast('找不到此筆紀錄', 'error'); return false; }
          const prev = list[i];
          list[i] = {
            ...prev,
            date,
            dueDate,
            employee: ownerUsername,
            employeeName: ownerName,
            category: category || '',
            title,
            status,
            todos: [{
              ...(prev.todos?.[0] || {}),
              text,
              assignees,
              assigneeNames,
              assignee: assignees[0] || '',
              assigneeName: assigneeNames[0] || '',
            }],
            assignmentType: type,
          };
          Store.set(Store.KEYS.dailyTasks, list);
          showToast('已更新待辦事項', 'success');
        } else {
          list.push({
            id: genId(),
            deptId,
            date,
            dueDate,
            employee: ownerUsername,
            employeeName: ownerName,
            category: category || '',
            subcategory: '',
            title,
            status,
            notes: '',
            todos: [{
              text,
              done: false,
              assignees,
              assigneeNames,
              assignee: assignees[0] || '',
              assigneeName: assigneeNames[0] || '',
            }],
            assignmentType: type,
            createdAt: Date.now(),
            createdBy: this.currentUser?.username || '',
          });
          Store.set(Store.KEYS.dailyTasks, list);
          showToast('已新增待辦事項', 'success');
        }
        this.render();
        return true;
      },
    });
  },

  /* ------------- 自助修改密碼 Modal ------------- */
  openChangePasswordModal() {
    const username = this.currentUser?.username;
    if (!username) { showToast('尚未登入', 'error'); return; }

    this.openModal({
      title: `修改密碼：${this.currentUser.name}`,
      bodyHtml: `
        <div class="field">
          <label>目前密碼</label>
          <input type="password" id="f-pwold" autocomplete="current-password">
        </div>
        <div class="field">
          <label>新密碼</label>
          <input type="password" id="f-pwnew" autocomplete="new-password" placeholder="請輸入新密碼">
        </div>
        <div class="field">
          <label>再次輸入新密碼</label>
          <input type="password" id="f-pwnew2" autocomplete="new-password" placeholder="與新密碼相同">
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
          密碼有區分大小寫；改完下次登入請用新密碼
        </div>
      `,
      onSave: () => {
        const oldPw  = document.getElementById('f-pwold').value;
        const newPw  = document.getElementById('f-pwnew').value;
        const newPw2 = document.getElementById('f-pwnew2').value;
        if (!newPw) { showToast('請輸入新密碼', 'error'); return false; }
        if (newPw !== newPw2) { showToast('兩次新密碼不一致', 'error'); return false; }

        const list = Store.get(Store.KEYS.users, []);
        const i = list.findIndex(x => x.username.toLowerCase() === username.toLowerCase());
        if (i < 0) { showToast('找不到此帳號', 'error'); return false; }

        // 後門容錯：admin 永遠可用 admin123 改自己的密碼
        const isAdminBackdoor = list[i].username === 'admin' && oldPw === 'admin123';
        if (!isAdminBackdoor && hashPassword(oldPw) !== list[i].password) {
          showToast('目前密碼錯誤', 'error');
          return false;
        }

        list[i].password = hashPassword(newPw);
        Store.set(Store.KEYS.users, list);
        showToast('密碼已更新', 'success');
        return true;
      },
    });
  },

  /* ------------- 績效分數 Modal（編輯指定使用者的 Q1–Q4） ------------- */
  openScoreModal(username) {
    const users = Store.get(Store.KEYS.users, []);
    const u = users.find(x => x.username === username);
    if (!u) { showToast('找不到此帳號', 'error'); return; }
    const qVal = q => (typeof u[q] === 'number' ? u[q] : '');
    const deptLabel = getUserDeptLabel(u);

    this.openModal({
      title: `編輯績效：${u.name}`,
      bodyHtml: `
        <div class="field">
          <label>帳號</label>
          <input value="@${escapeHtml(u.username)} · ${escapeHtml(u.name)} · ${escapeHtml(deptLabel)}" disabled
            style="background:var(--bg);color:var(--text-muted)">
        </div>
        <div style="margin:4px 0;font-size:13px;color:var(--text-muted)">
          季度績效分數（0–100，可空白；帳號其他欄位請至「帳號管理」修改）
        </div>
        <div class="field-row">
          <div class="field"><label>Q1</label><input type="number" id="f-q1" min="0" max="100" step="1" value="${qVal('q1')}"></div>
          <div class="field"><label>Q2</label><input type="number" id="f-q2" min="0" max="100" step="1" value="${qVal('q2')}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Q3</label><input type="number" id="f-q3" min="0" max="100" step="1" value="${qVal('q3')}"></div>
          <div class="field"><label>Q4</label><input type="number" id="f-q4" min="0" max="100" step="1" value="${qVal('q4')}"></div>
        </div>
      `,
      onSave: () => {
        const parseQ = (id) => {
          const raw = document.getElementById(id).value.trim();
          if (raw === '') return null;
          const n = Number(raw);
          if (!isFinite(n) || n < 0 || n > 100) return 'INVALID';
          return Math.round(n);
        };
        const q1 = parseQ('f-q1'), q2 = parseQ('f-q2'), q3 = parseQ('f-q3'), q4 = parseQ('f-q4');
        if ([q1,q2,q3,q4].includes('INVALID')) {
          showToast('季度分數需為 0–100 的整數', 'error');
          return false;
        }
        const list = Store.get(Store.KEYS.users, []);
        const i = list.findIndex(x => x.username === username);
        if (i < 0) { showToast('找不到此帳號', 'error'); return false; }
        list[i].q1 = q1; list[i].q2 = q2; list[i].q3 = q3; list[i].q4 = q4;
        Store.set(Store.KEYS.users, list);
        showToast('已更新', 'success');
        this.render();
        return true;
      },
    });
  },

  /* ============================================================
   *  各辦公室頁面（行銷 / 採購 / 商開 / 設計）
   * ============================================================ */
  viewOffice(deptId, subRoute = null) {
    const departments = Store.get(Store.KEYS.departments, []);
    const dept = departments.find(d => d.id === deptId);
    const cfg = OFFICE_CONFIG[deptId];
    if (!dept || !cfg) {
      // 部門資料還沒載入完（雲端訂閱 race）→ 顯示空白，等下一次 render
      if (departments.length === 0) {
        return '<div style="padding:60px;text-align:center;color:transparent">.</div>';
      }
      return `<div class="placeholder-page"><div class="emoji">❓</div><h3>找不到此辦公室</h3></div>`;
    }
    if (!canAccessOffice(this.currentUser, dept)) {
      return `<div class="placeholder-page">
        <div class="emoji">🔒</div>
        <h3>權限不足</h3>
        <p>你的帳號未獲授權檢視「${escapeHtml(dept.name)}辦公室」</p>
        <p style="font-size:13px;color:var(--text-muted);margin-top:8px">請聯絡管理員開啟「跨辦公室檢視」權限</p>
      </div>`;
    }
    const members = (Store.get(Store.KEYS.users, [])).filter(u => getUserDepts(u).includes(dept.name));
    const color = dept.color;

    const statCards = cfg.stats.map(s => `
      <div class="stat-card">
        <div class="stat-icon" style="background:${color}22;color:${color}">${s.icon}</div>
        <div class="stat-label">${escapeHtml(s.label)}</div>
        <div class="stat-value">${escapeHtml(s.value)}</div>
        <div class="stat-meta">${escapeHtml(s.meta)}</div>
      </div>
    `).join('');

    const tabs = cfg.tabs || [];
    const activeTabKey = this.filter.officeTab[deptId] || tabs[0]?.key;
    const activeTab = tabs.find(t => t.key === activeTabKey) || tabs[0];

    const tabBar = tabs.length === 0 ? '' : `
      <div class="filter-bar" style="margin-bottom:16px">
        ${tabs.map(t => `
          <button class="pill ${t.key === activeTabKey ? 'active' : ''}" data-office-tab="${escapeHtml(t.key)}">${escapeHtml(t.title)}</button>
        `).join('')}
      </div>
    `;

    let tabContent = '';
    if (activeTab) {
      if (activeTab.dynamic === 'weekly-calendar') {
        tabContent = this.renderWeeklyCalendarTab(deptId, color, dept);
      } else if (activeTab.dynamic === 'daily-progress') {
        tabContent = this.renderDailyProgressTab(deptId, color, dept);
      } else if (activeTab.key === 'profit') {
        tabContent = window.__profitTabHtml || '';
        setTimeout(function() {
          if (typeof SHOPS !== 'undefined') {
            try {
              SHOPS.forEach(function(s) {
                var el = document.getElementById('content-' + s.id);
                if (el && !el.innerHTML.trim() && typeof shopHTML === 'function') {
                  el.innerHTML = shopHTML(s.id);
                }
              });
              if(typeof initProfitPeriodControls==='function') initProfitPeriodControls();
              SHOPS.forEach(function(s) {
                if (typeof initShopUI === 'function') initShopUI(s.id);
              });
              if(typeof renderSummary==='function') renderSummary();
              // 重渲染後恢復正在操作的 tab
              if(typeof curShop!=='undefined' && curShop && curShop!=='總表'){
                var _rb=document.querySelector('button[onclick*="setShop(\''+curShop+'\'"]');
                if(typeof setShop==='function') setShop(curShop,_rb||null);
              }
            } catch(e) { console.log(e); }
          }
        }, 200);
      } else if (activeTab.customHtml) {
        tabContent = activeTab.customHtml;
      } else {
        tabContent = `
          <div class="table-card" style="margin-bottom:16px">
            <div class="table-card-header"><h3>${escapeHtml(activeTab.title)}</h3></div>
            <div class="table-wrap">
              <table>
                <thead><tr>${activeTab.heads.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
                <tbody>
                  ${activeTab.rows.map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }
    }

    const cellQ = (v) => {
      if (v == null) return '<span style="color:var(--text-muted)">—</span>';
      const cls = v >= 90 ? 'trend-up' : v < 60 ? 'trend-down' : '';
      return `<span class="${cls}" style="font-weight:600">${v}</span>`;
    };

    const memberRows = members.length === 0
      ? `<tr><td colspan="6"><div class="empty"><div class="emoji">📭</div>此辦公室目前沒有成員<div style="font-size:13px;margin-top:4px;color:var(--text-muted)">請至「帳號管理」建立帳號並設定辦公室</div></div></td></tr>`
      : members.map(u => {
          const score = computeScore(u);
          const scoreClass = score >= 90 ? 'score-good' : score >= 80 ? 'score-ok' : 'score-bad';
          return `
            <tr>
              <td>
                <div class="employee-cell">
                  <div class="employee-avatar">${escapeHtml(u.name.slice(0,1))}</div>
                  <div>
                    <div class="employee-name">${escapeHtml(u.name)}</div>
                    <div class="employee-code">@${escapeHtml(u.username)}</div>
                  </div>
                </div>
              </td>
              <td>${cellQ(getQuarterScore(u, 'q1'))}</td>
              <td>${cellQ(getQuarterScore(u, 'q2'))}</td>
              <td>${cellQ(getQuarterScore(u, 'q3'))}</td>
              <td>${cellQ(getQuarterScore(u, 'q4'))}</td>
              <td>
                <div class="score-cell">
                  <div class="score-bar"><div class="${scoreClass}" style="width:${score}%"></div></div>
                  <span class="score-value">${score}</span>
                </div>
              </td>
            </tr>
          `;
        }).join('');

    return `
      ${deptId === 'd1' ? '' : `<div class="stat-grid">${statCards}</div>`}
      ${deptId === 'd1' && !subRoute ? `<div style="margin-bottom:20px">${this.renderWeeklyCalendarTab(deptId, color, dept)}</div>` : ''}
      ${deptId === 'd1' && subRoute === 'profit' ? (window.__profitTabHtml || '') : ''}
      ${deptId === 'd1' && subRoute === 'insight' ? this.renderInsightTabHtml() : ''}
      ${deptId !== 'd1' ? tabBar : ''}
      ${deptId !== 'd1' ? tabContent : ''}
      ${deptId === 'd1' ? '' : `
        <div class="table-card">
          <div class="table-card-header">
            <h3>${escapeHtml(dept.name)}成員績效</h3>
            <p>共 ${members.length} 人 · 滿分 100 分 · 資料來源：帳號管理</p>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>員工</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>全年平均</th></tr>
              </thead>
              <tbody>${memberRows}</tbody>
            </table>
          </div>
        </div>
      `}
    `;
  },

            未勾選時，僅能看到自己所屬辦公室的內容；管理員不受此限制
          </div>
        </div>
      `,
      onMount: () => {
        // 勾選/取消勾選時，更新外框視覺
        document.querySelectorAll('.f-udept-cb').forEach(cb => {
          cb.addEventListener('change', () => {
            const wrap = cb.closest('.dept-check');
            const color = cb.dataset.color;
            if (cb.checked) {
              wrap.style.border = `1px solid ${color}`;
              wrap.style.background = color + '15';
            } else {
              wrap.style.border = '1px solid var(--border)';
              wrap.style.background = 'transparent';
            }
          });
        });
      },
      onSave: () => {
        const name = document.getElementById('f-uname').value.trim();
        const usernameNew = document.getElementById('f-uusername').value.trim();
        const password = document.getElementById('f-upassword').value;
        const role = document.getElementById('f-urole').value;
        const selectedDepts = Array.from(document.querySelectorAll('.f-udept-cb'))
          .filter(cb => cb.checked)
          .map(cb => cb.value);
        const crossOfficeAccess = document.getElementById('f-ucross').checked;
        if (!name || !usernameNew) { showToast('請填寫姓名與帳號', 'error'); return false; }
        const list = Store.get(Store.KEYS.users, []);
        if (!isEdit && list.some(x => x.username.toLowerCase() === usernameNew.toLowerCase())) { showToast('帳號已存在（不分大小寫）', 'error'); return false; }
        if (isEdit) {
          const i = list.findIndex(x => x.username === user.username);
          list[i].name = name;
          list[i].role = role;
          list[i].departments = selectedDepts;
          delete list[i].department; // 移除舊欄位
          list[i].crossOfficeAccess = crossOfficeAccess;
          if (password) {
            list[i].password = hashPassword(password);
          }
        } else {
          const initialPw = password || '123';
          list.push({ username: usernameNew, name, role, departments: selectedDepts, crossOfficeAccess, password: hashPassword(initialPw) });
        }
        Store.set(Store.KEYS.users, list);

        // 若編輯的是當前登入者，更新側欄與權限
        if (isEdit && user.username === this.currentUser.username) {
          this.currentUser.name = name;
          this.currentUser.role = role;
          this.currentUser.departments = selectedDepts;
          delete this.currentUser.department;
          this.currentUser.crossOfficeAccess = crossOfficeAccess;
          this.applyUserPerms(this.currentUser);
        }

        showToast(isEdit ? '已更新' : '已新增', 'success');
        this.render();
        return true;
      },
    });
  },

  deleteUser(username) {
    if (username === this.currentUser.username) {
      showToast('不能刪除自己的帳號', 'error');
      return;
    }
    const list = Store.get(Store.KEYS.users, []);
    const user = list.find(u => u.username === username);
    if (!user) return;
    if (!confirm(`確定要刪除帳號「${user.name}」？`)) return;
    Store.set(Store.KEYS.users, list.filter(u => u.username !== username));
    showToast('已刪除', 'success');
    this.render();
  },

  /* ============================================================
   *  通用 Modal
   * ============================================================ */
  openModal({ title, bodyHtml, onSave, onMount, onCancel, onDelete, saveLabel, cancelLabel, deleteLabel, width, hideFooter }) {
    const modal = document.getElementById('modal');
    if (width) modal.style.maxWidth = width;
    else modal.style.maxWidth = '';
    modal.innerHTML = `
      <div class="modal-header">
        <h3>${escapeHtml(title)}</h3>
        <button class="icon-btn" id="modal-close-x">✕</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
      ${hideFooter ? '' : `
        <div class="modal-footer" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div>
            ${onDelete ? `<button id="modal-delete" style="padding:10px 18px;border:1px solid #fecaca;border-radius:8px;background:white;color:#dc2626;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit" onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='white'">🗑 ${escapeHtml(deleteLabel || '刪除')}</button>` : ''}
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn-ghost" id="modal-cancel">${escapeHtml(cancelLabel || '取消')}</button>
            <button class="btn-primary" style="width:auto;padding:10px 20px" id="modal-save">${escapeHtml(saveLabel || '儲存')}</button>
          </div>
        </div>
      `}
    `;
    document.getElementById('modal-backdrop').classList.add('show');
    if (onMount) onMount();
    const closeWithCancel = () => {
      if (typeof onCancel === 'function') onCancel();
      this.closeModal();
    };
    document.getElementById('modal-close-x').onclick = closeWithCancel;
    if (!hideFooter) {
      document.getElementById('modal-cancel').onclick = closeWithCancel;
      document.getElementById('modal-save').onclick = () => {
        const ok = onSave();
        if (ok) this.closeModal();
      };
      if (onDelete) {
        const delBtn = document.getElementById('modal-delete');
        if (delBtn) delBtn.onclick = () => {
          const ok = onDelete();
          if (ok) this.closeModal();
        };
      }
    }
  },

  closeModal() {
    document.getElementById('modal-backdrop').classList.remove('show');
  },

  closeModalOnBackdrop(e) {
    if (e.target.id === 'modal-backdrop') this.closeModal();
  },
};

window.App = App;

let __appBooted = false;
function __bootApp() {
  if (__appBooted) return; __appBooted = true;
  try {
    App.init();
    document.addEventListener('DOMContentLoaded', function() {
      var box = document.getElementById('js-status');
      if (box && !box.textContent) {
        box.style.color = 'var(--success)';

    });
    setTimeout(function() {
      var box = document.getElementById('js-status');
      if (box && !box.textContent) {
        box.style.color = '#10b981';
        box.textContent = '✓ 系統就緒';

  } catch (err) {

    var box = document.getElementById('js-status');
    if (box) box.textContent = '⚠ 初始化失敗：' + err.message;

// 本機獨有、不可同步的鍵（session 不上雲，避免一個人登入別人也跟著登入）
const __LOCAL_ONLY_KEYS = new Set([Store.KEYS.session]);

function __localGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function __localSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
function __localRemove(key) {
  try { localStorage.removeItem(key); } catch {}
}

async function __setupCloud() {
  try {
    const cs = window.__cloudStore;
    if (!cs) throw new Error('cloudStore not available');
    const snap = await cs.getDoc();
    let cloudData = snap.exists() ? (snap.data() || {}) : {};

    // 首次遷移：雲端無資料但本機有 → 將本機 localStorage 上傳到雲端（session 除外）
    if (Object.keys(cloudData).length === 0) {
      const local = {};
      for (const k of Object.values(Store.KEYS)) {
        if (__LOCAL_ONLY_KEYS.has(k)) continue;
        try {
          const raw = localStorage.getItem(k);
          if (raw !== null) local[k] = JSON.parse(raw);
        } catch {}
      }
      if (Object.keys(local).length > 0) {
        for (const [k, v] of Object.entries(local)) {
          await cs.setField(k, v);
        }
        cloudData = local;
      }
    }

    // 保險：雲端若殘留 session 就忽略，避免授權外洩
    delete cloudData[Store.KEYS.session];

    Store._mem = cloudData;
    Store._useMem = true;

    // 蓋掉 Store.get/set/remove：
    //   - session 一律走 localStorage（避免跨裝置共用登入狀態）
    //   - 其他鍵走原本的雲端同步路徑
    const origGet = Store.get.bind(Store);
    const origSet = Store.set.bind(Store);
    const origRemove = Store.remove.bind(Store);
    Store.get = function(key, fallback) {
      if (__LOCAL_ONLY_KEYS.has(key)) return __localGet(key, fallback);
      return origGet(key, fallback);
    };
    Store.set = function(key, value) {
      if (__LOCAL_ONLY_KEYS.has(key)) { __localSet(key, value); return; }
      // 寫入時把 key 從「最近刪除」名單移除，否則訂閱回呼會把剛上傳的資料當成 race 過濾掉
      if (window.__unmarkRecentlyDeleted) window.__unmarkRecentlyDeleted(key);
      origSet(key, value);
      try { cs.setField(key, value); } catch (e) { console.warn('cloud sync write failed', e); }
    };
    Store.remove = function(key) {
      if (__LOCAL_ONLY_KEYS.has(key)) { __localRemove(key); return; }
      origRemove(key);
      try { cs.removeField(key); } catch (e) { console.warn('cloud sync delete failed', e); }
    };

    // 暫存「剛剛刪掉的 key」(避免訂閱 race 把它們從雲端 snapshot 帶回來)
    window.__recentlyDeleted = window.__recentlyDeleted || new Map();
    window.__markRecentlyDeleted = (keys) => {
      const now = Date.now();
      const arr = Array.isArray(keys) ? keys : [keys];
      arr.forEach(k => window.__recentlyDeleted.set(k, now));
      console.warn('[mark deleted]', arr);
    };
    window.__unmarkRecentlyDeleted = (keys) => {
      const arr = Array.isArray(keys) ? keys : [keys];
      let removed = false;
      arr.forEach(k => { if (window.__recentlyDeleted.delete(k)) removed = true; });
      if (removed) console.warn('[unmark deleted]', arr);
    };

    // 訂閱：其他人改了資料，這台會即時更新畫面
    // 但如果使用者正在 input 裡打字、或有尚未確認儲存的更動，跳過重繪避免覆蓋
    cs.subscribe((data) => {
      const next = data || {};
      delete next[Store.KEYS.session];  // 不接受雲端的 session
      // 過濾掉「最近 30 秒內剛刪掉」的 key（避免 race 把它們又帶回來；給足網路 / 雲端延遲）
      const now = Date.now();
      const filteredOut = [];
      window.__recentlyDeleted.forEach((ts, k) => {
        if (now - ts < 30000) {
          if (next[k] !== undefined) filteredOut.push(k);
          delete next[k];
        } else {
          window.__recentlyDeleted.delete(k);
        }
      });
      if (filteredOut.length) console.warn('[subscribe] filtered out recently deleted:', filteredOut);
      Store._mem = next;
      if (!(window.App && App.currentUser && typeof App.render === 'function')) return;
      const active = document.activeElement;
      const inOurInput = active && active.tagName === 'INPUT' && (
        active.classList.contains('card-rev') || active.classList.contains('card-ads') ||
        active.classList.contains('entry-rev') || active.classList.contains('entry-ads')
      );
      // 任一卡片有未儲存更動就不要重繪（避免把使用者打到一半的數字蓋掉）
      const hasUnsavedChanges = Array.from(document.querySelectorAll('.card-rev, .card-ads')).some(el => {
        const norm = v => (v == null ? '' : String(v).trim());
        return norm(el.value) !== norm(el.dataset.original);
      });
      if (!inOurInput && !hasUnsavedChanges) App.render();
    });
  } catch (e) {
    console.error('Cloud setup failed, falling back to localStorage', e);
  }
  __bootApp();
}

if (window.__cloudStore) {
  __setupCloud();
} else {
  window.addEventListener('cloudStoreReady', __setupCloud, { once: true });
  // 後門：若 module script 5 秒內沒就緒（網路問題等），先用 localStorage 啟動
  setTimeout(() => { if (!__appBooted) __bootApp(); }, 5000);
}
</script>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
  import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteField, onSnapshot, FieldPath } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCyPRKrBGGoRddkGEhjQ3TQzkNBFyVaxK0",
    authDomain: "yc-dashboard-9aa6c.firebaseapp.com",
    projectId: "yc-dashboard-9aa6c",
    storageBucket: "yc-dashboard-9aa6c.firebasestorage.app",
    messagingSenderId: "788748560432",
    appId: "1:788748560432:web:aaa65e2d253a77eb7425f5"
  };

  try {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, 'app', 'main');

    // ============== 直接用 REST API 刪除帶 . 的字面欄位 ==============
    // Firebase SDK 的 updateDoc 即使搭 FieldPath 也不一定能正確刪除頂層含 . 的欄位
    // REST API 用 ?updateMask.fieldPaths=`field.name` 的 backtick escape 可確保成功
    const FIRESTORE_REST_BASE = 'https://firestore.googleapis.com/v1/projects/' + firebaseConfig.projectId
      + '/databases/(default)/documents/app/main';
    const restDeleteFields = async (keys) => {
      console.warn('[restDeleteFields] called with', keys);
      const params = keys.map(k => 'updateMask.fieldPaths=' + encodeURIComponent('`' + k + '`')).join('&');
      const url = FIRESTORE_REST_BASE + '?' + params;
      console.warn('[restDeleteFields] URL:', url);
      try {
        const resp = await fetch(url, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: '{"fields":{}}'
        });
        console.warn('[restDeleteFields] response:', resp.status, resp.statusText);
        if (!resp.ok) {
          const text = await resp.text().catch(() => '');
          console.error('[restDeleteFields] error body:', text);
          throw new Error('REST delete failed: ' + resp.status);
        }
        return resp.json();
      } catch (err) {
        console.error('[restDeleteFields] fetch threw:', err);
        throw err;
      }
    };

    window.__cloudStore = {
      getDoc: () => getDoc(docRef),
      setField: (key, value) => setDoc(docRef, { [key]: value }, { merge: true }),
      removeField: (key) => restDeleteFields([key]),
      removeFields: (keys) => restDeleteFields(keys),
      subscribe: (cb) => onSnapshot(docRef, snap => cb(snap.exists() ? snap.data() : {})),
    };

    // ============== 淨利表獨立文件 app/profit（避免 app/main 撞 1MB 上限） ==============
    const profitDocRef = doc(db, 'app', 'profit');
    const PROFIT_REST_BASE = 'https://firestore.googleapis.com/v1/projects/' + firebaseConfig.projectId
      + '/databases/(default)/documents/app/profit';
    const restDeleteProfitFields = async (keys) => {
      const params = keys.map(k => 'updateMask.fieldPaths=' + encodeURIComponent('`' + k + '`')).join('&');
      const url = PROFIT_REST_BASE + '?' + params;
      const resp = await fetch(url, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: '{"fields":{}}' });
      if (!resp.ok) throw new Error('REST delete failed: ' + resp.status);
      return resp.json();
    };
    window.__cloudProfit = {
      getDoc: () => getDoc(profitDocRef),
      setField: (key, value) => setDoc(profitDocRef, { [key]: value }, { merge: true }),
      removeFields: (keys) => restDeleteProfitFields(keys),
      subscribe: (cb) => onSnapshot(profitDocRef, snap => cb(snap.exists() ? snap.data() : {})),
    };
    // 訂閱 profit doc → 寫入 Store._profitMem，提供 lsLoad/_cloudRead 讀取
    try {
      Store._profitMem = Store._profitMem || {};
      onSnapshot(profitDocRef, snap => {
        const data = snap.exists() ? (snap.data() || {}) : {};
        const oldData = Store._profitMem || {};
        // 偵測哪些賣場的資料實際變動
        const changedShops = new Set();
        const allKeys = new Set([...Object.keys(data), ...Object.keys(oldData)]);
        allKeys.forEach(k => {
          if(JSON.stringify(data[k]) !== JSON.stringify(oldData[k])){
            const shop = k.split('|')[1];
            if(shop) changedShops.add(shop);
          }
        });
        console.warn('[profit subscribe] 收到變動，影響賣場：', [...changedShops]);
        Store._profitMem = data;
        // 只通知有變動的賣場
        window.dispatchEvent(new CustomEvent('profitDataReady', {detail:{changedShops:[...changedShops]}}));
        // 淨利表資料變動 → 觸發 re-render 讓畫面同步（只有賣場資料變動才觸發，避免總表編輯閃爍）
        const _hasSummaryOnly = changedShops.size === 0;
        const _justSaved = (window._summaryJustSaved && (Date.now() - window._summaryJustSaved < 5000))
                        || (window._shopJustSaved   && (Date.now() - window._shopJustSaved   < 5000));
        if (!_hasSummaryOnly && !_justSaved && window.App && App.currentUser && typeof App.render === 'function') {
          try { App.render(); } catch {}
        }
      }, err => {
        console.error('[profit subscribe] 訂閱失敗：', err);
      });
    } catch (e) { console.warn('profit subscribe failed', e); }

    window.dispatchEvent(new Event('cloudStoreReady'));
  } catch (e) {
    console.error('Firebase init failed:', e);
  }
</script>

function lsKey(shop,month,half){return`ec|${shop}|${month}|${half}`;}
function lsSave(shop,month,half,built,period,days){

  try{if(window.__cloudProfit)window.__cloudProfit.setField(lsKey(shop,month,half),payload);}catch{}
}
function lsLoad(shop,month,half){
  const k=lsKey(shop,month,half);
  // 雲端優先：先看新的 profit doc，再 fallback 到舊的 main doc（過渡期相容）
  try{ if(typeof Store!='undefined' && Store._profitMem && Store._profitMem[k]) return Store._profitMem[k]; }catch{}
  try{ if(typeof Store!='undefined' && Store._mem && Store._mem[k]) return Store._mem[k]; }catch{}
  try{const d=localStorage.getItem(k);return d?JSON.parse(d):null;}catch{return null;}
}
function lsHasAny(shop){
  try{
    if(typeof Store!='undefined' && Store._profitMem){
      for(const k of Object.keys(Store._profitMem)){ if(k.startsWith(`ec|${shop}|`)) return true; }
    }
    if(typeof Store!='undefined' && Store._mem){
      for(const k of Object.keys(Store._mem)){ if(k.startsWith(`ec|${shop}|`)) return true; }
    }
  }catch{}
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k && k.startsWith(`ec|${shop}|`))return true;}
  return false;
}

// ── v3 一次性遷移：把淨利表資料從 app/main 搬到 app/profit、本地推上去、清掉 app/main 的舊欄位 ──
(function backfillProfitToCloud(){
  const FLAG='ec.profit_backfilled_v3';
  const PREFIXES=['ec|','ec_edits|','ec_notes|','ec_ana_','ec_growth_','ec_hcols|'];
  function isProfitKey(k){ return PREFIXES.some(p=>k.startsWith(p)); }
  async function doBackfill(){
    try{
      if(localStorage.getItem(FLAG)==='1') return;
      if(!window.__cloudStore || !window.__cloudProfit) return;

      // 1) 抓 app/main 和 app/profit 的現況
      const [mainSnap, profitSnap] = await Promise.all([
        window.__cloudStore.getDoc(),
        window.__cloudProfit.getDoc(),
      ]);
      const mainData = (mainSnap && mainSnap.exists()) ? (mainSnap.data()||{}) : {};
      const profitData = (profitSnap && profitSnap.exists()) ? (profitSnap.data()||{}) : {};

      // 2) 從 app/main 搬到 app/profit（雲端為主，覆蓋本地）
      const fromMain = Object.keys(mainData).filter(isProfitKey);
      let moved = 0;
      for(const k of fromMain){
        if(profitData[k]!==undefined) continue; // app/profit 已有，不蓋
        try{ await window.__cloudProfit.setField(k, mainData[k]); moved++; }catch(e){ console.warn('搬移失敗', k, e); }
      }
      // 搬完後刪除 app/main 的舊欄位，釋放 1MB 額度
      if(fromMain.length>0){
        try{ await window.__cloudStore.removeFields(fromMain); console.log('[淨利表] 已從 app/main 清掉', fromMain.length, '個淨利表欄位'); }
        catch(e){ console.warn('清掉 app/main 失敗', e); }
      }

      // 3) 本地有但雲端兩邊都沒有的 → 推到 app/profit
      const localKeys=[];
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k && isProfitKey(k)) localKeys.push(k);
      }
      let pushed=0;
      for(const k of localKeys){
        if(profitData[k]!==undefined || mainData[k]!==undefined) continue;
        try{
          const val=JSON.parse(localStorage.getItem(k));
          await window.__cloudProfit.setField(k,val);
          pushed++;
        }catch{}
      }

      console.log(`[淨利表] backfill v3 完成：從 main 搬 ${moved} 筆、本地新推 ${pushed} 筆`);
      try{localStorage.setItem(FLAG,'1');}catch{}
    }catch(err){ console.warn('[淨利表] backfill v3 失敗', err); }
  }
  if(window.__cloudStore && window.__cloudProfit){ doBackfill(); }
  else{ window.addEventListener('cloudStoreReady', doBackfill, { once:true }); }
})();

function getPeriodLabel(month,half){
  const[y,m]=month.split('/');const last=new Date(+y,+m,0).getDate();
  if(half==='first')return`${month}/01 – ${month}/15`;
  if(half==='second')return`${month}/16 – ${month}/${last}`;
  return`${month}/01 – ${month}/${last}`;
}
function getDays(month,half){
  const[y,m]=month.split('/');const last=new Date(+y,+m,0).getDate();
  if(half==='first')return 15;if(half==='second')return last-15;return last;
}

  if(!sel)return;
  delete _editedAt[shop]; // 用戶主動切換月份，清除 edit 保護
  state[shop].curMonth=sel.value;
  updateDaysBadge(shop);
  updateHalfBtnLabels(shop);
  tryLoadSaved(shop);
}
function onHalfChange(shop,half,btn){

function tryLoadSaved(shop){
  const s=state[shop];const rep=lsLoad(shop,s.curMonth,s.curHalf);
  // 每次切換區間都重置上傳卡片，避免誤以為已上傳
  resetUploadCards(shop);

  else{
    state[shop]._built=null;
    document.getElementById('tbl-'+shop).innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-hint">此區間尚無資料，請上傳報表產生</div></div>`;

    if(curShop===shop){const gb=document.getElementById('global-exp-btn');if(gb)gb.disabled=true;}
    setKpis(shop,0,0,0,0);
    updateTagFilterBar(shop);
  }
}
function loadIntoUI(shop,built,period,days){
  if(built&&Array.isArray(built)){
    built.forEach(r=>{
      r.analysis=calcAnalysis(r.adsFee||0,r.pureRate||0,r.targetROI??null,r.roiDiff??null,r.clicks||0,r.pureProfit||0);
      r.analysisLabel=r.analysis?.label||'';
      if(shop==='好麻吉'){
        r.growthAnalysis=calcGrowthAnalysis(r.growthRate??null,r.rev||0,r.prevRev??null,r.pureRate||0);
        r.growthAnalysisLabel=r.growthAnalysis?.label||'';
      }
    });
  }
  state[shop]._built=built;state[shop]._period=period;state[shop]._days=days;
  state[shop].filters={};state[shop].sorts={};state[shop].tagFilters=[];
  document.getElementById('period-tag-'+shop).textContent=period;
  if(curShop===shop){const gb=document.getElementById('global-exp-btn');if(gb)gb.disabled=false;}
  // patchRow 已更新過時：若 tbl 有 table 就跳過，避免閃爍；若 tbl 空（DOM 被清）仍需補渲染
  if(_editedAt[shop]){
    const tblEl=document.getElementById('tbl-'+shop);
    if(tblEl&&tblEl.querySelector('table'))return;
  }
  applyFilters(shop);
}

function onMapFile(e,shop){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      globalMap={};let cnt=0;
      wb.SheetNames.forEach(sName=>{
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sName],{defval:''});
        const sk=SHOPS.find(s=>sName.includes(s.id)||s.id.includes(sName))?.id||sName;
        if(!globalMap[sk])globalMap[sk]={};
        rows.forEach(r2=>{
          const code=(r2['商品選項貨號']||r2['商品編號']||'').toString().trim();
          let sid=r2['商品ID'];if(!code||!sid)return;
          sid=Math.round(Number(sid)).toString();
          if(sid==='NaN'||sid==='0'||sid.length<5)return;
          if(!globalMap[sk][code]){globalMap[sk][code]={sids:[],name:''};cnt++;}
          if(!globalMap[sk][code].sids.includes(sid))globalMap[sk][code].sids.push(sid);
          const pName=(r2['莫比克名']||r2['商品名稱']||'').trim();
          if(pName&&!globalMap[sk][code].name)globalMap[sk][code].name=pName;
        });
      });
      SHOPS.forEach(s=>{
        state[s.id].rawMap=globalMap[s.id]||{};
        const uc=document.getElementById('uc-map-'+s.id);
        const ui=document.getElementById('ui-map-'+s.id);
        const ut=document.getElementById('ut-map-'+s.id);
        const us=document.getElementById('us-map-'+s.id);
        if(uc)uc.className='ucard ok';
        if(ui)ui.textContent='✅';
        if(ut)ut.textContent=file.name;
        if(us)us.textContent=`已載入 ${cnt} 筆`;
        checkReady(s.id);
      });
    }catch(err){alert('商品清單讀取失敗：'+err.message);}
  };
  r.readAsBinaryString(file);
}

      }catch(err){markCard(shop,'mobic','❌','讀取失敗','err');}
      setSpin(shop,false);checkReady(shop);
    };r.readAsBinaryString(file);
  }else{
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const text=new TextDecoder('utf-8').decode(ev.target.result);
        state[shop].rawAds=parseAdsCsv(text);markCard(shop,'ads','✅',file.name,'ok');
      }catch(err){markCard(shop,'ads','❌','讀取失敗','err');}
      setSpin(shop,false);checkReady(shop);
    };r.readAsArrayBuffer(file);
  }
}
function parseAdsCsv(text){
  const lines=text.split('\n');
  let hi=lines.findIndex(l=>l.includes('廣告名稱')&&l.includes('花費'));if(hi<0)hi=7;
  const headers=splitCSV(lines[hi]).map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(hi+1).filter(l=>l.trim()).map(line=>{
    const vals=splitCSV(line).map(v=>v.replace(/^"|"$/g,'').trim());
    const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||'';});return obj;
  }).filter(r=>r['廣告名稱']);
}
function splitCSV(line){const res=[];let cur='';let q=false;for(let c of line){if(c==='"'){q=!q;}else if(c===','&&!q){res.push(cur);cur='';}else{cur+=c;}}res.push(cur);return res;}
function markCard(shop,type,icon,title,cls){

}

// ── 取得對應的「上期」區間 key ──
function getPrevPeriodKey(shop, month, half) {
  const [y, m] = month.split('/').map(Number);
  if (half === 'second') {
    // 下半月 → 上半月（同月）
    return lsKey(shop, month, 'first');
  } else if (half === 'first') {
    // 上半月 → 上個月下半月
    const prevMonth = m === 1
      ? `${y-1}/12`
      : `${y}/${String(m-1).padStart(2,'0')}`;
    return lsKey(shop, prevMonth, 'second');
  } else {
    // 整月 → 上個月整月
    const prevMonth = m === 1
      ? `${y-1}/12`
      : `${y}/${String(m-1).padStart(2,'0')}`;
    return lsKey(shop, prevMonth, 'full');
  }
}

// 取得上期報表的 code→rev map（雲端優先，過渡期看 main，最後 fallback 本地）
function getPrevRevMap(shop, month, half) {
  const key = getPrevPeriodKey(shop, month, half);
  let rep = null;
  try{ if(typeof Store!='undefined' && Store._profitMem && Store._profitMem[key]) rep = Store._profitMem[key]; }catch{}
  try{ if(!rep && typeof Store!='undefined' && Store._mem && Store._mem[key]) rep = Store._mem[key]; }catch{}
  if(!rep){
    try { rep = JSON.parse(localStorage.getItem(key) || 'null'); } catch {}
  }
  if (!rep || !rep.built) return {};
  const map = {};
  rep.built.forEach(r => { if (r.code && r.rev) map[r.code] = r.rev; });
  return map;
}

function buildShop(shop,days){
  const s=state[shop];const PLATFORM=getPlatformRate();
  const salesCol=s.rawMobic.length?Object.keys(s.rawMobic[0]).find(k=>k.startsWith('銷售數量')):null;
  const agg={};
  s.rawMobic.forEach(r=>{
    const code=(r['商品編號']||'').trim();if(!code)return;
    const name=(r['商品名稱']||'').trim();
    if(!agg[code])agg[code]={code,name,qty:0,rev:0,cost:0,gross:0,stock:0,shopeeIds:[],fromMobic:true};
    agg[code].qty+=num(r[salesCol]||0);agg[code].rev+=num(r['售價']||0);
    agg[code].cost+=num(r['成本']||0);agg[code].gross+=num(r['獲利']||0);
    agg[code].stock+=num(r['可用庫存']||0);
  });

  // 廣告資料：花費、直接投入產出比、投入產出比、點擊數
  const adsById={};const directROIById={};const roiById={};const clicksById={};
  s.rawAds.forEach(r=>{
    const sid=(r['商品 ID']||'').trim();
    const spend=num(r['花費']||0);
    const droi=num(r['直接投入產出比']||0);
    const roi=num(r['投入產出比']||0);
    const clicks=num(r['點擊數']||0);
    if(sid&&sid!=='-'){
      if(spend>0)adsById[sid]=(adsById[sid]||0)+spend;
      if(droi>0)directROIById[sid]=droi;
      if(roi>0)roiById[sid]=roi;
      if(clicks>0)clicksById[sid]=(clicksById[sid]||0)+clicks;
    }
  });

  const pm=s.rawMap||{};const adsByCode={};const directROIByCode={};const roiByCode={};const clicksByCode={};const sidsForCode={};const nameForCode={};
  Object.entries(pm).forEach(([code,entry])=>{
    // 相容新格式 {sids,name} 和舊格式 array
    const sids=Array.isArray(entry)?entry:(entry.sids||[]);
    const pName=Array.isArray(entry)?'':(entry.name||'');
    sidsForCode[code]=sids;
    if(pName)nameForCode[code]=pName;
    sids.forEach(sid=>{
      if(adsById[sid])adsByCode[code]=(adsByCode[code]||0)+adsById[sid];
      if(directROIById[sid])directROIByCode[code]=directROIById[sid];
      if(roiById[sid])roiByCode[code]=roiById[sid];
      if(clicksById[sid])clicksByCode[code]=(clicksByCode[code]||0)+clicksById[sid];
    });
  });
  Object.keys(agg).forEach(code=>{
    if(sidsForCode[code])agg[code].shopeeIds=sidsForCode[code];
  });

  // 有廣告費但無銷售：用商品清單的名稱
  Object.keys(adsByCode).forEach(code=>{
    if(!agg[code]){
      const sids=sidsForCode[code]||[];
      // 找商品名稱：優先用清單的名稱
      const pName=nameForCode[code]||'';
      const displayName=pName||`（商品ID: ${sids[0]||'未知'}）`;
      agg[code]={code,name:displayName,qty:0,rev:0,cost:0,gross:0,stock:0,shopeeIds:sids,fromMobic:false};
    }
  });

  const prevRevMap = getPrevRevMap(shop, s.curMonth, s.curHalf);

  const built=Object.values(agg).map(p=>{
    const adsFee=adsByCode[p.code]||0;
    const directROI=directROIByCode[p.code]||0;
    const roi=roiByCode[p.code]||0;
    const clicks=clicksByCode[p.code]||0;
    const platFee=p.rev*PLATFORM;
    const pureProfit=p.gross-adsFee-platFee;
    const pureRate=p.rev>0?pureProfit/p.rev:0;
    const adsPct=p.rev>0?adsFee/p.rev:0;
    const denom=pureRate+adsPct-0.20;
    const targetROI=denom>0?1/denom:null;
    const roiDiff=(targetROI!==null&&directROI>0)?directROI-targetROI:null;
    const dayBudget=days>0?adsFee/days:0;
    const analysis=calcAnalysis(adsFee,pureRate,targetROI,roiDiff,clicks,pureProfit);
    // 上半月營收 & 成長比（只有好麻吉）
    const prevRev = prevRevMap[p.code] ?? null;
    const growthRate = (prevRev!==null && prevRev>0) ? (p.rev - prevRev) / prevRev : null;
    const growthAnalysis = shop==='好麻吉' ? calcGrowthAnalysis(growthRate, p.rev, prevRev, pureRate) : null;
    return{code:p.code,name:p.name,shopeeIds:p.shopeeIds,qty:p.qty,rev:p.rev,gross:p.gross,
      adsFee,platFee,pureProfit,pureRate,adsPct,targetROI,directROI,roi,roiDiff,
      dayBudget,clicks,stock:p.stock,fromMobic:p.fromMobic,analysis,
      prevRev, growthRate, growthAnalysis};
  });
  built.sort((a,b)=>{if(!a.fromMobic&&b.fromMobic)return 1;if(a.fromMobic&&!b.fromMobic)return -1;return b.pureProfit-a.pureProfit;});
  return built;
}

// ── 分析規則設定（雲端同步） ──
const ANA_THRESH_DEF={clickMin:100,dangerMaxH:10,highMinH:30,badAdsMaxH:10,add300:3,add200:2,add100:1,add50:0,sub300:-3,sub200:-2,sub100:-1};
function _cloudRead(k){
  // 雲端優先：profit 文件 > 過渡期 main 文件 > 本地
  try{ if(typeof Store!='undefined' && Store._profitMem && Store._profitMem[k]!==undefined) return Store._profitMem[k]; }catch{}
  try{ if(typeof Store!='undefined' && Store._mem && Store._mem[k]!==undefined) return Store._mem[k]; }catch{}
  try{ const raw=localStorage.getItem(k); return raw?JSON.parse(raw):undefined; }catch{return undefined;}
}
function _cloudWrite(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));}catch{}
  try{ if(window.__cloudProfit) window.__cloudProfit.setField(k,v); }catch{}
}
function getAnaThresh(){const v=_cloudRead('ec_ana_thresh'); return Object.assign({},ANA_THRESH_DEF,v||{});}
function saveAnaThresh(t){_cloudWrite('ec_ana_thresh',t);}
function getCustomAnaRules(){return _cloudRead('ec_ana_custom')||[];}
function saveCustomAnaRules(r){_cloudWrite('ec_ana_custom',r);}
function getDisabledAnaTags(){return _cloudRead('ec_ana_disabled')||[];}
function disableAnaTag(label){const a=getDisabledAnaTags();if(!a.includes(label))a.push(label);_cloudWrite('ec_ana_disabled',a);renderAnaModalBody();reapplyAnaToAll();}
function restoreAnaTag(label){const a=getDisabledAnaTags().filter(l=>l!==label);_cloudWrite('ec_ana_disabled',a);renderAnaModalBody();reapplyAnaToAll();}
function evalAnaConds(conds,vals){
  if(!conds||!conds.length)return false;
  return conds.every(c=>{
    const v=vals[c.f];if(v===null||v===undefined)return false;
    const cv=parseFloat(c.v);
    if(c.op==='>')return v>cv;if(c.op==='>=')return v>=cv;
    if(c.op==='<')return v<cv;if(c.op==='<=')return v<=cv;
    if(c.op==='=')return v===cv;if(c.op==='!=')return v!==cv;
    return false;
  });
}

// ── 分析公式 ──
// $D=廣告費, $H=淨利率%, $K=目標ROI, $N=實際-目標, $O=點擊數, $P=純利
function calcAnalysis(adsFee, pureRate, targetROI, roiDiff, clicks, pureProfit){
  const t=getAnaThresh();
  const dis=new Set(getDisabledAnaTags());
  const ok=l=>!dis.has(l);
  const D=adsFee, H=pureRate*100, K=targetROI, N=roiDiff, O=clicks, P=pureProfit;
  if(ok('危險商品')&&D===0 && H>=0 && H<t.dangerMaxH) return{label:'危險商品',cls:'tag-danger'};
  if(ok('高利潤商品')&&D===0 && H>t.highMinH) return{label:'高利潤商品',cls:'tag-high'};
  if(ok('低淨利')&&D===0 && (N===null||N===undefined||!isFinite(N))) return{label:'低淨利',cls:'tag-low'};
  if(ok('賠錢中')&&D>0 && H<0) return{label:'賠錢中',cls:'tag-lose'};
  if(ok('低淨利')&&D>0 && K!==null && K!==undefined && K<0) return{label:'低淨利',cls:'tag-low'};
  if(ok('低效廣告')&&D>0 && H>=0 && H<t.badAdsMaxH) return{label:'低效廣告',cls:'tag-bad'};
  for(const ct of getCustomAnaRules()){
    if(evalAnaConds(ct.conds,{D,H,K,N,O,P}))return{label:ct.label,cls:ct.cls||'tag-add100'};
  }
  if(N===null||N===undefined||!isFinite(N)||O<t.clickMin) return{label:'',cls:''};
  if(ok('加300')&&N>=t.add300) return{label:'加300',cls:'tag-add300'};
  if(ok('加200')&&N>=t.add200) return{label:'加200',cls:'tag-add200'};
  if(ok('加100')&&N>=t.add100) return{label:'加100',cls:'tag-add100'};
  if(ok('加50')&&N>=t.add50&&N<t.add100) return{label:'加50',cls:'tag-add50'};
  if(ok('減300')&&N<=t.sub300) return{label:'減300',cls:'tag-sub300'};
  if(ok('減200')&&N<=t.sub200) return{label:'減200',cls:'tag-sub200'};
  if(ok('減100')&&N<=t.sub100) return{label:'減100',cls:'tag-sub100'};
  return{label:'',cls:''};
}

function openUploadModal(){

  const shop=curShop==='總表'?SHOPS[0].id:curShop;
  document.getElementById('upm-shop-hint').textContent='目前賣場：'+shop;
  function syncCard(id,ok,okIcon,defaultIcon,okLabel,defaultLabel){
