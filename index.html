        <span style="width:1px;height:14px;background:var(--border);margin:0 2px"></span>
        <button class="pill ${summaryRange === 'thisMonth' ? 'active' : ''}" data-summary-range="thisMonth"
          style="padding:4px 10px;font-size:11px;font-weight:600">本月</button>
        <button class="pill ${summaryRange === 'lastMonth' ? 'active' : ''}" data-summary-range="lastMonth"
          style="padding:4px 10px;font-size:11px;font-weight:600">上月</button>
        <span style="display:inline-flex;align-items:center;gap:4px">
          <span style="font-size:11px;color:var(--text-muted);font-weight:600">選月份：</span>
          <input type="month" id="summary-custom-month" value="${customMonth}" max="${toDateStr(now).slice(0,7)}"
            style="padding:3px 8px;border:1px solid ${summaryRange === 'customMonth' ? 'var(--primary)' : 'var(--border)'};border-radius:999px;font-size:11px;font-family:inherit;background:${summaryRange === 'customMonth' ? 'var(--primary-soft)' : 'var(--surface)'}">
        </span>
      </div>
    `;

    const summaryCards = PLATFORM_GROUPS.map(g => {
      const members = platforms.filter(p => g.members.includes(p.name));
      const cur  = members.reduce((s, p) => s + sumOver(p, rangeInfo.showDates), 0);
      const prev = members.reduce((s, p) => s + sumOver(p, rangeInfo.compareDates), 0);
      const d    = prev > 0 ? ((cur / prev) - 1) * 100 : 0;
      const iconHtml = g.logo
        ? `<img src="${g.logo}" alt="${escapeHtml(g.name)}" style="width:22px;height:22px;object-fit:contain;border-radius:4px;display:block">`
        : `<span style="font-size:16px;line-height:1">${g.icon}</span>`;
      return `
        <div class="stat-card" style="padding:14px 16px;background:white;border:1px solid var(--border);border-radius:10px;box-shadow:none">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;color:var(--text-muted)">
            ${iconHtml}
            <span style="font-size:12px;font-weight:600;letter-spacing:.02em">${escapeHtml(g.name)}</span>
            <span style="margin-left:auto;font-size:10px;color:var(--text-muted);font-weight:500">${escapeHtml(rangeInfo.label)}</span>
          </div>
          <div style="font-size:22px;color:var(--text);font-weight:700;margin:0;line-height:1.15;font-variant-numeric:tabular-nums;letter-spacing:-.01em">${fmtNTD(cur)}</div>
          <div style="margin-top:6px;font-size:11px;color:var(--text-muted);font-weight:500">
            ${d >= 0
              ? `<span class="up">↑ ${d.toFixed(1)}%</span>`
              : `<span class="down">↓ ${Math.abs(d).toFixed(1)}%</span>`} 較${escapeHtml(rangeInfo.compareLabel)}
          </div>
        </div>
      `;
    }).join('');

    // 依通路分群（蝦皮 / MOMO / 酷澎）
    const marketOrder = ['shopee', 'momo', 'coupang'];
    const marketTint = { shopee: '#ee4d2d', momo: '#ec4899', coupang: '#3b82f6' };
    const grouped = { shopee: [], momo: [], coupang: [] };
    platforms.forEach((p, i) => {
      const m = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      if (!grouped[m]) grouped[m] = [];
      grouped[m].push({ p, i });
    });

    // 單一賣場列
    const buildPlatformRow = (p, i) => {
      const td = inputOf(p);
      const yd = prevOf(p);
      const delta = yd > 0 ? ((td / yd) - 1) * 100 : 0;
      const hasAds = PLATFORMS_WITH_AD_SPEND.has(p.name);
      const inputAds = +(p.dailyAdSpend?.[inputDateStr]) || 0;
      const roas = (td > 0 && inputAds > 0) ? (td / inputAds).toFixed(2) : '—';
      const m = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      const logoSrc = MARKETPLACE_BADGE[m].src;

      const deltaCell = yd > 0
        ? (delta >= 0
            ? `<span class="up" style="font-weight:600">↑ ${delta.toFixed(1)}%</span>`
            : `<span class="down" style="font-weight:600">↓ ${Math.abs(delta).toFixed(1)}%</span>`)
        : '<span style="color:var(--text-muted)">—</span>';

      const inputStyle = 'width:120px;padding:4px 10px;border:1px solid var(--border);border-radius:5px;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;text-align:center;color:var(--text);box-sizing:border-box;background:white;height:28px';

      // 輸入框預設帶入「當日已儲存」的值（加上千分位逗號），過 12 點跨日才會自動清成 0
      const fmt = v => (v > 0 ? (+v).toLocaleString() : '');
      const revValue = fmt(td);
      const adsValue = fmt(inputAds);

      const adsCell = hasAds
        ? `<input type="text" inputmode="numeric" class="card-ads" data-idx="${i}" data-original="${adsValue}" value="${adsValue}" placeholder="0" onfocus="this.select()"
              style="${inputStyle}">`
        : '<span style="color:var(--text-muted);font-size:14px">—</span>';

      const roasCell = hasAds
        ? `<span class="card-roas" data-idx="${i}" style="font-weight:700;font-variant-numeric:tabular-nums;color:${p.color};font-size:13px">${roas}</span>`
        : '<span style="color:var(--text-muted);font-size:13px">—</span>';

      return `
        <tr data-card-idx="${i}" style="border-top:1px solid var(--border)">
          <td style="padding:3px 10px;white-space:nowrap">
            <div style="display:flex;align-items:center;gap:7px">
              <img src="${logoSrc}" alt="" style="width:20px;height:20px;border-radius:4px;object-fit:contain;background:white;padding:1px;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.06)">
              <span style="font-weight:600;font-size:13px">${escapeHtml(p.name)}</span>
            </div>
          </td>
          <td style="padding:3px 8px;text-align:center">
            <input type="text" inputmode="numeric" class="card-rev" data-idx="${i}" data-original="${revValue}" value="${revValue}" placeholder="0" onfocus="this.select()"
              style="${inputStyle}">
          </td>
          <td style="padding:3px 8px;text-align:center">${adsCell}</td>
          <td style="padding:3px 8px;text-align:center">${roasCell}</td>
          <td style="padding:3px 8px;white-space:nowrap;font-size:12px;text-align:center">${deltaCell}</td>
          <td style="padding:3px 6px;white-space:nowrap;text-align:center">
            <button class="row-save-btn" data-idx="${i}" title="立即儲存此列" style="display:none;width:26px;height:26px;font-size:14px;font-weight:700;border:0;border-radius:5px;background:#10b981;color:white;cursor:pointer;box-shadow:0 2px 4px rgba(16,185,129,.3)">✓</button>
          </td>
        </tr>
      `;
    };

    // 通路分群分隔列 + 該通路的賣場列
    const marketRowsHtml = marketOrder.map(m => {
      const items = grouped[m] || [];
      if (items.length === 0) return '';
      const badge = MARKETPLACE_BADGE[m];
      const tint = marketTint[m] || '#6b7280';
      const dividerRow = `
        <tr style="background:var(--bg)">
          <td colspan="6" style="padding:6px 14px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:7px">
              <img src="${badge.src}" alt="${escapeHtml(badge.name)}"
                style="width:14px;height:14px;border-radius:3px;object-fit:contain;flex-shrink:0">
              <span style="font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase">${escapeHtml(badge.name)}</span>
              <span style="font-size:10px;color:var(--text-muted);font-weight:500">· ${items.length} 個賣場</span>
            </div>
          </td>
        </tr>
      `;
      const platformRows = items.map(({ p, i }) => buildPlatformRow(p, i)).join('');
      return dividerRow + platformRows;
    }).join('');

    // 當日總計列
    const grandRev = platforms.reduce((s, p) => s + inputOf(p), 0);
    const grandPrev = platforms.reduce((s, p) => s + prevOf(p), 0);
    const grandDelta = grandPrev > 0 ? ((grandRev / grandPrev) - 1) * 100 : 0;
    const grandAds = platforms
      .filter(p => PLATFORMS_WITH_AD_SPEND.has(p.name))
      .reduce((s, p) => s + (+(p.dailyAdSpend?.[inputDateStr]) || 0), 0);
    const grandRoas = grandAds > 0 ? (grandRev / grandAds).toFixed(2) : '—';
    const grandDeltaCell = grandPrev > 0
      ? (grandDelta >= 0
          ? `<span class="up" style="font-weight:700">↑ ${grandDelta.toFixed(1)}%</span>`
          : `<span class="down" style="font-weight:700">↓ ${Math.abs(grandDelta).toFixed(1)}%</span>`)
      : '<span style="color:var(--text-muted)">—</span>';

    const totalRow = `
      <tr style="background:var(--bg);border-top:2px solid var(--border)">
        <td style="padding:6px 10px;font-weight:800;font-size:13px;letter-spacing:.05em">當日總計</td>
        <td style="padding:6px 10px;text-align:center;font-weight:800;font-size:14px;font-variant-numeric:tabular-nums">NT$ ${grandRev.toLocaleString()}</td>
        <td style="padding:6px 10px;text-align:center;font-weight:700;font-size:13px;color:var(--text-muted);font-variant-numeric:tabular-nums">NT$ ${grandAds.toLocaleString()}</td>
        <td style="padding:6px 10px;text-align:center;font-weight:800;font-size:13px;color:#6366f1;font-variant-numeric:tabular-nums">${grandRoas}</td>
        <td style="padding:6px 10px;font-size:12px;text-align:center">${grandDeltaCell}</td>
        <td></td>
      </tr>
    `;

    const revenueTableHtml = `
      <div class="table-card" style="margin:0;width:100%;display:flex;flex-direction:column">
        <div class="table-card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:8px 12px">
          <div>
            <h3 style="margin:0;font-size:14px">每日營收填寫</h3>
            <p style="margin:1px 0 0;font-size:11px;color:var(--text-muted)">輸入後按 Enter 或點別處跳出確認再儲存 · 過 12 點自動歸 0</p>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:4px;background:var(--bg);padding:3px 6px;border-radius:6px">
              <span style="font-size:11px;color:var(--text-muted);font-weight:500;padding-left:4px">填寫日期</span>
              <button id="entry-date-prev" title="前一天" style="padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:white;color:var(--text-muted);font-size:11px;cursor:pointer;line-height:1">←</button>
              <input type="date" id="entry-date-picker" value="${escapeHtml(inputDateStr)}" max="${escapeHtml(todayStrLocal)}"
                style="padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-weight:600;font-family:inherit;color:var(--text);background:white;width:130px">
              <button id="entry-date-next" title="後一天" style="padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:white;color:var(--text-muted);font-size:11px;cursor:pointer;line-height:1" ${inputDateStr >= todayStrLocal ? 'disabled' : ''}>→</button>
              ${inputDateStr !== defaultInputDate ? `<button id="entry-date-reset" title="回到昨天" style="padding:2px 7px;border:0;border-radius:4px;background:var(--primary-soft);color:var(--primary);font-size:10px;font-weight:600;cursor:pointer;margin-left:2px">昨天</button>` : ''}
            </div>
            <button id="open-month-detail" title="查看本月每日明細"
              style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:white;color:var(--text);font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px">
              📅 本月明細
            </button>
          </div>
        </div>
        <div class="table-wrap">
          <table style="border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed">
            <thead>
              <tr style="background:var(--bg)">
                <th style="padding:5px 10px;text-align:left;font-size:11px;width:auto">賣場</th>
                <th style="padding:5px 10px;text-align:center;font-size:11px;width:140px">營收 NT$</th>
                <th style="padding:5px 10px;text-align:center;font-size:11px;width:140px">廣告費</th>
                <th style="padding:5px 10px;text-align:center;font-size:11px;width:70px">ROAS</th>
                <th style="padding:5px 10px;text-align:center;font-size:11px;width:90px">較前一日</th>
                <th style="padding:5px 6px;text-align:center;width:36px"></th>
              </tr>
            </thead>
            <tbody>
              ${marketRowsHtml}
              ${totalRow}
            </tbody>
          </table>
        </div>
      </div>
    `;

    return `
      <div class="page-header" style="margin-bottom:10px">
        <h2 style="font-size:22px;margin:0">儀表板首頁 <span class="live-dot">即時資料</span></h2>
        <p style="margin:2px 0 0;font-size:13px">歡迎回來，${escapeHtml(this.currentUser.name)}　·　${inputDateDisplay}</p>
      </div>
      ${summaryPills}
      <div class="stat-grid" style="grid-template-columns:repeat(4, 1fr);margin-bottom:12px;gap:10px">${summaryCards}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch">
        <div style="display:flex">${revenueTableHtml}</div>
        <div style="display:flex">${this.dailyLineChartHtml(platforms)}</div>
      </div>
    `;
  },

  /* ============================================================
   *  行銷辦公室 - 工作週曆（Google Calendar 風格的週檢視）
   * ============================================================ */
  renderWeeklyCalendarTab(deptId, color, dept) {
    const allTasks = Store.get(Store.KEYS.dailyTasks, []);
    const tasks = allTasks.filter(t => t.deptId === deptId);
    const members = (Store.get(Store.KEYS.users, []))
      .filter(u => getUserDepts(u).includes(dept.name));

    // filter 狀態
    if (!this.filter.dashboardMarketing) this.filter.dashboardMarketing = { employee: 'all', weekOffset: 0, viewMode: 'week', monthOffset: 0 };
    const f = this.filter.dashboardMarketing;
    if (!f.viewMode) f.viewMode = 'week';
    if (f.monthOffset == null) f.monthOffset = 0;
    const isMonthMode = f.viewMode === 'month';
    const weekOffset = f.weekOffset || 0;
    const monthOffset = f.monthOffset || 0;

    const now = new Date();
    const todayStr2 = toDateStr(now);
    const weekDayNames = ['週一','週二','週三','週四','週五','週六','週日'];

    // 計算範圍：依檢視模式
    let rangeStart, rangeEnd, headerLabel, datesInGrid, gridCols, gridRows;
    let displayLabel; // 例如 "本週" / "6/01 – 6/07" / "2026 年 6 月"

    if (isMonthMode) {
      // 月檢視：取得目標月份的第一天
      const target = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
      const yMonth = target.getFullYear();
      const mMonth = target.getMonth();
      const firstOfMonth = new Date(yMonth, mMonth, 1);
      const lastOfMonth = new Date(yMonth, mMonth + 1, 0);
      // 從第一天前推到週一
      const dow = firstOfMonth.getDay();
      const firstMondayOffset = dow === 0 ? -6 : 1 - dow;
      const gridStart = addDays(firstOfMonth, firstMondayOffset);
      // 計算所需週數（5 或 6）
      const totalDays = lastOfMonth.getDate() - firstMondayOffset;
      const weeks = Math.ceil(totalDays / 7);
      datesInGrid = Array.from({ length: weeks * 7 }, (_, i) => addDays(gridStart, i));
      rangeStart = toDateStr(firstOfMonth);
      rangeEnd = toDateStr(lastOfMonth);
      gridCols = 7;
      gridRows = weeks;
      headerLabel = `${yMonth} 年 ${mMonth + 1} 月`;
      displayLabel = monthOffset === 0 ? '本月' : monthOffset === -1 ? '上月' : monthOffset === 1 ? '下月' : `${monthOffset > 0 ? '+' : ''}${monthOffset} 月`;
    } else {
      // 週檢視
      const dayOfWeek = now.getDay();
      const offsetToMon = (dayOfWeek === 0 ? -6 : 1 - dayOfWeek);
      const monday = addDays(now, offsetToMon + weekOffset * 7);
      datesInGrid = Array.from({ length: 7 }, (_, i) => addDays(monday, i));
      rangeStart = toDateStr(datesInGrid[0]);
      rangeEnd = toDateStr(datesInGrid[6]);
      gridCols = 7;
      gridRows = 1;
      headerLabel = `${rangeStart.slice(5).replace('-','/')} – ${rangeEnd.slice(5).replace('-','/')}`;
      displayLabel = weekOffset === 0 ? '本週' : weekOffset === -1 ? '上週' : weekOffset === 1 ? '下週' : `${weekOffset > 0 ? '+' : ''}${weekOffset} 週`;
    }

    // 套人員篩選
    let tasksInRange = tasks.filter(t => t.date >= rangeStart && t.date <= rangeEnd);
    if (f.employee && f.employee !== 'all') {
      tasksInRange = tasksInRange.filter(t => t.employee === f.employee);
    }
    const byDate = {};
    datesInGrid.forEach(d => { byDate[toDateStr(d)] = []; });
    tasksInRange.forEach(t => {
      if (byDate[t.date]) byDate[t.date].push(t);
    });

    // 狀態統計（右上 badge 用）
    const statusCounts = { '進行中': 0, '已完成': 0, '遇阻': 0, '待開始': 0 };
    tasksInRange.forEach(t => {
      if (statusCounts[t.status] != null) statusCounts[t.status]++;
    });

    // 未完成待辦
    const pendingTodos = [];
    tasksInRange.forEach(t => {
      const todos = Array.isArray(t.todos) ? t.todos : [];
      todos.forEach((td, idx) => {
        if (!td.done && td.text) {
          pendingTodos.push({ task: t, todoIdx: idx, text: td.text });
        }
      });
    });

    const employeeOptions = `
      <option value="all" ${(f.employee || 'all') === 'all' ? 'selected' : ''}>全部人員</option>
      ${members.map(u => `<option value="${escapeHtml(u.username)}" ${f.employee === u.username ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}
    `;

    // === 月檢視：5-6 列 × 7 欄；每格較緊湊 ===
    // === 週檢視：1 列 × 7 欄；每格寬鬆 ===
    let calendarBody = '';

    if (isMonthMode) {
      const targetMonth = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1).getMonth();
      // 頂部週名稱
      const headRow = `
        <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);background:var(--bg)">
          ${weekDayNames.map(n => `<div style="padding:6px 8px;font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:.05em;text-align:center">${n}</div>`).join('')}
        </div>
      `;
      const cellsHtml = datesInGrid.map((d, i) => {
        const ds = toDateStr(d);
        const isToday = ds === todayStr2;
        const isCurrentMonth = d.getMonth() === targetMonth;
        const dayTasks = byDate[ds] || [];
        const more = dayTasks.length - 2;
        const taskMini = dayTasks.slice(0, 2).map(t => {
          const catMeta = t.category ? getCategoryMeta(t.category) : null;
          const catColor = catMeta?.color || '#6b7280';
          const st = DAILY_TASK_STATUS[t.status] || { color: '#6b7280', emoji: '•' };
          return `
            <div data-cal-task="${escapeHtml(t.id)}" style="background:white;border-left:3px solid ${catColor};border-radius:3px;padding:2px 4px;margin-bottom:2px;cursor:pointer;font-size:10px;line-height:1.3;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(t.title)}${t.employeeName ? ' · ' + escapeHtml(t.employeeName) : ''}">
              <span style="color:${st.color}">${st.emoji}</span> ${escapeHtml(t.title)}
            </div>
          `;
        }).join('');

        return `
          <div style="border-right:${(i+1) % 7 === 0 ? '0' : '1px solid var(--border)'};border-bottom:${i < (gridRows-1)*7 ? '1px solid var(--border)' : '0'};padding:4px 5px;min-height:78px;display:flex;flex-direction:column;background:${isToday ? '#eef2ff44' : 'transparent'};opacity:${isCurrentMonth ? 1 : 0.4}">
            <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:3px">
              <span style="display:inline-flex;align-items:center;justify-content:center;${isToday ? `background:var(--primary);color:white;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700` : 'font-size:11px;color:var(--text-muted);font-weight:500'}">${d.getDate()}</span>
            </div>
            <div style="flex:1;min-height:0">
              ${taskMini}
              ${more > 0 ? `<div style="font-size:9px;color:var(--text-muted);font-weight:600;padding:1px 4px">+${more}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
      calendarBody = `
        ${headRow}
        <div style="display:grid;grid-template-columns:repeat(7,1fr)">
          ${cellsHtml}
        </div>
      `;
    } else {
      const columnsHtml = datesInGrid.map((d, i) => {
        const dateStr = toDateStr(d);
        const isToday = dateStr === todayStr2;
        const dayTasks = byDate[dateStr] || [];

        const taskCardsHtml = dayTasks.length === 0
          ? `<div style="padding:14px 8px;text-align:center;color:#cbd5e1;font-size:11px">—</div>`
          : dayTasks.map(t => {
              const st = DAILY_TASK_STATUS[t.status] || { color: '#6b7280', bg: '#e5e7eb', emoji: '•' };
              const catMeta = t.category ? getCategoryMeta(t.category) : null;
              const catColor = catMeta?.color || '#6b7280';
              const todos = Array.isArray(t.todos) ? t.todos : [];
              const doneCount = todos.filter(td => td.done).length;
              const canEdit = this.currentUser.role === 'admin' || this.currentUser.username === t.employee;
              return `
                <div data-cal-task="${escapeHtml(t.id)}" style="position:relative;background:white;border:1px solid var(--border);border-left:3px solid ${catColor};border-radius:6px;padding:6px 8px;margin-bottom:6px;cursor:pointer;transition:box-shadow .15s" onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,.08)'" onmouseout="this.style.boxShadow='none'">
                  ${canEdit ? `<button class="cal-task-del" data-cal-del="${escapeHtml(t.id)}" title="刪除此筆工作進度" style="position:absolute;top:3px;right:3px;width:18px;height:18px;border:0;border-radius:4px;background:transparent;color:#cbd5e1;font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0" onmouseover="this.style.background='#fee2e2';this.style.color='#ef4444'" onmouseout="this.style.background='transparent';this.style.color='#cbd5e1'">🗑</button>` : ''}
                  <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px;flex-wrap:wrap;padding-right:${canEdit ? '22px' : '0'}">
                    ${t.category ? `<span style="font-size:9px;font-weight:700;color:${catColor};letter-spacing:.03em">${escapeHtml(t.category)}</span>` : ''}
                    ${t.subcategory ? `<span style="font-size:9px;color:var(--text-muted)">· ${escapeHtml(t.subcategory)}</span>` : ''}
                    <span style="margin-left:auto;display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:999px;background:${st.bg};color:${st.color};font-size:9px;font-weight:700">${st.emoji} ${escapeHtml(t.status)}</span>
                  </div>
                  <div style="font-size:12px;font-weight:600;line-height:1.35;color:var(--text);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${escapeHtml(t.title)}</div>
                  <div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px;color:var(--text-muted);flex-wrap:wrap">
                    <span>${escapeHtml(t.employeeName || t.employee)}</span>
                    ${t.dueDate ? `<span style="display:inline-flex;align-items:center;gap:2px;color:#ef4444;font-weight:600" title="預計完成日">📌 ${escapeHtml(t.dueDate.slice(5).replace('-','/'))}</span>` : ''}
                    ${todos.length > 0 ? `<span style="margin-left:auto">📝 待辦 ${doneCount}/${todos.length}</span>` : ''}
                  </div>
                </div>
              `;
            }).join('');

        return `
          <div style="flex:1;min-width:0;display:flex;flex-direction:column;border-right:${i < 6 ? '1px solid var(--border)' : '0'};background:${isToday ? '#eef2ff44' : 'transparent'}">
            <div style="padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);${isToday ? `background:var(--primary);color:white` : ''}">
              <div style="font-size:10px;font-weight:600;${isToday ? 'color:white' : 'color:var(--text-muted)'};letter-spacing:.05em">${weekDayNames[i]}</div>
              <div style="font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;${isToday ? 'color:white' : 'color:var(--text)'}">${d.getMonth()+1}/${d.getDate()}</div>
            </div>
            <div style="padding:6px;flex:1;min-height:110px">
              ${taskCardsHtml}
            </div>
          </div>
        `;
      }).join('');
      calendarBody = `<div style="display:flex">${columnsHtml}</div>`;
    }

    // 未完成待辦
    const scopeLabel = isMonthMode ? '本月' : '本週';
    const pendingHtml = pendingTodos.length === 0
      ? `<div style="padding:14px;text-align:center;color:var(--text-muted);font-size:12px">${scopeLabel}沒有待辦事項 🎉</div>`
      : pendingTodos.slice(0, 40).map(({ task, todoIdx, text }) => {
          const catMeta = task.category ? getCategoryMeta(task.category) : null;
          const catColor = catMeta?.color || '#6b7280';
          const st = DAILY_TASK_STATUS[task.status] || { color: '#6b7280', bg: '#e5e7eb', emoji: '•' };
          const td = task.todos?.[todoIdx];
          // 待辦有指派人員就用它，沒有就用任務的負責人
          const displayName = (td?.assigneeName) || task.employeeName || task.employee;
          const hasAssignee = !!td?.assigneeName;
          return `
            <label style="display:flex;align-items:center;gap:7px;padding:7px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px;flex-wrap:wrap">
              <input type="checkbox" class="dp-todo-tick" data-task-id="${escapeHtml(task.id)}" data-todo-idx="${todoIdx}" style="width:14px;height:14px;cursor:pointer;flex-shrink:0">
              <span style="flex:1;min-width:120px;color:var(--text)">${escapeHtml(text)}</span>
              <span style="display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:999px;background:${st.bg};color:${st.color};font-size:10px;font-weight:700;flex-shrink:0">${st.emoji} ${escapeHtml(task.status)}</span>
              ${task.category ? `<span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;background:${catColor}14;color:${catColor};flex-shrink:0">${escapeHtml(task.category)}</span>` : ''}
              <span style="font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;flex-shrink:0">${task.date.slice(5).replace('-','/')}</span>
              <span style="font-size:10px;color:${hasAssignee ? 'var(--text)' : 'var(--text-muted)'};flex-shrink:0;min-width:50px;font-weight:${hasAssignee ? '700' : '500'}" title="${hasAssignee ? '待辦指派人員' : '任務負責人'}">${hasAssignee ? '👤 ' : ''}${escapeHtml(displayName)}</span>
            </label>
          `;
        }).join('');

    // 上一個 / 下一個 按鈕：依模式而定
    const prevOffset = isMonthMode ? monthOffset - 1 : weekOffset - 1;
    const nextOffset = isMonthMode ? monthOffset + 1 : weekOffset + 1;
    const offsetAttr = isMonthMode ? 'data-month-offset' : 'data-week-offset';

    return `
      <div style="display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start">
        <div class="table-card">
          <div class="table-card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:12px 16px">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
              <h3 style="margin:0;font-size:14px;font-weight:600">工作${isMonthMode ? '月' : '週'}曆</h3>
              <div style="display:flex;align-items:center;gap:4px">
                <button class="pill" ${offsetAttr}="${prevOffset}" title="上一個" style="padding:3px 8px;font-size:11px">←</button>
                <button class="pill active" ${offsetAttr}="0" style="padding:3px 10px;font-size:11px;min-width:60px">${displayLabel}</button>
                <button class="pill" ${offsetAttr}="${nextOffset}" title="下一個" style="padding:3px 8px;font-size:11px">→</button>
              </div>
              <div style="display:flex;align-items:center;gap:4px;padding-left:6px;border-left:1px solid var(--border);margin-left:4px">
                <button class="pill ${!isMonthMode ? 'active' : ''}" data-view-mode="week" style="padding:3px 10px;font-size:11px">週</button>
                <button class="pill ${isMonthMode ? 'active' : ''}" data-view-mode="month" style="padding:3px 10px;font-size:11px">月</button>
              </div>
              <span style="font-size:11px;color:var(--text-muted)">${escapeHtml(headerLabel)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <div style="display:flex;align-items:center;gap:4px">
                ${DAILY_TASK_STATUS_LIST.map(s => {
                  const meta = DAILY_TASK_STATUS[s];
                  const c = statusCounts[s] || 0;
                  return `<span title="${escapeHtml(s)} ${c} 件" style="display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:999px;background:${meta.bg};color:${meta.color};font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;${c === 0 ? 'opacity:.4' : ''}">${meta.emoji} ${escapeHtml(s)} ${c}</span>`;
                }).join('')}
              </div>
              <span style="font-size:12px;color:var(--text-muted);margin-left:6px">人員</span>
              <select id="dash-mkt-emp" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;cursor:pointer">
                ${employeeOptions}
              </select>
              <button class="btn-add" data-cal-add="${escapeHtml(deptId)}" style="padding:5px 12px;font-size:12px">+ 新增進度</button>
            </div>
          </div>
          <div style="border-top:1px solid var(--border)">${calendarBody}</div>
        </div>
        <div class="table-card" style="position:sticky;top:14px">
          <div class="table-card-header" style="padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div>
              <h3 style="margin:0;font-size:14px;font-weight:600">未完成待辦事項 <span style="font-size:11px;color:var(--text-muted);font-weight:500">· ${scopeLabel} ${pendingTodos.length} 項</span></h3>
              <p style="margin:2px 0 0;font-size:11px;color:var(--text-muted)">打勾即標記完成</p>
            </div>
            <button class="btn-add" data-todo-quick-add="${escapeHtml(deptId)}" style="padding:5px 10px;font-size:11px;flex-shrink:0">+ 新增待辦</button>
          </div>
          <div style="max-height:540px;overflow-y:auto">${pendingHtml}</div>
        </div>
      </div>
    `;
  },

  /* 每日營收曲線（近 N 天） */
  dailyLineChartHtml(platforms /* days param ignored now */) {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const endDate = addDays(now, -1);
    const yMonth = now.getFullYear();
    const mMonth = now.getMonth() + 1;
    const endStr = toDateStr(endDate);

    // 以本月為主：從本月 1 號到昨日（最新有資料的一天）
    const dates = [];
    for (let d = new Date(monthStart); toDateStr(d) <= endStr; d = addDays(d, 1)) {
      dates.push(toDateStr(d));
    }

    // 切換：null = 總計（全部加總），string = 單一平台
    const activeName = this.filter.chartPlatform || null;

    // 圖例（全賣場 + 7 個平台）
    const allPill = `
      <button class="line-legend" data-name="" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:${activeName === null ? '#0f172a' : 'var(--bg)'};border:1px solid ${activeName === null ? '#0f172a' : 'var(--border)'};border-radius:999px;font-size:11px;color:${activeName === null ? 'white' : 'var(--text-muted)'};cursor:pointer;font-weight:500">🏪 全賣場</button>
    `;
    const platformPills = platforms.map(p => {
      const isActive = activeName === p.name;
      const isDimmed = activeName !== null && !isActive;
      const market = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      const logoSrc = MARKETPLACE_BADGE[market].src;
      return `
        <button class="line-legend" data-name="${escapeHtml(p.name)}"
          style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px 3px 3px;background:${isActive ? p.color : p.color + '14'};border:1px solid ${isActive ? p.color : p.color + '40'};border-radius:999px;font-size:11px;color:${isActive ? 'white' : p.color};cursor:pointer;font-weight:600;opacity:${isDimmed ? '0.45' : '1'};transition:opacity .15s">
          <img src="${logoSrc}" alt="" style="width:16px;height:16px;border-radius:50%;object-fit:contain;background:white;flex-shrink:0">
          ${escapeHtml(p.name)}
        </button>
      `;
    }).join('');

    // 計算每日資料
    // 全賣場模式（activeName == null）：7 條平台曲線同時顯示
    // 單一平台模式：只顯示該平台一條線
    const logoImgHtml = (platformName) => {
      const m = PLATFORM_MARKETPLACE[platformName] || 'shopee';
      const s = MARKETPLACE_BADGE[m];
      return `<img src="${s.src}" alt="${escapeHtml(s.name)}" style="width:18px;height:18px;border-radius:4px;object-fit:contain;background:white;padding:1px;vertical-align:middle;margin-right:6px;box-shadow:0 1px 2px rgba(0,0,0,0.06)">`;
    };

    let series, lineLabel, lineLabelHtml, lineColor, isMulti;
    if (activeName) {
      const p = platforms.find(x => x.name === activeName);
      if (p) {
        series = [{ name: p.name, color: p.color, icon: p.icon,
                    values: dates.map(d => +(p.daily?.[d]) || 0) }];
        lineLabel = p.name;
        lineLabelHtml = `${logoImgHtml(p.name)}<span style="vertical-align:middle">${escapeHtml(p.name)}</span>`;
        lineColor = p.color;
        isMulti = false;
      } else {
        series = platforms.map(pp => ({
          name: pp.name, color: pp.color, icon: pp.icon,
          values: dates.map(d => +(pp.daily?.[d]) || 0),
        }));
        lineLabel = '全賣場';
        lineLabelHtml = '<span style="vertical-align:middle">🏪 全賣場</span>';
        lineColor = '#0f172a';
        isMulti = true;
      }
    } else {
      series = platforms.map(pp => ({
        name: pp.name, color: pp.color, icon: pp.icon,
        values: dates.map(d => +(pp.daily?.[d]) || 0),
      }));
      lineLabel = '全賣場';
      lineLabelHtml = '<span style="vertical-align:middle">🏪 全賣場</span>';
      lineColor = '#0f172a';
      isMulti = true;
    }

    // 每日全平台資料供 tooltip 取用
    const dailyData = dates.map(d => ({
      date: d,
      total: platforms.reduce((s, pp) => s + (+pp.daily?.[d] || 0), 0),
      breakdown: platforms.map(pp => ({
        name: pp.name, icon: pp.icon, color: pp.color,
        value: +pp.daily?.[d] || 0,
      })),
    }));

    // 沒資料的空狀態
    if (dates.length === 0) {
      return `
        <div class="chart-card" style="margin-top:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px">
            <h3 style="margin:0">${yMonth} 年 ${mMonth} 月每日營收</h3>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${allPill}${platformPills}</div>
          <div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px">
            本月還沒有資料 — 等行銷團隊進系統填入昨日數字後，這裡會顯示曲線
          </div>
        </div>
      `;
    }

    const maxV = Math.max(1, ...series.flatMap(s => s.values));

    const W = 1000, H = 280;
    const padL = 60, padR = 20, padT = 20, padB = 32;
    const cw = W - padL - padR;
    const ch = H - padT - padB;
    const xStep = dates.length > 1 ? cw / (dates.length - 1) : cw / 2;

    // Y 軸刻度
    const yTicks = [];
    for (let i = 0; i <= 4; i++) {
      const y = padT + ch - (i / 4) * ch;
      const v = (maxV / 4) * i;
      yTicks.push(`
        <line x1="${padL}" x2="${W - padR}" y1="${y}" y2="${y}" stroke="#e2e8f0" stroke-dasharray="3,3"/>
        <text x="${padL - 10}" y="${y + 4}" font-size="11" fill="#94a3b8" text-anchor="end">${this.fmtTick(v)}</text>
      `);
    }

    // X 軸日期標籤
    const xLabelEvery = Math.max(1, Math.round(dates.length / 8));
    const xLabels = dates.map((d, i) => {
      if (i % xLabelEvery !== 0 && i !== dates.length - 1 && i !== 0) return '';
      const x = padL + i * xStep;
      const label = d.slice(5).replace('-', '/');
      return `<text x="${x}" y="${H - padB + 18}" font-size="11" fill="#64748b" text-anchor="middle">${label}</text>`;
    }).join('');

    // 折線（每個 series 一條）
    const polylines = series.map(s => {
      const pts = s.values.map((v, i) => {
        const x = padL + i * xStep;
        const y = padT + ch - (v / maxV) * ch;
        return `${x},${y}`;
      }).join(' ');
      return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="${isMulti ? 2 : 2.5}" stroke-linejoin="round" stroke-linecap="round" />`;
    }).join('');

    // 資料點圓圈（每個 series 每天一個）
    const circles = series.map(s => s.values.map((v, i) => {
      const x = padL + i * xStep;
      const y = padT + ch - (v / maxV) * ch;
      return `<circle cx="${x}" cy="${y}" r="${isMulti ? 2.5 : 3}" fill="white" stroke="${s.color}" stroke-width="${isMulti ? 1.5 : 2}" />`;
    }).join('')).join('');

    // 保存 chart 狀態供 hover handler 使用
    this._chartState = { dates, dailyData, series, padL, xStep, W, H, padT, ch, maxV, lineColor, lineLabel, isMulti, activeName };

    // 計算目前選中的 series 累計：全賣場 = 7 個賣場全部加總；單一賣場 = 該賣場本月加總
    const seriesTotal = series.reduce((s, ss) => s + ss.values.reduce((a, b) => a + b, 0), 0);
    const daysWithData = dates.filter(d =>
      series.some(s => s.values[dates.indexOf(d)] > 0)
    ).length;
    const totalLabel = isMulti ? '本月全賣場累計' : `本月「${lineLabel}」累計`;

    return `
      <div class="chart-card" style="margin:0;padding:12px 14px;width:100%;display:flex;flex-direction:column">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;flex-shrink:0">
          <h3 style="margin:0;font-size:14px;display:inline-flex;align-items:center;gap:4px">${yMonth} 年 ${mMonth} 月　${lineLabelHtml} 每日營收</h3>
          <span style="font-size:11px;color:var(--text-muted)">滑鼠移上去看當日</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px;flex-shrink:0">
          <span style="font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:.05em">${escapeHtml(totalLabel)}</span>
          <span style="font-size:20px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.01em">NT$ ${seriesTotal.toLocaleString()}</span>
          <span style="font-size:11px;color:var(--text-muted)">· ${daysWithData} 天有資料</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;flex-shrink:0">${allPill}${platformPills}</div>
        <div id="line-chart-container" style="position:relative;flex:1;min-height:240px;display:flex">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block">
            ${yTicks.join('')}
            ${polylines}
            ${circles}
            ${xLabels}
            <line id="chart-guide" x1="0" y1="${padT}" x2="0" y2="${padT + ch}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" style="opacity:0;transition:opacity .1s" />
            ${isMulti ? '' : `<circle id="chart-active-dot" cx="0" cy="0" r="6" fill="${lineColor}" stroke="white" stroke-width="2" style="opacity:0;transition:opacity .1s" />`}
          </svg>
          <div id="line-chart-tooltip" style="position:absolute;display:none;background:#1e293b;color:white;padding:10px 14px;border-radius:8px;font-size:13px;pointer-events:none;box-shadow:0 8px 24px rgba(15,23,42,0.2);z-index:10;transform:translate(-50%, calc(-100% - 10px));min-width:200px"></div>
        </div>
      </div>
    `;
  },

  bindLineChartTooltip() {
    const container = document.getElementById('line-chart-container');
    if (!container || !this._chartState) return;
    const svg = container.querySelector('svg');
    const tooltip = document.getElementById('line-chart-tooltip');
    const guide   = document.getElementById('chart-guide');
    const activeDot = document.getElementById('chart-active-dot'); // 只有單一平台模式才有
    if (!svg || !tooltip || !guide) return;

    const { dates, dailyData, series, padL, xStep, W, H, padT, ch, maxV, isMulti, activeName } = this._chartState;

    const logoFor = (name) => {
      const m = PLATFORM_MARKETPLACE[name] || 'shopee';
      return MARKETPLACE_BADGE[m].src;
    };

    const fmtTooltip = (i) => {
      const data = dailyData[i];
      const dateStr = data.date.replace(/-/g, '/');
      if (isMulti) {
        // 全賣場模式：顯示日期 + 總計 + 7 個平台明細
        return `
          <div style="font-size:11px;opacity:0.7;margin-bottom:6px">${dateStr}</div>
          <div style="font-size:11px;opacity:0.7">全賣場總計</div>
          <div style="font-size:18px;font-weight:700;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.18);font-variant-numeric:tabular-nums">NT$ ${Math.round(data.total).toLocaleString()}</div>
          <div style="font-size:12px;line-height:1.7">
            ${data.breakdown.map(p => `
              <div style="display:flex;justify-content:space-between;gap:18px;align-items:center">
                <span style="opacity:0.9;display:inline-flex;align-items:center;gap:6px">
                  <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${p.color}"></span>
                  <img src="${logoFor(p.name)}" alt="" style="width:16px;height:16px;border-radius:3px;object-fit:contain;background:white;flex-shrink:0">
                  ${escapeHtml(p.name)}
                </span>
                <span style="font-variant-numeric:tabular-nums;opacity:${p.value > 0 ? 1 : 0.4}">${p.value > 0 ? p.value.toLocaleString() : '—'}</span>
              </div>
            `).join('')}
          </div>
        `;
      } else {
        // 單一平台模式
        const p = data.breakdown.find(x => x.name === activeName);
        const v = p ? p.value : 0;
        return `
          <div style="font-size:11px;opacity:0.7;margin-bottom:4px">${dateStr}</div>
          ${p ? `<div style="font-size:12px;opacity:0.9;margin-bottom:4px;display:inline-flex;align-items:center;gap:6px">
            <img src="${logoFor(p.name)}" alt="" style="width:16px;height:16px;border-radius:3px;object-fit:contain;background:white;flex-shrink:0">
            ${escapeHtml(p.name)}
          </div>` : ''}
          <div style="font-size:18px;font-weight:700;font-variant-numeric:tabular-nums">NT$ ${Math.round(v).toLocaleString()}</div>
        `;
      }
    };

    const update = (e) => {
      const svgRect = svg.getBoundingClientRect();
      const x = e.clientX - svgRect.left;
      const scaleX = svgRect.width / W;
      const scaleY = svgRect.height / H;
      const svgX = x / scaleX;

      let i = Math.round((svgX - padL) / xStep);
      i = Math.max(0, Math.min(dates.length - 1, i));

      const cx = padL + i * xStep;
      // 多線：tooltip 對齊到該日最高線；單線：對齊到該線
      const yVal = isMulti
        ? Math.max(...series.map(s => s.values[i]))
        : series[0].values[i];
      const cy = padT + ch - (yVal / maxV) * ch;

      tooltip.innerHTML = fmtTooltip(i);
      tooltip.style.left = `${cx * scaleX}px`;
      tooltip.style.top  = `${cy * scaleY}px`;
      tooltip.style.display = 'block';

      guide.setAttribute('x1', cx);
      guide.setAttribute('x2', cx);
      guide.style.opacity = '1';

      if (activeDot && !isMulti) {
        activeDot.setAttribute('cx', cx);
        activeDot.setAttribute('cy', cy);
        activeDot.style.opacity = '1';
      }
    };

    const hide = () => {
      tooltip.style.display = 'none';
      guide.style.opacity = '0';
      if (activeDot) activeDot.style.opacity = '0';
    };

    container.addEventListener('mousemove', update);
    container.addEventListener('mouseleave', hide);
  },

  fmtTick(v) {
    if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
    if (v >= 1000) return Math.round(v / 1000) + 'K';
    return Math.round(v).toString();
  },
