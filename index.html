  /* ============================================================
   *  本月明細 — 試算表式檢視
   * ============================================================ */
  openMonthlyDetailModal() {
    let platforms = Store.get(Store.KEYS.platforms, null);
    if (!platforms) platforms = JSON.parse(JSON.stringify(PLATFORMS));
    platforms = migratePlatforms(platforms);

    const now = new Date();
    const yMonth = now.getFullYear();
    const mMonth = now.getMonth();
    const lastDay = new Date(yMonth, mMonth + 1, 0).getDate();
    const todayDay = now.getDate();
    // 只顯示「本月 1 號 到 今天」的日期（未來空白日不顯示，避免列數太多要捲動）
    const dates = Array.from({ length: todayDay }, (_, i) =>
      `${yMonth}-${String(mMonth + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`
    );

    // 依通路分群（蝦皮 4 / MOMO 2 / 酷澎 1）
    const marketOrder = ['shopee', 'momo', 'coupang'];
    const marketTint = { shopee: '#ee4d2d', momo: '#ec4899', coupang: '#3b82f6' };
    const grouped = { shopee: [], momo: [], coupang: [] };
    platforms.forEach(p => {
      const m = PLATFORM_MARKETPLACE[p.name] || 'shopee';
      if (!grouped[m]) grouped[m] = [];
      grouped[m].push(p);
    });

    // 取所有平台的順序 + 各自是否有廣告費
    const flatPlatforms = [];
    marketOrder.forEach(m => grouped[m].forEach(p => flatPlatforms.push({ p, market: m })));

    // 計算每平台每日 / 每平台總計 / 每日總計 / 整月總計
    const get = (p, d) => +(p.daily?.[d]) || 0;
    const getAds = (p, d) => +(p.dailyAdSpend?.[d]) || 0;

    const platformTotals = flatPlatforms.map(({ p }) => {
      const rev = dates.reduce((s, d) => s + get(p, d), 0);
      const ads = PLATFORMS_WITH_AD_SPEND.has(p.name)
        ? dates.reduce((s, d) => s + getAds(p, d), 0)
        : 0;
      const roas = ads > 0 ? (rev / ads).toFixed(2) : '—';
      return { rev, ads, roas };
    });

    // 表頭：通路（合併欄）+ 每平台子欄 + 總計
    // Row 1: marketplace headers
    // Row 2: 營收 / 廣告費 / ROAS sub-headers

    const fmt = (n) => n > 0 ? n.toLocaleString() : '—';
    const fmtCell = (n, dim) => `<td style="padding:1px 4px;text-align:right;font-variant-numeric:tabular-nums;font-size:10px;color:${dim ? '#cbd5e1' : 'var(--text)'};line-height:1.3">${fmt(n)}</td>`;
    const fmtRoas = (rev, ads) => {
      if (ads === 0) return `<td style="padding:1px 4px;text-align:right;color:#cbd5e1;font-size:10px;line-height:1.3">—</td>`;
      const r = (rev / ads).toFixed(2);
      return `<td style="padding:1px 4px;text-align:right;font-variant-numeric:tabular-nums;font-size:10px;font-weight:600;color:#4f46e5;line-height:1.3">${r}</td>`;
    };

    // 建欄位設定：每平台佔幾欄
    const colSpec = flatPlatforms.map(({ p }) => {
      const hasAds = PLATFORMS_WITH_AD_SPEND.has(p.name);
      return { p, hasAds, cols: hasAds ? 3 : 1 };
    });

    // 通路合併表頭
    const marketHeadHtml = marketOrder.map(m => {
      const items = grouped[m] || [];
      if (items.length === 0) return '';
      const tint = marketTint[m];
      const totalCols = items.reduce((s, p) => s + (PLATFORMS_WITH_AD_SPEND.has(p.name) ? 3 : 1), 0);
      const badge = MARKETPLACE_BADGE[m];
      return `<th colspan="${totalCols}" style="padding:4px 6px;background:${tint}14;color:${tint};text-align:center;font-size:10px;font-weight:700;border-left:2px solid ${tint};border-bottom:1px solid var(--border)"><img src="${badge.src}" style="width:12px;height:12px;vertical-align:middle;border-radius:3px;margin-right:3px;object-fit:contain">${escapeHtml(badge.name)}</th>`;
    }).join('');

    // 平台名稱列
    const platformHeadHtml = colSpec.map(({ p, cols }) => {
      return `<th colspan="${cols}" style="padding:4px 4px;text-align:center;font-size:10px;color:var(--text);font-weight:600;border-bottom:1px solid var(--border);border-left:1px solid var(--border);white-space:nowrap">${escapeHtml(p.name)}</th>`;
    }).join('');

    // 子欄位列（短標籤節省空間）
    const subHeadHtml = colSpec.map(({ hasAds }) => {
      if (hasAds) {
        return `<th style="padding:3px 4px;text-align:right;font-size:9px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border)">營收</th>
                <th style="padding:3px 4px;text-align:right;font-size:9px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border)">廣告</th>
                <th style="padding:3px 4px;text-align:right;font-size:9px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border)">ROAS</th>`;
      }
      return `<th style="padding:3px 4px;text-align:right;font-size:9px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border)">營收</th>`;
    }).join('');

    // 每一天的資料列
    const todayStrLocal = toDateStr(new Date());
    let monthTotalRev = 0;
    let monthTotalAds = 0;
    const dayRowsHtml = dates.map(d => {
      const isToday = d === todayStrLocal;
      const dayLabel = d.slice(5).replace('-', '/');
      let dayRev = 0;
      let dayAds = 0;
      // 各通路當日小計（蝦皮 / MOMO / 酷澎）
      const marketSubtotals = { shopee: 0, momo: 0, coupang: 0 };
      const cells = colSpec.map(({ p, hasAds }) => {
        const rev = get(p, d);
        dayRev += rev;
        const m = PLATFORM_MARKETPLACE[p.name] || 'shopee';
        marketSubtotals[m] += rev;
        if (hasAds) {
          const ads = getAds(p, d);
          dayAds += ads;
          return fmtCell(rev, rev === 0) + fmtCell(ads, ads === 0) + fmtRoas(rev, ads);
        }
        return fmtCell(rev, rev === 0);
      }).join('');
      monthTotalRev += dayRev;
      monthTotalAds += dayAds;

      const subtotalCell = (val, tint, bold) => `
        <td style="padding:1px 6px;text-align:right;font-size:10px;font-weight:${bold ? '700' : '600'};font-variant-numeric:tabular-nums;color:${val > 0 ? (tint || 'var(--text)') : '#cbd5e1'};background:var(--bg);border-left:1px solid var(--border)">${fmt(val)}</td>
      `;

      return `
        <tr style="background:${isToday ? '#eef2ff44' : 'transparent'};line-height:1.3">
          <td style="padding:1px 6px;font-size:10px;font-weight:600;color:${isToday ? 'var(--primary)' : 'var(--text-muted)'};font-variant-numeric:tabular-nums;white-space:nowrap;border-right:1px solid var(--border);background:${isToday ? '#f5f3ff' : 'var(--surface)'}">${escapeHtml(dayLabel)}${isToday ? ' ●' : ''}</td>
          ${cells}
          ${subtotalCell(marketSubtotals.shopee, '#ee4d2d')}
          ${subtotalCell(marketSubtotals.momo, '#ec4899')}
          ${subtotalCell(marketSubtotals.coupang, '#3b82f6')}
          <td style="padding:1px 6px;text-align:right;font-size:11px;font-weight:800;font-variant-numeric:tabular-nums;color:${dayRev > 0 ? 'var(--text)' : '#cbd5e1'};background:#fef3c7;border-left:2px solid var(--warn)">${fmt(dayRev)}</td>
        </tr>
      `;
    }).join('');

    // 總計列：個別賣場 + 通路小計
    const totalCells = colSpec.map(({ hasAds }, idx) => {
      const t = platformTotals[idx];
      if (hasAds) {
        return `<td style="padding:5px 5px;text-align:right;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums">${fmt(t.rev)}</td>
                <td style="padding:5px 5px;text-align:right;font-size:10px;font-weight:600;color:var(--text-muted);font-variant-numeric:tabular-nums">${fmt(t.ads)}</td>
                <td style="padding:5px 5px;text-align:right;font-size:11px;font-weight:700;color:#4f46e5;font-variant-numeric:tabular-nums">${t.roas}</td>`;
      }
      return `<td style="padding:5px 5px;text-align:right;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums">${fmt(t.rev)}</td>`;
    }).join('');

    // 通路月總計
    const monthSubtotals = { shopee: 0, momo: 0, coupang: 0 };
    flatPlatforms.forEach(({ p, market }, idx) => {
      monthSubtotals[market] += platformTotals[idx].rev;
    });

    const tableHtml = `
      <div style="border:1px solid var(--border);border-radius:6px;overflow:hidden">
        <table style="border-collapse:separate;border-spacing:0;width:100%;table-layout:auto;font-size:10px">
          <thead style="background:var(--surface)">
            <tr>
              <th rowspan="3" style="padding:3px 6px;text-align:left;font-size:9px;color:var(--text-muted);font-weight:600;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);width:42px">日期</th>
              ${marketHeadHtml}
              <th colspan="4" rowspan="2" style="padding:3px 6px;text-align:center;font-size:10px;color:var(--text-muted);font-weight:700;border-left:2px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg)">通路小計 / 當日總計</th>
            </tr>
            <tr>${platformHeadHtml}</tr>
            <tr>${subHeadHtml}
              <th style="padding:2px 5px;text-align:right;font-size:9px;color:#ee4d2d;font-weight:700;border-bottom:1px solid var(--border);background:#ee4d2d10;border-left:2px solid var(--border)">蝦皮總</th>
              <th style="padding:2px 5px;text-align:right;font-size:9px;color:#ec4899;font-weight:700;border-bottom:1px solid var(--border);background:#ec489910">MOMO</th>
              <th style="padding:2px 5px;text-align:right;font-size:9px;color:#3b82f6;font-weight:700;border-bottom:1px solid var(--border);background:#3b82f610">酷澎</th>
              <th style="padding:2px 5px;text-align:right;font-size:9px;color:var(--warn);font-weight:700;border-bottom:1px solid var(--border);background:#fef3c7;border-left:2px solid var(--warn)">當日總營收</th>
            </tr>
          </thead>
          <tbody>
            ${dayRowsHtml}
          </tbody>
          <tfoot>
            <tr style="background:var(--bg);border-top:2px solid var(--border)">
              <td style="padding:5px 6px;font-size:11px;font-weight:800;color:var(--text);border-right:1px solid var(--border);background:var(--bg)">總計</td>
              ${totalCells}
              <td style="padding:5px 6px;text-align:right;font-size:11px;font-weight:800;color:#ee4d2d;background:#ee4d2d18;border-left:2px solid var(--border);font-variant-numeric:tabular-nums">${fmt(monthSubtotals.shopee)}</td>
              <td style="padding:5px 6px;text-align:right;font-size:11px;font-weight:800;color:#ec4899;background:#ec489918;font-variant-numeric:tabular-nums">${fmt(monthSubtotals.momo)}</td>
              <td style="padding:5px 6px;text-align:right;font-size:11px;font-weight:800;color:#3b82f6;background:#3b82f618;font-variant-numeric:tabular-nums">${fmt(monthSubtotals.coupang)}</td>
              <td style="padding:5px 6px;text-align:right;font-size:12px;font-weight:800;color:var(--warn);background:#fef3c7;border-left:2px solid var(--warn);font-variant-numeric:tabular-nums">${fmt(monthTotalRev)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
      <div style="margin-top:4px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--text-muted)">
        <button id="restore-backup-btn" style="padding:4px 9px;border:1px solid var(--border);border-radius:5px;background:white;color:var(--text-muted);font-size:11px;cursor:pointer;font-weight:500" title="從上一次儲存前的備份還原資料">
          ↩ 還原上一版
        </button>
        <span>${dates.length === 0 ? '本月還沒有任何日期可顯示' : `共 ${dates.length} 天 · ● 今天 · — 無資料`}</span>
      </div>
    `;

    this.openModal({
      title: `📅 ${yMonth} 年 ${mMonth + 1} 月 明細`,
      bodyHtml: tableHtml,
      width: '85vw',
      hideFooter: true,
      onMount: () => {
        const btn = document.getElementById('restore-backup-btn');
        if (btn) btn.addEventListener('click', () => this.restorePlatformsBackup());
      },
    });
  },

  /* ------------- 還原 platforms 備份 ------------- */
  restorePlatformsBackup() {
    const backup = Store.get(Store.KEYS.platformsBackup, null);
    if (!backup || !backup.data) {
      showToast('沒有可還原的備份', 'error');
      return;
    }
    const ts = new Date(backup.timestamp || 0);
    const tsLabel = isFinite(ts.getTime())
      ? `${ts.getFullYear()}/${String(ts.getMonth()+1).padStart(2,'0')}/${String(ts.getDate()).padStart(2,'0')} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`
      : '時間未知';

    // 統計備份內容
    const backupSummary = (backup.data || []).map(p => {
      const days = Object.keys(p.daily || {}).length;
      return `${p.name}：${days} 天有資料`;
    }).join('<br>');

    this.closeModal();
    this.openModal({
      title: '⚠️ 還原上一版營收資料',
      bodyHtml: `
        <div style="font-size:13px;color:var(--text);line-height:1.7">
          <p style="margin:0 0 10px">準備從備份還原以下資料：</p>
          <div style="padding:10px 14px;background:var(--bg);border-radius:6px;font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums;line-height:1.8;margin-bottom:12px">
            <div style="font-weight:600;color:var(--text);margin-bottom:6px">備份時間：${escapeHtml(tsLabel)}${backup.savedBy ? ` · 由 ${escapeHtml(backup.savedBy)} 觸發` : ''}</div>
            ${backupSummary}
          </div>
          <div style="padding:10px 12px;background:#fee2e2;border-left:3px solid #ef4444;border-radius:6px;font-size:12px">
            <strong>注意</strong>：還原會把目前所有營收 / 廣告費資料覆蓋成備份的版本。<br>
            如果你今天有填新的資料但還沒備份過，會 <strong>遺失</strong>。確定要還原嗎？
          </div>
        </div>
      `,
      saveLabel: '確認還原',
      cancelLabel: '取消',
      onSave: () => {
        // 還原前再備份一次當前資料（避免使用者按錯後無法 redo）
        const current = Store.get(Store.KEYS.platforms, null);
        if (current) {
          Store.set(Store.KEYS.platformsBackup, {
            data: current,
            timestamp: Date.now(),
            savedBy: this.currentUser?.username || '',
            note: '還原前自動備份',
          });
        }
        Store.set(Store.KEYS.platforms, backup.data);
        showToast('✓ 已還原到備份版本', 'success');
        this.render();
        return true;
      },
    });
  },

  /* ============================================================
   *  卡片內 inputs（今日營收 + 廣告費）— 失焦時跳出確認 / 取消 dialog
   * ============================================================ */
  bindCardInputs() {
    // 本月明細按鈕
    const btnMonthDetail = document.getElementById('open-month-detail');
    if (btnMonthDetail) {
      btnMonthDetail.addEventListener('click', () => this.openMonthlyDetailModal());
    }
    // 填寫日期 picker + 前後一天按鈕
    const picker = document.getElementById('entry-date-picker');
    const todayLocal = toDateStr(new Date());
    const defaultEntry = toDateStr(addDays(new Date(), -1));
    if (picker) {
      picker.addEventListener('change', () => {
        let v = picker.value;
        if (!v) return;
        if (v > todayLocal) v = todayLocal;
        this.filter.entryDate = v;
        this.render();
      });
    }
    const prevBtn = document.getElementById('entry-date-prev');
    if (prevBtn) {
      prevBtn.addEventListener('click', () => {
        const cur = this.filter.entryDate || defaultEntry;
        const d = new Date(cur + 'T00:00:00');
        this.filter.entryDate = toDateStr(addDays(d, -1));
        this.render();
      });
    }
    const nextBtn = document.getElementById('entry-date-next');
    if (nextBtn) {
      nextBtn.addEventListener('click', () => {
        const cur = this.filter.entryDate || defaultEntry;
        const d = new Date(cur + 'T00:00:00');
        const next = toDateStr(addDays(d, 1));
        if (next > todayLocal) return;
        this.filter.entryDate = next;
        this.render();
      });
    }
    const resetBtn = document.getElementById('entry-date-reset');
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        this.filter.entryDate = defaultEntry;
        this.render();
      });
    }

    // 寫入日期：以使用者於「填寫日期」picker 選的為準（預設昨天）
    const inputDateStr = this.filter.entryDate || toDateStr(addDays(new Date(), -1));

    // 字串「123,456」→ 數字 123456；空字串 / 非數字 → null
    const parseAmount = (raw) => {
      if (raw == null) return null;
      const digits = String(raw).replace(/[^\d]/g, '');
      if (digits === '') return null;
      const n = +digits;
      return isFinite(n) ? n : null;
    };
    // 數字 → 千分位字串
    const fmtAmount = (n) => (n != null && n > 0 ? n.toLocaleString() : '');

    // 比對兩個值用「數字本身」比，避免逗號干擾
    const sameVal = (a, b) => {
      const pa = parseAmount(a), pb = parseAmount(b);
      return (pa == null ? 0 : pa) === (pb == null ? 0 : pb);
    };

    // 該列輸入是否有改動
    const isDirty = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const revChanged = revEl && !sameVal(revEl.value, revEl.dataset.original);
      const adsChanged = adsEl && !sameVal(adsEl.value, adsEl.dataset.original);
      return revChanged || adsChanged;
    };

    // 顯示「未儲存」的視覺提示（橘色邊框 + 顯示快速儲存按鈕）
    const markUnsaved = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const orange = '#f59e0b';
      let anyDirty = false;
      if (revEl) {
        const changed = !sameVal(revEl.value, revEl.dataset.original);
        revEl.style.borderColor = changed ? orange : 'var(--border)';
        revEl.style.boxShadow = changed ? '0 0 0 2px #f59e0b22' : 'none';
        if (changed) anyDirty = true;
      }
      if (adsEl) {
        const changed = !sameVal(adsEl.value, adsEl.dataset.original);
        adsEl.style.borderColor = changed ? orange : 'var(--border)';
        adsEl.style.boxShadow = changed ? '0 0 0 2px #f59e0b22' : 'none';
        if (changed) anyDirty = true;
      }
      // 該列的「✓ 快速儲存」按鈕：dirty 時顯示，乾淨時隱藏
      const saveBtn = document.querySelector(`.row-save-btn[data-idx="${idx}"]`);
      if (saveBtn) saveBtn.style.display = anyDirty ? 'inline-block' : 'none';
    };

    // 邊打邊更新 ROAS（不存檔）
    const updateRoas = (idx) => {
      const roasEl = document.querySelector(`.card-roas[data-idx="${idx}"]`);
      if (!roasEl) return;
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const rev = parseAmount(revEl?.value) || 0;
      const ads = parseAmount(adsEl?.value) || 0;
      roasEl.textContent = (rev > 0 && ads > 0) ? (rev / ads).toFixed(2) : '—';
    };

    // 還原輸入框到原始值
    const revert = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      if (revEl) revEl.value = revEl.dataset.original || '';
      if (adsEl) adsEl.value = adsEl.dataset.original || '';
      updateRoas(idx);
      markUnsaved(idx);
    };

    // 寫入 store
    const commit = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const platforms = Store.get(Store.KEYS.platforms, null);

      // 🔒 寫入前先備份：把目前雲端版本存到 ec.platformsBackup
      //   如果未來資料出意外，可在 📅 本月明細 視窗按「還原上一版」救回
      if (platforms && Array.isArray(platforms)) {
        Store.set(Store.KEYS.platformsBackup, {
          data: platforms,
          timestamp: Date.now(),
          savedBy: this.currentUser?.username || '',
        });
      }

      const list = migratePlatforms(platforms ? platforms.map(p => ({ ...p })) : JSON.parse(JSON.stringify(PLATFORMS)));
      if (!list[idx]) return;

      const writeField = (key, val) => {
        list[idx][key] = list[idx][key] || {};
        if (val == null || isNaN(val)) delete list[idx][key][inputDateStr];
        else list[idx][key][inputDateStr] = Math.round(val);
      };

      if (revEl) {
        const n = parseAmount(revEl.value);
        writeField('daily', n);
        const formatted = fmtAmount(n);
        revEl.value = formatted;
        revEl.dataset.original = formatted;
      }
      if (adsEl) {
        const n = parseAmount(adsEl.value);
        writeField('dailyAdSpend', n);
        const formatted = fmtAmount(n);
        adsEl.value = formatted;
        adsEl.dataset.original = formatted;
      }
      Store.set(Store.KEYS.platforms, list);
      markUnsaved(idx);
      showToast('已儲存', 'success');
    };

    // 顯示確認 / 取消 dialog
    let dialogOpen = false;
    const promptConfirm = (idx) => {
      if (dialogOpen) return; // 同一次只跳一次
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const platforms = Store.get(Store.KEYS.platforms, null) || [];
      const platformName = platforms[idx]?.name || '此賣場';
      const dispVal = (n) => (n == null || n <= 0 ? '—' : n.toLocaleString());

      const revOldN = parseAmount(revEl?.dataset.original);
      const revNewN = parseAmount(revEl?.value);
      const adsOldN = parseAmount(adsEl?.dataset.original);
      const adsNewN = parseAmount(adsEl?.value);
      const revChanged = revEl && (revOldN || 0) !== (revNewN || 0);
      const adsChanged = adsEl && (adsOldN || 0) !== (adsNewN || 0);
      if (!revChanged && !adsChanged) return;

      const diffRow = (label, oldN, newN, changed) => {
        if (!changed) return '';
        return `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px">
            <span style="min-width:60px;font-size:12px;color:var(--text-muted);font-weight:600">${escapeHtml(label)}</span>
            <span style="font-variant-numeric:tabular-nums;color:var(--text-muted);text-decoration:line-through;font-size:14px">${dispVal(oldN)}</span>
            <span style="color:var(--text-muted);font-size:12px">→</span>
            <span style="font-variant-numeric:tabular-nums;color:#f59e0b;font-weight:700;font-size:16px">${dispVal(newN)}</span>
          </div>
        `;
      };

      dialogOpen = true;
      this.openModal({
        title: `確認修改 — ${platformName}`,
        bodyHtml: `
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:10px">
            日期：<strong style="color:var(--text)">${escapeHtml(inputDateStr)}</strong>
          </div>
          ${diffRow('營收', revOldN, revNewN, revChanged)}
          ${diffRow('廣告費', adsOldN, adsNewN, adsChanged)}
          <div style="margin-top:14px;padding:10px 12px;background:#f59e0b14;border-left:3px solid #f59e0b;border-radius:6px;font-size:12px;color:var(--text)">
            按「確認」會寫入雲端儲存；按「稍後再說」會關掉視窗但保留剛輸入的數字（橘色邊框＝尚未儲存）。
          </div>
        `,
        saveLabel: '確認',
        cancelLabel: '稍後再說',
        onSave: () => {
          dialogOpen = false;
          commit(idx);
          return true;
        },
        onCancel: () => {
          // 取消只關掉確認視窗 — 輸入框保留使用者打的數字（橘色邊框 = 未儲存）
          // 等使用者下次點別處或按 Enter 才會再次跳確認
          dialogOpen = false;
          markUnsaved(idx);
        },
      });
    };

    // 列上的 ✓ 快速儲存按鈕：直接 commit，跳過確認視窗
    document.querySelectorAll('.row-save-btn').forEach(btn => {
      btn.addEventListener('mousedown', (e) => e.preventDefault()); // 不要讓 input 先 blur 跳出確認
      btn.addEventListener('click', () => {
        const idx = +btn.dataset.idx;
        commit(idx);
      });
    });

    // 輸入時：即時加千分位 + 更新 ROAS、標記未儲存
    document.querySelectorAll('.card-rev, .card-ads').forEach(el => {
      const idx = +el.dataset.idx;
      el.addEventListener('input', () => {
        // 即時格式化：保留游標相對位置
        const before = el.value;
        const caret = el.selectionStart || 0;
        const digitsBeforeCaret = before.slice(0, caret).replace(/[^\d]/g, '').length;
        const digits = before.replace(/[^\d]/g, '');
        const formatted = digits === '' ? '' : (+digits).toLocaleString();
        if (formatted !== before) {
          el.value = formatted;
          // 重新放游標：放在「相同位數之後」
          let count = 0, newCaret = formatted.length;
          for (let i = 0; i < formatted.length; i++) {
            if (/\d/.test(formatted[i])) count++;
            if (count === digitsBeforeCaret) { newCaret = i + 1; break; }
          }
          try { el.setSelectionRange(newCaret, newCaret); } catch (_) {}
        }
        updateRoas(idx);
        markUnsaved(idx);
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          el.blur();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          // Esc 直接還原這格（不存）
          el.value = el.dataset.original || '';
          updateRoas(idx);
          markUnsaved(idx);
        }
      });
      el.addEventListener('blur', () => {
        // 失焦時若有改動 → 跳確認 dialog
        // 但若新焦點仍在同一列（例如從營收跳到廣告費），先不跳，等整列都離開
        setTimeout(() => {
          const active = document.activeElement;
          const sameRow = active && active.tagName === 'INPUT'
            && (active.classList.contains('card-rev') || active.classList.contains('card-ads'))
            && +active.dataset.idx === idx;
          if (sameRow) return;
          if (isDirty(idx)) promptConfirm(idx);
        }, 50);
      });
    });
  },

  /* （已棄用）營收輸入區段 bindRevenueEntry — 保留方法避免外部呼叫崩潰 */
  bindRevenueEntry() {
    const recompute = () => {
      let totalRev = 0, totalAds = 0;
      document.querySelectorAll('.entry-rev').forEach(el => {
        const v = +el.value;
        if (isFinite(v)) totalRev += v;
      });
      document.querySelectorAll('.entry-ads').forEach(el => {
        const v = +el.value;
        if (isFinite(v)) totalAds += v;
      });
      document.querySelectorAll('.entry-roas').forEach(el => {
        const idx = +el.dataset.idx;
        const revEl = document.querySelector(`.entry-rev[data-idx="${idx}"]`);
        const adsEl = document.querySelector(`.entry-ads[data-idx="${idx}"]`);
        const rev = revEl ? +revEl.value : 0;
        const ads = adsEl ? +adsEl.value : 0;
        el.textContent = (rev > 0 && ads > 0) ? (rev / ads).toFixed(2) : '—';
      });
      const tr = document.getElementById('entry-total-rev');
      const ta = document.getElementById('entry-total-ads');
      const trs = document.getElementById('entry-total-roas');
      if (tr) tr.textContent = fmtNTD(totalRev);
      if (ta) ta.textContent = totalAds > 0 ? fmtNTD(totalAds) : '—';
      if (trs) trs.textContent = (totalRev > 0 && totalAds > 0) ? (totalRev / totalAds).toFixed(2) : '—';
    };

    document.querySelectorAll('.entry-rev, .entry-ads').forEach(el => {
      el.addEventListener('input', recompute);
    });

    const dateEl = document.getElementById('entry-date');
    if (dateEl) dateEl.addEventListener('change', () => {
      this.filter.entryDate = dateEl.value;
      this.render();
    });

    const todayBtn = document.getElementById('entry-today');
    if (todayBtn) todayBtn.addEventListener('click', () => {
      this.filter.entryDate = toDateStr(new Date());
      this.render();
    });

    const saveBtn = document.getElementById('entry-save');
    if (saveBtn) saveBtn.addEventListener('click', () => {
      const entryDate = (document.getElementById('entry-date') || {}).value || toDateStr(new Date());
      const platforms = Store.get(Store.KEYS.platforms, null) || JSON.parse(JSON.stringify(PLATFORMS));
      const migrated = migratePlatforms(platforms);
      const list = migrated;

      document.querySelectorAll('.entry-rev').forEach(el => {
        const idx = +el.dataset.idx;
        const v = el.value === '' ? null : +el.value;
        if (!list[idx]) return;
        list[idx].daily = list[idx].daily || {};
        if (v == null || isNaN(v)) delete list[idx].daily[entryDate];
        else list[idx].daily[entryDate] = Math.round(v);
      });
      document.querySelectorAll('.entry-ads').forEach(el => {
        const idx = +el.dataset.idx;
        const v = el.value === '' ? null : +el.value;
        if (!list[idx]) return;
        list[idx].dailyAdSpend = list[idx].dailyAdSpend || {};
        if (v == null || isNaN(v)) delete list[idx].dailyAdSpend[entryDate];
        else list[idx].dailyAdSpend[entryDate] = Math.round(v);
      });

      Store.set(Store.KEYS.platforms, list);
      showToast(`${entryDate.replace(/-/g, '/')} 已儲存`, 'success');
      const statusEl = document.getElementById('entry-status');
      if (statusEl) statusEl.textContent = '✓ 已同步到雲端';
    });
  },

  openPlatformModal(idx) {
    let platforms = Store.get(Store.KEYS.platforms, null);
    if (!platforms) platforms = JSON.parse(JSON.stringify(PLATFORMS));
    platforms = migratePlatforms(platforms);
    platforms = platforms.map(p => ({
      ...p,
      daily: { ...(p.daily || {}) },
      dailyAdSpend: { ...(p.dailyAdSpend || {}) },
    }));

    const p = platforms[idx];
    if (!p) { showToast('找不到此平台', 'error'); return; }

    const now = new Date();
    const todayStr = toDateStr(now);
    const yesterdayStr = toDateStr(addDays(now, -1));
    const hasAds = PLATFORMS_WITH_AD_SPEND.has(p.name);

    // 重新渲染 modal body 用：日期變動時更新欄位值
    const renderBody = (dateStr) => {
      const rev = (p.daily[dateStr] != null) ? p.daily[dateStr] : '';
      const ads = (p.dailyAdSpend[dateStr] != null) ? p.dailyAdSpend[dateStr] : '';
      const roas = (typeof rev === 'number' && rev > 0 && typeof ads === 'number' && ads > 0)
        ? (rev / ads).toFixed(2) : '—';
      return `
        <div class="field">
          <label>平台</label>
          <input value="${p.icon} ${escapeHtml(p.name)}" disabled
            style="background:var(--bg);color:var(--text-muted)">
        </div>
        <div class="field">
          <label>日期</label>
          <input type="date" id="m-date" value="${dateStr}" max="${todayStr}">
          <div style="margin-top:6px;font-size:12px;color:var(--text-muted)">
            預設為昨天，可改其他日期；改完日期欄位下方數字會跟著變
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>當日營收（NT$）</label>
            <input type="number" id="m-rev" min="0" step="1" value="${rev}" placeholder="0" onfocus="this.select()">
          </div>
          <div class="field">
            <label>廣告費（NT$）</label>
            ${hasAds
              ? `<input type="number" id="m-ads" min="0" step="1" value="${ads}" placeholder="0" onfocus="this.select()">`
              : `<input value="此平台沒有廣告費" disabled style="background:var(--bg);color:var(--text-muted)">`}
          </div>
        </div>
        ${hasAds ? `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:${p.color}14;border-radius:var(--radius-sm);margin-top:8px">
            <span style="font-size:12px;color:var(--text-muted);letter-spacing:.05em">ROAS</span>
            <span id="m-roas" style="font-weight:700;font-variant-numeric:tabular-nums;color:${p.color};font-size:18px">${roas}</span>
          </div>
        ` : ''}
        <div style="font-size:12px;color:var(--text-muted);margin-top:6px">
          留空表示「沒這筆」，會把該日數值刪掉；ROAS = 營收 ÷ 廣告費（自動算）
        </div>
      `;
    };

    this.openModal({
      title: `編輯：${p.icon} ${p.name}`,
      bodyHtml: renderBody(yesterdayStr),
      onMount: () => {
        const updateRoas = () => {
          const roasEl = document.getElementById('m-roas');
          if (!roasEl) return;
          const revEl = document.getElementById('m-rev');
          const adsEl = document.getElementById('m-ads');
          const rev = revEl ? +revEl.value : 0;
          const ads = adsEl ? +adsEl.value : 0;
          roasEl.textContent = (rev > 0 && ads > 0) ? (rev / ads).toFixed(2) : '—';
        };
        // 切換日期時，即時更新下方營收與廣告費欄位顯示
        const dateEl = document.getElementById('m-date');
        if (dateEl) dateEl.addEventListener('change', () => {
          const newDate = dateEl.value;
          if (!newDate) return;
          const revEl = document.getElementById('m-rev');
          const adsEl = document.getElementById('m-ads');
          const newRev = (p.daily[newDate] != null) ? p.daily[newDate] : '';
          const newAds = (p.dailyAdSpend[newDate] != null) ? p.dailyAdSpend[newDate] : '';
          if (revEl) revEl.value = newRev;
          if (adsEl) adsEl.value = newAds;
          updateRoas();
        });
        // 邊打邊更新 ROAS
        const revEl = document.getElementById('m-rev');
        const adsEl = document.getElementById('m-ads');
        if (revEl) revEl.addEventListener('input', updateRoas);
        if (adsEl) adsEl.addEventListener('input', updateRoas);
      },
      onSave: () => {
        const dateStr = (document.getElementById('m-date') || {}).value;
        if (!dateStr) { showToast('請選擇日期', 'error'); return false; }

        const revRaw = (document.getElementById('m-rev') || {}).value;
        const rev = revRaw === '' ? null : +revRaw;
        if (rev != null && (!isFinite(rev) || rev < 0)) { showToast('營收需為非負數字', 'error'); return false; }
        if (rev == null) delete p.daily[dateStr];
        else p.daily[dateStr] = Math.round(rev);

        if (hasAds) {
          const adsRaw = (document.getElementById('m-ads') || {}).value;
          const ads = adsRaw === '' ? null : +adsRaw;
          if (ads != null && (!isFinite(ads) || ads < 0)) { showToast('廣告費需為非負數字', 'error'); return false; }
          if (ads == null) delete p.dailyAdSpend[dateStr];
          else p.dailyAdSpend[dateStr] = Math.round(ads);
        }

        Store.set(Store.KEYS.platforms, platforms);
        showToast(`「${p.name}」${dateStr.replace(/-/g,'/')} 已更新`, 'success');
        this.render();
        return true;
      },
    });
  },

  /* ============================================================
   *  績效管理
   * ============================================================ */
  viewEmployees() {
    const departments = Store.get(Store.KEYS.departments, []);
    const allUsers = Store.get(Store.KEYS.users, []);
    // 員工績效明細：排除管理員、以及未指派辦公室（全公司）的帳號
    const users = allUsers.filter(u => u.role !== 'admin' && getUserDepts(u).length > 0);
    const deptById = Object.fromEntries(departments.map(d => [d.id, d]));
    const filterDept = this.filter.dept === 'all' ? null : deptById[this.filter.dept];
    const filtered = !filterDept
      ? users
      : users.filter(u => getUserDepts(u).includes(filterDept.name));

    const quarter = this.filter.quarter || 'all';
    const sortKey = quarter === 'all' ? null : quarter;

    const ranked = filtered.map(u => ({
      ...u,
      score: computeScore(u),
      trend: trendFromQuarters(u),
    })).sort((a, b) => {
      const av = sortKey ? (getQuarterScore(a, sortKey) ?? -1) : a.score;
      const bv = sortKey ? (getQuarterScore(b, sortKey) ?? -1) : b.score;
      return bv - av;
    });

    const avgScore = ranked.length
      ? Math.round(ranked.reduce((s, e) => {
          const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
          return s + v;
        }, 0) / ranked.length * 10) / 10
      : 0;
    const excellent = ranked.filter(e => {
      const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
      return v >= 90;
    }).length;
    const needsImprov = ranked.filter(e => {
      const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
      return v > 0 && v < 60;
    }).length;
    const topPerformer = ranked[0];

    const deptByName = Object.fromEntries(departments.map(d => [d.name, d]));

    const cellScore = (val) => {
      if (val == null) return '<span style="color:var(--text-muted)">—</span>';
      const cls = val >= 90 ? 'trend-up' : val < 60 ? 'trend-down' : '';
      return `<span class="${cls}" style="font-weight:600">${val}</span>`;
    };
    const highlight = (q) => quarter === q ? 'style="background:var(--primary-soft)"' : '';

    const rows = ranked.length === 0 ? `
      <tr><td colspan="10"><div class="empty"><div class="emoji">📭</div>
        <div>尚無員工資料</div>
        <div style="font-size:13px;margin-top:4px">請先到「帳號管理」建立員工帳號</div>
      </div></td></tr>
    ` : ranked.map((u, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
      const userDepts = getUserDepts(u);
      const scoreClass = u.score >= 90 ? 'score-good' : u.score >= 80 ? 'score-ok' : 'score-bad';
      const trendIcon = u.trend === 'up' ? '<span class="trend-up">↑ 上升</span>'
        : u.trend === 'down' ? '<span class="trend-down">↓ 下降</span>'
        : '<span class="trend-flat">→ 持平</span>';
      const deptCell = userDepts.length === 0
        ? `<span style="color:var(--text-muted)">全公司</span>`
        : userDepts.map(dn => {
            const d = deptByName[dn];
            return d
              ? `<span class="dept-tag" style="background:${d.color}22;color:${d.color};margin-right:4px">${escapeHtml(d.name)}</span>`
              : `<span class="dept-tag" style="background:#e5e7eb;color:#6b7280;margin-right:4px">${escapeHtml(dn)}</span>`;
          }).join('');
      return `
        <tr>
          <td><span class="rank-badge ${rankClass}">${rank}</span></td>
          <td>
            <div class="employee-cell">
              <div class="employee-avatar">${escapeHtml(u.name.slice(0,1))}</div>
              <div>
                <div class="employee-name">${escapeHtml(u.name)}</div>
                <div class="employee-code">@${escapeHtml(u.username)}</div>
              </div>
            </div>
          </td>
          <td>${deptCell}</td>
          <td ${highlight('q1')}>${cellScore(getQuarterScore(u, 'q1'))}</td>
          <td ${highlight('q2')}>${cellScore(getQuarterScore(u, 'q2'))}</td>
          <td ${highlight('q3')}>${cellScore(getQuarterScore(u, 'q3'))}</td>
          <td ${highlight('q4')}>${cellScore(getQuarterScore(u, 'q4'))}</td>
          <td>
            <div class="score-cell">
              <div class="score-bar"><div class="${scoreClass}" style="width:${u.score}%"></div></div>
              <span class="score-value">${u.score}</span>
            </div>
          </td>
          <td>${trendIcon}</td>
          <td>
            <div class="row-actions">
              <button class="icon-btn" title="編輯分數" onclick="App.openScoreModal('${escapeHtml(u.username)}')">✏️</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    const deptPills = `
      <button class="pill ${this.filter.dept === 'all' ? 'active' : ''}" data-dept="all">全部辦公室</button>
      ${departments.map(d => `
        <button class="pill ${this.filter.dept === d.id ? 'active' : ''}" data-dept="${d.id}">${escapeHtml(d.name)}</button>
      `).join('')}
    `;

    const quarterLabels = { all: '全年', q1: 'Q1', q2: 'Q2', q3: 'Q3', q4: 'Q4' };
    const quarterPills = ['all','q1','q2','q3','q4'].map(q => `
      <button class="pill ${quarter === q ? 'active' : ''}" data-quarter="${q}">${quarterLabels[q]}</button>
    `).join('');

    const currentLabel = quarterLabels[quarter];
    const tableSubtitle = quarter === 'all'
      ? `依全年平均分數排序 · 共 ${ranked.length} 人`
      : `依 ${currentLabel} 分數排序 · 共 ${ranked.length} 人`;

    return `
      <div class="page-header">
        <h2>績效管理 <span class="live-dot">即時更新</span></h2>
        <p>各辦公室員工 ${currentLabel} 績效分數（滿分 100 分）</p>
      </div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--info-soft);color:var(--info)">📊</div>
          <div class="stat-label">${currentLabel}平均分數</div>
          <div class="stat-value">${avgScore}</div>
          <div class="stat-meta">滿分 100 分</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--success-soft);color:var(--success)">🏆</div>
          <div class="stat-label">優秀員工（≥ 90）</div>
          <div class="stat-value">${excellent}</div>
          <div class="stat-meta">共 ${ranked.length} 人中</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--danger-soft);color:var(--danger)">⚠️</div>
          <div class="stat-label">待加強（&lt; 60）</div>
          <div class="stat-value">${needsImprov}</div>
          <div class="stat-meta">需關注並輔導</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--primary-soft);color:var(--primary)">⭐</div>
          <div class="stat-label">${currentLabel}最高分</div>
          <div class="stat-value" style="font-size:22px">${topPerformer ? escapeHtml(topPerformer.name) : '—'}</div>
          <div class="stat-meta">${topPerformer ? (sortKey ? (getQuarterScore(topPerformer, sortKey) ?? '—') : topPerformer.score) + ' 分' : ''}</div>
        </div>
      </div>
      <div class="filter-bar">
        ${deptPills}
        <span style="width:1px;height:24px;background:var(--border);margin:0 4px"></span>
        ${quarterPills}
        <span class="filter-spacer"></span>
        ${this.currentUser.role === 'admin' ? `<button class="btn-ghost" onclick="App.navigate('users')">前往帳號管理 ↗</button>` : ''}
      </div>
      <div class="table-card">
        <div class="table-card-header">
          <h3>員工績效明細</h3>
          <p>${tableSubtitle}</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>排名</th><th>員工</th><th>辦公室</th>
                <th ${highlight('q1')}>Q1</th>
                <th ${highlight('q2')}>Q2</th>
                <th ${highlight('q3')}>Q3</th>
                <th ${highlight('q4')}>Q4</th>
                <th>全年平均</th><th>趨勢</th><th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  },

  bindFilterBar() {
    document.querySelectorAll('.pill[data-dept]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.dept = p.dataset.dept;
        this.render();
      });
    });
    document.querySelectorAll('.pill[data-quarter]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.quarter = p.dataset.quarter;
        this.render();
      });
    });
  },

  bindOfficeTabs(deptId) {
    document.querySelectorAll('.pill[data-office-tab]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.officeTab[deptId] = p.dataset.officeTab;
        this.render();
      });
    });
    // d1（行銷）：只有在主頁（有週曆）才綁；子頁不綁（避免 querySelector 找不到元素）
    if (deptId === 'd1' && document.querySelector('[data-week-offset], [data-month-offset]')) {
      this.bindWeeklyCalendar(deptId);
    }
    // d1 profit 子頁：初始化淨利表的賣場分頁內容
    if (deptId === 'd1' && this.route === 'office-d1-profit' && typeof SHOPS !== 'undefined') {
      setTimeout(() => {
        try {
          SHOPS.forEach(s => {
            const el = document.getElementById('content-' + s.id);
            if (el && !el.innerHTML.trim() && typeof shopHTML === 'function') {
              el.innerHTML = shopHTML(s.id);
            }
          });
          SHOPS.forEach(s => {
            if (typeof initShopUI === 'function') initShopUI(s.id);
          });
        } catch (e) { console.error('profit init failed', e); }
      }, 200);
    }
    // 動態 tab 的事件綁定
    const activeTab = this.filter.officeTab[deptId];
    const cfg = OFFICE_CONFIG[deptId];
    const tabKey = activeTab || cfg?.tabs?.[0]?.key;
    const tab = cfg?.tabs?.find(t => t.key === tabKey);
    if (tab?.dynamic === 'daily-progress') {
      this.bindDailyProgress(deptId);
    } else if (tab?.dynamic === 'weekly-calendar') {
      this.bindWeeklyCalendar(deptId);
    }
  },

  /* ------------- 工作週曆事件綁定 ------------- */
  bindWeeklyCalendar(deptId) {
    const ensureFilter = () => {
      if (!this.filter.dashboardMarketing) {
        this.filter.dashboardMarketing = { employee: 'all', weekOffset: 0, monthOffset: 0, viewMode: 'week' };
      }
    };
    // 人員下拉
    const emp = document.getElementById('dash-mkt-emp');
    if (emp) emp.addEventListener('change', () => {
      ensureFilter();
      this.filter.dashboardMarketing.employee = emp.value;
      this.render();
    });
    // 切換週
    document.querySelectorAll('[data-week-offset]').forEach(btn => {
      btn.addEventListener('click', () => {
        ensureFilter();
        this.filter.dashboardMarketing.weekOffset = +btn.dataset.weekOffset;
        this.render();
      });
    });
    // 切換月
    document.querySelectorAll('[data-month-offset]').forEach(btn => {
      btn.addEventListener('click', () => {
        ensureFilter();
        this.filter.dashboardMarketing.monthOffset = +btn.dataset.monthOffset;
        this.render();
      });
    });
    // 切換週 / 月 模式
    document.querySelectorAll('[data-view-mode]').forEach(btn => {
      btn.addEventListener('click', () => {
        ensureFilter();
        const m = btn.dataset.viewMode;
        this.filter.dashboardMarketing.viewMode = m;
        // 切到月模式時重設 monthOffset 為 0（本月）
        if (m === 'month') this.filter.dashboardMarketing.monthOffset = 0;
        else this.filter.dashboardMarketing.weekOffset = 0;
        this.render();
      });
    });
    // 點任務卡 → 編輯
    document.querySelectorAll('[data-cal-task]').forEach(card => {
      card.addEventListener('click', (e) => {
        // 點到刪除按鈕時不要觸發編輯
        if (e.target.closest('[data-cal-del]')) return;
        this.openDailyTaskModal(deptId, card.dataset.calTask);
      });
    });
    // 刪除按鈕
    document.querySelectorAll('[data-cal-del]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        this.deleteDailyTask(btn.dataset.calDel);
      });
    });
    // 新增進度
    document.querySelectorAll('[data-cal-add]').forEach(btn => {
      btn.addEventListener('click', () => this.openDailyTaskModal(deptId));
    });
    // 快速新增單一待辦
    document.querySelectorAll('[data-todo-quick-add]').forEach(btn => {
      btn.addEventListener('click', () => this.openQuickTodoModal(btn.dataset.todoQuickAdd));
    });
    // 未完成待辦勾選
    document.querySelectorAll('.dp-todo-tick').forEach(cb => {
      cb.addEventListener('change', () => {
        const taskId = cb.dataset.taskId;
        const todoIdx = +cb.dataset.todoIdx;
        const list = Store.get(Store.KEYS.dailyTasks, []);
        const i = list.findIndex(x => x.id === taskId);
        if (i < 0) return;
        if (!Array.isArray(list[i].todos)) list[i].todos = [];
        if (list[i].todos[todoIdx]) {
          list[i].todos[todoIdx].done = cb.checked;
          Store.set(Store.KEYS.dailyTasks, list);
          this.render();
        }
      });
    });
  },

  /* ============================================================
   *  每日工作進度
   * ============================================================ */
  renderDailyProgressTab(deptId, color, dept) {
    const allTasks = Store.get(Store.KEYS.dailyTasks, []);
    const tasks = allTasks.filter(t => t.deptId === deptId);
    const members = (Store.get(Store.KEYS.users, [])).filter(u => getUserDepts(u).includes(dept.name));
    const f = this.filter.dailyProgress;

    // 套用篩選
    let filtered = tasks.slice();
    if (f.employee && f.employee !== 'all') {
      filtered = filtered.filter(t => t.employee === f.employee);
    }
    if (f.status && f.status !== 'all') {
      filtered = filtered.filter(t => t.status === f.status);
    }
    if (f.dateFrom) filtered = filtered.filter(t => t.date >= f.dateFrom);
    if (f.dateTo)   filtered = filtered.filter(t => t.date <= f.dateTo);

    // 排序：日期新→舊，相同日期 createdAt 新→舊
    filtered.sort((a, b) => {
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (b.createdAt || 0) - (a.createdAt || 0);
    });

    // 統計
    const counts = { '進行中': 0, '已完成': 0, '遇阻': 0, '待開始': 0 };
    tasks.forEach(t => { if (counts[t.status] != null) counts[t.status]++; });

    const statusPills = ['all', ...DAILY_TASK_STATUS_LIST].map(s => {
      const active = (f.status || 'all') === s;
      const label = s === 'all' ? `全部 (${tasks.length})` : `${DAILY_TASK_STATUS[s].emoji} ${s} (${counts[s]})`;
      return `<button class="pill ${active ? 'active' : ''}" data-dp-status="${escapeHtml(s)}">${label}</button>`;
    }).join('');

    const employeeOptions = `
      <option value="all" ${(f.employee || 'all') === 'all' ? 'selected' : ''}>全部員工</option>
      ${members.map(u => `<option value="${escapeHtml(u.username)}" ${f.employee === u.username ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}
    `;

    // 依日期分組（filtered 已按日期新→舊排序）
    const grouped = [];
    let currentGroup = null;
    filtered.forEach(t => {
      if (!currentGroup || currentGroup.date !== t.date) {
        currentGroup = { date: t.date, items: [] };
        grouped.push(currentGroup);
      }
      currentGroup.items.push(t);
    });

    const weekdayMap = ['週日','週一','週二','週三','週四','週五','週六'];
    const formatDateHeading = (dateStr) => {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      const today = new Date();
      const tStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      const yStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
      let extra = '';
      if (dateStr === tStr) extra = ' · 今天';
      else if (dateStr === yStr) extra = ' · 昨天';
      return `${dateStr} ${weekdayMap[dt.getDay()]}${extra}`;
    };

    const timelineHtml = filtered.length === 0
      ? `<div class="empty" style="padding:48px 24px"><div class="emoji">📋</div>${tasks.length === 0 ? '尚無工作進度紀錄' : '沒有符合篩選條件的紀錄'}<div style="font-size:13px;margin-top:4px;color:var(--text-muted)">${tasks.length === 0 ? '點右上「+ 新增進度」開始記錄' : '試試調整員工或狀態篩選'}</div></div>`
      : `<div style="padding:8px 8px 16px">${
          grouped.map(g => `
            <div style="margin-top:12px">
              <div style="display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--text-muted)">
                <span style="display:inline-block;width:4px;height:14px;border-radius:2px;background:${color}"></span>
                <span style="font-variant-numeric:tabular-nums">${escapeHtml(formatDateHeading(g.date))}</span>
                <span style="flex:1;height:1px;background:var(--border)"></span>
                <span style="font-size:12px;font-weight:500;color:var(--text-muted)">${g.items.length} 筆</span>
              </div>
              <div style="position:relative;margin:6px 0 6px 24px;padding-left:18px;border-left:2px solid var(--border)">
                ${g.items.map(t => {
                  const st = DAILY_TASK_STATUS[t.status] || { color: '#6b7280', bg: '#e5e7eb', emoji: '•' };
                  const canEdit = this.currentUser.role === 'admin' || this.currentUser.username === t.employee;
                  const catMeta = t.category ? getCategoryMeta(t.category) : null;
                  const catColor = catMeta?.color || '#6b7280';
                  const todos = Array.isArray(t.todos) ? t.todos : [];
                  const doneCount = todos.filter(td => td.done).length;
                  return `
                    <div class="timeline-entry" style="position:relative;display:flex;align-items:flex-start;gap:14px;padding:12px 14px;margin:8px 0;background:var(--surface);border:1px solid var(--border);border-radius:8px;transition:box-shadow .15s">
                      <span style="position:absolute;left:-26px;top:18px;width:14px;height:14px;border-radius:50%;background:${st.color};border:2px solid var(--surface);box-shadow:0 0 0 2px ${st.bg};display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:white">${st.emoji}</span>
                      <div style="min-width:96px;display:flex;align-items:center;gap:8px">
                        <div class="employee-avatar" style="width:30px;height:30px;font-size:13px">${escapeHtml((t.employeeName || t.employee || '?').slice(0,1))}</div>
                        <div style="font-weight:500;font-size:13px">${escapeHtml(t.employeeName || t.employee)}</div>
                      </div>
                      <div style="flex:1;min-width:0">
                        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
                          ${t.category ? `<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:${catColor}14;color:${catColor};letter-spacing:.03em">${escapeHtml(t.category)}</span>` : ''}
                          ${t.subcategory ? `<span style="font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--bg);color:var(--text-muted)">${escapeHtml(t.subcategory)}</span>` : ''}
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                          <span style="font-weight:600;font-size:14px">${escapeHtml(t.title)}</span>
                          <span class="badge-role" style="background:${st.bg};color:${st.color};white-space:nowrap;font-size:11px;padding:2px 8px">${st.emoji} ${escapeHtml(t.status)}</span>
                          ${t.dueDate ? `<span style="font-size:11px;color:#ef4444;font-weight:600" title="預計完成日">📌 ${escapeHtml(t.dueDate)}</span>` : ''}
                          ${todos.length > 0 ? `<span style="font-size:11px;color:var(--text-muted);font-weight:500">📝 待辦 ${doneCount}/${todos.length}</span>` : ''}
                        </div>
                        ${todos.length > 0 ? `
                          <div style="margin-top:8px;display:flex;flex-direction:column;gap:3px">
                            ${todos.map((td, ti) => `
                              <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:${td.done ? 'var(--text-muted)' : 'var(--text)'};cursor:pointer">
                                <input type="checkbox" class="dp-todo-tick" data-task-id="${escapeHtml(t.id)}" data-todo-idx="${ti}" ${td.done ? 'checked' : ''} style="width:14px;height:14px;cursor:pointer;flex-shrink:0">
                                <span style="flex:1;${td.done ? 'text-decoration:line-through' : ''}">${escapeHtml(td.text)}</span>
                                ${td.assigneeName ? `<span style="font-size:10px;color:var(--text-muted);font-weight:600;background:var(--bg);padding:1px 6px;border-radius:3px;flex-shrink:0">👤 ${escapeHtml(td.assigneeName)}</span>` : ''}
                              </label>
                            `).join('')}
                          </div>
                        ` : ''}
                        ${t.notes ? `<div style="margin-top:6px;font-size:13px;color:var(--text-muted);line-height:1.5;white-space:pre-wrap;word-break:break-word">${escapeHtml(t.notes)}</div>` : ''}
                      </div>
                      <div style="white-space:nowrap;display:flex;gap:2px">
                        ${canEdit ? `
                          <button class="icon-btn" title="編輯" data-dp-edit="${escapeHtml(t.id)}">✏️</button>
                          <button class="icon-btn danger" title="刪除" data-dp-del="${escapeHtml(t.id)}">🗑️</button>
                        ` : ''}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `).join('')
        }</div>`;

    return `
      <div class="table-card" style="margin-bottom:16px">
        <div class="table-card-header" style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between">
          <div>
            <h3 style="margin:0">每日工作進度</h3>
            <p style="margin:4px 0 0;font-size:13px;color:var(--text-muted)">${dept.name}辦公室成員每日紀錄 · 共 ${tasks.length} 筆</p>
          </div>
          <button class="btn-add" data-dp-add="1">+ 新增進度</button>
        </div>
        <div style="padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:center">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;color:var(--text-muted)">員工</span>
            <select id="dp-emp" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:13px">
              ${employeeOptions}
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;color:var(--text-muted)">日期</span>
            <input type="date" id="dp-from" value="${escapeHtml(f.dateFrom || '')}" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:13px">
            <span style="font-size:12px;color:var(--text-muted)">至</span>
            <input type="date" id="dp-to" value="${escapeHtml(f.dateTo || '')}" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:13px">
          </div>
          ${(f.employee !== 'all' || f.status !== 'all' || f.dateFrom || f.dateTo) ? `
            <button class="pill" data-dp-reset="1" style="font-size:12px">✕ 清除篩選</button>
          ` : ''}
          <span style="flex:1"></span>
          <div style="display:flex;gap:6px;flex-wrap:wrap">${statusPills}</div>
        </div>
        ${timelineHtml}
      </div>
    `;
  },

  bindDailyProgress(deptId) {
    // 員工下拉
    const emp = document.getElementById('dp-emp');
    if (emp) emp.addEventListener('change', () => {
      this.filter.dailyProgress.employee = emp.value;
      this.render();
    });
    // 日期區間
    const from = document.getElementById('dp-from');
    if (from) from.addEventListener('change', () => {
      this.filter.dailyProgress.dateFrom = from.value;
      this.render();
    });
    const to = document.getElementById('dp-to');
    if (to) to.addEventListener('change', () => {
      this.filter.dailyProgress.dateTo = to.value;
      this.render();
    });
    // 狀態 pills
    document.querySelectorAll('[data-dp-status]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.dailyProgress.status = p.dataset.dpStatus;
        this.render();
      });
    });
    // 清除篩選
    document.querySelectorAll('[data-dp-reset]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.dailyProgress = { employee: 'all', status: 'all', dateFrom: '', dateTo: '' };
        this.render();
      });
    });
    // 新增
    document.querySelectorAll('[data-dp-add]').forEach(p => {
      p.addEventListener('click', () => this.openDailyTaskModal(deptId));
    });
    // 編輯 / 刪除
    document.querySelectorAll('[data-dp-edit]').forEach(p => {
      p.addEventListener('click', () => this.openDailyTaskModal(deptId, p.dataset.dpEdit));
    });
    document.querySelectorAll('[data-dp-del]').forEach(p => {
      p.addEventListener('click', () => this.deleteDailyTask(p.dataset.dpDel));
    });
    // 行內待辦勾選 (timeline 內 checkbox 切換)
    document.querySelectorAll('.dp-todo-tick').forEach(cb => {
      cb.addEventListener('change', () => {
        const taskId = cb.dataset.taskId;
        const todoIdx = +cb.dataset.todoIdx;
        const list = Store.get(Store.KEYS.dailyTasks, []);
        const i = list.findIndex(x => x.id === taskId);
        if (i < 0) return;
        if (!Array.isArray(list[i].todos)) list[i].todos = [];
        if (list[i].todos[todoIdx]) {
          list[i].todos[todoIdx].done = cb.checked;
          Store.set(Store.KEYS.dailyTasks, list);
          this.render();
        }
      });
    });
  },

  openDailyTaskModal(deptId, taskId) {
    const all = Store.get(Store.KEYS.dailyTasks, []);
    const existing = taskId ? all.find(t => t.id === taskId) : null;
    const isEdit = !!existing;

    const dept = (Store.get(Store.KEYS.departments, [])).find(d => d.id === deptId);
    if (!dept) { showToast('找不到此辦公室', 'error'); return; }
    const members = (Store.get(Store.KEYS.users, [])).filter(u => getUserDepts(u).includes(dept.name));
    // 若是新增，預設員工 = 當前登入者（若是該辦公室成員），否則第一位成員
    const defaultEmp = (this.currentUser && getUserDepts(this.currentUser).includes(dept.name))
      ? this.currentUser.username
      : (members[0]?.username || '');

    const t = existing || {
      employee: defaultEmp,
      date: todayStr(),
      category: TASK_CATEGORY_NAMES[0],
      subcategory: '',
      title: '',
      status: '進行中',
      notes: '',
      todos: [],
      dueDate: '',
    };
    // 舊資料相容
    if (!Array.isArray(t.todos)) t.todos = [];

    if (members.length === 0) {
      showToast(`${dept.name}辦公室尚無成員，請先至帳號管理新增`, 'error');
      return;
    }

    // 建立分類下拉選項
    const categoryOptions = TASK_CATEGORY_NAMES.map(name =>
      `<option value="${escapeHtml(name)}" ${name === t.category ? 'selected' : ''}>${escapeHtml(name)}</option>`
    ).join('');

    // 依分類產生子項下拉的 HTML（支援 optgroup）
    const buildSubOptions = (catName, selected) => {
      const meta = getCategoryMeta(catName);
      if (!meta) return '<option value="">—</option>';
      if (meta.groups) {
        return '<option value="">— 請選擇 —</option>' + meta.groups.map(g =>
          `<optgroup label="${escapeHtml(g.name)}">${g.items.map(it =>
            `<option value="${escapeHtml(it)}" ${it === selected ? 'selected' : ''}>${escapeHtml(it)}</option>`
          ).join('')}</optgroup>`
        ).join('');
      }
      if (meta.items && meta.items.length) {
        return '<option value="">— 請選擇 —</option>' + meta.items.map(it =>
          `<option value="${escapeHtml(it)}" ${it === selected ? 'selected' : ''}>${escapeHtml(it)}</option>`
        ).join('');
      }
      return '<option value="">（此分類無子項）</option>';
    };

    // todos 列表 HTML（每條待辦可指派人員）
    const memberOptsForTodo = (selected) => `
      <option value="" ${!selected ? 'selected' : ''}>— 指派對象 —</option>
      ${members.map(u => `<option value="${escapeHtml(u.username)}" ${u.username === selected ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}
    `;
    const todoRowHtml = (text, done, idx, assignee = '') => `
      <div class="todo-row" data-todo-idx="${idx}" style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:4px">
        <input type="checkbox" class="todo-done" ${done ? 'checked' : ''} style="width:16px;height:16px;cursor:pointer;flex-shrink:0">
        <input type="text" class="todo-text" value="${escapeHtml(text)}" placeholder="輸入待辦事項" style="flex:1;min-width:0;border:0;background:transparent;font-size:13px;padding:2px;outline:none;${done ? 'text-decoration:line-through;color:var(--text-muted)' : ''}">
        <select class="todo-assignee" title="指派人員" style="flex-shrink:0;max-width:110px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;background:white;color:var(--text);font-size:11px;font-family:inherit;cursor:pointer">
          ${memberOptsForTodo(assignee)}
        </select>
        <button type="button" class="todo-del icon-btn" style="width:24px;height:24px;font-size:11px;flex-shrink:0">✕</button>
      </div>
    `;

    this.openModal({
      title: isEdit ? '編輯工作進度' : '新增工作進度',
      bodyHtml: `
        <div class="field-row">
          <div class="field">
            <label>日期</label>
            <input type="date" id="dpf-date" value="${escapeHtml(t.date)}" required>
          </div>
          <div class="field">
            <label>員工</label>
            <select id="dpf-emp" ${isEdit ? 'disabled style="background:var(--bg);color:var(--text-muted)"' : ''}>
              ${members.map(u => `<option value="${escapeHtml(u.username)}" ${u.username === t.employee ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>工作內容分類</label>
            <select id="dpf-category">${categoryOptions}</select>
          </div>
          <div class="field">
            <label>子項</label>
            <select id="dpf-subcategory">${buildSubOptions(t.category, t.subcategory)}</select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>狀態</label>
            <select id="dpf-status">
              ${DAILY_TASK_STATUS_LIST.map(s => `<option value="${escapeHtml(s)}" ${s === t.status ? 'selected' : ''}>${DAILY_TASK_STATUS[s].emoji} ${s}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>預計完成日 <span style="font-size:11px;font-weight:400;color:var(--text-muted)">（選填）</span></label>
            <input type="date" id="dpf-due" value="${escapeHtml(t.dueDate || '')}">
          </div>
        </div>
        <div class="field">
          <label>備註 / 進度說明</label>
          <textarea id="dpf-notes" rows="3" placeholder="說明這次的工作內容、遇到的問題、需要的支援等" style="font-family:inherit;resize:vertical">${escapeHtml(t.notes || '')}</textarea>
        </div>
        <div class="field">
          <label style="display:flex;align-items:center;justify-content:space-between">
            <span>待辦事項 <span style="font-size:11px;font-weight:400;color:var(--text-muted)">（可拆解此工作的小任務）</span></span>
            <button type="button" id="dpf-todo-add" style="padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:white;color:var(--text);font-size:11px;font-weight:600;cursor:pointer">+ 新增一項</button>
          </label>
          <div id="dpf-todos">
            ${t.todos.map((td, i) => todoRowHtml(td.text || '', td.done || false, i, td.assignee || '')).join('')}
          </div>
        </div>
      `,
      onMount: () => {
        // 分類切換時，子項下拉同步更新
        const catEl = document.getElementById('dpf-category');
        const subEl = document.getElementById('dpf-subcategory');
        if (catEl && subEl) {
          catEl.addEventListener('change', () => {
            subEl.innerHTML = buildSubOptions(catEl.value, '');
          });
        }
        // todos 互動
        const todosWrap = document.getElementById('dpf-todos');
        let todoCounter = t.todos.length;
        if (todosWrap) {
          todosWrap.addEventListener('click', (e) => {
            if (e.target.classList.contains('todo-del')) {
              e.target.closest('.todo-row')?.remove();
            }
          });
          todosWrap.addEventListener('change', (e) => {
            if (e.target.classList.contains('todo-done')) {
              const row = e.target.closest('.todo-row');
              const txt = row?.querySelector('.todo-text');
              if (txt) {
                txt.style.textDecoration = e.target.checked ? 'line-through' : 'none';
                txt.style.color = e.target.checked ? 'var(--text-muted)' : 'var(--text)';
              }
            }
          });
        }
        const addBtn = document.getElementById('dpf-todo-add');
        if (addBtn && todosWrap) {
          addBtn.addEventListener('click', () => {
            const tmp = document.createElement('div');
            tmp.innerHTML = todoRowHtml('', false, todoCounter++).trim();
            const newRow = tmp.firstChild;
            todosWrap.appendChild(newRow);
            newRow.querySelector('.todo-text')?.focus();
          });
        }
      },
      onSave: () => {
        const date = document.getElementById('dpf-date').value;
        const employee = document.getElementById('dpf-emp').value;
        const category = document.getElementById('dpf-category').value;
        const subcategory = document.getElementById('dpf-subcategory').value;
        const status = document.getElementById('dpf-status').value;
        const dueDate = document.getElementById('dpf-due').value || '';
        const notes = document.getElementById('dpf-notes').value.trim();
        const todos = Array.from(document.querySelectorAll('#dpf-todos .todo-row'))
          .map(row => {
            const assigneeUsername = row.querySelector('.todo-assignee')?.value || '';
            const assigneeUser = assigneeUsername ? members.find(u => u.username === assigneeUsername) : null;
            return {
              text: row.querySelector('.todo-text')?.value.trim() || '',
              done: row.querySelector('.todo-done')?.checked || false,
              assignee: assigneeUsername,
              assigneeName: assigneeUser ? assigneeUser.name : '',
            };
          })
          .filter(td => td.text !== '');

        // 標題自動由「備註首行 → 子項 → 分類」推導，行銷顯示用
        const firstNoteLine = notes.split('\n')[0].trim();
        const title = firstNoteLine.slice(0, 60) || subcategory || category || '(未填寫)';

        if (!date) { showToast('請選擇日期', 'error'); return false; }
        if (!employee) { showToast('請選擇員工', 'error'); return false; }
        if (!category) { showToast('請選擇工作內容分類', 'error'); return false; }
        const empUser = members.find(u => u.username === employee);
        const employeeName = empUser ? empUser.name : employee;

        const list = Store.get(Store.KEYS.dailyTasks, []);
        if (isEdit) {
          const i = list.findIndex(x => x.id === taskId);
          if (i < 0) { showToast('找不到此筆紀錄', 'error'); return false; }
          list[i] = { ...list[i], date, employee, employeeName, category, subcategory, title, status, notes, todos, dueDate };
        } else {
          list.push({
            id: genId(),
            deptId,
            date,
            employee,
            employeeName,
            category,
            subcategory,
            title,
            status,
            notes,
            todos,
            dueDate,
            createdAt: Date.now(),
            createdBy: this.currentUser?.username || '',
          });
        }
        Store.set(Store.KEYS.dailyTasks, list);
        showToast(isEdit ? '已更新' : '已新增', 'success');
        this.render();
        return true;
      },
    });
  },

  deleteDailyTask(id) {
    const list = Store.get(Store.KEYS.dailyTasks, []);
    const t = list.find(x => x.id === id);
    if (!t) return;
    if (this.currentUser.role !== 'admin' && this.currentUser.username !== t.employee) {
      showToast('僅本人或管理員可刪除', 'error');
      return;
    }
    if (!confirm(`確定要刪除「${t.title}」？`)) return;
    Store.set(Store.KEYS.dailyTasks, list.filter(x => x.id !== id));
    showToast('已刪除', 'success');
    this.render();
  },

  openChangePasswordModal() {
    const username = this.currentUser?.username;
    if (!username) { showToast('尚未登入', 'error'); return; }

    this.openModal({
      title: `修改密碼：${this.currentUser.name}`,
      bodyHtml: `
        <div class="field">
          <label>目前密碼</label>
          <input type="password" id="f-pwold" autocomplete="current-password">
        </div>
        <div class="field">
          <label>新密碼</label>
          <input type="password" id="f-pwnew" autocomplete="new-password" placeholder="請輸入新密碼">
        </div>
        <div class="field">
          <label>再次輸入新密碼</label>
          <input type="password" id="f-pwnew2" autocomplete="new-password" placeholder="與新密碼相同">
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
          密碼有區分大小寫；改完下次登入請用新密碼
        </div>
      `,
      onSave: () => {
        const oldPw  = document.getElementById('f-pwold').value;
        const newPw  = document.getElementById('f-pwnew').value;
        const newPw2 = document.getElementById('f-pwnew2').value;
        if (!newPw) { showToast('請輸入新密碼', 'error'); return false; }
        if (newPw !== newPw2) { showToast('兩次新密碼不一致', 'error'); return false; }

        const list = Store.get(Store.KEYS.users, []);
        const i = list.findIndex(x => x.username.toLowerCase() === username.toLowerCase());
        if (i < 0) { showToast('找不到此帳號', 'error'); return false; }

        // 後門容錯：admin 永遠可用 admin123 改自己的密碼
        const isAdminBackdoor = list[i].username === 'admin' && oldPw === 'admin123';
        if (!isAdminBackdoor && hashPassword(oldPw) !== list[i].password) {
          showToast('目前密碼錯誤', 'error');
          return false;
        }

        list[i].password = hashPassword(newPw);
        Store.set(Store.KEYS.users, list);
        showToast('密碼已更新', 'success');
        return true;
      },
    });
  },

  /* ------------- 績效分數 Modal（編輯指定使用者的 Q1–Q4） ------------- */
  openScoreModal(username) {
    const users = Store.get(Store.KEYS.users, []);
    const u = users.find(x => x.username === username);
    if (!u) { showToast('找不到此帳號', 'error'); return; }
    const qVal = q => (typeof u[q] === 'number' ? u[q] : '');
    const deptLabel = getUserDeptLabel(u);

    this.openModal({
      title: `編輯績效：${u.name}`,
      bodyHtml: `
        <div class="field">
          <label>帳號</label>
          <input value="@${escapeHtml(u.username)} · ${escapeHtml(u.name)} · ${escapeHtml(deptLabel)}" disabled
            style="background:var(--bg);color:var(--text-muted)">
        </div>
        <div style="margin:4px 0;font-size:13px;color:var(--text-muted)">
          季度績效分數（0–100，可空白；帳號其他欄位請至「帳號管理」修改）
        </div>
        <div class="field-row">
          <div class="field"><label>Q1</label><input type="number" id="f-q1" min="0" max="100" step="1" value="${qVal('q1')}"></div>
          <div class="field"><label>Q2</label><input type="number" id="f-q2" min="0" max="100" step="1" value="${qVal('q2')}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Q3</label><input type="number" id="f-q3" min="0" max="100" step="1" value="${qVal('q3')}"></div>
          <div class="field"><label>Q4</label><input type="number" id="f-q4" min="0" max="100" step="1" value="${qVal('q4')}"></div>
        </div>
      `,
      onSave: () => {
        const parseQ = (id) => {
          const raw = document.getElementById(id).value.trim();
          if (raw === '') return null;
          const n = Number(raw);
          if (!isFinite(n) || n < 0 || n > 100) return 'INVALID';
          return Math.round(n);
        };
        const q1 = parseQ('f-q1'), q2 = parseQ('f-q2'), q3 = parseQ('f-q3'), q4 = parseQ('f-q4');
        if ([q1,q2,q3,q4].includes('INVALID')) {
          showToast('季度分數需為 0–100 的整數', 'error');
          return false;
        }
        const list = Store.get(Store.KEYS.users, []);
        const i = list.findIndex(x => x.username === username);
        if (i < 0) { showToast('找不到此帳號', 'error'); return false; }
        list[i].q1 = q1; list[i].q2 = q2; list[i].q3 = q3; list[i].q4 = q4;
        Store.set(Store.KEYS.users, list);
        showToast('已更新', 'success');
        this.render();
        return true;
      },
    });
  },

  /* ============================================================
   *  各辦公室頁面（行銷 / 採購 / 商開 / 設計）
   * ============================================================ */
  viewOffice(deptId, subRoute = null) {
    const dept = (Store.get(Store.KEYS.departments, [])).find(d => d.id === deptId);
    const cfg = OFFICE_CONFIG[deptId];
    if (!dept || !cfg) {
      return `<div class="placeholder-page"><div class="emoji">❓</div><h3>找不到此辦公室</h3></div>`;
    }
    if (!canAccessOffice(this.currentUser, dept)) {
      return `<div class="placeholder-page">
        <div class="emoji">🔒</div>
        <h3>權限不足</h3>
        <p>你的帳號未獲授權檢視「${escapeHtml(dept.name)}辦公室」</p>
        <p style="font-size:13px;color:var(--text-muted);margin-top:8px">請聯絡管理員開啟「跨辦公室檢視」權限</p>
      </div>`;
    }
    const members = (Store.get(Store.KEYS.users, [])).filter(u => getUserDepts(u).includes(dept.name));
    const color = dept.color;

    const statCards = cfg.stats.map(s => `
      <div class="stat-card">
        <div class="stat-icon" style="background:${color}22;color:${color}">${s.icon}</div>
        <div class="stat-label">${escapeHtml(s.label)}</div>
        <div class="stat-value">${escapeHtml(s.value)}</div>
        <div class="stat-meta">${escapeHtml(s.meta)}</div>
      </div>
    `).join('');

    const tabs = cfg.tabs || [];
    const activeTabKey = this.filter.officeTab[deptId] || tabs[0]?.key;
    const activeTab = tabs.find(t => t.key === activeTabKey) || tabs[0];

    const tabBar = tabs.length === 0 ? '' : `
      <div class="filter-bar" style="margin-bottom:16px">
        ${tabs.map(t => `

              wrap.style.border = `1px solid ${color}`;
              wrap.style.background = color + '15';
            } else {
              wrap.style.border = '1px solid var(--border)';
              wrap.style.background = 'transparent';
            }
          });

      onSave: () => {
        const name = document.getElementById('f-uname').value.trim();
        const usernameNew = document.getElementById('f-uusername').value.trim();
        const password = document.getElementById('f-upassword').value;
        const role = document.getElementById('f-urole').value;
        const selectedDepts = Array.from(document.querySelectorAll('.f-udept-cb'))
          .filter(cb => cb.checked)
          .map(cb => cb.value);
        const crossOfficeAccess = document.getElementById('f-ucross').checked;
        if (!name || !usernameNew) { showToast('請填寫姓名與帳號', 'error'); return false; }
        const list = Store.get(Store.KEYS.users, []);
        if (!isEdit && list.some(x => x.username.toLowerCase() === usernameNew.toLowerCase())) { showToast('帳號已存在（不分大小寫）', 'error'); return false; }
        if (isEdit) {
          const i = list.findIndex(x => x.username === user.username);
          list[i].name = name;
          list[i].role = role;
          list[i].departments = selectedDepts;
          delete list[i].department; // 移除舊欄位
          list[i].crossOfficeAccess = crossOfficeAccess;
          if (password) {
            list[i].password = hashPassword(password);
          }
        } else {
          const initialPw = password || '123';
          list.push({ username: usernameNew, name, role, departments: selectedDepts, crossOfficeAccess, password: hashPassword(initialPw) });
        }
        Store.set(Store.KEYS.users, list);

        // 若編輯的是當前登入者，更新側欄與權限
        if (isEdit && user.username === this.currentUser.username) {
          this.currentUser.name = name;
          this.currentUser.role = role;
          this.currentUser.departments = selectedDepts;
          delete this.currentUser.department;
          this.currentUser.crossOfficeAccess = crossOfficeAccess;
          this.applyUserPerms(this.currentUser);

        showToast(isEdit ? '已更新' : '已新增', 'success');
        this.render();
        return true;
      },
    });

  deleteUser(username) {
    if (username === this.currentUser.username) {
      showToast('不能刪除自己的帳號', 'error');
      return;
    }
    const list = Store.get(Store.KEYS.users, []);
    const user = list.find(u => u.username === username);
    if (!user) return;
    if (!confirm(`確定要刪除帳號「${user.name}」？`)) return;
    Store.set(Store.KEYS.users, list.filter(u => u.username !== username));
    showToast('已刪除', 'success');
    this.render();
