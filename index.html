<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元創數位 · 績效管理</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --sidebar: #0f172a;
    --sidebar-2: #1e293b;
    --sidebar-text: #cbd5e1;
    --sidebar-muted: #64748b;
    --primary: #6366f1;
    --primary-soft: #eef2ff;
    --primary-dark: #4f46e5;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --success: #10b981;
    --success-soft: #d1fae5;
    --warn: #f59e0b;
    --warn-soft: #fef3c7;
    --danger: #ef4444;
    --danger-soft: #fee2e2;
    --info: #3b82f6;
    --info-soft: #dbeafe;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
    --shadow: 0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg: 0 10px 25px -5px rgba(15,23,42,.1), 0 8px 10px -6px rgba(15,23,42,.05);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                 "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }

  /* ------------- 登入頁 ------------- */
  #view-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
    padding: 24px;
  }
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
  }
  .login-logo {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 28px;
  }
  .login-logo .brand-logo {
    width: 220px;
    max-width: 100%;
    height: auto;
    display: block;
  }
  .login-logo p { margin: 0; font-size: 12px; color: var(--text-muted); }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    transition: border-color .15s, box-shadow .15s;
    background: white;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
  }
  .btn-primary {
    width: 100%;
    background: var(--primary);
    color: white;
    border: 0;
    padding: 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .login-hint {
    margin-top: 16px;
    padding: 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .login-hint code {
    background: white;
    padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--text);
  }
  .login-error {
    background: var(--danger-soft);
    color: var(--danger);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .login-error.show { display: block; }

  /* ------------- 主應用版面 ------------- */
  #view-app { display: none; min-height: 100vh; }
  .app-layout { display: flex; min-height: 100vh; }

  /* 側欄 */
  .sidebar {
    width: 240px;
    background: var(--sidebar);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .sidebar-header .brand-logo {
    width: 160px;
    max-width: 100%;
    height: auto;
    display: block;
    background: transparent;
  }
  .sidebar-header p { margin: 0; font-size: 11px; color: var(--sidebar-muted); }
  .sidebar-nav { flex: 1; padding: 0 12px; overflow-y: auto; }
  .sidebar-group {
    margin-top: 16px;
    padding: 0 8px;
    font-size: 11px;
    color: var(--sidebar-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 8px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 2px;
    border-radius: var(--radius-sm);
    color: var(--sidebar-text);
    cursor: pointer;
    font-size: 14px;
    transition: background .15s, color .15s;
    border: 0;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--sidebar-2); color: white; }
  .nav-item.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 12px rgba(99,102,241,.4);
  }
  .nav-item .icon { font-size: 16px; line-height: 1; }
  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--sidebar-2);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-footer .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 14px;
  }
  .sidebar-footer .info { flex: 1; min-width: 0; }
  .sidebar-footer .name {
    color: white;
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sidebar-footer .role {
    color: var(--sidebar-muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .logout-btn {
    margin: 0 16px 16px;
    background: var(--danger);
    color: white;
    border: 0;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-weight: 500;
    font-size: 13px;
  }
  .logout-btn:hover { background: #dc2626; }

  /* 主內容 */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
  }
  .page-header { margin-bottom: 24px; }
  .page-header h2 {
    margin: 0 0 4px;
    font-size: 24px;
    font-weight: 700;
  }
  .page-header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .page-header .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--success);
    margin-left: 12px;
  }
  .page-header .live-dot::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  /* 統計卡片 */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    padding: 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .stat-card .stat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 12px;
  }
  .stat-card .stat-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .stat-card .stat-value {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .stat-card .stat-meta {
    font-size: 12px;
    color: var(--text-muted);
  }
  .stat-card .stat-meta .up { color: var(--success); }
  .stat-card .stat-meta .down { color: var(--danger); }

  /* 篩選列 */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .pill {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    color: var(--text);
    transition: all .15s;
  }
  .pill:hover { border-color: var(--primary); color: var(--primary); }
  .pill.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .filter-spacer { flex: 1; }
  .btn-add {
    background: var(--primary);
    color: white;
    border: 0;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-add:hover { background: var(--primary-dark); }
  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .btn-ghost:hover { background: var(--bg); }

  /* 表格 */
  .table-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .table-card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .table-card-header h3 { margin: 0 0 4px; font-size: 16px; }
  .table-card-header p { margin: 0; font-size: 13px; color: var(--text-muted); }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th {
    text-align: left;
    padding: 14px 24px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    font-weight: 500;
    white-space: nowrap;
  }
  td {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:hover { background: rgba(99,102,241,.03); }
  .rank-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: white;
  }
  .rank-1 { background: #f59e0b; }
  .rank-2 { background: #94a3b8; }
  .rank-3 { background: #fb923c; }
  .rank-other { background: var(--bg); color: var(--text-muted); }
  .employee-cell { display: flex; align-items: center; gap: 12px; }
  .employee-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--primary-soft);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 13px;
  }
  .employee-name { font-weight: 500; }
  .employee-code { font-size: 12px; color: var(--text-muted); }
  .dept-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }
  .error-rate.low { color: var(--success); font-weight: 500; }
  .error-rate.mid { color: var(--warn); font-weight: 500; }
  .error-rate.high { color: var(--danger); font-weight: 500; }
  .score-cell { display: flex; align-items: center; gap: 12px; }
  .score-bar {
    width: 100px; height: 6px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .score-bar > div {
    height: 100%;
    transition: width .4s;
  }
  .score-good { background: var(--success); }
  .score-ok { background: var(--warn); }
  .score-bad { background: var(--danger); }
  .score-value { font-weight: 600; min-width: 24px; }
  .trend-up { color: var(--success); }
  .trend-flat { color: var(--text-muted); }
  .trend-down { color: var(--danger); }
  .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  tr:hover .row-actions { opacity: 1; }
  .icon-btn {
    width: 28px; height: 28px;
    border: 0;
    background: transparent;
    border-radius: 6px;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.danger:hover { background: var(--danger-soft); color: var(--danger); }
  .empty {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty .emoji { font-size: 40px; margin-bottom: 12px; }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    backdrop-filter: blur(2px);
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: white;
    border-radius: var(--radius);
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 { margin: 0; font-size: 16px; }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* 部門色塊 */
  .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform .15s;
  }
  .color-swatch:hover { transform: scale(1.05); }
  .color-swatch.selected { border-color: var(--text); }

  /* 部門卡片網格 */
  .dept-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .dept-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .dept-card .dept-color {
    width: 12px; height: 12px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  .dept-card h4 { margin: 0 0 4px; font-size: 16px; }
  .dept-card .count { font-size: 13px; color: var(--text-muted); }
  .dept-card .actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 4px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: white;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    font-size: 14px;
    z-index: 200;
    transform: translateY(100px);
    opacity: 0;
    transition: all .25s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* Dashboard overview */
  .overview-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) {
    .overview-grid { grid-template-columns: 1fr; }
    .main { padding: 20px; }
    .sidebar { width: 200px; }
  }
  .chart-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 20px;
  }
  .chart-card h3 { margin: 0 0 16px; font-size: 16px; }
  .dept-list { display: flex; flex-direction: column; gap: 12px; }
  .dept-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dept-row .label { flex: 1; font-size: 13px; }
  .dept-row .bar {
    flex: 2;
    height: 8px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .dept-row .bar > div { height: 100%; }
  .dept-row .value { font-weight: 600; font-size: 13px; min-width: 32px; text-align: right; }

  /* placeholder pages */
  .placeholder-page {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 60px;
    text-align: center;
  }
  .placeholder-page .emoji { font-size: 56px; margin-bottom: 16px; }
  .placeholder-page h3 { margin: 0 0 8px; }
  .placeholder-page p { color: var(--text-muted); margin: 0; }

  /* admin user list */
  .user-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
  }
  .user-row:first-child { border-top: 0; }
  .user-row .info { flex: 1; }
  .user-row .info .name { font-weight: 500; }
  .user-row .info .meta { font-size: 12px; color: var(--text-muted); }
  .badge-role {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .role-admin { background: var(--primary-soft); color: var(--primary); }
  .role-staff { background: var(--bg); color: var(--text-muted); }
</style>
</head>
<body>

<!-- ============== 登入頁 ============== -->
<div id="view-login">
  <div class="login-card">
    <div class="login-logo">
      <img class="brand-logo" src="logo.png" alt="元創數位">
      <p>元創數位 · 內部管理系統</p>
    </div>

    <div id="login-error" class="login-error"></div>

    <!-- 登入表單 -->
    <div id="form-login">
      <div class="field">
        <label>帳號</label>
        <input type="text" id="login-username" autocomplete="username" placeholder="請輸入帳號">
      </div>
      <div class="field">
        <label>密碼</label>
        <input type="password" id="login-password" autocomplete="current-password" placeholder="請輸入密碼">
      </div>
      <button type="button" class="btn-primary" onclick="window.App && App.login()">登入</button>
      <div class="login-hint" id="login-hint">
        請使用管理員建立的帳號登入。<br>
        如忘記帳號或密碼，請聯絡系統管理員。
        <div id="js-status" style="margin-top:8px;color:var(--danger);font-size:11px"></div>
      </div>
    </div>
  </div>
</div>

<!-- ============== 主應用 ============== -->
<div id="view-app">
  <div class="app-layout">
    <!-- 側欄 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img class="brand-logo" src="logo.png" alt="元創數位">
        <p>元創數位 · 內部管理系統</p>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-group">總覽</div>
        <button class="nav-item" data-route="dashboard">
          <span class="icon">🏠</span><span>儀表板首頁</span>
        </button>
        <button class="nav-item active" data-route="employees">
          <span class="icon">📊</span><span>績效管理</span>
        </button>
        <div class="sidebar-group">辦公室</div>
        <button class="nav-item" data-route="office-d1">
          <span class="icon">📣</span><span>行銷</span>
        </button>
        <button class="nav-item" data-route="office-d2">
          <span class="icon">🛒</span><span>採購</span>
        </button>
        <button class="nav-item" data-route="office-d3">
          <span class="icon">💼</span><span>商開</span>
        </button>
        <button class="nav-item" data-route="office-d4">
          <span class="icon">🎨</span><span>設計</span>
        </button>
        <div class="sidebar-group" id="admin-group" style="display:none">系統管理</div>
        <button class="nav-item" data-route="users" id="nav-users" style="display:none">
          <span class="icon">👥</span><span>帳號管理</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="avatar" id="user-avatar">?</div>
        <div class="info">
          <div class="name" id="user-name">—</div>
          <div class="role" id="user-role">—</div>
        </div>
        <button title="修改密碼" onclick="App.openChangePasswordModal()"

  KEYS: {
    users: 'ec.users',
    departments: 'ec.departments',
    employees: 'ec.employees',
    platforms: 'ec.platforms',
    session: 'ec.session',
    seeded: 'ec.seeded.v5',
  },
  _mem: {},
  _useMem: (function() {
    // 偵測 localStorage 可用性；data: URL / 隱私模式 / 沙箱 iframe 下會失敗
    try {
      const t = '__ec_test__';
      localStorage.setItem(t, '1');
      localStorage.removeItem(t);
      return false;
    } catch { return true; }
  })(),
  get(key, fallback) {
    if (this._useMem) {
      return this._mem[key] !== undefined ? this._mem[key] : fallback;
    }
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      this._useMem = true;
      return this._mem[key] !== undefined ? this._mem[key] : fallback;
    }
  },
  set(key, value) {
    if (this._useMem) { this._mem[key] = value; return; }
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch { this._useMem = true; this._mem[key] = value; }
  },
  remove(key) {
    if (this._useMem) { delete this._mem[key]; return; }
    try { localStorage.removeItem(key); }
    catch { this._useMem = true; delete this._mem[key]; }
  },
};

/* ------------- 密碼雜湊（同步 FNV-like，非真實安全方案，僅避免明碼儲存） ------------- */
function hashPassword(pw) {
  const s = String(pw) + '::ec-dashboard::v2';
  let h1 = 0x811c9dc5 >>> 0;
  let h2 = 0x12345678 >>> 0;
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    h1 = Math.imul(h1 ^ c, 0x01000193) >>> 0;
    h2 = Math.imul((h2 + c) >>> 0, 0x85ebca6b) >>> 0;
    h2 = (h2 ^ (h2 >>> 13)) >>> 0;
  }
  return h1.toString(16).padStart(8, '0') + h2.toString(16).padStart(8, '0');
}

/* ------------- 種子資料（冪等，只補缺漏，不覆蓋使用者輸入） -------------
 * 每次載入都會跑，但只在某個鍵不存在時才寫入預設值；
 * 加上對舊版員工資料 schema（orders/items/...）的就地遷移。
 * 想完全重置請按登入頁的「↻ 重設範例資料」。
 */
function seedData() {
  const defaultPwHash = hashPassword('admin123');

  // Users：若沒有任何 admin 帳號才補上預設 admin；同時補齊缺漏的 Q1–Q4 欄位
  const users = Store.get(Store.KEYS.users, []);
  let usersChanged = false;
  if (!users.some(u => u.role === 'admin')) {
    users.push({ username: 'admin', password: defaultPwHash, name: '陳大明', role: 'admin', department: '', q1: null, q2: null, q3: null, q4: null });
    usersChanged = true;
  }
  users.forEach(u => {
    if (!('q1' in u)) { u.q1 = null; usersChanged = true; }
    if (!('q2' in u)) { u.q2 = null; usersChanged = true; }
    if (!('q3' in u)) { u.q3 = null; usersChanged = true; }
    if (!('q4' in u)) { u.q4 = null; usersChanged = true; }
  });
  if (usersChanged) Store.set(Store.KEYS.users, users);

  // Departments：完全沒有才補預設 4 個辦公室
  const departments = Store.get(Store.KEYS.departments);
  if (!departments || departments.length === 0) {
    Store.set(Store.KEYS.departments, [
      { id: 'd1', name: '行銷', color: '#ec4899' },
      { id: 'd2', name: '採購', color: '#10b981' },
      { id: 'd3', name: '商開', color: '#6366f1' },
      { id: 'd4', name: '設計', color: '#8b5cf6' },
    ]);
  }

  // 績效管理已直接讀取使用者帳號，不再需要獨立的 employees 資料；
  // 舊版的 ec.employees 留在 localStorage 不會影響運作。

  Store.set(Store.KEYS.seeded, true);
}

/* ------------- 計算年度績效分數（Q1–Q4 平均，0–100） ------------- */
function computeScore(emp) {
  const qs = [emp.q1, emp.q2, emp.q3, emp.q4].filter(q => typeof q === 'number' && !isNaN(q));
  if (qs.length === 0) return 0;
  return Math.round(qs.reduce((s, q) => s + q, 0) / qs.length);
}
function getQuarterScore(emp, q) {
  const v = emp[q];
  return typeof v === 'number' && !isNaN(v) ? v : null;
}
function canAccessOffice(user, dept) {
  if (!user || !dept) return false;
  if (user.role === 'admin') return true;
  if (user.crossOfficeAccess === true) return true;
  return dept.name === user.department;
}

function trendFromQuarters(emp) {
  const a = emp.q3, b = emp.q4;
  if (typeof a !== 'number' || typeof b !== 'number') return 'flat';
  if (b - a >= 2) return 'up';
  if (a - b >= 2) return 'down';
  return 'flat';
}

/* ------------- 日期工具 ------------- */
function toDateStr(d) {
  // local-time YYYY-MM-DD (避免 toISOString 的 UTC 偏差導致跨日)
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function eachDay(startStr, endStr, fn) {
  const start = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T00:00:00');
  for (let d = start; d <= end; d = addDays(d, 1)) fn(toDateStr(d));
}
function sumDaily(daily, startStr, endStr) {
  if (!daily || !startStr || !endStr || startStr > endStr) return 0;
  let s = 0; eachDay(startStr, endStr, k => { s += +daily[k] || 0; });
  return s;
}
function getRangeDates(range, customStart, customEnd) {
  const now = new Date();
  const today = toDateStr(now);
  if (range === 'today')     return { start: today, end: today, label: '今日' };
  if (range === 'yesterday') { const y = toDateStr(addDays(now, -1)); return { start: y, end: y, label: '昨日' }; }
  if (range === 'week') {
    // 本週週一 → 今天
    const dow = now.getDay() || 7; // Sun=0→7, Mon=1, ... Sat=6
    return { start: toDateStr(addDays(now, -(dow - 1))), end: today, label: '本週' };
  }
  if (range === 'month') {
    const m1 = new Date(now.getFullYear(), now.getMonth(), 1);
    return { start: toDateStr(m1), end: today, label: '本月' };
  }
  if (range === 'custom') {
    const s = customStart || toDateStr(addDays(now, -6));
    const e = customEnd   || today;
    const label = (s === e) ? s.replace(/-/g, '/') : `${s.replace(/-/g, '/')} ~ ${e.replace(/-/g, '/')}`;
    return { start: s, end: e, label };
  }
  return { start: today, end: today, label: '今日' };
}

/* ------------- 平台資料遷移：舊 schema → 每日序列 daily{} ------------- */
function migratePlatforms(platforms) {
  if (!Array.isArray(platforms)) return platforms;
  let changed = false;
  const out = platforms.map(p => {
    // 已是新版（含 daily 物件且至少有資料）
    if (p.daily && typeof p.daily === 'object' && Object.keys(p.daily).length > 0) {
      return p;
    }
    changed = true;
    // 從舊欄位推估每日資料
    const today = +p.today || 0;
    const monthTotal = +p.month || +p.monthTotal || (today * 30);
    let yesterday = +p.yesterday;
    if (!isFinite(yesterday) || yesterday < 0) {
      const delta = +p.deltaPct || 0;
      yesterday = (1 + delta / 100) !== 0 ? today / (1 + delta / 100) : today;
    }
    const avgDaily = monthTotal / 30;
    const seedBase = p.name.split('').reduce((s, c) => s + c.charCodeAt(0), 0);
    const daily = {};
    const now = new Date();
    for (let i = 89; i >= 0; i--) {
      const key = toDateStr(addDays(now, -i));
      const s = Math.sin(seedBase * 0.013 + i * 0.731) * 43758.5453;
      const r = Math.abs(s - Math.floor(s)); // 0~1
      const factor = 0.55 + r * 0.9; // 0.55 ~ 1.45
      daily[key] = Math.round(avgDaily * factor);
    }
    daily[toDateStr(now)] = Math.round(today);
    daily[toDateStr(addDays(now, -1))] = Math.round(yesterday);
    return { name: p.name, icon: p.icon, color: p.color, daily };
  });
  return changed ? out : platforms;
}

/* 確保最近 N 天都有資料（每天打開頁面時自動把當天補上，序列會滾動） */
function ensureDailyRecent(platforms, days = 90) {
  let changed = false;
  const now = new Date();
  platforms.forEach(p => {
    if (!p.daily) { p.daily = {}; changed = true; }
    // 找最近一個有值的日期，作為產生後續資料的基準
    let prev = null;
    for (let i = days; i >= 0; i--) {
      const key = toDateStr(addDays(now, -i));
      if (p.daily[key] != null) { prev = p.daily[key]; break; }
    }
    if (prev == null) prev = 100000;
    for (let i = days - 1; i >= 0; i--) {
      const key = toDateStr(addDays(now, -i));
      if (p.daily[key] == null) {
        const r = Math.abs(Math.sin(key.length + i * 1.7) * 100) % 30 / 100; // 0~0.3
        const factor = 0.85 + r; // 0.85 ~ 1.15
        p.daily[key] = Math.round(prev * factor);
        changed = true;
      }
      prev = p.daily[key];
    }
  });
  return changed;
}

      const user = (Store.get(Store.KEYS.users, [])).find(u => u.username === session.username);
      if (user) {
        this.enterApp(user);
        return;
      }
    }
    this.showLogin();
  },

  // 若不知為何沒有任何使用者，自動補回預設 admin（避免被鎖在外面）
  ensureAdmin() {
    const users = Store.get(Store.KEYS.users, []);
    if (users.length === 0) {
      Store.set(Store.KEYS.users, [{
        username: 'admin',
        password: hashPassword('admin123'),
        name: '陳大明',
        role: 'admin',
        department: '商開',
      }]);
    }
  },

  bindNav() {
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => this.navigate(btn.dataset.route));
    });
  },

  /* ------------- 登入 ------------- */
  showLogin() {
    document.getElementById('view-login').style.display = 'flex';
    document.getElementById('view-app').style.display = 'none';
  },

  showAuthError(msg) {
    const e = document.getElementById('login-error');
    e.textContent = msg;
    e.classList.add('show');
  },

  login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const ulow = username.toLowerCase();

    // 後門：admin / admin123 永遠可登入（不論 localStorage 狀態），同時修復資料
    if (ulow === 'admin' && password === 'admin123') {
      const users = Store.get(Store.KEYS.users, []);
      let admin = users.find(u => u.username.toLowerCase() === 'admin');
      if (!admin) {
        admin = { username: 'admin', password: hashPassword('admin123'),
                  name: '陳大明', role: 'admin', department: '' };
        users.push(admin);
      } else {
        // 修復舊版錯誤雜湊
        admin.password = hashPassword('admin123');
        admin.role = 'admin';
      }
      Store.set(Store.KEYS.users, users);
      Store.set(Store.KEYS.session, { username: admin.username });
      this.enterApp(admin);
      return;
    }

    const users = Store.get(Store.KEYS.users, []);
    const user = users.find(u => u.username.toLowerCase() === ulow);
    if (!user) { this.showAuthError('帳號不存在'); return; }
    const hash = hashPassword(password);
    if (hash !== user.password) { this.showAuthError('密碼錯誤'); return; }
    Store.set(Store.KEYS.session, { username: user.username });
    this.enterApp(user);
  },

  logout() {
    if (!confirm('確定要登出嗎？')) return;
    Store.remove(Store.KEYS.session);
    this.currentUser = null;
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    this.showLogin();
  },

  /* ------------- 進入主應用 ------------- */
  enterApp(user) {
    this.currentUser = user;
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-app').style.display = 'block';
    this.applyUserPerms(user);
    this.navigate('employees');
  },

  // 依使用者權限更新側欄的顯示（角色資訊、管理員區、可見的辦公室）
  applyUserPerms(user) {
    const deptLabel = user.department || '全公司';
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('user-role').textContent =
      (user.role === 'admin' ? '管理員' : '員工') + '・' + deptLabel;
    document.getElementById('user-avatar').textContent = user.name.slice(0, 1);

    const isAdmin = user.role === 'admin';
    document.getElementById('admin-group').style.display = isAdmin ? '' : 'none';
    document.getElementById('nav-users').style.display = isAdmin ? '' : 'none';

    const departments = Store.get(Store.KEYS.departments, []);
    document.querySelectorAll('[data-route^="office-"]').forEach(btn => {
      const deptId = btn.dataset.route.replace('office-', '');
      const dept = departments.find(d => d.id === deptId);
      btn.style.display = canAccessOffice(user, dept) ? '' : 'none';
    });
  },

  /* ------------- 路由 ------------- */
  navigate(route) {
    if (!route) return;
    this.route = route;
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.route === route);
    });
    this.render();
  },

  render() {
    const main = document.getElementById('main-content');
    if (this.route && this.route.startsWith('office-')) {
      const deptId = this.route.slice('office-'.length);
      main.innerHTML = this.viewOffice(deptId);
      this.bindOfficeTabs(deptId);
      return;
    }
    switch (this.route) {
      case 'dashboard': main.innerHTML = this.viewDashboard(); this.bindDashboardPills(); break;
      case 'employees': main.innerHTML = this.viewEmployees(); this.bindFilterBar(); break;
      case 'users': main.innerHTML = this.viewUsers(); break;
      default: main.innerHTML = this.viewEmployees(); this.bindFilterBar();
    }
  },

  /* ============================================================
   *  儀表板首頁
   * ============================================================ */
  viewDashboard() {
    // 讀取 → 遷移舊 schema → 補齊最近 90 天 → 視需要寫回
    let platforms = Store.get(Store.KEYS.platforms, null);
    if (!platforms) platforms = JSON.parse(JSON.stringify(PLATFORMS));
    let migrated = migratePlatforms(platforms);
    const wasMigrated = migrated !== platforms;
    if (wasMigrated) platforms = migrated;
    const extended = ensureDailyRecent(platforms, 90);
    if (wasMigrated || extended) Store.set(Store.KEYS.platforms, platforms);

    const now = new Date();
    const todayStr = toDateStr(now);
    const ystrDay = toDateStr(addDays(now, -1));

    const range = this.filter.range || 'today';
    const customStart = this.filter.customStart || toDateStr(addDays(now, -6));
    const customEnd = this.filter.customEnd || todayStr;
    const rd = getRangeDates(range, customStart, customEnd);
    const currentLabel = rd.label;

    const valueOf = (p) => sumDaily(p.daily, rd.start, rd.end);
    const rangeTotal = platforms.reduce((s, p) => s + valueOf(p), 0);
    const maxValue = Math.max(1, ...platforms.map(valueOf));

    const todayOf = (p) => +(p.daily?.[todayStr]) || 0;
    const yesterdayOf = (p) => +(p.daily?.[ystrDay]) || 0;
    const todayTotal = platforms.reduce((s, p) => s + todayOf(p), 0);
    const yesterdayTotal = platforms.reduce((s, p) => s + yesterdayOf(p), 0);
    const overallDelta = yesterdayTotal > 0 ? (todayTotal / yesterdayTotal - 1) * 100 : 0;

    const platformCards = platforms.map((p, i) => {
      const td = todayOf(p);
      const yd = yesterdayOf(p);
      const delta = yd > 0 ? ((td / yd) - 1) * 100 : 0;
      return `
        <div class="stat-card" style="position:relative">
          <button class="icon-btn" title="編輯" onclick="App.openPlatformModal(${i})"
            style="position:absolute;top:10px;right:10px">✏️</button>
          <div class="stat-icon" style="background:${p.color}22;color:${p.color}">${p.icon}</div>
          <div class="stat-label">${escapeHtml(p.name)}</div>
          <div class="stat-value" style="font-size:22px">${fmtNTD(td)}</div>
          <div class="stat-meta">
            ${delta >= 0
              ? `<span class="up">↑ ${delta.toFixed(1)}%</span>`
              : `<span class="down">↓ ${Math.abs(delta).toFixed(1)}%</span>`} 較昨日
          </div>
        </div>
      `;
    }).join('');

    const rangeLabels = { today: '今日', yesterday: '昨日', week: '本週', month: '本月', custom: '自訂' };
    const rangePills = ['today','yesterday','week','month','custom'].map(r => `
      <button class="pill ${range === r ? 'active' : ''}" data-range="${r}" style="padding:4px 12px;font-size:12px">${rangeLabels[r]}</button>
    `).join('');

    const dateInputs = range === 'custom' ? `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;font-size:13px;flex-wrap:wrap">
        <span style="color:var(--text-muted)">起：</span>
        <input type="date" id="custom-start" value="${customStart}" max="${todayStr}"
          style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit">
        <span style="color:var(--text-muted)">迄：</span>
        <input type="date" id="custom-end" value="${customEnd}" max="${todayStr}"
          style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit">
        <button class="btn-ghost" id="custom-quick-7"  style="padding:6px 10px;font-size:12px">最近 7 天</button>
        <button class="btn-ghost" id="custom-quick-30" style="padding:6px 10px;font-size:12px">最近 30 天</button>
      </div>
    ` : '';

    return `
      <div class="page-header">
        <h2>儀表板首頁 <span class="live-dot">即時資料</span></h2>
        <p>歡迎回來，${escapeHtml(this.currentUser.name)}　今日 ${new Date().toLocaleDateString('zh-TW')}　·　今日總營收 <strong style="color:var(--text)">${fmtNTD(todayTotal)}</strong> ${overallDelta >= 0 ? `<span class="up" style="margin-left:6px">↑ ${overallDelta.toFixed(1)}%</span>` : `<span class="down" style="margin-left:6px">↓ ${Math.abs(overallDelta).toFixed(1)}%</span>`}</p>
      </div>
      <div class="stat-grid">${platformCards}</div>
      <div class="chart-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap">
          <h3 style="margin:0">各平台${range === 'custom' ? '' : currentLabel}營收</h3>
          <div id="range-pills" style="display:flex;gap:4px;flex-wrap:wrap">${rangePills}</div>
        </div>
        ${dateInputs}
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">
          ${currentLabel} 合計 <strong style="color:var(--text)">${fmtNTD(rangeTotal)}</strong>
          <span style="margin-left:8px;color:var(--text-muted);font-size:12px">（${rd.start.replace(/-/g,'/')} ~ ${rd.end.replace(/-/g,'/')}）</span>
        </div>
        <div>
          ${platforms.map((p, i) => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;${i < platforms.length - 1 ? 'border-bottom:1px solid var(--border);' : ''}">
              <span class="dept-tag" style="background:${p.color}22;color:${p.color};font-size:14px;padding:5px 14px">${escapeHtml(p.name)}</span>
              <span style="font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.02em">${fmtNTD(valueOf(p))}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  },

  bindDashboardPills() {
    document.querySelectorAll('#range-pills [data-range]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.filter.range = btn.dataset.range;
        if (this.filter.range === 'custom' && !this.filter.customStart) {
          const now = new Date();
          this.filter.customStart = toDateStr(addDays(now, -6));
          this.filter.customEnd = toDateStr(now);
        }
        this.render();
      });
    });
    const startEl = document.getElementById('custom-start');
    const endEl   = document.getElementById('custom-end');
    if (startEl) startEl.addEventListener('change', () => {
      let s = startEl.value, e = document.getElementById('custom-end').value;
      if (s && e && s > e) e = s;
      this.filter.customStart = s; this.filter.customEnd = e;
      this.render();
    });
    if (endEl) endEl.addEventListener('change', () => {
      let s = document.getElementById('custom-start').value, e = endEl.value;
      if (s && e && e < s) s = e;
      this.filter.customStart = s; this.filter.customEnd = e;
      this.render();
    });
    const q7 = document.getElementById('custom-quick-7');
    if (q7) q7.addEventListener('click', () => {
      const now = new Date();
      this.filter.customStart = toDateStr(addDays(now, -6));
      this.filter.customEnd = toDateStr(now);
      this.render();
    });
    const q30 = document.getElementById('custom-quick-30');
    if (q30) q30.addEventListener('click', () => {
      const now = new Date();
      this.filter.customStart = toDateStr(addDays(now, -29));
      this.filter.customEnd = toDateStr(now);
      this.render();
    });
  },

  openPlatformModal(idx) {
    let platforms = Store.get(Store.KEYS.platforms, null);
    if (!platforms) platforms = JSON.parse(JSON.stringify(PLATFORMS));
    platforms = migratePlatforms(platforms);
    ensureDailyRecent(platforms, 90);
    platforms = platforms.map(p => ({ ...p, daily: { ...(p.daily || {}) } }));

    const p = platforms[idx];
    if (!p) { showToast('找不到此平台', 'error'); return; }

    const now = new Date();
    const todayStr = toDateStr(now);
    const ystrDay = toDateStr(addDays(now, -1));
    const todayVal = +(p.daily[todayStr]) || 0;
    const ydayVal  = +(p.daily[ystrDay]) || 0;

    // 提供一個可選的「指定日期」欄位，方便補歷史
    const customDateDefault = toDateStr(addDays(now, -2));

    this.openModal({
      title: `編輯：${p.name}`,
      bodyHtml: `
        <div class="field">
          <label>平台</label>
          <input value="${escapeHtml(p.name)}" disabled style="background:var(--bg);color:var(--text-muted)">
        </div>
        <div class="field-row">
          <div class="field">
            <label>今日營收（${todayStr.replace(/-/g,'/')}）</label>
            <input type="number" id="f-today" min="0" step="1" value="${todayVal}">
          </div>
          <div class="field">
            <label>昨日營收（${ystrDay.replace(/-/g,'/')}）</label>
            <input type="number" id="f-yesterday" min="0" step="1" value="${ydayVal}">
          </div>
        </div>
        <div style="margin:14px 0 4px;padding-top:12px;border-top:1px dashed var(--border);font-size:13px;color:var(--text-muted)">
          補/修指定日期（選填）
        </div>
        <div class="field-row">
          <div class="field">
            <label>日期</label>
            <input type="date" id="f-anydate" value="${customDateDefault}" max="${todayStr}">
          </div>
          <div class="field">
            <label>當日營收（NT$）</label>
            <input type="number" id="f-anyval" min="0" step="1" placeholder="留空不改">
          </div>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
          本週 / 本月 / 自訂區間總額會由每日資料自動加總，無需直接編輯
        </div>
      `,
      onSave: () => {
        const today = +document.getElementById('f-today').value;
        const yesterday = +document.getElementById('f-yesterday').value;
        if (!isFinite(today) || today < 0) { showToast('今日營收需為非負數字', 'error'); return false; }
        if (!isFinite(yesterday) || yesterday < 0) { showToast('昨日營收需為非負數字', 'error'); return false; }
        p.daily[todayStr] = Math.round(today);
        p.daily[ystrDay] = Math.round(yesterday);

        const anyDate = document.getElementById('f-anydate').value;
        const anyValRaw = document.getElementById('f-anyval').value;
        if (anyDate && anyValRaw !== '') {
          const v = +anyValRaw;
          if (!isFinite(v) || v < 0) { showToast('指定日期當日營收需為非負數字', 'error'); return false; }
          p.daily[anyDate] = Math.round(v);
        }

        Store.set(Store.KEYS.platforms, platforms);
        showToast(`「${p.name}」已更新`, 'success');
        this.render();
        return true;
      },
    });
  },

  /* ============================================================
   *  績效管理
   * ============================================================ */
  viewEmployees() {
    const departments = Store.get(Store.KEYS.departments, []);
    const allUsers = Store.get(Store.KEYS.users, []);
    // 員工績效明細：排除管理員、以及未指派辦公室（全公司）的帳號
    const users = allUsers.filter(u => u.role !== 'admin' && u.department);
    const deptById = Object.fromEntries(departments.map(d => [d.id, d]));
    const filterDept = this.filter.dept === 'all' ? null : deptById[this.filter.dept];
    const filtered = !filterDept
      ? users
      : users.filter(u => u.department === filterDept.name);

    const quarter = this.filter.quarter || 'all';
    const sortKey = quarter === 'all' ? null : quarter;

    const ranked = filtered.map(u => ({
      ...u,
      score: computeScore(u),
      trend: trendFromQuarters(u),
    })).sort((a, b) => {
      const av = sortKey ? (getQuarterScore(a, sortKey) ?? -1) : a.score;
      const bv = sortKey ? (getQuarterScore(b, sortKey) ?? -1) : b.score;
      return bv - av;
    });

    const avgScore = ranked.length
      ? Math.round(ranked.reduce((s, e) => {
          const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
          return s + v;
        }, 0) / ranked.length * 10) / 10
      : 0;
    const excellent = ranked.filter(e => {
      const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
      return v >= 90;
    }).length;
    const needsImprov = ranked.filter(e => {
      const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
      return v > 0 && v < 60;
    }).length;
    const topPerformer = ranked[0];

    const deptByName = Object.fromEntries(departments.map(d => [d.name, d]));

    const cellScore = (val) => {
      if (val == null) return '<span style="color:var(--text-muted)">—</span>';
      const cls = val >= 90 ? 'trend-up' : val < 60 ? 'trend-down' : '';
      return `<span class="${cls}" style="font-weight:600">${val}</span>`;
    };
    const highlight = (q) => quarter === q ? 'style="background:var(--primary-soft)"' : '';

    const rows = ranked.length === 0 ? `
      <tr><td colspan="10"><div class="empty"><div class="emoji">📭</div>
        <div>尚無員工資料</div>
        <div style="font-size:13px;margin-top:4px">請先到「帳號管理」建立員工帳號</div>
      </div></td></tr>
    ` : ranked.map((u, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
      const dept = deptByName[u.department];
      const scoreClass = u.score >= 90 ? 'score-good' : u.score >= 80 ? 'score-ok' : 'score-bad';
      const trendIcon = u.trend === 'up' ? '<span class="trend-up">↑ 上升</span>'
        : u.trend === 'down' ? '<span class="trend-down">↓ 下降</span>'
        : '<span class="trend-flat">→ 持平</span>';
      const deptCell = dept
        ? `<span class="dept-tag" style="background:${dept.color}22;color:${dept.color}">${escapeHtml(dept.name)}</span>`
        : `<span style="color:var(--text-muted)">${escapeHtml(u.department || '全公司')}</span>`;
      return `
        <tr>
          <td><span class="rank-badge ${rankClass}">${rank}</span></td>
          <td>
            <div class="employee-cell">
              <div class="employee-avatar">${escapeHtml(u.name.slice(0,1))}</div>
              <div>
                <div class="employee-name">${escapeHtml(u.name)}</div>
                <div class="employee-code">@${escapeHtml(u.username)}</div>
              </div>
            </div>
          </td>
          <td>${deptCell}</td>
          <td ${highlight('q1')}>${cellScore(getQuarterScore(u, 'q1'))}</td>
          <td ${highlight('q2')}>${cellScore(getQuarterScore(u, 'q2'))}</td>
          <td ${highlight('q3')}>${cellScore(getQuarterScore(u, 'q3'))}</td>
          <td ${highlight('q4')}>${cellScore(getQuarterScore(u, 'q4'))}</td>
          <td>
            <div class="score-cell">
              <div class="score-bar"><div class="${scoreClass}" style="width:${u.score}%"></div></div>
              <span class="score-value">${u.score}</span>
            </div>
          </td>
          <td>${trendIcon}</td>
          <td>
            <div class="row-actions">
              <button class="icon-btn" title="編輯分數" onclick="App.openScoreModal('${escapeHtml(u.username)}')">✏️</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    const deptPills = `
      <button class="pill ${this.filter.dept === 'all' ? 'active' : ''}" data-dept="all">全部辦公室</button>
      ${departments.map(d => `
        <button class="pill ${this.filter.dept === d.id ? 'active' : ''}" data-dept="${d.id}">${escapeHtml(d.name)}</button>
      `).join('')}
    `;

    const quarterLabels = { all: '全年', q1: 'Q1', q2: 'Q2', q3: 'Q3', q4: 'Q4' };
    const quarterPills = ['all','q1','q2','q3','q4'].map(q => `
      <button class="pill ${quarter === q ? 'active' : ''}" data-quarter="${q}">${quarterLabels[q]}</button>
    `).join('');

    const currentLabel = quarterLabels[quarter];
    const tableSubtitle = quarter === 'all'
      ? `依全年平均分數排序 · 共 ${ranked.length} 人`
      : `依 ${currentLabel} 分數排序 · 共 ${ranked.length} 人`;

    return `
      <div class="page-header">
        <h2>績效管理 <span class="live-dot">即時更新</span></h2>
        <p>各辦公室員工 ${currentLabel} 績效分數（滿分 100 分）</p>
      </div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--info-soft);color:var(--info)">📊</div>
          <div class="stat-label">${currentLabel}平均分數</div>
          <div class="stat-value">${avgScore}</div>
          <div class="stat-meta">滿分 100 分</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--success-soft);color:var(--success)">🏆</div>
          <div class="stat-label">優秀員工（≥ 90）</div>
          <div class="stat-value">${excellent}</div>
          <div class="stat-meta">共 ${ranked.length} 人中</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--danger-soft);color:var(--danger)">⚠️</div>
          <div class="stat-label">待加強（&lt; 60）</div>
          <div class="stat-value">${needsImprov}</div>
          <div class="stat-meta">需關注並輔導</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--primary-soft);color:var(--primary)">⭐</div>
          <div class="stat-label">${currentLabel}最高分</div>
          <div class="stat-value" style="font-size:22px">${topPerformer ? escapeHtml(topPerformer.name) : '—'}</div>
          <div class="stat-meta">${topPerformer ? (sortKey ? (getQuarterScore(topPerformer, sortKey) ?? '—') : topPerformer.score) + ' 分' : ''}</div>
        </div>
      </div>
      <div class="filter-bar">
        ${deptPills}

    this.openModal({
      title: `修改密碼：${this.currentUser.name}`,

        </div>
        <div class="field">

        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">

      `,

        const oldPw  = document.getElementById('f-pwold').value;
        const newPw  = document.getElementById('f-pwnew').value;
        const newPw2 = document.getElementById('f-pwnew2').value;
        if (!newPw) { showToast('請輸入新密碼', 'error'); return false; }
        if (newPw !== newPw2) { showToast('兩次新密碼不一致', 'error'); return false; }

        const list = Store.get(Store.KEYS.users, []);
        const i = list.findIndex(x => x.username.toLowerCase() === username.toLowerCase());
        if (i < 0) { showToast('找不到此帳號', 'error'); return false; }

        // 後門容錯：admin 永遠可用 admin123 改自己的密碼
        const isAdminBackdoor = list[i].username === 'admin' && oldPw === 'admin123';
        if (!isAdminBackdoor && hashPassword(oldPw) !== list[i].password) {
          showToast('目前密碼錯誤', 'error');
          return false;
        }

        list[i].password = hashPassword(newPw);
        Store.set(Store.KEYS.users, list);
        showToast('密碼已更新', 'success');
        return true;
      },
    });

  /* ------------- 績效分數 Modal（編輯指定使用者的 Q1–Q4） ------------- */
  openScoreModal(username) {
    const users = Store.get(Store.KEYS.users, []);
    const u = users.find(x => x.username === username);
    if (!u) { showToast('找不到此帳號', 'error'); return; }
    const qVal = q => (typeof u[q] === 'number' ? u[q] : '');
    const deptLabel = u.department || '全公司';

    this.openModal({
      title: `編輯績效：${u.name}`,
      bodyHtml: `
        <div class="field">
          <label>帳號</label>
          <input value="@${escapeHtml(u.username)} · ${escapeHtml(u.name)} · ${escapeHtml(deptLabel)}" disabled
            style="background:var(--bg);color:var(--text-muted)">
        </div>
        <div style="margin:4px 0;font-size:13px;color:var(--text-muted)">
          季度績效分數（0–100，可空白；帳號其他欄位請至「帳號管理」修改）
        </div>
        <div class="field-row">
          <div class="field"><label>Q1</label><input type="number" id="f-q1" min="0" max="100" step="1" value="${qVal('q1')}"></div>
          <div class="field"><label>Q2</label><input type="number" id="f-q2" min="0" max="100" step="1" value="${qVal('q2')}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Q3</label><input type="number" id="f-q3" min="0" max="100" step="1" value="${qVal('q3')}"></div>
          <div class="field"><label>Q4</label><input type="number" id="f-q4" min="0" max="100" step="1" value="${qVal('q4')}"></div>
        </div>
      `,
      onSave: () => {
        const parseQ = (id) => {
          const raw = document.getElementById(id).value.trim();
          if (raw === '') return null;
          const n = Number(raw);
          if (!isFinite(n) || n < 0 || n > 100) return 'INVALID';
          return Math.round(n);
        };
        const q1 = parseQ('f-q1'), q2 = parseQ('f-q2'), q3 = parseQ('f-q3'), q4 = parseQ('f-q4');
        if ([q1,q2,q3,q4].includes('INVALID')) {
          showToast('季度分數需為 0–100 的整數', 'error');
          return false;
        }
        const list = Store.get(Store.KEYS.users, []);
        const i = list.findIndex(x => x.username === username);
        if (i < 0) { showToast('找不到此帳號', 'error'); return false; }
        list[i].q1 = q1; list[i].q2 = q2; list[i].q3 = q3; list[i].q4 = q4;
        Store.set(Store.KEYS.users, list);
        showToast('已更新', 'success');
        this.render();
        return true;
      },
    });
  },

  viewOffice(deptId) {

    if (!dept || !cfg) {
      return `<div class="placeholder-page"><div class="emoji">❓</div><h3>找不到此辦公室</h3></div>`;

  deleteUser(username) {
    if (username === this.currentUser.username) {
      showToast('不能刪除自己的帳號', 'error');
      return;
    }
    const list = Store.get(Store.KEYS.users, []);
    const user = list.find(u => u.username === username);
    if (!user) return;
    if (!confirm(`確定要刪除帳號「${user.name}」？`)) return;
    Store.set(Store.KEYS.users, list.filter(u => u.username !== username));
    showToast('已刪除', 'success');
    this.render();
  },

      </div>
    `;
    document.getElementById('modal-backdrop').classList.add('show');
    if (onMount) onMount();
    document.getElementById('modal-save').onclick = () => {
      const ok = onSave();
      if (ok) this.closeModal();

  closeModal() {
    document.getElementById('modal-backdrop').classList.remove('show');
  },

  closeModalOnBackdrop(e) {
    if (e.target.id === 'modal-backdrop') this.closeModal();
  },
};

// 本機獨有、不可同步的鍵（session 不上雲，避免一個人登入別人也跟著登入）
const __LOCAL_ONLY_KEYS = new Set([Store.KEYS.session]);

function __localGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function __localSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
function __localRemove(key) {
  try { localStorage.removeItem(key); } catch {}
}

async function __setupCloud() {
  try {
    const cs = window.__cloudStore;
    if (!cs) throw new Error('cloudStore not available');
    const snap = await cs.getDoc();
    let cloudData = snap.exists() ? (snap.data() || {}) : {};

    // 首次遷移：雲端無資料但本機有 → 將本機 localStorage 上傳到雲端（session 除外）
    if (Object.keys(cloudData).length === 0) {
      const local = {};
      for (const k of Object.values(Store.KEYS)) {
        if (__LOCAL_ONLY_KEYS.has(k)) continue;
        try {
          const raw = localStorage.getItem(k);
          if (raw !== null) local[k] = JSON.parse(raw);
        } catch {}
      }
      if (Object.keys(local).length > 0) {
        for (const [k, v] of Object.entries(local)) {
          await cs.setField(k, v);
        }
        cloudData = local;
      }
    }

    // 保險：雲端若殘留 session 就忽略，避免授權外洩
    delete cloudData[Store.KEYS.session];

    Store._mem = cloudData;
    Store._useMem = true;

    // 蓋掉 Store.get/set/remove：
    //   - session 一律走 localStorage（避免跨裝置共用登入狀態）
    //   - 其他鍵走原本的雲端同步路徑
    const origGet = Store.get.bind(Store);
    const origSet = Store.set.bind(Store);
    const origRemove = Store.remove.bind(Store);
    Store.get = function(key, fallback) {
      if (__LOCAL_ONLY_KEYS.has(key)) return __localGet(key, fallback);
      return origGet(key, fallback);
    };
    Store.set = function(key, value) {
      if (__LOCAL_ONLY_KEYS.has(key)) { __localSet(key, value); return; }
      origSet(key, value);
      try { cs.setField(key, value); } catch (e) { console.warn('cloud sync write failed', e); }
    };
    Store.remove = function(key) {
      if (__LOCAL_ONLY_KEYS.has(key)) { __localRemove(key); return; }
      origRemove(key);
      try { cs.removeField(key); } catch (e) { console.warn('cloud sync delete failed', e); }
    };

    // 訂閱：其他人改了資料，這台會即時更新畫面
    cs.subscribe((data) => {
      const next = data || {};
      delete next[Store.KEYS.session];  // 不接受雲端的 session
      Store._mem = next;
      if (window.App && App.currentUser && typeof App.render === 'function') App.render();
    });
  } catch (e) {
    console.error('Cloud setup failed, falling back to localStorage', e);
  }
  __bootApp();
}

if (window.__cloudStore) {
  __setupCloud();
} else {
  window.addEventListener('cloudStoreReady', __setupCloud, { once: true });
  // 後門：若 module script 5 秒內沒就緒（網路問題等），先用 localStorage 啟動
  setTimeout(() => { if (!__appBooted) __bootApp(); }, 5000);
}
</script>
