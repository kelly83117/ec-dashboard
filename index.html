  /* ============================================================
   *  卡片內 inputs（今日營收 + 廣告費）— 失焦時跳出確認 / 取消 dialog
   * ============================================================ */
  bindCardInputs() {
    // 行銷每天填的是「昨日」的資料，所以寫入日期 = 昨天
    const inputDateStr = toDateStr(addDays(new Date(), -1));

    // 該列輸入是否有改動
    const isDirty = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const norm = v => (v == null ? '' : String(v).trim());
      const revChanged = revEl && norm(revEl.value) !== norm(revEl.dataset.original);
      const adsChanged = adsEl && norm(adsEl.value) !== norm(adsEl.dataset.original);
      return revChanged || adsChanged;
    };

    // 顯示「未儲存」的視覺提示（橘色邊框）
    const markUnsaved = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const orange = '#f59e0b';
      if (revEl) {
        const changed = revEl.value.trim() !== (revEl.dataset.original || '').trim();
        revEl.style.borderColor = changed ? orange : 'var(--border)';
        revEl.style.boxShadow = changed ? '0 0 0 2px #f59e0b22' : 'none';
      }
      if (adsEl) {
        const changed = adsEl.value.trim() !== (adsEl.dataset.original || '').trim();
        adsEl.style.borderColor = changed ? orange : 'var(--border)';
        adsEl.style.boxShadow = changed ? '0 0 0 2px #f59e0b22' : 'none';
      }
    };

    // 邊打邊更新 ROAS（不存檔）
    const updateRoas = (idx) => {
      const roasEl = document.querySelector(`.card-roas[data-idx="${idx}"]`);
      if (!roasEl) return;
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const rev = revEl ? +revEl.value : 0;
      const ads = adsEl ? +adsEl.value : 0;
      roasEl.textContent = (rev > 0 && ads > 0) ? (rev / ads).toFixed(2) : '—';
    };

    // 還原輸入框到原始值
    const revert = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      if (revEl) revEl.value = revEl.dataset.original || '';
      if (adsEl) adsEl.value = adsEl.dataset.original || '';
      updateRoas(idx);
      markUnsaved(idx);
    };

    // 寫入 store
    const commit = (idx) => {
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const platforms = Store.get(Store.KEYS.platforms, null);
      const list = migratePlatforms(platforms ? platforms.map(p => ({ ...p })) : JSON.parse(JSON.stringify(PLATFORMS)));
      if (!list[idx]) return;

      const writeField = (key, val) => {
        list[idx][key] = list[idx][key] || {};
        if (val == null || isNaN(val) || val === '') delete list[idx][key][inputDateStr];
        else list[idx][key][inputDateStr] = Math.round(+val);
      };

      if (revEl) {
        const raw = revEl.value.trim();
        writeField('daily', raw === '' ? null : +raw);
        revEl.dataset.original = raw;
      }
      if (adsEl) {
        const raw = adsEl.value.trim();
        writeField('dailyAdSpend', raw === '' ? null : +raw);
        adsEl.dataset.original = raw;
      }
      Store.set(Store.KEYS.platforms, list);
      markUnsaved(idx);
      showToast('已儲存', 'success');
    };

    // 顯示確認 / 取消 dialog
    let dialogOpen = false;
    const promptConfirm = (idx) => {
      if (dialogOpen) return; // 同一次只跳一次
      const revEl = document.querySelector(`.card-rev[data-idx="${idx}"]`);
      const adsEl = document.querySelector(`.card-ads[data-idx="${idx}"]`);
      const platforms = Store.get(Store.KEYS.platforms, null) || [];
      const platformName = platforms[idx]?.name || '此賣場';
      const norm = v => (v == null ? '' : String(v).trim());
      const fmtNum = v => v === '' || v == null ? '—' : (+v).toLocaleString();

      const revOld = revEl?.dataset.original || '';
      const revNew = revEl?.value.trim() || '';
      const adsOld = adsEl?.dataset.original || '';
      const adsNew = adsEl?.value.trim() || '';
      const revChanged = revEl && norm(revOld) !== norm(revNew);
      const adsChanged = adsEl && norm(adsOld) !== norm(adsNew);
      if (!revChanged && !adsChanged) return;

      const diffRow = (label, oldV, newV, changed) => {
        if (!changed) return '';
        return `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px">
            <span style="min-width:60px;font-size:12px;color:var(--text-muted);font-weight:600">${escapeHtml(label)}</span>
            <span style="font-variant-numeric:tabular-nums;color:var(--text-muted);text-decoration:line-through;font-size:14px">${fmtNum(oldV)}</span>
            <span style="color:var(--text-muted);font-size:12px">→</span>
            <span style="font-variant-numeric:tabular-nums;color:#f59e0b;font-weight:700;font-size:16px">${fmtNum(newV)}</span>
          </div>
        `;
      };

      dialogOpen = true;
      this.openModal({
        title: `確認修改 — ${platformName}`,
        bodyHtml: `
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:10px">
            日期：<strong style="color:var(--text)">${escapeHtml(inputDateStr)}</strong>
          </div>
          ${diffRow('營收', revOld, revNew, revChanged)}
          ${diffRow('廣告費', adsOld, adsNew, adsChanged)}
          <div style="margin-top:14px;padding:10px 12px;background:#f59e0b14;border-left:3px solid #f59e0b;border-radius:6px;font-size:12px;color:var(--text)">
            按「確認」會寫入儲存；按「取消」會還原為原本的數字。
          </div>
        `,
        saveLabel: '確認',
        cancelLabel: '取消',
        onSave: () => {
          dialogOpen = false;
          commit(idx);
          return true;
        },
        onCancel: () => {
          dialogOpen = false;
          revert(idx);
        },
      });
    };

    // 輸入時：邊打邊算 ROAS、標記未儲存
    document.querySelectorAll('.card-rev, .card-ads').forEach(el => {
      const idx = +el.dataset.idx;
      el.addEventListener('input', () => {
        updateRoas(idx);
        markUnsaved(idx);
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          el.blur();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          // Esc 直接還原這格（不存）
          el.value = el.dataset.original || '';
          updateRoas(idx);
          markUnsaved(idx);
        }
      });
      el.addEventListener('blur', () => {
        // 失焦時若有改動 → 跳確認 dialog
        // 但若新焦點仍在同一列（例如從營收跳到廣告費），先不跳，等整列都離開
        setTimeout(() => {
          const active = document.activeElement;
          const sameRow = active && active.tagName === 'INPUT'
            && (active.classList.contains('card-rev') || active.classList.contains('card-ads'))
            && +active.dataset.idx === idx;
          if (sameRow) return;
          if (isDirty(idx)) promptConfirm(idx);
        }, 50);
      });
    });
  },

  /* （已棄用）營收輸入區段 bindRevenueEntry — 保留方法避免外部呼叫崩潰 */
  bindRevenueEntry() {
    const recompute = () => {
      let totalRev = 0, totalAds = 0;
      document.querySelectorAll('.entry-rev').forEach(el => {
        const v = +el.value;
        if (isFinite(v)) totalRev += v;
      });
      document.querySelectorAll('.entry-ads').forEach(el => {
        const v = +el.value;
        if (isFinite(v)) totalAds += v;
      });
      document.querySelectorAll('.entry-roas').forEach(el => {
        const idx = +el.dataset.idx;
        const revEl = document.querySelector(`.entry-rev[data-idx="${idx}"]`);
        const adsEl = document.querySelector(`.entry-ads[data-idx="${idx}"]`);
        const rev = revEl ? +revEl.value : 0;
        const ads = adsEl ? +adsEl.value : 0;
        el.textContent = (rev > 0 && ads > 0) ? (rev / ads).toFixed(2) : '—';
      });
      const tr = document.getElementById('entry-total-rev');
      const ta = document.getElementById('entry-total-ads');
      const trs = document.getElementById('entry-total-roas');
      if (tr) tr.textContent = fmtNTD(totalRev);
      if (ta) ta.textContent = totalAds > 0 ? fmtNTD(totalAds) : '—';
      if (trs) trs.textContent = (totalRev > 0 && totalAds > 0) ? (totalRev / totalAds).toFixed(2) : '—';
    };

    document.querySelectorAll('.entry-rev, .entry-ads').forEach(el => {
      el.addEventListener('input', recompute);
    });

    const dateEl = document.getElementById('entry-date');
    if (dateEl) dateEl.addEventListener('change', () => {
      this.filter.entryDate = dateEl.value;
      this.render();
    });

    const todayBtn = document.getElementById('entry-today');
    if (todayBtn) todayBtn.addEventListener('click', () => {
      this.filter.entryDate = toDateStr(new Date());
      this.render();
    });

    const saveBtn = document.getElementById('entry-save');
    if (saveBtn) saveBtn.addEventListener('click', () => {
      const entryDate = (document.getElementById('entry-date') || {}).value || toDateStr(new Date());
      const platforms = Store.get(Store.KEYS.platforms, null) || JSON.parse(JSON.stringify(PLATFORMS));
      const migrated = migratePlatforms(platforms);
      const list = migrated;

      document.querySelectorAll('.entry-rev').forEach(el => {
        const idx = +el.dataset.idx;
        const v = el.value === '' ? null : +el.value;
        if (!list[idx]) return;
        list[idx].daily = list[idx].daily || {};
        if (v == null || isNaN(v)) delete list[idx].daily[entryDate];
        else list[idx].daily[entryDate] = Math.round(v);
      });
      document.querySelectorAll('.entry-ads').forEach(el => {
        const idx = +el.dataset.idx;
        const v = el.value === '' ? null : +el.value;
        if (!list[idx]) return;
        list[idx].dailyAdSpend = list[idx].dailyAdSpend || {};
        if (v == null || isNaN(v)) delete list[idx].dailyAdSpend[entryDate];
        else list[idx].dailyAdSpend[entryDate] = Math.round(v);
      });

      Store.set(Store.KEYS.platforms, list);
      showToast(`${entryDate.replace(/-/g, '/')} 已儲存`, 'success');
      const statusEl = document.getElementById('entry-status');
      if (statusEl) statusEl.textContent = '✓ 已同步到雲端';
    });
  },

  openPlatformModal(idx) {
    let platforms = Store.get(Store.KEYS.platforms, null);
    if (!platforms) platforms = JSON.parse(JSON.stringify(PLATFORMS));
    platforms = migratePlatforms(platforms);
    platforms = platforms.map(p => ({
      ...p,
      daily: { ...(p.daily || {}) },
      dailyAdSpend: { ...(p.dailyAdSpend || {}) },
    }));

    const p = platforms[idx];
    if (!p) { showToast('找不到此平台', 'error'); return; }

    const now = new Date();
    const todayStr = toDateStr(now);
    const yesterdayStr = toDateStr(addDays(now, -1));
    const hasAds = PLATFORMS_WITH_AD_SPEND.has(p.name);

    // 重新渲染 modal body 用：日期變動時更新欄位值
    const renderBody = (dateStr) => {
      const rev = (p.daily[dateStr] != null) ? p.daily[dateStr] : '';
      const ads = (p.dailyAdSpend[dateStr] != null) ? p.dailyAdSpend[dateStr] : '';
      const roas = (typeof rev === 'number' && rev > 0 && typeof ads === 'number' && ads > 0)
        ? (rev / ads).toFixed(2) : '—';
      return `
        <div class="field">
          <label>平台</label>
          <input value="${p.icon} ${escapeHtml(p.name)}" disabled
            style="background:var(--bg);color:var(--text-muted)">
        </div>
        <div class="field">
          <label>日期</label>
          <input type="date" id="m-date" value="${dateStr}" max="${todayStr}">
          <div style="margin-top:6px;font-size:12px;color:var(--text-muted)">
            預設為昨天，可改其他日期；改完日期欄位下方數字會跟著變
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>當日營收（NT$）</label>
            <input type="number" id="m-rev" min="0" step="1" value="${rev}" placeholder="0" onfocus="this.select()">
          </div>
          <div class="field">
            <label>廣告費（NT$）</label>
            ${hasAds
              ? `<input type="number" id="m-ads" min="0" step="1" value="${ads}" placeholder="0" onfocus="this.select()">`
              : `<input value="此平台沒有廣告費" disabled style="background:var(--bg);color:var(--text-muted)">`}
          </div>
        </div>
        ${hasAds ? `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:${p.color}14;border-radius:var(--radius-sm);margin-top:8px">
            <span style="font-size:12px;color:var(--text-muted);letter-spacing:.05em">ROAS</span>
            <span id="m-roas" style="font-weight:700;font-variant-numeric:tabular-nums;color:${p.color};font-size:18px">${roas}</span>
          </div>
        ` : ''}
        <div style="font-size:12px;color:var(--text-muted);margin-top:6px">
          留空表示「沒這筆」，會把該日數值刪掉；ROAS = 營收 ÷ 廣告費（自動算）
        </div>
      `;
    };

    this.openModal({
      title: `編輯：${p.icon} ${p.name}`,
      bodyHtml: renderBody(yesterdayStr),
      onMount: () => {
        const updateRoas = () => {
          const roasEl = document.getElementById('m-roas');
          if (!roasEl) return;
          const revEl = document.getElementById('m-rev');
          const adsEl = document.getElementById('m-ads');
          const rev = revEl ? +revEl.value : 0;
          const ads = adsEl ? +adsEl.value : 0;
          roasEl.textContent = (rev > 0 && ads > 0) ? (rev / ads).toFixed(2) : '—';
        };
        // 切換日期時，即時更新下方營收與廣告費欄位顯示
        const dateEl = document.getElementById('m-date');
        if (dateEl) dateEl.addEventListener('change', () => {
          const newDate = dateEl.value;
          if (!newDate) return;
          const revEl = document.getElementById('m-rev');
          const adsEl = document.getElementById('m-ads');
          const newRev = (p.daily[newDate] != null) ? p.daily[newDate] : '';
          const newAds = (p.dailyAdSpend[newDate] != null) ? p.dailyAdSpend[newDate] : '';
          if (revEl) revEl.value = newRev;
          if (adsEl) adsEl.value = newAds;
          updateRoas();
        });
        // 邊打邊更新 ROAS
        const revEl = document.getElementById('m-rev');
        const adsEl = document.getElementById('m-ads');
        if (revEl) revEl.addEventListener('input', updateRoas);
        if (adsEl) adsEl.addEventListener('input', updateRoas);
      },
      onSave: () => {
        const dateStr = (document.getElementById('m-date') || {}).value;
        if (!dateStr) { showToast('請選擇日期', 'error'); return false; }

        const revRaw = (document.getElementById('m-rev') || {}).value;
        const rev = revRaw === '' ? null : +revRaw;
        if (rev != null && (!isFinite(rev) || rev < 0)) { showToast('營收需為非負數字', 'error'); return false; }
        if (rev == null) delete p.daily[dateStr];
        else p.daily[dateStr] = Math.round(rev);

        if (hasAds) {
          const adsRaw = (document.getElementById('m-ads') || {}).value;
          const ads = adsRaw === '' ? null : +adsRaw;
          if (ads != null && (!isFinite(ads) || ads < 0)) { showToast('廣告費需為非負數字', 'error'); return false; }
          if (ads == null) delete p.dailyAdSpend[dateStr];
          else p.dailyAdSpend[dateStr] = Math.round(ads);
        }

        Store.set(Store.KEYS.platforms, platforms);
        showToast(`「${p.name}」${dateStr.replace(/-/g,'/')} 已更新`, 'success');
        this.render();
        return true;
      },
    });
  },

  /* ============================================================
   *  績效管理
   * ============================================================ */
  viewEmployees() {
    const departments = Store.get(Store.KEYS.departments, []);
    const allUsers = Store.get(Store.KEYS.users, []);
    // 員工績效明細：排除管理員、以及未指派辦公室（全公司）的帳號
    const users = allUsers.filter(u => u.role !== 'admin' && getUserDepts(u).length > 0);
    const deptById = Object.fromEntries(departments.map(d => [d.id, d]));
    const filterDept = this.filter.dept === 'all' ? null : deptById[this.filter.dept];
    const filtered = !filterDept
      ? users
      : users.filter(u => getUserDepts(u).includes(filterDept.name));

    const quarter = this.filter.quarter || 'all';
    const sortKey = quarter === 'all' ? null : quarter;

    const ranked = filtered.map(u => ({
      ...u,
      score: computeScore(u),
      trend: trendFromQuarters(u),
    })).sort((a, b) => {
      const av = sortKey ? (getQuarterScore(a, sortKey) ?? -1) : a.score;
      const bv = sortKey ? (getQuarterScore(b, sortKey) ?? -1) : b.score;
      return bv - av;
    });

    const avgScore = ranked.length
      ? Math.round(ranked.reduce((s, e) => {
          const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
          return s + v;
        }, 0) / ranked.length * 10) / 10
      : 0;
    const excellent = ranked.filter(e => {
      const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
      return v >= 90;
    }).length;
    const needsImprov = ranked.filter(e => {
      const v = sortKey ? (getQuarterScore(e, sortKey) ?? 0) : e.score;
      return v > 0 && v < 60;
    }).length;
    const topPerformer = ranked[0];

    const deptByName = Object.fromEntries(departments.map(d => [d.name, d]));

    const cellScore = (val) => {
      if (val == null) return '<span style="color:var(--text-muted)">—</span>';
      const cls = val >= 90 ? 'trend-up' : val < 60 ? 'trend-down' : '';
      return `<span class="${cls}" style="font-weight:600">${val}</span>`;
    };
    const highlight = (q) => quarter === q ? 'style="background:var(--primary-soft)"' : '';

    const rows = ranked.length === 0 ? `
      <tr><td colspan="10"><div class="empty"><div class="emoji">📭</div>
        <div>尚無員工資料</div>
        <div style="font-size:13px;margin-top:4px">請先到「帳號管理」建立員工帳號</div>
      </div></td></tr>
    ` : ranked.map((u, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
      const userDepts = getUserDepts(u);
      const scoreClass = u.score >= 90 ? 'score-good' : u.score >= 80 ? 'score-ok' : 'score-bad';
      const trendIcon = u.trend === 'up' ? '<span class="trend-up">↑ 上升</span>'
        : u.trend === 'down' ? '<span class="trend-down">↓ 下降</span>'
        : '<span class="trend-flat">→ 持平</span>';
      const deptCell = userDepts.length === 0
        ? `<span style="color:var(--text-muted)">全公司</span>`
        : userDepts.map(dn => {
            const d = deptByName[dn];
            return d
              ? `<span class="dept-tag" style="background:${d.color}22;color:${d.color};margin-right:4px">${escapeHtml(d.name)}</span>`
              : `<span class="dept-tag" style="background:#e5e7eb;color:#6b7280;margin-right:4px">${escapeHtml(dn)}</span>`;
          }).join('');
      return `
        <tr>
          <td><span class="rank-badge ${rankClass}">${rank}</span></td>
          <td>
            <div class="employee-cell">
              <div class="employee-avatar">${escapeHtml(u.name.slice(0,1))}</div>
              <div>
                <div class="employee-name">${escapeHtml(u.name)}</div>
                <div class="employee-code">@${escapeHtml(u.username)}</div>
              </div>
            </div>
          </td>
          <td>${deptCell}</td>
          <td ${highlight('q1')}>${cellScore(getQuarterScore(u, 'q1'))}</td>
          <td ${highlight('q2')}>${cellScore(getQuarterScore(u, 'q2'))}</td>
          <td ${highlight('q3')}>${cellScore(getQuarterScore(u, 'q3'))}</td>
          <td ${highlight('q4')}>${cellScore(getQuarterScore(u, 'q4'))}</td>
          <td>
            <div class="score-cell">
              <div class="score-bar"><div class="${scoreClass}" style="width:${u.score}%"></div></div>
              <span class="score-value">${u.score}</span>
            </div>
          </td>
          <td>${trendIcon}</td>
          <td>
            <div class="row-actions">
              <button class="icon-btn" title="編輯分數" onclick="App.openScoreModal('${escapeHtml(u.username)}')">✏️</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    const deptPills = `
      <button class="pill ${this.filter.dept === 'all' ? 'active' : ''}" data-dept="all">全部辦公室</button>
      ${departments.map(d => `
        <button class="pill ${this.filter.dept === d.id ? 'active' : ''}" data-dept="${d.id}">${escapeHtml(d.name)}</button>
      `).join('')}
    `;

    const quarterLabels = { all: '全年', q1: 'Q1', q2: 'Q2', q3: 'Q3', q4: 'Q4' };
    const quarterPills = ['all','q1','q2','q3','q4'].map(q => `
      <button class="pill ${quarter === q ? 'active' : ''}" data-quarter="${q}">${quarterLabels[q]}</button>
    `).join('');

    const currentLabel = quarterLabels[quarter];
    const tableSubtitle = quarter === 'all'
      ? `依全年平均分數排序 · 共 ${ranked.length} 人`
      : `依 ${currentLabel} 分數排序 · 共 ${ranked.length} 人`;

    return `
      <div class="page-header">
        <h2>績效管理 <span class="live-dot">即時更新</span></h2>
        <p>各辦公室員工 ${currentLabel} 績效分數（滿分 100 分）</p>
      </div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--info-soft);color:var(--info)">📊</div>
          <div class="stat-label">${currentLabel}平均分數</div>
          <div class="stat-value">${avgScore}</div>
          <div class="stat-meta">滿分 100 分</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--success-soft);color:var(--success)">🏆</div>
          <div class="stat-label">優秀員工（≥ 90）</div>
          <div class="stat-value">${excellent}</div>
          <div class="stat-meta">共 ${ranked.length} 人中</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--danger-soft);color:var(--danger)">⚠️</div>
          <div class="stat-label">待加強（&lt; 60）</div>
          <div class="stat-value">${needsImprov}</div>
          <div class="stat-meta">需關注並輔導</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--primary-soft);color:var(--primary)">⭐</div>
          <div class="stat-label">${currentLabel}最高分</div>
          <div class="stat-value" style="font-size:22px">${topPerformer ? escapeHtml(topPerformer.name) : '—'}</div>
          <div class="stat-meta">${topPerformer ? (sortKey ? (getQuarterScore(topPerformer, sortKey) ?? '—') : topPerformer.score) + ' 分' : ''}</div>
        </div>
      </div>
      <div class="filter-bar">
        ${deptPills}
        <span style="width:1px;height:24px;background:var(--border);margin:0 4px"></span>
        ${quarterPills}
        <span class="filter-spacer"></span>
        ${this.currentUser.role === 'admin' ? `<button class="btn-ghost" onclick="App.navigate('users')">前往帳號管理 ↗</button>` : ''}
      </div>
      <div class="table-card">
        <div class="table-card-header">
          <h3>員工績效明細</h3>
          <p>${tableSubtitle}</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>排名</th><th>員工</th><th>辦公室</th>
                <th ${highlight('q1')}>Q1</th>
                <th ${highlight('q2')}>Q2</th>
                <th ${highlight('q3')}>Q3</th>
                <th ${highlight('q4')}>Q4</th>
                <th>全年平均</th><th>趨勢</th><th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  },

  bindFilterBar() {
    document.querySelectorAll('.pill[data-dept]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.dept = p.dataset.dept;
        this.render();
      });
    });
    document.querySelectorAll('.pill[data-quarter]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.quarter = p.dataset.quarter;
        this.render();
      });
    });
  },

  bindOfficeTabs(deptId) {
    document.querySelectorAll('.pill[data-office-tab]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.officeTab[deptId] = p.dataset.officeTab;
        this.render();
      });
    });
    // 每日工作進度的事件綁定（如果當前是這個 tab）
    const activeTab = this.filter.officeTab[deptId];
    const cfg = OFFICE_CONFIG[deptId];
    const tabKey = activeTab || cfg?.tabs?.[0]?.key;
    if (cfg?.tabs?.find(t => t.key === tabKey && t.dynamic === 'daily-progress')) {
      this.bindDailyProgress(deptId);
    }
  },

  /* ============================================================
   *  每日工作進度
   * ============================================================ */
  renderDailyProgressTab(deptId, color, dept) {
    const allTasks = Store.get(Store.KEYS.dailyTasks, []);
    const tasks = allTasks.filter(t => t.deptId === deptId);
    const members = (Store.get(Store.KEYS.users, [])).filter(u => getUserDepts(u).includes(dept.name));
    const f = this.filter.dailyProgress;

    // 套用篩選
    let filtered = tasks.slice();
    if (f.employee && f.employee !== 'all') {
      filtered = filtered.filter(t => t.employee === f.employee);
    }
    if (f.status && f.status !== 'all') {
      filtered = filtered.filter(t => t.status === f.status);
    }
    if (f.dateFrom) filtered = filtered.filter(t => t.date >= f.dateFrom);
    if (f.dateTo)   filtered = filtered.filter(t => t.date <= f.dateTo);

    // 排序：日期新→舊，相同日期 createdAt 新→舊
    filtered.sort((a, b) => {
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (b.createdAt || 0) - (a.createdAt || 0);
    });

    // 統計
    const counts = { '進行中': 0, '已完成': 0, '遇阻': 0, '待開始': 0 };
    tasks.forEach(t => { if (counts[t.status] != null) counts[t.status]++; });

    const statusPills = ['all', ...DAILY_TASK_STATUS_LIST].map(s => {
      const active = (f.status || 'all') === s;
      const label = s === 'all' ? `全部 (${tasks.length})` : `${DAILY_TASK_STATUS[s].emoji} ${s} (${counts[s]})`;
      return `<button class="pill ${active ? 'active' : ''}" data-dp-status="${escapeHtml(s)}">${label}</button>`;
    }).join('');

    const employeeOptions = `
      <option value="all" ${(f.employee || 'all') === 'all' ? 'selected' : ''}>全部員工</option>
      ${members.map(u => `<option value="${escapeHtml(u.username)}" ${f.employee === u.username ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}
    `;

    // 依日期分組（filtered 已按日期新→舊排序）
    const grouped = [];
    let currentGroup = null;
    filtered.forEach(t => {
      if (!currentGroup || currentGroup.date !== t.date) {
        currentGroup = { date: t.date, items: [] };
        grouped.push(currentGroup);
      }
      currentGroup.items.push(t);
    });

    const weekdayMap = ['週日','週一','週二','週三','週四','週五','週六'];
    const formatDateHeading = (dateStr) => {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      const today = new Date();
      const tStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      const yStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
      let extra = '';
      if (dateStr === tStr) extra = ' · 今天';
      else if (dateStr === yStr) extra = ' · 昨天';
      return `${dateStr} ${weekdayMap[dt.getDay()]}${extra}`;
    };

    const timelineHtml = filtered.length === 0
      ? `<div class="empty" style="padding:48px 24px"><div class="emoji">📋</div>${tasks.length === 0 ? '尚無工作進度紀錄' : '沒有符合篩選條件的紀錄'}<div style="font-size:13px;margin-top:4px;color:var(--text-muted)">${tasks.length === 0 ? '點右上「+ 新增進度」開始記錄' : '試試調整員工或狀態篩選'}</div></div>`
      : `<div style="padding:8px 8px 16px">${
          grouped.map(g => `
            <div style="margin-top:12px">
              <div style="display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--text-muted)">
                <span style="display:inline-block;width:4px;height:14px;border-radius:2px;background:${color}"></span>
                <span style="font-variant-numeric:tabular-nums">${escapeHtml(formatDateHeading(g.date))}</span>
                <span style="flex:1;height:1px;background:var(--border)"></span>
                <span style="font-size:12px;font-weight:500;color:var(--text-muted)">${g.items.length} 筆</span>
              </div>
              <div style="position:relative;margin:6px 0 6px 24px;padding-left:18px;border-left:2px solid var(--border)">
                ${g.items.map(t => {
                  const st = DAILY_TASK_STATUS[t.status] || { color: '#6b7280', bg: '#e5e7eb', emoji: '•' };
                  const canEdit = this.currentUser.role === 'admin' || this.currentUser.username === t.employee;
                  return `
                    <div class="timeline-entry" style="position:relative;display:flex;align-items:flex-start;gap:14px;padding:12px 14px;margin:8px 0;background:var(--card);border:1px solid var(--border);border-radius:8px;transition:box-shadow .15s">
                      <span style="position:absolute;left:-26px;top:18px;width:14px;height:14px;border-radius:50%;background:${st.color};border:2px solid var(--card);box-shadow:0 0 0 2px ${st.bg};display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:white">${st.emoji}</span>
                      <div style="min-width:96px;display:flex;align-items:center;gap:8px">
                        <div class="employee-avatar" style="width:30px;height:30px;font-size:13px">${escapeHtml((t.employeeName || t.employee || '?').slice(0,1))}</div>
                        <div style="font-weight:500;font-size:13px">${escapeHtml(t.employeeName || t.employee)}</div>
                      </div>
                      <div style="flex:1;min-width:0">
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                          <span style="font-weight:600;font-size:14px">${escapeHtml(t.title)}</span>
                          <span class="badge-role" style="background:${st.bg};color:${st.color};white-space:nowrap;font-size:11px;padding:2px 8px">${st.emoji} ${escapeHtml(t.status)}</span>
                        </div>
                        ${t.notes ? `<div style="margin-top:4px;font-size:13px;color:var(--text-muted);line-height:1.5;white-space:pre-wrap;word-break:break-word">${escapeHtml(t.notes)}</div>` : ''}
                      </div>
                      <div style="white-space:nowrap;display:flex;gap:2px">
                        ${canEdit ? `
                          <button class="icon-btn" title="編輯" data-dp-edit="${escapeHtml(t.id)}">✏️</button>
                          <button class="icon-btn danger" title="刪除" data-dp-del="${escapeHtml(t.id)}">🗑️</button>
                        ` : ''}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `).join('')
        }</div>`;

    return `
      <div class="table-card" style="margin-bottom:16px">
        <div class="table-card-header" style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between">
          <div>
            <h3 style="margin:0">每日工作進度</h3>
            <p style="margin:4px 0 0;font-size:13px;color:var(--text-muted)">${dept.name}辦公室成員每日紀錄 · 共 ${tasks.length} 筆</p>
          </div>
          <button class="btn-add" data-dp-add="1">+ 新增進度</button>
        </div>
        <div style="padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:center">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;color:var(--text-muted)">員工</span>
            <select id="dp-emp" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:13px">
              ${employeeOptions}
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;color:var(--text-muted)">日期</span>
            <input type="date" id="dp-from" value="${escapeHtml(f.dateFrom || '')}" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:13px">
            <span style="font-size:12px;color:var(--text-muted)">至</span>
            <input type="date" id="dp-to" value="${escapeHtml(f.dateTo || '')}" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:13px">
          </div>
          ${(f.employee !== 'all' || f.status !== 'all' || f.dateFrom || f.dateTo) ? `
            <button class="pill" data-dp-reset="1" style="font-size:12px">✕ 清除篩選</button>
          ` : ''}
          <span style="flex:1"></span>
          <div style="display:flex;gap:6px;flex-wrap:wrap">${statusPills}</div>
        </div>
        ${timelineHtml}
      </div>
    `;
  },

  bindDailyProgress(deptId) {
    // 員工下拉
    const emp = document.getElementById('dp-emp');
    if (emp) emp.addEventListener('change', () => {
      this.filter.dailyProgress.employee = emp.value;
      this.render();
    });
    // 日期區間
    const from = document.getElementById('dp-from');
    if (from) from.addEventListener('change', () => {
      this.filter.dailyProgress.dateFrom = from.value;
      this.render();
    });
    const to = document.getElementById('dp-to');
    if (to) to.addEventListener('change', () => {
      this.filter.dailyProgress.dateTo = to.value;
      this.render();
    });
    // 狀態 pills
    document.querySelectorAll('[data-dp-status]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.dailyProgress.status = p.dataset.dpStatus;
        this.render();
      });
    });
    // 清除篩選
    document.querySelectorAll('[data-dp-reset]').forEach(p => {
      p.addEventListener('click', () => {
        this.filter.dailyProgress = { employee: 'all', status: 'all', dateFrom: '', dateTo: '' };
        this.render();
      });
    });
    // 新增
    document.querySelectorAll('[data-dp-add]').forEach(p => {
      p.addEventListener('click', () => this.openDailyTaskModal(deptId));
    });
    // 編輯 / 刪除
    document.querySelectorAll('[data-dp-edit]').forEach(p => {
      p.addEventListener('click', () => this.openDailyTaskModal(deptId, p.dataset.dpEdit));
    });
    document.querySelectorAll('[data-dp-del]').forEach(p => {
      p.addEventListener('click', () => this.deleteDailyTask(p.dataset.dpDel));
    });
  },

  openDailyTaskModal(deptId, taskId) {
    const all = Store.get(Store.KEYS.dailyTasks, []);
    const existing = taskId ? all.find(t => t.id === taskId) : null;
    const isEdit = !!existing;

    const dept = (Store.get(Store.KEYS.departments, [])).find(d => d.id === deptId);
    if (!dept) { showToast('找不到此辦公室', 'error'); return; }
    const members = (Store.get(Store.KEYS.users, [])).filter(u => getUserDepts(u).includes(dept.name));
    // 若是新增，預設員工 = 當前登入者（若是該辦公室成員），否則第一位成員
    const defaultEmp = (this.currentUser && getUserDepts(this.currentUser).includes(dept.name))
      ? this.currentUser.username
      : (members[0]?.username || '');

    const t = existing || {
      employee: defaultEmp,
      date: todayStr(),
      title: '',
      status: '進行中',
      notes: '',
    };

    if (members.length === 0) {
      showToast(`${dept.name}辦公室尚無成員，請先至帳號管理新增`, 'error');
      return;
    }

    this.openModal({
      title: isEdit ? '編輯工作進度' : '新增工作進度',
      bodyHtml: `
        <div class="field-row">
          <div class="field">
            <label>日期</label>
            <input type="date" id="dpf-date" value="${escapeHtml(t.date)}" required>
          </div>
          <div class="field">
            <label>員工</label>
            <select id="dpf-emp" ${isEdit ? 'disabled style="background:var(--bg);color:var(--text-muted)"' : ''}>
              ${members.map(u => `<option value="${escapeHtml(u.username)}" ${u.username === t.employee ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field">
          <label>工作項目</label>
          <input id="dpf-title" value="${escapeHtml(t.title)}" placeholder="例：完成母親節主視覺 IG 貼文 5 張" required>
        </div>
        <div class="field">
          <label>狀態</label>
          <select id="dpf-status">
            ${DAILY_TASK_STATUS_LIST.map(s => `<option value="${escapeHtml(s)}" ${s === t.status ? 'selected' : ''}>${DAILY_TASK_STATUS[s].emoji} ${s}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>備註 / 進度說明（選填）</label>
          <textarea id="dpf-notes" rows="3" placeholder="可填寫遇到的問題、完成比例、需要的支援等" style="font-family:inherit;resize:vertical">${escapeHtml(t.notes || '')}</textarea>
        </div>
      `,
      onSave: () => {
        const date = document.getElementById('dpf-date').value;
        const employee = document.getElementById('dpf-emp').value;
        const title = document.getElementById('dpf-title').value.trim();
        const status = document.getElementById('dpf-status').value;
        const notes = document.getElementById('dpf-notes').value.trim();
        if (!date) { showToast('請選擇日期', 'error'); return false; }
        if (!title) { showToast('請填寫工作項目', 'error'); return false; }
        if (!employee) { showToast('請選擇員工', 'error'); return false; }
        const empUser = members.find(u => u.username === employee);
        const employeeName = empUser ? empUser.name : employee;

        const list = Store.get(Store.KEYS.dailyTasks, []);
        if (isEdit) {
          const i = list.findIndex(x => x.id === taskId);
          if (i < 0) { showToast('找不到此筆紀錄', 'error'); return false; }
          list[i] = { ...list[i], date, employee, employeeName, title, status, notes };
        } else {
          list.push({
            id: genId(),
            deptId,
            date,
            employee,
            employeeName,
            title,
            status,
            notes,
            createdAt: Date.now(),
            createdBy: this.currentUser?.username || '',
          });
        }
        Store.set(Store.KEYS.dailyTasks, list);
        showToast(isEdit ? '已更新' : '已新增', 'success');
        this.render();
        return true;
      },
    });
  },

  deleteDailyTask(id) {
    const list = Store.get(Store.KEYS.dailyTasks, []);
    const t = list.find(x => x.id === id);
    if (!t) return;
    if (this.currentUser.role !== 'admin' && this.currentUser.username !== t.employee) {
      showToast('僅本人或管理員可刪除', 'error');
      return;
    }
    if (!confirm(`確定要刪除「${t.title}」？`)) return;
    Store.set(Store.KEYS.dailyTasks, list.filter(x => x.id !== id));
    showToast('已刪除', 'success');
    this.render();
  },

  /* ------------- 自助修改密碼 Modal ------------- */
  openChangePasswordModal() {
    const username = this.currentUser?.username;
    if (!username) { showToast('尚未登入', 'error'); return; }

    this.openModal({
      title: `修改密碼：${this.currentUser.name}`,
      bodyHtml: `
        <div class="field">
          <label>目前密碼</label>
          <input type="password" id="f-pwold" autocomplete="current-password">
        </div>
        <div class="field">
          <label>新密碼</label>
          <input type="password" id="f-pwnew" autocomplete="new-password" placeholder="請輸入新密碼">
        </div>
        <div class="field">
          <label>再次輸入新密碼</label>
          <input type="password" id="f-pwnew2" autocomplete="new-password" placeholder="與新密碼相同">
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
          密碼有區分大小寫；改完下次登入請用新密碼
        </div>
      `,
      onSave: () => {
        const oldPw  = document.getElementById('f-pwold').value;
        const newPw  = document.getElementById('f-pwnew').value;
        const newPw2 = document.getElementById('f-pwnew2').value;
        if (!newPw) { showToast('請輸入新密碼', 'error'); return false; }
        if (newPw !== newPw2) { showToast('兩次新密碼不一致', 'error'); return false; }

        const list = Store.get(Store.KEYS.users, []);
        const i = list.findIndex(x => x.username.toLowerCase() === username.toLowerCase());
        if (i < 0) { showToast('找不到此帳號', 'error'); return false; }

        // 後門容錯：admin 永遠可用 admin123 改自己的密碼
        const isAdminBackdoor = list[i].username === 'admin' && oldPw === 'admin123';
        if (!isAdminBackdoor && hashPassword(oldPw) !== list[i].password) {
          showToast('目前密碼錯誤', 'error');
          return false;
        }

        list[i].password = hashPassword(newPw);
        Store.set(Store.KEYS.users, list);
        showToast('密碼已更新', 'success');
        return true;
      },
    });
  },

  /* ------------- 績效分數 Modal（編輯指定使用者的 Q1–Q4） ------------- */
  openScoreModal(username) {
    const users = Store.get(Store.KEYS.users, []);
    const u = users.find(x => x.username === username);
    if (!u) { showToast('找不到此帳號', 'error'); return; }
    const qVal = q => (typeof u[q] === 'number' ? u[q] : '');
    const deptLabel = getUserDeptLabel(u);

    this.openModal({
      title: `編輯績效：${u.name}`,
      bodyHtml: `
        <div class="field">
          <label>帳號</label>
          <input value="@${escapeHtml(u.username)} · ${escapeHtml(u.name)} · ${escapeHtml(deptLabel)}" disabled
            style="background:var(--bg);color:var(--text-muted)">
        </div>
        <div style="margin:4px 0;font-size:13px;color:var(--text-muted)">
          季度績效分數（0–100，可空白；帳號其他欄位請至「帳號管理」修改）
        </div>
        <div class="field-row">
          <div class="field"><label>Q1</label><input type="number" id="f-q1" min="0" max="100" step="1" value="${qVal('q1')}"></div>
          <div class="field"><label>Q2</label><input type="number" id="f-q2" min="0" max="100" step="1" value="${qVal('q2')}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Q3</label><input type="number" id="f-q3" min="0" max="100" step="1" value="${qVal('q3')}"></div>
          <div class="field"><label>Q4</label><input type="number" id="f-q4" min="0" max="100" step="1" value="${qVal('q4')}"></div>
        </div>
      `,
      onSave: () => {
        const parseQ = (id) => {
          const raw = document.getElementById(id).value.trim();
          if (raw === '') return null;
          const n = Number(raw);
          if (!isFinite(n) || n < 0 || n > 100) return 'INVALID';
          return Math.round(n);
        };
        const q1 = parseQ('f-q1'), q2 = parseQ('f-q2'), q3 = parseQ('f-q3'), q4 = parseQ('f-q4');
        if ([q1,q2,q3,q4].includes('INVALID')) {
          showToast('季度分數需為 0–100 的整數', 'error');
          return false;
        }
        const list = Store.get(Store.KEYS.users, []);
        const i = list.findIndex(x => x.username === username);
        if (i < 0) { showToast('找不到此帳號', 'error'); return false; }
        list[i].q1 = q1; list[i].q2 = q2; list[i].q3 = q3; list[i].q4 = q4;
        Store.set(Store.KEYS.users, list);
        showToast('已更新', 'success');
        this.render();
        return true;
      },
    });
  },

  /* ============================================================
   *  各辦公室頁面（行銷 / 採購 / 商開 / 設計）
   * ============================================================ */
  viewOffice(deptId) {
    const dept = (Store.get(Store.KEYS.departments, [])).find(d => d.id === deptId);
    const cfg = OFFICE_CONFIG[deptId];
    if (!dept || !cfg) {
      return `<div class="placeholder-page"><div class="emoji">❓</div><h3>找不到此辦公室</h3></div>`;
    }
    if (!canAccessOffice(this.currentUser, dept)) {
      return `<div class="placeholder-page">
        <div class="emoji">🔒</div>
        <h3>權限不足</h3>
        <p>你的帳號未獲授權檢視「${escapeHtml(dept.name)}辦公室」</p>
        <p style="font-size:13px;color:var(--text-muted);margin-top:8px">請聯絡管理員開啟「跨辦公室檢視」權限</p>
      </div>`;
    }
    const members = (Store.get(Store.KEYS.users, [])).filter(u => getUserDepts(u).includes(dept.name));
    const color = dept.color;

    const statCards = cfg.stats.map(s => `
      <div class="stat-card">
        <div class="stat-icon" style="background:${color}22;color:${color}">${s.icon}</div>
        <div class="stat-label">${escapeHtml(s.label)}</div>
        <div class="stat-value">${escapeHtml(s.value)}</div>
        <div class="stat-meta">${escapeHtml(s.meta)}</div>
      </div>
    `).join('');

    const tabs = cfg.tabs || [];
    const activeTabKey = this.filter.officeTab[deptId] || tabs[0]?.key;
    const activeTab = tabs.find(t => t.key === activeTabKey) || tabs[0];

    const tabBar = tabs.length === 0 ? '' : `
      <div class="filter-bar" style="margin-bottom:16px">
        ${tabs.map(t => `
          <button class="pill ${t.key === activeTabKey ? 'active' : ''}" data-office-tab="${escapeHtml(t.key)}">${escapeHtml(t.title)}</button>
        `).join('')}
      </div>
    `;

    let tabContent = '';
    if (activeTab) {
      if (activeTab.dynamic === 'daily-progress') {
        tabContent = this.renderDailyProgressTab(deptId, color, dept);
      } else if (activeTab.customHtml) {
        tabContent = activeTab.customHtml;
      } else {
        tabContent = `
          <div class="table-card" style="margin-bottom:16px">
            <div class="table-card-header"><h3>${escapeHtml(activeTab.title)}</h3></div>
            <div class="table-wrap">
              <table>
                <thead><tr>${activeTab.heads.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
                <tbody>
                  ${activeTab.rows.map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }
    }

    const cellQ = (v) => {
      if (v == null) return '<span style="color:var(--text-muted)">—</span>';
      const cls = v >= 90 ? 'trend-up' : v < 60 ? 'trend-down' : '';
      return `<span class="${cls}" style="font-weight:600">${v}</span>`;
    };

    const memberRows = members.length === 0
      ? `<tr><td colspan="6"><div class="empty"><div class="emoji">📭</div>此辦公室目前沒有成員<div style="font-size:13px;margin-top:4px;color:var(--text-muted)">請至「帳號管理」建立帳號並設定辦公室</div></div></td></tr>`
      : members.map(u => {
          const score = computeScore(u);
          const scoreClass = score >= 90 ? 'score-good' : score >= 80 ? 'score-ok' : 'score-bad';
          return `
            <tr>
              <td>
                <div class="employee-cell">
                  <div class="employee-avatar">${escapeHtml(u.name.slice(0,1))}</div>
                  <div>
                    <div class="employee-name">${escapeHtml(u.name)}</div>
                    <div class="employee-code">@${escapeHtml(u.username)}</div>
                  </div>
                </div>
              </td>
              <td>${cellQ(getQuarterScore(u, 'q1'))}</td>
              <td>${cellQ(getQuarterScore(u, 'q2'))}</td>
              <td>${cellQ(getQuarterScore(u, 'q3'))}</td>
              <td>${cellQ(getQuarterScore(u, 'q4'))}</td>
              <td>
                <div class="score-cell">
                  <div class="score-bar"><div class="${scoreClass}" style="width:${score}%"></div></div>
                  <span class="score-value">${score}</span>
                </div>
              </td>
            </tr>
          `;
        }).join('');

    return `
      <div class="page-header">
        <h2>
          <span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${color};vertical-align:middle;margin-right:8px"></span>
          ${cfg.icon} ${escapeHtml(dept.name)}辦公室
        </h2>
        <p>${escapeHtml(cfg.subtitle)}</p>
      </div>
      <div class="stat-grid">${statCards}</div>
      ${tabBar}
      ${tabContent}
      <div class="table-card">
        <div class="table-card-header">
          <h3>${escapeHtml(dept.name)}成員績效</h3>
          <p>共 ${members.length} 人 · 滿分 100 分 · 資料來源：帳號管理</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>員工</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>全年平均</th></tr>
            </thead>
            <tbody>${memberRows}</tbody>
          </table>
        </div>
      </div>
    `;
  },

   *  帳號管理（管理員）
   * ============================================================ */

      return `<div class="placeholder-page"><div class="emoji">🔒</div><h3>權限不足</h3><p>僅管理員可存取此頁面</p></div>`;
    }
    const users = Store.get(Store.KEYS.users, []);
    const rows = users.map(u => {
      const isAdmin = u.role === 'admin';
      const crossBadge = (isAdmin || u.crossOfficeAccess === true)
        ? `<span class="badge-role" style="background:var(--success-soft);color:var(--success)">🌐 跨辦公室</span>`
        : `<span class="badge-role" style="background:var(--warn-soft);color:var(--warn)">僅本辦公室</span>`;
      return `

          <div class="employee-avatar">${escapeHtml(u.name.slice(0,1))}</div>

      </div>
      <div class="table-card">${rows || '<div class="empty"><div class="emoji">👥</div>尚無帳號</div>'}</div>

  openUserModal(username) {
    const users = Store.get(Store.KEYS.users, []);
    const user = username ? users.find(u => u.username === username) : null;
    const isEdit = !!user;
    const departments = Store.get(Store.KEYS.departments, []);
    const u = user || { username:'', name:'', role:'staff', departments: [], crossOfficeAccess: false };
    const userDepts = getUserDepts(u);

    this.openModal({
      title: isEdit ? '編輯帳號' : '新增帳號',
      bodyHtml: `
        <div class="field"><label>姓名</label><input id="f-uname" value="${escapeHtml(u.name)}" required></div>
        <div class="field">
          <label>帳號</label>
          <input id="f-uusername" value="${escapeHtml(u.username)}" ${isEdit?'readonly':''} required>
        </div>
        <div class="field">
          <label>${isEdit ? '新密碼（留空保留原密碼）' : '初始密碼（留空預設為 123）'}</label>
          <input type="password" id="f-upassword" placeholder="${isEdit ? '不改密碼請留空' : '預設 123'}">
        </div>
        <div class="field">
          <label>權限</label>
          <select id="f-urole">
            <option value="staff" ${u.role==='staff'?'selected':''}>員工</option>
            <option value="admin" ${u.role==='admin'?'selected':''}>管理員</option>
          </select>
        </div>
        <div class="field">
          <label>辦公室（可複選）</label>
          <div id="f-udept-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:white">
            ${departments.map(d => {
              const checked = userDepts.includes(d.name);
              return `
                <label class="dept-check" data-dept-name="${escapeHtml(d.name)}" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid ${checked ? d.color : 'var(--border)'};border-radius:6px;background:${checked ? d.color+'15' : 'transparent'};cursor:pointer;transition:all .15s">
                  <input type="checkbox" class="f-udept-cb" value="${escapeHtml(d.name)}" data-color="${escapeHtml(d.color)}" ${checked ? 'checked' : ''} style="width:16px;height:16px;cursor:pointer;accent-color:${d.color}">
                  <span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${d.color}"></span>
                  <span style="font-weight:500;font-size:14px">${escapeHtml(d.name)}</span>
                </label>
              `;
            }).join('')}
          </div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:6px">
            未勾選任何辦公室＝全公司（不歸屬特定辦公室）；可同時勾選多個
          </div>
        </div>
        <div class="field" style="margin-top:4px;padding:12px;background:var(--bg);border-radius:var(--radius-sm)">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
            <input type="checkbox" id="f-ucross" ${u.crossOfficeAccess ? 'checked' : ''} style="width:16px;height:16px;cursor:pointer">
            <span style="font-weight:500">允許檢視其他辦公室的工作事項</span>
          </label>
          <div style="font-size:12px;color:var(--text-muted);margin-top:6px;padding-left:24px">
            未勾選時，僅能看到自己所屬辦公室的內容；管理員不受此限制
          </div>
        </div>
      `,
      onMount: () => {
        // 勾選/取消勾選時，更新外框視覺
        document.querySelectorAll('.f-udept-cb').forEach(cb => {
          cb.addEventListener('change', () => {
            const wrap = cb.closest('.dept-check');
            const color = cb.dataset.color;
            if (cb.checked) {
              wrap.style.border = `1px solid ${color}`;
              wrap.style.background = color + '15';
            } else {
              wrap.style.border = '1px solid var(--border)';
              wrap.style.background = 'transparent';
            }
          });
        });
      },
      onSave: () => {
        const name = document.getElementById('f-uname').value.trim();
        const usernameNew = document.getElementById('f-uusername').value.trim();
        const password = document.getElementById('f-upassword').value;
        const role = document.getElementById('f-urole').value;
        const selectedDepts = Array.from(document.querySelectorAll('.f-udept-cb'))
          .filter(cb => cb.checked)
          .map(cb => cb.value);
        const crossOfficeAccess = document.getElementById('f-ucross').checked;
        if (!name || !usernameNew) { showToast('請填寫姓名與帳號', 'error'); return false; }
        const list = Store.get(Store.KEYS.users, []);
        if (!isEdit && list.some(x => x.username.toLowerCase() === usernameNew.toLowerCase())) { showToast('帳號已存在（不分大小寫）', 'error'); return false; }
        if (isEdit) {
          const i = list.findIndex(x => x.username === user.username);
          list[i].name = name;
          list[i].role = role;
          list[i].departments = selectedDepts;
          delete list[i].department; // 移除舊欄位
          list[i].crossOfficeAccess = crossOfficeAccess;
          if (password) {
            list[i].password = hashPassword(password);
          }
        } else {
          const initialPw = password || '123';
          list.push({ username: usernameNew, name, role, departments: selectedDepts, crossOfficeAccess, password: hashPassword(initialPw) });
        }
        Store.set(Store.KEYS.users, list);

        // 若編輯的是當前登入者，更新側欄與權限
        if (isEdit && user.username === this.currentUser.username) {
          this.currentUser.name = name;
          this.currentUser.role = role;
          this.currentUser.departments = selectedDepts;
          delete this.currentUser.department;
          this.currentUser.crossOfficeAccess = crossOfficeAccess;
          this.applyUserPerms(this.currentUser);
        }

        showToast(isEdit ? '已更新' : '已新增', 'success');
        this.render();
        return true;
      },
    });
  },

  deleteUser(username) {
    if (username === this.currentUser.username) {
      showToast('不能刪除自己的帳號', 'error');
      return;
    }
    const list = Store.get(Store.KEYS.users, []);
    const user = list.find(u => u.username === username);
    if (!user) return;
    if (!confirm(`確定要刪除帳號「${user.name}」？`)) return;
    Store.set(Store.KEYS.users, list.filter(u => u.username !== username));
    showToast('已刪除', 'success');
    this.render();
  },

  /* ============================================================
   *  通用 Modal
   * ============================================================ */
  openModal({ title, bodyHtml, onSave, onMount, onCancel, saveLabel, cancelLabel }) {
    const modal = document.getElementById('modal');
    modal.innerHTML = `
      <div class="modal-header">
        <h3>${escapeHtml(title)}</h3>
        <button class="icon-btn" id="modal-close-x">✕</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
      <div class="modal-footer">
        <button class="btn-ghost" id="modal-cancel">${escapeHtml(cancelLabel || '取消')}</button>
        <button class="btn-primary" style="width:auto;padding:10px 20px" id="modal-save">${escapeHtml(saveLabel || '儲存')}</button>
      </div>
    `;
    document.getElementById('modal-backdrop').classList.add('show');
    if (onMount) onMount();
    const closeWithCancel = () => {
      if (typeof onCancel === 'function') onCancel();
      this.closeModal();
    };
    document.getElementById('modal-close-x').onclick = closeWithCancel;
    document.getElementById('modal-cancel').onclick = closeWithCancel;
    document.getElementById('modal-save').onclick = () => {
      const ok = onSave();
      if (ok) this.closeModal();
    };
  },

  closeModal() {
    document.getElementById('modal-backdrop').classList.remove('show');
  },

  closeModalOnBackdrop(e) {
    if (e.target.id === 'modal-backdrop') this.closeModal();
  },
};

window.App = App;

let __appBooted = false;
function __bootApp() {
  if (__appBooted) return; __appBooted = true;
  try {
    App.init();
    document.addEventListener('DOMContentLoaded', function() {
      var box = document.getElementById('js-status');
      if (box && !box.textContent) {
        box.style.color = 'var(--success)';
        box.textContent = '✓ 系統就緒';
      }
    });
    setTimeout(function() {
      var box = document.getElementById('js-status');
      if (box && !box.textContent) {
        box.style.color = '#10b981';
        box.textContent = '✓ 系統就緒';
      }
    }, 50);
  } catch (err) {
    alert('App 初始化失敗：' + err.message + '\n\n' + err.stack);
    var box = document.getElementById('js-status');
    if (box) box.textContent = '⚠ 初始化失敗：' + err.message;
  }
}

// 本機獨有、不可同步的鍵（session 不上雲，避免一個人登入別人也跟著登入）
const __LOCAL_ONLY_KEYS = new Set([Store.KEYS.session]);

function __localGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function __localSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
function __localRemove(key) {
  try { localStorage.removeItem(key); } catch {}
}

async function __setupCloud() {
  try {
    const cs = window.__cloudStore;
    if (!cs) throw new Error('cloudStore not available');
    const snap = await cs.getDoc();
    let cloudData = snap.exists() ? (snap.data() || {}) : {};

    // 首次遷移：雲端無資料但本機有 → 將本機 localStorage 上傳到雲端（session 除外）
    if (Object.keys(cloudData).length === 0) {
      const local = {};
      for (const k of Object.values(Store.KEYS)) {
        if (__LOCAL_ONLY_KEYS.has(k)) continue;
        try {
          const raw = localStorage.getItem(k);
          if (raw !== null) local[k] = JSON.parse(raw);
        } catch {}
      }
      if (Object.keys(local).length > 0) {
        for (const [k, v] of Object.entries(local)) {
          await cs.setField(k, v);
        }
        cloudData = local;
      }
    }

    // 保險：雲端若殘留 session 就忽略，避免授權外洩
    delete cloudData[Store.KEYS.session];

    Store._mem = cloudData;
    Store._useMem = true;

    // 蓋掉 Store.get/set/remove：
    //   - session 一律走 localStorage（避免跨裝置共用登入狀態）
    //   - 其他鍵走原本的雲端同步路徑
    const origGet = Store.get.bind(Store);
    const origSet = Store.set.bind(Store);
    const origRemove = Store.remove.bind(Store);
    Store.get = function(key, fallback) {
      if (__LOCAL_ONLY_KEYS.has(key)) return __localGet(key, fallback);
      return origGet(key, fallback);
    };
    Store.set = function(key, value) {
      if (__LOCAL_ONLY_KEYS.has(key)) { __localSet(key, value); return; }
      origSet(key, value);
      try { cs.setField(key, value); } catch (e) { console.warn('cloud sync write failed', e); }
    };
    Store.remove = function(key) {
      if (__LOCAL_ONLY_KEYS.has(key)) { __localRemove(key); return; }
      origRemove(key);
      try { cs.removeField(key); } catch (e) { console.warn('cloud sync delete failed', e); }
    };

    // 訂閱：其他人改了資料，這台會即時更新畫面
    // 但如果使用者正在 input 裡打字、或有尚未確認儲存的更動，跳過重繪避免覆蓋
    cs.subscribe((data) => {
      const next = data || {};
      delete next[Store.KEYS.session];  // 不接受雲端的 session
      Store._mem = next;
      if (!(window.App && App.currentUser && typeof App.render === 'function')) return;
      const active = document.activeElement;
      const inOurInput = active && active.tagName === 'INPUT' && (
        active.classList.contains('card-rev') || active.classList.contains('card-ads') ||
        active.classList.contains('entry-rev') || active.classList.contains('entry-ads')
      );
      // 任一卡片有未儲存更動就不要重繪（避免把使用者打到一半的數字蓋掉）
      const hasUnsavedChanges = Array.from(document.querySelectorAll('.card-rev, .card-ads')).some(el => {
        const norm = v => (v == null ? '' : String(v).trim());
        return norm(el.value) !== norm(el.dataset.original);
      });
      if (!inOurInput && !hasUnsavedChanges) App.render();
    });
  } catch (e) {
    console.error('Cloud setup failed, falling back to localStorage', e);
  }
  __bootApp();
}

if (window.__cloudStore) {
  __setupCloud();
} else {
  window.addEventListener('cloudStoreReady', __setupCloud, { once: true });
  // 後門：若 module script 5 秒內沒就緒（網路問題等），先用 localStorage 啟動
  setTimeout(() => { if (!__appBooted) __bootApp(); }, 5000);
}
</script>
